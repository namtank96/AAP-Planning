<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AAP 채용 v0.1 — AAP Run 설명 데모 (Simulation PoC)</title>
<!--
  v0.1 — 제조사(반도체) 경력직 채용 AAP Run 설명 데모 (BD·경영진용 4장면 시연).
  · 캐논 템플릿 = 손해사정 v0.56(검증된 4장면 골격). CSS 토큰·클래스 1:1 재사용, 의미축만 채용으로 재배치.
    손해사정 충돌축(과실↔상해) → 채용 충돌축(사내 ATS 기록 ↔ 외부 재직검증) / 통제축(공정성·차별금지) 으로 교체.
  · 손해사정의 탭1(방식 비교)·탭2(아키텍처 포스터)는 채용 데모에서 제거 → 4장면 단독 페이지로 슬림화('삭제가 핵심').
  · 좌=고객(채용팀) 업무 콘솔(적합도 점수·신뢰도 비노출), 우=AAP 6단계 Runtime 작동 흐름(다크 엔진룸).
  · key message: 단일 AI는 이력서 점수 하나 내고 끝, AAP는 한 채용 건을 직무요건 해석→평가 분해→공정성·검증 게이트로 사람에게 이관→확정·기록까지 잇는다.
  · 5타입 색: Agent=teal · Module=violet · 기존솔루션=cyan · Connector=blue · Policy=amber.
  · 도메인 수치 = Simulation 가정값(데이터 트랙 case REQ-IC-2042). SME 검증 전 가정값 표기.
  · 단일 HTML · 외부 라이브러리 0.
-->
<style>
  :root{
    --ink:#0F172A;--bg:#FFFFFF;--surf:#F8FAFC;--border:#E5E7EB;--muted:#64748B;--line:#EEF1F4;--slate:#475569;
    --aap:#0D9488;--aap-soft:#ECFDF5;--aap-border:#5EEAD4;--aap-ink:#0F766E;
    --green:#15803D;--green-soft:#F0FDF4;--green-border:#86EFAC;--mint:#10B981;--mint-soft:#ECFDF5;--mint-border:#A7F3D0;--mint-ink:#047857;
    --amber:#D97706;--amber-soft:#FFFBEB;--amber-border:#FDE68A;--amber-ink:#B45309;
    --danger:#DC2626;--danger-soft:#FEF2F2;--danger-border:#FECACA;--danger-ink:#B91C1C;
    --blue:#1D4ED8;--blue-soft:#EFF6FF;--blue-border:#BFDBFE;--blue-ink:#1E40AF;
    --violet:#6D28D9;--violet-soft:#F5F3FF;--violet-border:#DDD6FE;
    --cyan:#0891B2;--cyan-soft:#ECFEFF;--cyan-border:#A5F0FC;--cyan-ink:#0E7490;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 4px 14px rgba(15,23,42,.05);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.55;font-size:14px}
  .wrap{max-width:1240px;margin:0 auto;padding:16px 22px 60px}

  header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:4px 0 10px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
  .logo .dot{width:11px;height:11px;border-radius:3px;background:var(--aap)}
  .badge-sim{margin-left:auto;background:var(--ink);color:#fff;border-radius:999px;padding:5px 12px;font-size:11px;font-weight:600}
  .badge-val{background:var(--amber-soft);color:var(--amber-ink);border:1px solid var(--amber-border);border-radius:999px;padding:5px 11px;font-size:11px;font-weight:700}

  .casebox{border:1px solid var(--border);border-radius:13px;background:#fff;box-shadow:var(--shadow);padding:12px 16px;margin-bottom:13px}
  .casebox h2{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .casebox .cdesc{font-size:12px;color:var(--slate);line-height:1.6;margin-top:5px}
  .casebox .cdesc b{color:var(--ink);font-weight:800}
  .casebox .ckey{font-size:12px;font-weight:700;color:var(--aap-ink);background:var(--aap-soft);border:1px solid var(--aap-border);border-radius:9px;padding:8px 12px;margin-top:8px;line-height:1.5}

  /* 콘솔 셸 */
  .pc{border:1px solid var(--border);border-radius:13px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
  .pc-top{display:flex;align-items:center;gap:10px;background:#0F172A;color:#fff;padding:9px 14px;flex-wrap:wrap}
  .pc-top .pc-brand{font-size:12px;font-weight:800;display:flex;align-items:center;gap:7px}
  .pc-top .pc-brand i{width:9px;height:9px;border-radius:2px;background:var(--aap);display:inline-block}
  .pc-top .pc-crumb{font-size:10.5px;font-weight:600;color:#94A3B8}
  .pc-top .pc-crumb b{color:#E2E8F0;font-weight:800}
  .pc-top .pc-user{margin-left:auto;font-size:10.5px;font-weight:700;color:#CBD5E1}

  .rs-strip{display:flex;align-items:center;gap:2px;background:#F1F5F9;border-bottom:1px solid var(--border);padding:8px 12px;flex-wrap:wrap}
  .rs-strip .rs-sep{color:var(--muted);font-weight:800;font-size:11px;margin:0 1px}
  .rs-step{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:9px;cursor:pointer;opacity:.6;transition:opacity .15s,background .15s}
  .rs-step:hover{opacity:.92;background:#fff}
  .rs-step .rs-n{font-size:11px;font-weight:800;color:var(--muted)}
  .rs-step .rs-t{font-size:10.5px;font-weight:700;color:var(--slate)}
  .rs-step.on{opacity:1;background:#fff;box-shadow:0 1px 6px rgba(13,148,136,.18)}
  .rs-step.on .rs-n{color:var(--aap)}.rs-step.on .rs-t{color:var(--aap-ink);font-weight:800}
  .rs-step.done{opacity:.9}.rs-step.done .rs-n{color:var(--mint-ink)}
  .rs-main{padding:14px 18px;min-height:470px}
  .rs-nav{display:flex;align-items:center;gap:9px;padding:11px 16px;border-top:1px solid var(--border);background:#F8FAFC;flex-wrap:wrap}
  .rs-nav .rs-pos{font-size:10px;font-weight:800;color:var(--muted)}

  /* 좌/우 2분할 */
  .scene-2col{display:grid;grid-template-columns:1.9fr 1fr;gap:14px;align-items:start}
  @media(max-width:980px){.scene-2col{grid-template-columns:1fr}}
  .scene-l{display:flex;flex-direction:column;gap:11px;min-width:0}

  .ex-note{font-size:10px;font-weight:800;color:var(--aap-ink);background:var(--aap-soft);border:1px dashed var(--aap-border);border-radius:9px;padding:7px 12px;line-height:1.4}

  /* 장면 1 */
  .run-header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:linear-gradient(135deg,#0F172A,#1E293B);color:#fff;border-radius:13px;padding:13px 16px;box-shadow:var(--shadow)}
  .run-header .rh-id{font-size:12px;font-weight:800;color:#5EEAD4}
  .run-header .rh-st{font-size:11px;font-weight:600;color:#CBD5E1;line-height:1.5;margin-top:3px}
  .run-header .rh-next{margin-left:auto;text-align:right}
  .run-header .rh-next span{display:block;font-size:8.5px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.03em}
  .run-header .rh-next b{font-size:13px;font-weight:800;color:#fff}
  .run-msg{font-size:12px;font-weight:800;color:var(--ink);background:linear-gradient(135deg,#ECFDF5,#F0FDFA);border:1px solid var(--aap-border);border-left:4px solid var(--aap);border-radius:11px;padding:12px 15px;line-height:1.6}
  .run-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
  @media(max-width:640px){.run-hero{grid-template-columns:repeat(2,1fr)}}
  .rhc{border:1px solid var(--border);border-radius:12px;background:#fff;box-shadow:var(--shadow);padding:11px 13px}
  .rhc b{display:block;font-size:18px;font-weight:800;color:var(--ink);line-height:1}
  .rhc span{display:block;font-size:9px;font-weight:700;color:var(--muted);margin-top:5px;line-height:1.3}
  .rhc.t-mint{border-top:3px solid var(--mint)}.rhc.t-amber{border-top:3px solid var(--amber)}.rhc.t-red{border-top:3px solid var(--danger)}
  .t3-sech{font-size:10px;font-weight:800;color:var(--ink);margin:2px 0 -2px}
  .run-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  @media(max-width:680px){.run-3col{grid-template-columns:1fr}}
  .run-col{border:1px solid var(--border);border-radius:11px;padding:10px 12px}
  .run-col-h{font-size:9.5px;font-weight:800;margin-bottom:7px}
  .run-col ul{list-style:none;display:flex;flex-direction:column;gap:4px}
  .run-col li{font-size:9.5px;font-weight:700;color:var(--slate);line-height:1.4;padding-left:13px;position:relative}
  .run-col li::before{content:'·';position:absolute;left:3px;font-weight:900}
  .run-col.t-aap{background:var(--aap-soft);border-color:var(--aap-border)}.run-col.t-aap .run-col-h{color:var(--aap-ink)}.run-col.t-aap li::before{color:var(--aap)}
  .run-col.t-human{background:var(--amber-soft);border-color:var(--amber-border)}.run-col.t-human .run-col-h{color:var(--amber-ink)}.run-col.t-human li::before{color:var(--amber)}
  .run-col.t-after{background:var(--surf)}.run-col.t-after .run-col-h{color:var(--slate)}.run-col.t-after li::before{color:var(--muted)}

  /* 장면 공통 헤더 */
  .t3sum{border:1px solid var(--border);border-radius:12px;background:linear-gradient(180deg,#FCFEFE,#F6FAFB);box-shadow:var(--shadow);padding:11px 13px}
  .t3sum-h{font-size:13px;font-weight:800;color:var(--ink)}
  .t3sum-sub{font-size:9.5px;font-weight:700;color:var(--muted);line-height:1.5;margin-top:4px}
  .t3-note{font-size:9.5px;font-weight:600;color:var(--muted);line-height:1.5;background:var(--surf);border:1px solid var(--border);border-radius:9px;padding:8px 11px}
  .t3-note.boundary{border-color:var(--aap-border);background:var(--aap-soft);color:var(--aap-ink);font-weight:700}

  /* 장면 2 — 판단 카드 */
  .dec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-items:stretch}
  @media(max-width:820px){.dec-grid{grid-template-columns:1fr}}
  .dec-card2{border:1px solid var(--border);border-top:4px solid var(--amber);border-radius:12px;background:#fff;box-shadow:var(--shadow);padding:12px 13px;display:flex;flex-direction:column;gap:7px}
  .dec-card2.t-red{border-top-color:var(--danger)}.dec-card2.t-amber{border-top-color:var(--amber)}
  .dec-card2.done{opacity:.74;border-top-color:var(--mint)}
  .dec-card2 .dec-h{display:flex;align-items:center;gap:7px}
  .dec-card2 .dec-title{font-size:13px;font-weight:800;color:var(--ink)}
  .dt-badge{font-size:9px;font-weight:800;border-radius:6px;padding:2px 8px;border:1px solid}
  .dt-badge.t-red{background:var(--danger-soft);color:var(--danger-ink);border-color:var(--danger-border)}
  .dt-badge.t-amber{background:var(--amber-soft);color:var(--amber-ink);border-color:var(--amber-border)}
  .dec-card2 .dec-intro{font-size:11px;font-weight:800;color:var(--danger-ink);margin:0}
  .dec-card2.t-amber .dec-intro{color:var(--amber-ink)}
  .dec-why{font-size:10px;font-weight:700;color:var(--slate);line-height:1.45}
  .dec-2b{display:flex;flex-direction:column;gap:7px}
  .dec-card2 .t3b{border:1px solid var(--border);border-radius:9px;padding:7px 9px}
  .dec-card2 .t3b-h{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
  .dec-card2 .t3b.t-aap{background:var(--aap-soft);border-color:var(--aap-border)}.dec-card2 .t3b.t-aap .t3b-h{color:var(--aap-ink)}
  .dec-card2 .t3b.t-human{background:var(--amber-soft);border-color:var(--amber-border)}.dec-card2 .t3b.t-human .t3b-h{color:var(--amber-ink)}
  .dec-card2 .t3b ul{list-style:none;display:flex;flex-direction:column;gap:2px}
  .dec-card2 .t3b li{font-size:9.5px;font-weight:700;color:var(--slate);line-height:1.4;padding-left:11px;position:relative}
  .dec-card2 .t3b li::before{content:'·';position:absolute;left:3px;font-weight:900;color:var(--muted)}
  /* 검증 불일치 — 실재 출처 2블록 대비 */
  .src2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .src-b{border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:9px;font-weight:700;line-height:1.4}
  .src-b .src-k{font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:2px}
  .src-b.s-in{background:var(--blue-soft);border-color:var(--blue-border);color:var(--blue-ink)}
  .src-b.s-ex{background:var(--danger-soft);border-color:var(--danger-border);color:var(--danger-ink)}
  .src-vs{text-align:center;font-size:8px;font-weight:800;color:var(--danger);margin:2px 0}
  .dec-card2 .recommended-action{margin-top:auto;margin-bottom:0}
  .action-label{font-size:8.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
  .recommended-action .sc-act{font-size:12px;font-weight:800;padding:10px 16px;width:100%}
  .sc-act{font:inherit;font-size:11px;font-weight:800;border-radius:9px;padding:9px 13px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--slate)}
  .sc-act.amber{color:var(--amber-ink);border-color:var(--amber-border)}
  .sc-act.red{color:var(--danger-ink);border-color:var(--danger-border)}
  .sc-act.mint{color:var(--mint-ink);border-color:var(--mint-border)}
  .sc-act.reco{border-color:var(--aap);color:var(--aap-ink);box-shadow:0 0 0 2px rgba(13,148,136,.16)}
  .dec-done-row{margin-top:auto;font-size:10px;font-weight:800;color:var(--mint-ink);background:var(--mint-soft);border:1px solid var(--mint-border);border-radius:8px;padding:8px 10px;line-height:1.45}

  /* 장면 3 — 구조 / Agent 분해 */
  .ag-stage{display:flex;flex-direction:column;gap:7px}
  .ag-band.ctx{background:var(--blue-soft);border:1px solid var(--blue-border);border-radius:11px;padding:10px 13px}
  .ag-band-h{font-size:9.5px;font-weight:800;color:var(--slate);text-transform:uppercase;letter-spacing:.03em}
  .ag-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .ag-chip{font-size:9.5px;font-weight:700;color:var(--blue-ink);background:#fff;border:1px solid var(--blue-border);border-radius:7px;padding:3px 9px}
  .ag-down{text-align:center;font-size:9px;font-weight:800;color:var(--muted)}
  .ag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  @media(max-width:820px){.ag-grid{grid-template-columns:repeat(2,1fr)}}
  .ag-grid .wb-ag{border:1px solid var(--border);border-radius:10px;background:#fff;box-shadow:var(--shadow);padding:9px 11px}
  .ag-grid .wb-ag.t-amber{border-top:3px solid var(--amber)}.ag-grid .wb-ag.t-red{border-top:3px solid var(--danger)}.ag-grid .wb-ag.t-blue{border-top:3px solid var(--blue)}.ag-grid .wb-ag.t-aap{border-top:3px solid var(--aap)}
  .wb-ag-verb{font-size:11px;font-weight:800;color:var(--ink);line-height:1.3}
  .wb-ag-o{font-size:9.5px;font-weight:800;color:var(--aap-ink);margin-top:3px;line-height:1.35}
  .wb-ag-foot{display:flex;align-items:center;gap:6px;margin-top:5px;border-top:1px solid var(--line);padding-top:5px}
  .wb-ag-badge{font-size:7.5px;font-weight:800;color:var(--violet);background:var(--violet-soft);border:1px solid var(--violet-border);border-radius:5px;padding:1px 6px}
  .ho-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
  @media(max-width:820px){.ho-grid{grid-template-columns:1fr}}
  .ho-grid .wb-ho{border:1px solid var(--violet-border);border-left:3px solid var(--violet);border-radius:10px;background:var(--violet-soft);padding:9px 12px}
  .ho-grid .wb-ho-from{font-size:10px;font-weight:800;color:var(--violet)}
  .wb-ho-flow{font-size:10.5px;font-weight:800;color:var(--ink);margin:3px 0}
  .ho-grid .wb-ho-im{font-size:9px;font-weight:700;color:var(--slate);line-height:1.4}
  .ag-integ{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  @media(max-width:680px){.ag-integ{grid-template-columns:1fr}}
  .agi{border:1px solid var(--border);border-radius:10px;background:#fff;box-shadow:var(--shadow);padding:10px 12px;font-size:9.5px;font-weight:700;color:var(--muted)}
  .agi b{display:block;font-size:15px;font-weight:800;color:var(--ink);margin-bottom:3px}
  .agi.t-mint{border-top:3px solid var(--mint)}.agi.t-amber{border-top:3px solid var(--amber)}.agi.t-red{border-top:3px solid var(--danger)}
  /* 5타입 범례 */
  .type-leg{display:flex;flex-wrap:wrap;gap:8px;font-size:8.5px;font-weight:700;color:var(--slate);background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:6px 9px}
  .type-leg span{display:inline-flex;align-items:center;gap:4px}
  .type-leg i{width:8px;height:8px;border-radius:2px;display:inline-block}
  .tl-a{background:var(--aap)}.tl-m{background:var(--violet)}.tl-s{background:var(--cyan)}.tl-c{background:var(--blue)}.tl-p{background:var(--amber)}

  /* 장면 4 */
  .commit-grid{display:grid;grid-template-columns:1.05fr 1.4fr 1.05fr;gap:10px;align-items:start}
  @media(max-width:880px){.commit-grid{grid-template-columns:1fr}}
  .ops-card{border:1px solid var(--border);border-radius:11px;background:#fff;box-shadow:var(--shadow);padding:10px 12px}
  .ops-ch{font-size:10px;font-weight:800;color:var(--ink);margin-bottom:7px}
  .ops-row{display:flex;justify-content:space-between;gap:10px;font-size:10px;font-weight:700;padding:5px 0;border-top:1px solid var(--line)}
  .ops-row:first-of-type{border-top:0}
  .ops-row span{color:var(--muted)}.ops-row b{color:var(--ink);font-weight:800;text-align:right}
  .rlog{display:flex;flex-direction:column;gap:5px;margin-top:5px}
  .rlog-row{display:grid;grid-template-columns:36px 78px minmax(0,1fr);gap:8px;align-items:center}
  .rlog-t{font-size:9.5px;font-weight:800;color:var(--muted)}
  .rlog-k{font-size:8px;font-weight:800;border-radius:5px;padding:2px 6px;text-align:center;white-space:nowrap}
  .rlog-k.t-blue{background:var(--blue-soft);color:var(--blue-ink)}.rlog-k.t-violet{background:var(--violet-soft);color:var(--violet)}.rlog-k.t-slate{background:#E2E8F0;color:var(--slate)}.rlog-k.t-amber{background:var(--amber-soft);color:var(--amber-ink)}.rlog-k.t-mint{background:var(--mint-soft);color:var(--mint-ink)}.rlog-k.t-cyan{background:var(--cyan-soft);color:var(--cyan-ink)}
  .rlog-x{font-size:10px;font-weight:700;color:var(--slate);line-height:1.4}
  .rlog-hint{margin-top:8px;font-size:9px;font-weight:700;color:var(--muted);font-style:italic;line-height:1.4}
  .sc-crit{list-style:none;display:flex;flex-direction:column;gap:4px}
  .sc-crit li{font-size:10px;font-weight:600;color:var(--slate);padding-left:14px;position:relative;line-height:1.4}
  .sc-crit li::before{content:'·';position:absolute;left:4px;color:var(--aap);font-weight:900}

  /* 우측 — AAP 6단계 Runtime (다크 엔진룸) */
  .rt-panel{position:sticky;top:12px;background:#0B1220;border:1px solid #1E293B;border-radius:13px;padding:13px 14px;box-shadow:var(--shadow)}
  .rt-h{font-size:9px;font-weight:800;color:#5EEAD4;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px}

<script>
/* ===== 도메인 데이터 (Simulation 가정값 · 데이터 트랙 case REQ-IC-2042) ===== */
const CASE={

};
const EX_NOTE='이 직무는 예시입니다. 보여주는 건 AAP가 한 채용 건을 이해·분해·통제·기록까지 잇는 방식입니다.';
const RUN_MSG='단일 AI는 후보마다 점수 한 줄로 끝납니다 — AAP는 그 점수 뒤를 분해·검증·통제·기록으로 잇습니다.';

const UI_STATE={ scene:0 };
const STATE={ acted:{}, dynLogs:[],
  sys:{ ats:'전형단계 갱신 준비', interview:'면접 일정 후보 확정 대기', notice:'합/불 통보 발송 대기(승인 후)', offer:'오퍼 결재 상신 대기' } };

/* ===== 장면 2 — AAP가 넘긴 판단 3건 (HITL) ===== */
const DECISIONS=[
  {id:'verify', type:'검증', tone:'red', title:'경력 진위·재직 검증 불일치',
   intro:'AAP가 자동 통과시키지 않았습니다.',
   why:'사내 지원서 기록과 외부 재직검증 결과가 서로 다릅니다. 진위 판단은 책임이 큰 지점이라 담당자에게 남겼습니다.',
   src:{ in:'2018.03~2021.09 (3.5년) · 사내 ATS 지원서', ex:'2018.09~2021.09 (3.0년) · 외부 재직검증' },
   aap:['재직기간 6개월 차 → 총경력이 필수 5년 경계로 이동','사내 기록과 외부 검증의 실재 출처 충돌','자격·학위 검증은 일치'],
   human:['어느 출처를 사실로 볼지','추가 경력증명 요청 여부'], act:'추가 경력증명 요청',
   log:[['담당자 판단','담당자가 추가 경력증명 요청을 선택했습니다.'],['시스템 반영','후보에게 경력증명 보완 요청 안내를 발송 준비 상태로 만들었습니다.']],
   onAct:function(){ STATE.sys.notice='경력증명 보완 요청 발송 준비'; } },
  {id:'border', type:'적합도', tone:'amber', title:'직무 적합도 보더라인',
   intro:'AAP가 합/불을 확정하지 않았습니다.',
   why:'필수역량은 충족하나 우대역량 일부가 비어 경계 구간에 있습니다. 면접 진행 여부는 담당자 판단으로 남겼습니다.',
   aap:['필수역량 충족 (회로설계·DRC/LVS·PDK)','우대역량 일부 미충족 (Synopsys 툴체인)','보더라인 구간 — 자동 확정 ✕'],
   human:['면접 진행 여부','검증할 우대역량 항목'], act:'면접 진행',
   log:[['담당자 판단','담당자가 보더라인 후보의 면접 진행을 결정했습니다.'],['시스템 반영','면접 일정 후보를 생성하고 전형단계를 면접으로 갱신 준비했습니다.']],
   onAct:function(){ STATE.sys.interview='면접 일정 후보 3안 생성'; } },
  {id:'offer', type:'처우', tone:'amber', title:'처우·오퍼 권한 경계',
   intro:'AAP가 처우를 확정하지 않았습니다.',
   why:'동등 수준 후보 2명의 처우안이 정의된 밴드 상단을 넘어, 결재 권한 경계에서 멈췄습니다.',
   aap:['동등 후보 2명 처우안 비교','제시안이 처우밴드 상단 초과','오퍼 확정은 결재 권한 필요'],
   human:['밴드 초과 승인 여부','오퍼 결재 상신'], act:'결재 상신',
   log:[['담당자 판단','담당자가 처우안 결재 상신을 선택했습니다.'],['시스템 반영','처우 결재를 상신 대기 상태로 생성했습니다.']],
   onAct:function(){ STATE.sys.offer='처우 결재 상신'; } }
];

/* ===== 장면 3 — 공통 맥락 → Agent 분해 → A2A → 통합 ===== */
const CTX=['직무요건(JD)','필수역량','우대역량','처우밴드','공정성 정책'];
const AGENTS=[
  {verb:'직무 적합도를 평가했습니다', label:'적합도 Agent', out:'역량 항목별 충족·미충족 정리', tone:'aap'},
  {verb:'경력 진위를 대조했습니다', label:'경력검증 Agent', out:'사내 기록 ↔ 외부 검증 불일치 발견', tone:'red'},
  {verb:'처우 기준을 산정했습니다', label:'처우 Agent', out:'밴드 대비 동등 후보 비교', tone:'amber'},
  {verb:'전형 종합을 정리했습니다', label:'통합 Agent', out:'자동 / 검토 / 보류 분기', tone:'blue'}
];
const HANDOFFS=[
  {h:'검증 결과 전달', flow:'경력검증 Agent → 통합 Agent', desc:'재직 불일치가 통합 판단에 반영되어, 자동 통과 대신 검토로 라우팅됩니다.'},
  {h:'처우 결과 전달', flow:'처우 Agent → 통합 Agent', desc:'밴드 초과 신호가 통합 판단에 전달되어 결재 권한 경계로 분기됩니다.'}
];

/* ===== 장면 4 — 실행형 로그 ===== */
const BASE_LOGS=[
  {t:'10:02', kind:'근거 확인', x:'JD·지원서·자격증명을 수집했습니다.'},
  {t:'10:04', kind:'공정성 적용', x:'성별·연령·출신지역 항목을 평가에서 자동 배제하고 사유를 기록했습니다.'},
  {t:'10:06', kind:'Agent 실행', x:'적합도·경력검증·처우를 동시에 검토했습니다.'},
  {t:'10:08', kind:'기준 검토', x:'재직 불일치·보더라인·처우 초과를 담당자 판단으로 넘겼습니다.'}
];
const KIND_TONE={'근거 확인':'blue','공정성 적용':'cyan','Agent 실행':'violet','기준 검토':'slate','담당자 판단':'amber','시스템 반영':'mint'};

/* ===== 우측 6단계 Runtime + 상시 레이어 (장면별 진행 점등) ===== */
const RUNTIME=[
  {nm:'Input · 요청 접수', d:'채용 건·지원자 풀 접수'},
  {nm:'Semantic Mapping · 업무 이해', d:'비정형 JD → 통제 가능한 역량 평가 항목'},
  {nm:'Agent Execution · 실행', d:'적합도·검증·처우 Agent 병렬 실행'},
  {nm:'Rule / Model · 평가', d:'임계값·검증 일치 규칙 결정론 산정', gate:'공정성 게이트'},
  {nm:'Guardrail · 통제', d:'검증 불일치·보더라인·권한 경계 멈춤', gate:'HITL 3건'},
  {nm:'Writeback / Log · 반영·기록', d:'전형단계 갱신·통보 준비·Decision Lineage', gate:'외부 발송 게이트'}
];
/* 장면 인덱스별 Runtime 진행 위치 (done 까지 / on 단계) */
const SCENE_RT=[ {done:1,on:1}, {done:4,on:4}, {done:2,on:2}, {done:6,on:5} ];
const AMBIENT=['Master Agent','JD·역량 온톨로지','공정성 Guardrail','감사 로그·Decision Lineage'];

function renderRuntime(){
  const i=UI_STATE.scene, rt=SCENE_RT[i];
  const steps=RUNTIME.map((s,k)=>{
    const cls=k<rt.done?(k===rt.on?'on':'done'):(k===rt.on?'on':'');
    return `<div class="rt-step ${cls}"><div class="rt-ix">${k<rt.done&&k!==rt.on?'✓':(k+1)}</div>`+
      `<div class="rt-bd"><div class="rt-nm">${s.nm}</div><div class="rt-d">${s.d}</div>`+
      (s.gate?`<span class="rt-gate">★ ${s.gate}</span>`:'')+`</div></div>`;
  }).join('');
  return `<aside class="rt-panel"><div class="rt-h"><span class="rt-dot"></span>AAP 작동 흐름 · 6단계 Runtime</div>`+

    `<div class="rt-amb-chips">${AMBIENT.map(a=>`<span class="rt-amb-chip">${a}</span>`).join('')}</div></div></aside>`;
}

/* ===== 액션 — 장면 2 권장 액션 클릭 → 장면 4 이력 반영 (toast 없이) ===== */
let logSeq=8;
function doDecision(id){
  const d=DECISIONS.find(x=>x.id===id); if(!d||STATE.acted[id])return;

  renderTab3();
}

function renderDecisions(){
  const sum=`<div class="t3sum"><div class="t3sum-h">AAP가 넘긴 판단 3건 — ${CASE.id}</div><div class="t3sum-sub">AAP가 공통 맥락을 먼저 정리한 뒤, 책임·법적 리스크가 큰 판단만 담당자에게 남겼습니다. 멈춘 곳이 AAP가 통제한다는 증거입니다.</div></div>`;

    const src=d.src?`<div class="src2"><div class="src-b s-in"><div class="src-k">사내 기록</div>${d.src.in}</div><div class="src-b s-ex"><div class="src-k">외부 검증</div>${d.src.ex}</div></div><div class="src-vs">▲ 실재 출처 불일치</div>`:'';

      : `<div class="recommended-action"><div class="action-label">권장 액션</div><button class="sc-act ${d.tone==='red'?'red':'amber'} reco" data-dec="${d.id}">${d.act}</button></div>`;
    return `<div class="dec-card2 t-${d.tone}${acted?' done':''}"${d.id==='verify'?' data-guide="decision-card"':''}>`+
      `<div class="dec-h"><span class="dt-badge t-${d.tone}">${d.type}</span><span class="dec-title">${d.title}</span></div>`+
      `<div class="dec-intro">${d.intro}</div><div class="dec-why">${d.why}</div>`+src+
      `<div class="dec-2b"><div class="t3b t-aap"><div class="t3b-h">AAP가 확인한 것</div><ul>${chk}</ul></div><div class="t3b t-human"><div class="t3b-h">담당자가 판단할 것</div><ul>${hum}</ul></div></div>`+
      act+`</div>`;
  };
  return sum+`<div class="dec-grid">${DECISIONS.map(card).join('')}</div>`+
    `<div class="t3-note">AAP가 멈춘 곳은 자동화 실패가 아니라 책임·법적 판단 지점입니다. 차별 소지·검증 불일치는 자동 통과시키지 않습니다.</div>`;
}

/* ===== 장면 3 — 채용 건 구조 / Agent 결과 전달 ===== */
function renderStructure(){
  const sum=`<div class="t3sum"><div class="t3sum-h">채용 건 구조 / Agent 간 결과 전달 — ${CASE.id}</div><div class="t3sum-sub">AAP는 Agent를 많이 띄우는 게 아니라, 업무를 이해해 실행 구조를 구성합니다. 검증은 Connector, 평가룰·공정성은 Policy/Module로 끝내고 Agent는 4개만 둡니다.</div></div>`;
  const leg=`<div class="type-leg"><span><i class="tl-a"></i>Agent</span><span><i class="tl-m"></i>Module(JD·평가 정규화)</span><span><i class="tl-s"></i>기존 솔루션(ATS·AI:ON-U)</span><span><i class="tl-c"></i>Connector(HRIS·재직검증)</span><span><i class="tl-p"></i>Policy(공정성·임계값·권한)</span></div>`;
  const ctx=`<div class="ag-band ctx"><div class="ag-band-h">공통 채용 맥락</div><div class="ag-chips">${CTX.map(c=>`<span class="ag-chip">${c}</span>`).join('')}</div></div>`;
  const ags=`<div class="ag-band-h">Agent 작업 분해 — 같은 맥락을 나눠 맡김</div><div class="ag-grid">${AGENTS.map(a=>`<div class="wb-ag t-${a.tone}"><div class="wb-ag-verb">${a.verb}</div><div class="wb-ag-o">${a.out}</div><div class="wb-ag-foot"><span class="wb-ag-badge">${a.label}</span></div></div>`).join('')}</div>`;
  const ho=`<div class="ag-band-h">Agent 간 결과 전달 (A2A)</div><div class="ho-grid">${HANDOFFS.map(h=>`<div class="wb-ho"><div class="wb-ho-from">${h.h}</div><div class="wb-ho-flow">${h.flow}</div><div class="wb-ho-im">↳ ${h.desc}</div></div>`).join('')}</div>`;
  const integ=`<div class="ag-band-h">통합 결과 — 자동 / 검토 / 보류 분기</div><div class="ag-integ"><div class="agi t-mint"><b>${CASE.autoPass}명</b>자동 통과 (요건 명확)</div><div class="agi t-amber"><b>${CASE.humanN}건</b>담당자 판단</div><div class="agi t-red"><b>${CASE.autoHold}명</b>자동 보류 (게이트)</div></div>`;
  const stage=`<div class="ag-stage" data-guide="case-structure">${leg}${ctx}<div class="ag-down">↓ 같은 맥락 공유</div>${ags}<div class="ag-down">↓ Agent 결과를 서로 전달</div>${ho}<div class="ag-down">↓ 통합</div>${integ}</div>`;
  return sum+stage+`<div class="t3-note">검증=Connector+규칙, 공정성·임계값·권한=Policy/규칙, JD 해석=Module로 먼저 끝냈기에 Agent는 4개로 충분합니다. ‘많은 Agent’가 아니라 ‘업무에 맞는 구성’입니다.</div>`;
}

/* ===== 장면 4 — 확정 후 반영 / 판단 이력 ===== */
function renderCommit(){
  const sum=`<div class="t3sum"><div class="t3sum-h">확정 후 반영 / 판단 이력 — ${CASE.id}</div><div class="t3sum-sub">담당자가 승인하면 AAP가 전형단계·면접 일정·통보·결재 반영을 준비합니다. 외부 발송과 최종 확정은 승인·결재 권한에 따릅니다.</div></div>`;
  const reflect=`<div class="ops-card" data-guide="commit-card"><div class="ops-ch">승인하면 반영될 일</div>`+
    `<div class="ops-row"><span>전형 시스템(ATS)</span><b>${STATE.sys.ats}</b></div>`+
    `<div class="ops-row"><span>면접 일정</span><b>${STATE.sys.interview}</b></div>`+
    `<div class="ops-row"><span>후보 통보</span><b>${STATE.sys.notice}</b></div>`+
    `<div class="ops-row"><span>오퍼 결재</span><b>${STATE.sys.offer}</b></div>`+
    `<div class="ops-row"><span>Decision Lineage</span><b>평가 근거·검증 출처·배제 사유 기록</b></div></div>`;
  const logs=BASE_LOGS.concat(STATE.dynLogs);
  const rows=logs.map(l=>`<div class="rlog-row"><span class="rlog-t">${l.t}</span><span class="rlog-k t-${KIND_TONE[l.kind]||'slate'}">${l.kind}</span><span class="rlog-x">${l.x}</span></div>`).join('');
  const hist=`<div class="ops-card"><div class="ops-ch">AAP가 한 일 · 판단·실행 이력</div><div class="rlog">${rows}</div>`+
    (STATE.dynLogs.length?'':`<div class="rlog-hint">담당자가 장면 2에서 승인하면 반영 이력이 여기에 이어집니다.</div>`)+`</div>`;
  const evid=`<div class="ops-card"><div class="ops-ch">책임 있게 멈춘 증거</div><ul class="sc-crit"><li>성별·연령·출신지역 평가 배제 + 사유 기록</li><li>검증 불일치 자동 통과 차단</li><li>처우 밴드 초과 결재 권한 정지</li><li>평가 근거·검증 출처 재현 가능(Decision Lineage)</li><li><b>HITL은 자동화 실패가 아니라 책임·법적 판단 지점입니다.</b></li></ul></div>`;
  const boundary=`<div class="t3-note boundary">AAP는 반영을 준비하고 요청합니다. 합/불 통보·면접 초대 발송과 오퍼 최종 확정은 담당자 승인 및 결재 권한 기준에 따릅니다.</div>`;
  return sum+`<div class="commit-grid">${reflect}${hist}${evid}</div>`+boundary;
}

/* ===== 콘솔 셸 — 4장면 시연 흐름 ===== */
const T3_SCENES=[
  {id:'run', t:'AAP Run Summary', r:renderRunSummary},
  {id:'decisions', t:'AAP가 넘긴 판단 3건', r:renderDecisions},
  {id:'structure', t:'채용 건 구조 / Agent 결과 전달', r:renderStructure},
  {id:'commit', t:'확정 후 반영 / 판단 이력', r:renderCommit}
];
function renderTab3(){
  const host=document.getElementById('pcConsole'); if(!host)return;
  const i=UI_STATE.scene, last=T3_SCENES.length-1;
  const strip=T3_SCENES.map((s,k)=>`<div class="rs-step${k===i?' on':''}${k<i?' done':''}" data-scene="${k}"><span class="rs-n">0${k+1}</span><span class="rs-t">${s.t}</span></div>`).join('<span class="rs-sep">›</span>');
  const nav=`<div class="rs-nav"><button class="t3-btn ghost" data-nav="prev"${i===0?' disabled':''}>‹ 이전</button>`+
    `<button class="t3-btn ghost" data-nav="home">처음으로</button>`+
    `<span class="rs-pos">${i+1} / ${T3_SCENES.length}</span>`+
    `<button class="guide-btn" id="guideBtn" type="button">▶ AAP가 한 일 따라보기</button>`+
    (i<last?`<button class="t3-btn primary" data-nav="next">다음: ${T3_SCENES[i+1].t} ›</button>`:`<button class="t3-btn primary" data-nav="home">처음으로 ↺</button>`)+`</div>`;
  host.innerHTML=`<div class="pc"><div class="pc-top"><span class="pc-brand"><i></i>채용 콘솔 · AAP Run 설명 데모</span><span class="pc-crumb">예시 채용 건 · <b>${CASE.id}</b></span><span class="pc-user">BD·경영진용 설명 화면</span></div>`+
    `<div class="rs-strip">${strip}</div>`+
    `<main class="rs-main"><div class="scene-2col"><div class="scene-l">${T3_SCENES[i].r()}</div>${renderRuntime()}</div></main>`+nav+`</div>`;
  wireTab3();
  if(GUIDE.active) requestAnimationFrame(positionGuide);
}
function setScene(i){ UI_STATE.scene=Math.max(0,Math.min(T3_SCENES.length-1,i)); renderTab3(); }
function wireTab3(){
  document.querySelectorAll('#pcConsole [data-scene]').forEach(el=>el.addEventListener('click',()=>setScene(+el.dataset.scene)));
  document.querySelectorAll('#pcConsole [data-nav]').forEach(el=>el.addEventListener('click',()=>{ const a=el.dataset.nav; if(a==='prev')setScene(UI_STATE.scene-1); else if(a==='next')setScene(UI_STATE.scene+1); else setScene(0); }));
  document.querySelectorAll('#pcConsole [data-dec]').forEach(el=>el.addEventListener('click',()=>doDecision(el.dataset.dec)));
  const gb=document.getElementById('guideBtn'); if(gb) gb.addEventListener('click',startGuide);
}

/* ===== Guide Mode (온디맨드 4단계 · 화법 'AAP가') ===== */
const GUIDE={ active:false, step:0, curTarget:null, _onScroll:null, steps:[
  {scene:0, target:'run-summary', title:'AAP Run Summary', body:'AAP가 채용 건을 먼저 읽고 자동 통과 가능 후보, 담당자 판단 항목, 자동 보류로 나눴습니다. 직무는 예시이고, 핵심은 AAP의 업무 처리 방식입니다.'},
  {scene:1, target:'decision-card', title:'AAP가 넘긴 판단 3건', body:'AAP가 모든 것을 결정하지 않습니다. 검증 불일치·보더라인·처우 권한처럼 책임과 법적 리스크가 큰 지점은 멈춰 담당자에게 넘깁니다. 차별 소지 항목은 평가에서 배제합니다.'},
  {scene:2, target:'case-structure', title:'채용 건 구조 / Agent 결과 전달', body:'AAP는 Agent를 많이 띄우는 게 아니라 업무를 이해해 실행 구조를 구성합니다. 검증은 Connector, 공정성·임계값은 Policy로 끝내고 Agent는 평가·검증·처우·통합 4개만 둡니다.'},
  {scene:3, target:'commit-card', title:'확정 후 반영 / 판단 이력', body:'담당자가 승인하면 AAP가 전형단계·면접·통보·결재 반영을 준비합니다. 평가 근거·검증 출처·배제 사유가 남아 재현됩니다. 외부 발송·최종 확정은 권한 기준에 따릅니다.'}
]};
function ensureGuideOverlay(){
  let o=document.getElementById('guideOverlay');
  if(!o){ o=document.createElement('div'); o.id='guideOverlay'; o.innerHTML='<div id="guideSpot"></div><div id="guideBubble"></div>'; document.body.appendChild(o); }
  return o;
}
function startGuide(){
  GUIDE.active=true; ensureGuideOverlay();
  GUIDE._onScroll=function(){ if(GUIDE.active&&GUIDE.curTarget) requestAnimationFrame(layoutGuide); };
  window.addEventListener('scroll', GUIDE._onScroll, true);
  window.addEventListener('resize', GUIDE._onScroll);
  gotoGuide(0);
}
function stopGuide(){
  GUIDE.active=false; GUIDE.curTarget=null;
  if(GUIDE._onScroll){ window.removeEventListener('scroll',GUIDE._onScroll,true); window.removeEventListener('resize',GUIDE._onScroll); GUIDE._onScroll=null; }
  const o=document.getElementById('guideOverlay'); if(o)o.remove();
}
function nextGuide(){ if(GUIDE.step<GUIDE.steps.length-1) gotoGuide(GUIDE.step+1); else stopGuide(); }
function prevGuide(){ if(GUIDE.step>0) gotoGuide(GUIDE.step-1); }
function gotoGuide(i){ GUIDE.step=i; setScene(GUIDE.steps[i].scene); }
function positionGuide(){
  if(!GUIDE.active)return;
  const s=GUIDE.steps[GUIDE.step];
  const t=document.querySelector('#pcConsole [data-guide="'+s.target+'"]')||document.querySelector('#pcConsole .rs-main');
  if(!t)return; GUIDE.curTarget=t;
  ensureGuideOverlay();
  const bb=document.getElementById('guideBubble');
  bb.innerHTML='<div class="gb-step">'+(GUIDE.step+1)+' / '+GUIDE.steps.length+' · AAP 처리 흐름</div><div class="gb-title">'+s.title+'</div><div class="gb-body">'+s.body+'</div>'+
    '<div class="gb-ctl"><button id="gbPrev"'+(GUIDE.step===0?' disabled':'')+'>이전</button><button id="gbNext" class="primary">'+(GUIDE.step===GUIDE.steps.length-1?'완료':'다음 ▶')+'</button><button id="gbStop">중지</button></div>';
  document.getElementById('gbPrev').onclick=prevGuide; document.getElementById('gbNext').onclick=nextGuide; document.getElementById('gbStop').onclick=stopGuide;
  try{ t.scrollIntoView({block:'center',inline:'nearest'}); }catch(e){ try{ t.scrollIntoView(); }catch(e2){} }
  requestAnimationFrame(layoutGuide);
}
function layoutGuide(){
  if(!GUIDE.active||!GUIDE.curTarget)return;
  const t=GUIDE.curTarget, sp=document.getElementById('guideSpot'), bb=document.getElementById('guideBubble');
  if(!sp||!bb)return;
  const r=t.getBoundingClientRect(), pad=10;
  sp.style.left=(r.left-pad)+'px'; sp.style.top=(r.top-pad)+'px'; sp.style.width=(r.width+pad*2)+'px'; sp.style.height=(r.height+pad*2)+'px';
  const bw=320, bh=bb.offsetHeight||160;
  let bx=Math.min(Math.max(10,r.left), window.innerWidth-bw-10);
  let by=r.bottom+14; if(by+bh>window.innerHeight-10) by=Math.max(10,r.top-bh-14);
  bb.style.left=bx+'px'; bb.style.top=by+'px';
}

/* init */
renderTab3();
</script>
</body>
</html>
