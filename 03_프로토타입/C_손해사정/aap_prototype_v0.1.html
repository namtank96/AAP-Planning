<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 손해사정 Operating Loop Prototype v0.1</title>
<!--
  AAP 손해사정 Operating Loop Prototype v0.1
  - 온톨로지/KG 데모가 아니라, 손해사정 사건 1건이 AAP 6단계 Operating Loop
    (Data → Semantic → Reasoning → Decision → Action → Learning)를 통과하는 작동 프로토타입.
  - 주연: Agent Runtime · Decision Gate · HITL · Action/Writeback · Operational Learning. 온톨로지는 Semantic의 재료(조연).
  - 단일 HTML · 외부 라이브러리/이미지 0 · 결정론 엔진(같은 입력→같은 판정, Replay MATCHED).
-->
<style>
:root{
  --ink:#0F172A; --muted:#64748B; --line:#E5E7EB; --surf:#F8FAFC;
  --aap:#0D9488; --aap-soft:#ECFDF5; --aap-ink:#0F766E;
  --blue:#2563EB; --blue-soft:#EFF6FF; --violet:#6D28D9; --violet-soft:#F5F3FF;
  --amber:#D97706; --amber-soft:#FFFBEB; --danger:#DC2626; --danger-soft:#FEF2F2;
  --green:#15803D; --green-soft:#F0FDF4; --gray:#475569;
  --shadow:0 1px 3px rgba(15,23,42,.07),0 1px 2px rgba(15,23,42,.04);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Pretendard','Segoe UI',-apple-system,'Malgun Gothic',sans-serif;background:var(--surf);color:var(--ink);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh}

/* ===== 사이드바 ===== */
.side{background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:auto}
.brand{padding:16px 16px 12px;border-bottom:1px solid var(--line)}
.brand .bd{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800}
.brand .bd i{width:11px;height:11px;border-radius:3px;background:var(--aap);display:inline-block}
.brand .bs{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:6px;line-height:1.4}
.menu{padding:9px 8px;display:flex;flex-direction:column;gap:1px}
.menu .mh{font-size:8.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:9px 10px 4px}
.menu a{display:grid;grid-template-columns:20px 1fr;gap:9px;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--gray);text-decoration:none;transition:background .12s,color .12s}
.menu a .mn{width:20px;height:20px;border-radius:6px;background:var(--surf);border:1px solid var(--line);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.menu a .ml{font-size:12px;font-weight:700;line-height:1.15}
.menu a .ml span{display:block;font-size:8.5px;font-weight:700;color:var(--muted);margin-top:1px}
.menu a:hover{background:var(--surf)}
.menu a.active{background:var(--aap-soft)}
.menu a.active .mn{background:var(--aap);border-color:var(--aap);color:#fff}
.menu a.active .ml{color:var(--aap-ink)}
.menu a.active .ml span{color:var(--aap-ink);opacity:.8}
.side-foot{margin-top:auto;padding:12px 16px;border-top:1px solid var(--line);font-size:9px;font-weight:700;color:var(--muted);line-height:1.5}

/* ===== 상단바 + 루프 인디케이터 ===== */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:11px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.crumb{font-size:13px;font-weight:800}
.crumb span{color:var(--muted);font-weight:700}
.case-pill{font-size:10px;font-weight:800;color:var(--aap-ink);background:var(--aap-soft);border:1px solid #99F6E4;border-radius:999px;padding:4px 11px}
.loopbar{margin-left:auto;display:flex;align-items:center;gap:2px;flex-wrap:wrap}
.loopbar .lbh{font-size:8.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-right:6px}
.loopbar .ls{font-size:9px;font-weight:800;color:var(--muted);background:var(--surf);border:1px solid var(--line);border-radius:6px;padding:3px 7px;line-height:1.1}
.loopbar .ls b{display:block;font-size:10px;color:var(--gray)}
.loopbar .ls.on{background:var(--aap);border-color:var(--aap)}
.loopbar .ls.on,.loopbar .ls.on b{color:#fff}
.loopbar .la{color:#CBD5E1;font-weight:900;font-size:9px;margin:0 1px}

/* ===== 화면 공통 ===== */
.screen{padding:22px 24px 40px;max-width:1180px}
.h1{font-size:17px;font-weight:800;margin:0 0 3px}
.lead{font-size:12px;font-weight:600;color:var(--muted);margin:0 0 18px;line-height:1.55;max-width:880px}
.lead b{color:var(--gray)}
.sec{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:22px 0 9px}
.sec:first-of-type{margin-top:0}
.row{display:grid;gap:13px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:repeat(3,1fr)}.r4{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.card.tight{padding:11px 13px}
.card h4{margin:0 0 8px;font-size:12px;font-weight:800}
.card .ch-sub{font-size:9.5px;font-weight:700;color:var(--muted);margin-left:6px}
@media(max-width:1000px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.r2,.r3,.r4{grid-template-columns:1fr}}

/* KPI */
.kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow)}
.kpi .kl{font-size:10px;font-weight:800;color:var(--muted)}
.kpi .kv{font-size:21px;font-weight:800;margin-top:5px;letter-spacing:-.02em}
.kpi .kx{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:2px}
.kpi.auto .kv{color:var(--green)}.kpi.review .kv{color:var(--amber)}.kpi.risk .kv{color:var(--danger)}

/* badge */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;border-radius:6px;padding:2px 8px;border:1px solid;line-height:1.4;white-space:nowrap}
.b-green{background:var(--green-soft);color:var(--green);border-color:#BBF7D0}
.b-amber{background:var(--amber-soft);color:var(--amber);border-color:#FDE68A}
.b-red{background:var(--danger-soft);color:var(--danger);border-color:#FECACA}
.b-blue{background:var(--blue-soft);color:var(--blue);border-color:#BFDBFE}
.b-violet{background:var(--violet-soft);color:var(--violet);border-color:#DDD6FE}
.b-teal{background:var(--aap-soft);color:var(--aap-ink);border-color:#99F6E4}
.b-gray{background:var(--surf);color:var(--gray);border-color:var(--line)}

/* table */
table.tbl{width:100%;border-collapse:collapse;font-size:11.5px}
table.tbl th{text-align:left;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;padding:7px 9px;border-bottom:1px solid var(--line)}
table.tbl td{padding:8px 9px;border-bottom:1px solid var(--line);font-weight:600;color:var(--gray);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:0}
table.tbl td b{color:var(--ink);font-weight:800}
.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px}

/* comparison */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.cmp .ch{font-size:10px;font-weight:800;padding:8px 13px;border-bottom:1px solid var(--line)}
.cmp .cl{background:#FCFCFD;color:var(--muted)}.cmp .cr{background:var(--aap-soft);color:var(--aap-ink)}
.cmp .cc{padding:9px 13px;font-size:11px;font-weight:600;border-bottom:1px solid var(--line);line-height:1.45}
.cmp .cc.l{color:var(--muted);background:#FCFCFD}.cmp .cc.r{color:var(--gray)}
.cmp .cc:nth-last-child(-n+2){border-bottom:0}

/* caps */
.cap{border:1px solid var(--line);border-left:3px solid var(--aap);border-radius:9px;padding:10px 12px;background:#fff}
.cap .cn{font-size:11.5px;font-weight:800;color:var(--aap-ink)}
.cap .cd{font-size:10.5px;font-weight:600;color:var(--muted);margin-top:3px;line-height:1.45}

/* asset list */
.asset{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;margin-bottom:7px}
.asset .ad{width:8px;height:8px;border-radius:50%;background:var(--green);flex:0 0 auto;box-shadow:0 0 0 3px var(--green-soft)}
.asset .at{font-size:11.5px;font-weight:800}
.asset .ax{font-size:9.5px;font-weight:700;color:var(--muted)}
.asset .ak{margin-left:auto;font-size:9px;font-weight:800;color:var(--blue);background:var(--blue-soft);border:1px solid #BFDBFE;border-radius:5px;padding:2px 7px}

/* context rows */
.ctx{display:flex;gap:9px;padding:8px 0;border-bottom:1px dashed var(--line)}
.ctx:last-child{border-bottom:0}
.ctx .ck{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;min-width:78px;flex:0 0 auto;padding-top:1px}
.ctx .cv{font-size:11.5px;font-weight:600;color:var(--gray);line-height:1.45}

/* semantic chips / relations */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:10px;font-weight:700;color:var(--violet);background:var(--violet-soft);border:1px solid #DDD6FE;border-radius:6px;padding:3px 8px}
.term{padding:7px 0;border-bottom:1px dashed var(--line)}
.term:last-child{border-bottom:0}
.term b{font-size:11px;color:var(--violet);font-weight:800}
.term span{font-size:10.5px;color:var(--muted);font-weight:600}
.rel{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;padding:6px 0;border-bottom:1px dashed var(--line);flex-wrap:wrap}
.rel:last-child{border-bottom:0}
.rel .rn{color:var(--gray);background:var(--surf);border:1px solid var(--line);border-radius:6px;padding:2px 7px}
.rel .rr{font-size:8.5px;font-weight:800;color:var(--aap-ink)}
.rel .rv{margin-left:auto;font-size:9.5px;font-weight:800;color:var(--muted)}

/* ===== Agent Runtime ===== */
.runtime{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px;align-items:start}
@media(max-width:1040px){.runtime{grid-template-columns:1fr}}
.rt-comp{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.rt-comp .rc{font-size:9.5px;font-weight:800;color:var(--gray);background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 9px}
.rt-comp .rc.sup{color:var(--aap-ink);background:var(--aap-soft);border-color:#99F6E4}
.rt-comp .rc.gate{color:var(--violet);background:var(--violet-soft);border-color:#DDD6FE}
.runbar{display:flex;align-items:center;gap:11px;margin:12px 0 10px}
.btn{font:inherit;font-size:11px;font-weight:800;border-radius:8px;padding:8px 16px;cursor:pointer;border:1px solid;transition:opacity .15s,background .15s}
.btn-pri{background:var(--aap);color:#fff;border-color:var(--aap)}
.btn-pri:hover{background:var(--aap-ink)}
.btn-pri:disabled{opacity:.5;cursor:default}
.btn-ghost{background:#fff;color:var(--gray);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--aap);color:var(--aap-ink)}
.prog{flex:1;height:6px;border-radius:4px;background:var(--surf);border:1px solid var(--line);overflow:hidden;min-width:120px}
.prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--aap),var(--aap-ink));transition:width .4s ease}
.steps{display:flex;flex-direction:column;gap:5px}
.step{display:grid;grid-template-columns:22px 1fr;gap:10px;align-items:start;border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px 11px;transition:border-color .2s,opacity .2s}
.step .si{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);box-sizing:border-box;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:var(--muted);flex:0 0 auto}
.step .st{font-size:11.5px;font-weight:800}
.step .sd{font-size:9.5px;font-weight:600;color:var(--muted);margin-top:1px;line-height:1.35}
.step .so{font-size:9.5px;font-weight:800;color:var(--aap-ink);margin-top:4px;display:none}
.step.pending{opacity:.5}
.step.running{border-color:var(--aap)}
.step.running .si{border-color:var(--aap);color:var(--aap);animation:spin 1s linear infinite;border-top-color:transparent}
.step.done .si{background:var(--aap);border-color:var(--aap);color:#fff}
.step.done .so{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
@media(max-width:560px){.agrid{grid-template-columns:1fr}}
.acard{border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px 11px;transition:opacity .25s}
.acard.pending{opacity:.45}
.acard .an{font-size:11px;font-weight:800;display:flex;align-items:center;gap:6px}
.acard .averd{margin-left:auto}
.acard .achain{margin-top:6px;font-size:9.5px;font-weight:600;color:var(--gray);line-height:1.4}
.acard .achain div{padding-left:11px;position:relative;margin-top:2px}
.acard .achain div::before{content:'›';position:absolute;left:0;color:var(--aap);font-weight:900}
.acard .ameta{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.acard .ameta .tg{font-size:8px;font-weight:800;border-radius:4px;padding:1px 5px;border:1px solid}
.acard .ameta .tg.r{color:var(--aap-ink);background:var(--aap-soft);border-color:#99F6E4}
.acard .ameta .tg.t{color:var(--blue);background:var(--blue-soft);border-color:#BFDBFE}
.console{background:#0F172A;border-radius:10px;padding:12px 14px;min-height:300px}
.console .conh{font-size:9px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.console .line{font-family:'SFMono-Regular',Consolas,monospace;font-size:10.5px;line-height:1.55;color:#CBD5E1;white-space:pre-wrap;word-break:break-word;margin-bottom:2px;animation:fadein .25s ease}
.console .line .fired{color:#5EEAD4;font-weight:700}
.console .line .key{color:#FBBF24}
.console .line.dim{color:#64748B}
@keyframes fadein{from{opacity:0;transform:translateY(2px)}to{opacity:1}}

/* route lanes */
.lanes{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:780px){.lanes{grid-template-columns:1fr 1fr}}
.lane{border:1px solid var(--line);border-radius:11px;padding:12px;background:#fff;border-top:3px solid var(--line)}
.lane.auto{border-top-color:var(--green)}.lane.review{border-top-color:var(--amber)}
.lane.siu{border-top-color:var(--danger)}.lane.hold{border-top-color:var(--gray)}
.lane .lh{font-size:11px;font-weight:800}
.lane .lamt{font-size:16px;font-weight:800;margin:4px 0;letter-spacing:-.02em}
.lane.auto .lamt{color:var(--green)}.lane.review .lamt{color:var(--amber)}.lane.siu .lamt{color:var(--danger)}
.lane .litem{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:3px}

/* HITL */
.hitl{display:grid;grid-template-columns:230px minmax(0,1fr) 280px;gap:13px;align-items:start}
@media(max-width:1080px){.hitl{grid-template-columns:1fr}}
.queue{display:flex;flex-direction:column;gap:7px}
.qitem{border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px 11px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.qitem:hover{border-color:var(--aap)}
.qitem.sel{border-color:var(--aap);box-shadow:0 0 0 2px rgba(13,148,136,.16)}
.qitem .qn{font-size:11px;font-weight:800}
.qitem .qx{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:2px}
.jcard{border:1px solid var(--line);border-radius:10px;background:#fff;padding:11px 13px;margin-bottom:9px}
.jcard .jh{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800}
.jcard .jbasis{font-size:10.5px;font-weight:600;color:var(--gray);margin-top:6px;line-height:1.45}
.jcard .jbasis b{color:var(--ink)}
.acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.acts .ab{font:inherit;font-size:10px;font-weight:800;border-radius:7px;padding:6px 11px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--gray);transition:all .12s}
.acts .ab:hover{border-color:var(--aap);color:var(--aap-ink)}
.acts .ab.done{background:var(--aap);color:#fff;border-color:var(--aap)}
.evchain{display:flex;flex-direction:column;gap:5px}
.evrow{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;color:var(--gray);border:1px solid var(--line);border-radius:7px;padding:6px 8px;background:#fff}
.evrow .et{font-size:8px;font-weight:800;color:var(--blue);background:var(--blue-soft);border:1px solid #BFDBFE;border-radius:4px;padding:1px 5px}
.evrow .ev{margin-left:auto;font-size:9px;font-weight:800;color:var(--muted)}

/* action */
.actplan{display:flex;flex-direction:column;gap:8px}
.aprow{display:grid;grid-template-columns:30px 1fr auto;gap:11px;align-items:center;border:1px solid var(--line);border-radius:9px;background:#fff;padding:10px 12px;transition:border-color .2s}
.aprow .ai{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--surf);border:1px solid var(--line)}
.aprow .acode{font-size:9px;font-weight:800;color:var(--aap-ink);letter-spacing:.02em}
.aprow .alabel{font-size:11.5px;font-weight:800;margin-top:1px}
.aprow .atgt{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:1px}
.aprow.sent{border-color:var(--green)}
.wb{margin-top:7px}
.wbrow{display:flex;align-items:center;gap:9px;font-size:10.5px;font-weight:700;padding:6px 0;border-bottom:1px dashed var(--line)}
.wbrow:last-child{border-bottom:0}
.wbrow .wt{font-size:9px;color:var(--muted);font-family:'SFMono-Regular',Consolas,monospace}
.wbrow .ws{margin-left:auto}

/* log */
.logrow{display:grid;grid-template-columns:120px 1fr;gap:9px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:11px}
.logrow:last-child{border-bottom:0}
.logrow .lk{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;padding-top:1px}
.logrow .lv{font-weight:700;color:var(--gray);word-break:break-word}
.logrow .lv b{color:var(--ink)}
.replay-box{border:1px dashed var(--aap);border-radius:10px;background:var(--aap-soft);padding:12px 14px;margin-top:10px;display:none}
.replay-box.show{display:block;animation:fadein .3s ease}
.replay-box .rbh{font-size:11px;font-weight:800;color:var(--aap-ink);display:flex;align-items:center;gap:7px;margin-bottom:7px}
.matched{font-size:10px;font-weight:800;color:#fff;background:var(--green);border-radius:6px;padding:3px 9px}

/* closed loop diagram */
.loopdg{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:14px;border:1px solid var(--line);border-radius:11px;background:#fff}
.loopdg .ld{flex:1;min-width:96px;text-align:center;border-radius:9px;padding:9px 6px;background:var(--surf);border:1px solid var(--line)}
.loopdg .ld b{display:block;font-size:11px;font-weight:800;color:var(--gray)}
.loopdg .ld span{font-size:8.5px;font-weight:700;color:var(--muted)}
.loopdg .ld.teal{background:var(--aap-soft);border-color:#99F6E4}.loopdg .ld.teal b{color:var(--aap-ink)}
.loopdg .lda{color:var(--aap);font-weight:900;font-size:13px}
.loopnote{font-size:9.5px;font-weight:700;color:var(--muted);text-align:center;margin-top:8px}

/* platform layers */
.layer{display:grid;grid-template-columns:172px 1fr;gap:12px;align-items:center;border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 13px;margin-bottom:7px}
.layer .lname{font-size:11px;font-weight:800;color:var(--gray)}
.layer .ldid{font-size:8.5px;font-weight:800;color:var(--muted);display:block;margin-bottom:2px}
.layer .ldid b{color:var(--ink)}
.layer .ldd{font-size:11px;font-weight:600;color:var(--gray);line-height:1.45}
.layer.core{border:1.5px solid var(--aap);background:var(--aap-soft)}
.layer.core .lname{color:var(--aap-ink)}

function won(n){ return n.toLocaleString('ko-KR')+"원"; }
function man(n){ return (n/10000).toLocaleString('ko-KR')+"만원"; }
function fnv(str){ let h=0x811c9dc5; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,0x01000193); } return (h>>>0); }
function hash4(obj){ return fnv(JSON.stringify(obj)).toString(16).toUpperCase().padStart(8,"0").slice(0,4); }

  h+='<div class="replay-box" id="replayBox"><div class="rbh">Replay 결과 <span class="matched">MATCHED</span></div>';
  h+='<div class="logrow"><div class="lk">Input Hash</div><div class="lv mono">'+CASE.id+"-"+RESULT.inputHash+'</div></div>';
  h+='<div class="logrow"><div class="lk">Rules Fired</div><div class="lv mono">'+RESULT.firedOrder.join(", ")+'</div></div>';
  h+='<div class="logrow"><div class="lk">Decision Route</div><div class="lv">REVIEW (AUTO + HITL + SIU)</div></div>';
  h+='<div class="logrow"><div class="lk">Result Hash</div><div class="lv mono">'+RESULT.resultHash+'</div></div>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--aap-ink);margin-top:6px">같은 입력 → 같은 규칙 발동 → 같은 판정. 해시 일치로 재현성 검증됨.</div></div>';
  h+='<div style="margin-top:11px"><button class="btn btn-ghost" onclick="replayCase()">↻ Re-run same case (재현성 검증)</button></div>';
  h+='</div>';
  h+='</div>';
  h+='<div class="note"><b>EvalOps / Audit:</b> 사후가 아니라 판단 시점에 근거가 남기 때문에, 민원·소송·감사 시 동일 기준의 판정 근거를 즉시 제시할 수 있습니다.</div>';
  return h;
}

function renderPlatform(){
  let h='<h1 class="h1">Platform Architecture — 이 사건에서 8계층이 한 일</h1>';
  h+='<p class="lead">정적 아키텍처 그림이 아니라, 이번 손해사정 사건에서 각 계층이 <b>실제로 무엇을 했는지</b>로 봅니다. 손해사정 use case는 AAP 공통 플랫폼 역량으로 일반화됩니다. (캐논: 8계층 + Operating Loop + Trust 횡단)</p>';
  PLATFORM_LAYERS.forEach(l=>{
    const cls=l.accent==="core"?" core":(l.accent==="ds"?" ds":"");
    const mark=l.accent==="core"?'<span class="coremark">핵심</span>':(l.accent==="ds"?'<span class="dsmark">KT ds 차별화</span>':"");
    h+='<div class="layer'+cls+'"><div class="lname">'+l.id+' '+l.name+mark+'</div><div class="ldd">'+l.did+'</div></div>';
  });
  h+='<div class="sec">화면 → AAP 공통 역량 매핑</div><div class="card"><table class="tbl"><thead><tr><th>프로토타입 화면</th><th>AAP 공통 역량</th><th>Operating Loop</th></tr></thead><tbody>';
  const map=[
   ["Work Intake","Service Experience / Access","Data"],
   ["Data & Context","Business Semantic Modeling","Semantic"],
   ["Agent Runtime","Agentic Reasoning","Reasoning"],
   ["Decision Gate","Execution Control","Decision"],
   ["HITL Workspace","Human Review / Approval","Decision"],
   ["Action / Writeback","System Reflection","Action"],
   ["Learning & Ops","Operational Learning / EvalOps","Learning"],
   ["Platform Architecture","Trust Foundation (횡단)","—"]
  ];
  map.forEach(m=>{ h+='<tr><td><b>'+m[0]+'</b></td><td>'+m[1]+'</td><td class="mono">'+m[2]+'</td></tr>'; });
  h+='</tbody></table></div>';
  h+='<div class="sec">닫힌 루프</div><div class="loopdg">';
  ["Data","Semantic","Agentic Reasoning","Action / HITL","Decision Log","Learning"].forEach((x,i,arr)=>{ h+='<div class="ld'+(i===2?' teal':'')+'"><b>'+x+'</b></div>'; if(i<arr.length-1) h+='<span class="lda">▶</span>'; });
  h+='<span class="lda">↻</span></div><div class="loopnote">Learning → Semantic 으로 환류되어 사이클이 닫힙니다</div>';
  return h;
}

const RENDER={overview:renderOverview,intake:renderIntake,context:renderContext,runtime:renderRuntime,gate:renderGate,hitl:renderHitl,action:renderAction,learning:renderLearning,platform:renderPlatform};

/* ===================== 5. 인터랙션 ===================== */
let rtToken=0;
function runRuntime(){
  const btn=document.getElementById("runBtn"); if(btn){btn.disabled=true;}
  const stateEl=document.getElementById("rtState"); if(stateEl) stateEl.textContent="실행 중…";
  const prog=document.getElementById("rtProg"), con=document.getElementById("rtConsole");
  if(con) con.innerHTML="";
  RESULT.agents.forEach((ag,i)=>{ const c=document.getElementById("ac"+i); if(c) c.classList.add("pending"); });
  for(let i=0;i<RUNTIME_STEPS.length;i++){ const s=document.getElementById("rtStep"+i); if(s){ s.className="step pending"; } }
  const myToken=++rtToken; let k=-1;
  (function next(){
    if(myToken!==rtToken) return;
    if(k>=0){ const s=document.getElementById("rtStep"+k); if(s){ s.classList.remove("running"); s.classList.add("done"); const so=document.getElementById("rtOut"+k); if(so) so.textContent="✓ 완료"; }
      if(prog) prog.style.width=Math.round(((k+1)/RUNTIME_STEPS.length)*100)+"%"; }
    k++;
    if(k>=RUNTIME_STEPS.length){ STATE.ranRuntime=true; if(btn){btn.disabled=false; btn.textContent="↻ 다시 실행";} if(stateEl) stateEl.textContent="완료 · 판단 후보 6건 생성";
      RESULT.agents.forEach((ag,i)=>{ const c=document.getElementById("ac"+i); if(c) c.classList.remove("pending"); }); return; }
    const s=document.getElementById("rtStep"+k); if(s){ s.classList.remove("pending"); s.classList.add("running"); }
    const st=RUNTIME_STEPS[k];
    if(st.trace && con){ con.innerHTML=traceLinesHTML(); }
    if(st.reveal){ RESULT.agents.forEach((ag,i)=>{ const c=document.getElementById("ac"+i); if(c) c.classList.remove("pending"); }); }
    setTimeout(next,820);
  })();
}

function selQueue(i){
  document.querySelectorAll(".qitem").forEach(q=>q.classList.remove("sel"));
  const el=document.getElementById("q"+i); if(el) el.classList.add("sel");
  STATE.curQueue=i;
}
function hitlAct(act){
  const i=STATE.curQueue||0; STATE.hitl[i]=act;
  const el=document.getElementById("q"+i); if(el){ const qx=el.querySelector(".qx"); if(qx) qx.textContent="처리: "+act; }
  const fb=document.getElementById("hitlFeedback"); if(fb) fb.textContent="✓ 검토 큐 #"+(i+1)+" → \""+act+"\" 처리 · Decision Log("+RESULT.logId+")에 기록됨";
}

let actToken=0;
function executeActions(){
  const btn=document.getElementById("actBtn"); if(btn) btn.disabled=true;
  const stateEl=document.getElementById("actState"); if(stateEl) stateEl.textContent="반영 중…";
  const wb=document.getElementById("wbLog"); if(wb) wb.innerHTML="";
  const myToken=++actToken; let k=0;
  (function next(){
    if(myToken!==actToken) return;
    if(k>=RESULT.actionPlan.length){ if(btn){btn.disabled=false; btn.textContent="↻ 다시 실행";} if(stateEl) stateEl.textContent="완료 · 4건 시스템 반영"; STATE.actionsSent=true; return; }
    const ap=RESULT.actionPlan[k]; const row=document.getElementById("ap"+k), b=document.getElementById("apb"+k);
    if(row) row.classList.add("sent"); if(b) b.innerHTML=badge("b-green","반영됨 ✓");
    if(wb){ const r=document.createElement("div"); r.className="wbrow"; r.innerHTML='<span class="wt">'+RESULT.runAt.slice(11)+'</span>'+ap.code+' → '+ap.target+'<span class="ws">'+badge("b-green","ack")+'</span>'; wb.appendChild(r); }
    k++; setTimeout(next,560);
  })();
}

function replayCase(){
  const r2=computeResult();
  const ok=(r2.inputHash===RESULT.inputHash && r2.resultHash===RESULT.resultHash);
  const box=document.getElementById("replayBox"); if(box){ box.classList.add("show"); if(!ok){ box.querySelector(".matched").textContent="MISMATCH"; box.querySelector(".matched").style.background="var(--danger)"; } }
  STATE.replayed=true;
}

/* ===================== 6. 라우팅 ===================== */
function buildMenu(){
  const m=document.getElementById("menu");
  let h='<div class="mh">AAP Operating Loop</div>';
  SCREENS.forEach((s,i)=>{ h+='<a id="m_'+s.key+'" onclick="nav(\''+s.key+'\')"><span class="mn">'+i+'</span><span class="ml">'+s.label+'<span>'+s.sub+'</span></span></a>'; });
  m.innerHTML=h;
}
function buildLoopbar(stage){
  const lb=document.getElementById("loopbar");
  let h='<span class="lbh">Loop</span>';
  LOOP.forEach((l,i)=>{ const on=(stage===l.k); h+='<span class="ls'+(on?' on':'')+'"><b>'+l.k+'</b>'+l.ko+'</span>'; if(i<LOOP.length-1) h+='<span class="la">▸</span>'; });
  lb.innerHTML=h;
}
function nav(key){
  curKey=key; const sc=SCREENS.find(s=>s.key===key);
  document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
  const am=document.getElementById("m_"+key); if(am) am.classList.add("active");
  document.getElementById("crumb").innerHTML="AAP <span>›</span> "+sc.label;
  buildLoopbar(sc.stage);
  elScreen().innerHTML=RENDER[key]();
  window.scrollTo(0,0);
}

/* init */
buildMenu();
nav("overview");
</script>
