<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 손해사정 콘솔</title>
<!--
  AAP 손해사정 콘솔 v3 — 실제 손해사정사 업무 콘솔 형태.
  · 좌 업무 네비(손해사정 5단계) + 데이터·운영(입력/산출/로그) · 영역 간 자유 이동.
  · 각 업무 화면: AI 검증·산출 카드(입력→규칙→판정 근거 + 담당 Agent/R##) + 직접 판단 버튼.
  · 편집 가능한 입력 + compute() 결정론 엔진 — 입력 바꾸면 전 단계가 다시 계산. 단일 HTML·외부 의존성 0.
-->
<style>
:root{
  --canvas:#EEF1F6; --surface:#FFFFFF; --ink:#1A2332; --muted:#5B6B82; --line:#DCE2EC;
  --topbar:#141B2D; --nav:#F6F8FC; --accent:#2F54EB; --accent-sf:#EAF0FF;
  --ok:#1F9D5B; --review:#C77700; --hold:#C0392B; --siu:#7A3FBF;
  --ok-sf:#E7F6EE; --review-sf:#FBF1E0; --hold-sf:#FBEAE7; --siu-sf:#F1EAFB;
  --shadow:0 1px 2px rgba(20,27,45,.06); --mono:ui-monospace,'SF Mono',Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI','Malgun Gothic',sans-serif;background:var(--canvas);color:var(--ink);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;min-height:100vh}

/* 다크 상단바 */
.topbar{background:var(--topbar);color:#E4EAF3;display:flex;align-items:center;gap:12px;padding:10px 18px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.topbar .bm{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:8px}
.topbar .bm .sq{width:18px;height:18px;border-radius:5px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center}
.topbar .cr{font-size:11px;font-weight:600;color:#8E9BB5}
.topbar .cr b{color:#CDD6E6;font-weight:700}
.topbar .pill{margin-left:auto;display:flex;gap:7px}
.topbar .pl{font-family:var(--mono);font-size:11px;font-weight:700;border-radius:6px;padding:4px 9px;border:1px solid rgba(255,255,255,.14)}
.topbar .pl.a{color:#7BE0A8}.topbar .pl.r{color:#F0C27A}
.topbar .user{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;color:#AEB9CE}
.topbar .uav{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}

.body{display:grid;grid-template-columns:212px minmax(0,1fr);flex:1;min-height:0}
@media(max-width:920px){.body{grid-template-columns:1fr}}

/* 좌 업무 네비 */
.nav{background:var(--nav);border-right:1px solid var(--line);padding:12px 9px;display:flex;flex-direction:column;gap:2px;position:sticky;top:43px;height:calc(100vh - 43px);overflow:auto}
.navh{font-size:8.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:11px 6px 4px}
.navh:first-child{margin-top:2px}
.nitem{display:grid;grid-template-columns:24px 1fr auto;gap:9px;align-items:center;border:1px solid transparent;border-radius:9px;padding:8px 9px;cursor:pointer;transition:background .12s,border-color .12s}
.nitem:hover{background:#fff;border-color:var(--line)}
.nitem .ni{width:24px;height:24px;border-radius:7px;background:#E3E8F1;color:var(--muted);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.nitem .nt{font-size:12px;font-weight:700;color:var(--ink);line-height:1.15;min-width:0}
.nitem .nt span{display:block;font-size:8.5px;font-weight:600;color:var(--muted)}
.nitem .nb{font-size:8px;font-weight:800;border-radius:5px;padding:2px 5px}
.nitem.done .ni{background:var(--ok-sf);color:var(--ok)}
.nitem.active{background:#fff;border-color:var(--accent);box-shadow:0 1px 6px rgba(47,84,235,.14)}
.nitem.active .ni{background:var(--accent);color:#fff}
.nitem.active .nt{color:var(--accent)}
.navcase{margin-top:auto;border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px 10px;font-size:9px;font-weight:600;color:var(--muted);line-height:1.55}
.navcase b{color:var(--ink);font-weight:800;font-size:10px}

/* 작업 영역 */
.work{padding:18px 22px 40px;min-width:0;min-height:calc(100vh - 43px)}
.wh{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.wh .wt{font-size:17px;font-weight:800}
.wh .ws{font-size:11px;color:var(--muted);font-weight:600}
.aibar{font-size:10.5px;font-weight:700;color:var(--accent);background:var(--accent-sf);border:1px solid #C7D4F7;border-radius:8px;padding:6px 11px;margin:10px 0 14px;display:inline-flex;align-items:center;gap:7px}
.aibar .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.sec{font-size:12px;font-weight:800;margin:18px 0 9px;display:flex;align-items:center;gap:7px}
.sec .tag{font-size:9px;font-weight:800;color:var(--muted);background:var(--canvas);border:1px solid var(--line);border-radius:5px;padding:2px 7px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:11px}
.wcard{border:1px solid var(--line);border-radius:11px;background:var(--surface);box-shadow:var(--shadow);padding:12px 13px;display:flex;flex-direction:column;gap:8px;min-height:150px}
.wcard .ch{font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:space-between;gap:8px}
.wcard ul{margin:0;padding-left:15px;font-size:10.5px;color:var(--ink);line-height:1.6}
.wcard .rows{display:flex;flex-direction:column;gap:4px}
.wcard .rw{display:flex;justify-content:space-between;gap:8px;font-size:11px}
.wcard .rw span{color:var(--muted)}.wcard .rw b{font-family:var(--mono)}
.wcard .rw .rl{font-family:var(--mono);font-size:8px;font-weight:800;color:var(--accent);background:var(--accent-sf);border-radius:4px;padding:1px 4px;margin-right:5px}
.wcard .basis{font-size:10px;color:var(--ink);background:var(--canvas);border:1px solid var(--line);border-radius:7px;padding:7px 9px;line-height:1.45}
.wcard .basis b{color:var(--ink)}
.wcard .who{font-size:9px;font-weight:700;color:var(--muted);margin-top:auto}
.wcard .who b{color:var(--accent)}
.wcard .flag{font-size:9.5px;font-weight:700;color:var(--review);background:var(--review-sf);border:1px solid #F0DBB0;border-radius:7px;padding:6px 9px;line-height:1.4}
.wcard.alert .flag{color:var(--hold);background:var(--hold-sf);border-color:#F1C9C2}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;border-radius:6px;padding:2px 8px;border:1px solid;white-space:nowrap}
.badge .dt{width:6px;height:6px;border-radius:50%}
.b-ok{background:var(--ok-sf);color:var(--ok);border-color:#BBE6CD}.b-ok .dt{background:var(--ok)}
.b-review{background:var(--review-sf);color:var(--review);border-color:#F0DBB0}.b-review .dt{background:var(--review)}
.b-hold{background:var(--hold-sf);color:var(--hold);border-color:#F1C9C2}.b-hold .dt{background:var(--hold)}
.b-siu{background:var(--siu-sf);color:var(--siu);border-color:#DDC9F2}.b-siu .dt{background:var(--siu)}
.b-mut{background:var(--canvas);color:var(--muted);border-color:var(--line)}.b-mut .dt{background:#A9B4C8}

/* 직접 판단 */
.decide{border:1px solid var(--line);border-radius:11px;background:var(--surface);box-shadow:var(--shadow);padding:13px 15px;margin-top:14px}
.decide .dq{font-size:12.5px;font-weight:800;margin-bottom:10px}
.dbtns{display:flex;flex-wrap:wrap;gap:8px}
.dbtn{font:inherit;font-size:11.5px;font-weight:800;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid;transition:box-shadow .12s,background .12s,color .12s}
.dbtn:hover{box-shadow:0 2px 8px rgba(20,27,45,.12)}
.dbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.dbtn.warn{background:#fff;color:var(--review);border-color:#F0DBB0}
.dbtn.risk{background:#fff;color:var(--hold);border-color:#F1C9C2}
.dbtn.sel{box-shadow:0 0 0 3px rgba(47,84,235,.3)}
.outcome{font-size:11.5px;font-weight:700;border-radius:9px;padding:10px 12px;margin-top:11px;line-height:1.5;border:1px solid}
.outcome.ok{background:var(--ok-sf);color:#176B43;border-color:#BBE6CD}
.outcome.warn{background:var(--review-sf);color:var(--review);border-color:#F0DBB0}
.outcome.risk{background:var(--hold-sf);color:var(--hold);border-color:#F1C9C2}

/* 시나리오 */
.scn{border:1px solid var(--line);border-radius:11px;background:var(--surface);box-shadow:var(--shadow);padding:11px 13px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.scn:hover{border-color:var(--accent)}
.scn.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(47,84,235,.16)}
.scn .sh{font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.scn .stag{font-size:8.5px;font-weight:800;border-radius:5px;padding:2px 7px}
.scn .stag.reco{background:var(--accent-sf);color:var(--accent)}.scn .stag.alt{background:var(--canvas);color:var(--muted)}
.scn .sd{font-size:10.5px;color:var(--muted);margin:6px 0;line-height:1.45}
.scn .sr{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700}.scn .sr span{color:var(--muted)}

/* 입력 데이터 */
.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
@media(max-width:900px){.fgrid{grid-template-columns:repeat(2,1fr)}}
.fld{display:flex;flex-direction:column;gap:3px}
.fld span{font-size:10px;font-weight:700;color:var(--muted)}
.fld span i{font-style:normal;color:#9AA6BC}
.fld input,.fld select{font:inherit;font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:7px;padding:7px 9px;background:var(--surface);color:var(--ink);width:100%}
.fld input:focus,.fld select:focus{border-color:var(--accent);outline:none}
.exrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.exrow .exl{font-size:10px;font-weight:700;color:var(--muted)}
.exbtn{font:inherit;font-size:11px;font-weight:700;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:7px;padding:5px 12px;cursor:pointer}
.exbtn:hover{border-color:var(--accent);color:var(--accent)}
.ressum{display:flex;flex-wrap:wrap;gap:8px;align-items:center;border:1px solid var(--line);border-radius:10px;background:var(--surface);padding:11px 13px;box-shadow:var(--shadow);margin-bottom:14px}
.ressum .rs{font-size:10.5px;color:var(--muted)}
.ressum .rs b{font-family:var(--mono);font-size:13px;color:var(--ink);display:block;margin-top:2px}
.ressum .rs.a b{color:var(--ok)}.ressum .rs.r b{color:var(--review)}
.ressum .rchip{font-size:10px;font-weight:800;border-radius:6px;padding:3px 9px;border:1px solid}

/* 산출/Writeback */
.btn{font:inherit;font-size:12px;font-weight:700;border-radius:8px;padding:9px 16px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff}
.btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.5;cursor:default}
.btn.ghost{background:var(--surface);color:var(--accent);border-color:#BBC8F5}
.btn.sm{padding:6px 12px;font-size:11px}
.moneyflow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid var(--line);border-radius:10px;background:var(--surface);padding:12px 14px;box-shadow:var(--shadow)}
.moneyflow .mf small{font-size:9.5px;color:var(--muted)}
.moneyflow .mf b{font-family:var(--mono);font-size:14px;font-weight:700;display:block;margin-top:2px}
.moneyflow .mf.a b{color:var(--ok)}.moneyflow .mf.r b{color:var(--review)}
.moneyflow .ar{color:var(--accent);font-weight:800}
.aprow{display:grid;grid-template-columns:1fr auto;gap:11px;align-items:center;border:1px solid var(--line);border-radius:9px;background:var(--surface);padding:10px 13px;margin-bottom:7px}
.aprow .ac{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--accent)}
.aprow .al{font-size:12px;font-weight:700;margin-top:1px}.aprow .at{font-size:9.5px;color:var(--muted);margin-top:1px}
.wblog{border:1px solid var(--line);border-radius:9px;background:var(--surface);padding:4px 13px}
.wbr{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:600;padding:7px 0;border-bottom:1px dashed var(--line)}
.wbr:last-child{border-bottom:0}.wbr .wt{font-family:var(--mono);font-size:9px;color:var(--muted)}.wbr .ws{margin-left:auto}

/* 로그 */
.log{border:1px solid var(--line);border-radius:9px;background:var(--surface)}
.log .lr{display:grid;grid-template-columns:130px 1fr;gap:10px;padding:7px 13px;border-bottom:1px dashed var(--line);font-size:11.5px}
.log .lr:last-child{border-bottom:0}
.log .lr .lk{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.02em}
.log .lr .lv{word-break:break-word}
.replay{border:1px dashed var(--accent);border-radius:9px;background:var(--accent-sf);padding:12px 14px;margin-top:11px;display:none}
.replay.show{display:block}
.replay .rh{font-size:12px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:8px}
.matched{font-family:var(--mono);font-size:10px;font-weight:800;color:#fff;background:var(--ok);border-radius:5px;padding:3px 9px}
.note{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:9px 12px;line-height:1.5;margin-top:14px}
.sim{font-size:8.5px;font-weight:800;color:var(--review);background:var(--review-sf);border:1px solid #F0DBB0;border-radius:4px;padding:1px 5px;margin-left:5px}

#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;font-size:12px;font-weight:600;padding:10px 16px;border-radius:9px;box-shadow:0 6px 20px rgba(20,27,45,.28);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;display:flex;gap:10px;align-items:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast a{color:#9DB2FF;font-weight:700;cursor:pointer}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="bm"><span class="sq"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7z"/></svg></span> AAP 손해사정 콘솔</div>
    <span class="cr">사건 <b id="cbId">CLM-2026-0417</b> <span id="cbArea"></span></span>
    <div class="pill" id="pill"></div>
    <span class="user"><span class="uav">김</span>김민준 손해사정사</span>
  </div>
  <div class="body">
    <nav class="nav" id="nav"></nav>
    <main class="work" id="work"></main>
  </div>
</div>
<div id="toast"></div>

<script>
"use strict";

/* ===================== 사건 + 입력 + 엔진 ===================== */
const CASE = {
  id:"CLM-2026-0417", title:"교차로 직진/좌회전 충돌", type:"자동차보험 대물·대인 청구",
  owner:"김민준 손해사정사", sla:"접수 후 10일 이내 지급", receivedAt:"2026-06-15 09:42",
  policy:{ id:"POL-AUTO-8842", coverage:["대물배상","대인배상Ⅰ","대인배상Ⅱ","자기차량손해"] },
  mileage:"1.2만 km", year:"2023년식", injuryName:"상대 운전자(45세)", injuryGrade:"경추염좌 · 상해 14급", treatDays:14, treatNorm:10,
  evidence:[
    {name:"블랙박스 영상", status:"확보", trust:0.92},{name:"사고 현장 사진", status:"확보", trust:0.81},
    {name:"수리견적서", status:"확보", trust:0.76},{name:"진단서(OCR)", status:"확보", trust:0.74},
    {name:"운전자 진술", status:"불일치", trust:0.48}
  ]
};
const DEFAULTS={ repair:4800000, marketCap:4100000, medical:3000000, medicalNorm:2600000,
  faultBB:15, faultPre:30, faultThr:10, fraud:78, fraudThr:75, similar:3, stmtMatch:false, autoLimit:1000000 };
let INPUTS=Object.assign({},DEFAULTS);
const EXAMPLES={
  low:{name:"저위험", patch:{fraud:32, faultBB:25, faultPre:30, repair:3800000, marketCap:4100000, medical:0, similar:1, stmtMatch:true}},
  base:{name:"기본", patch:{}},
  high:{name:"고위험", patch:{fraud:92, faultBB:10, faultPre:32, repair:9000000, marketCap:6500000, medical:3000000, similar:4, stmtMatch:false}}
};
function hash(o){ const s=JSON.stringify(o); let h=0x811c9dc5; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,0x01000193); } return (h>>>0).toString(16).toUpperCase().padStart(8,"0").slice(0,4); }
function compute(inp){
  const repairAccepted=Math.min(inp.repair,inp.marketCap), repairExcess=Math.max(0,inp.repair-inp.marketCap);
  const medicalAccepted=Math.min(inp.medical,inp.medicalNorm), medicalExcess=Math.max(0,inp.medical-inp.medicalNorm);
  const acceptedLoss=repairAccepted+medicalAccepted;
  const faultGap=Math.abs(inp.faultBB-inp.faultPre), faultDisputed=faultGap>inp.faultThr;
  const faultLow=Math.min(inp.faultBB,inp.faultPre), faultHigh=Math.max(inp.faultBB,inp.faultPre);
  const ourLiabHigh=Math.round(acceptedLoss*faultHigh/100);
  let fraudEff=inp.fraud+(inp.similar>=3?5:0)+(!inp.stmtMatch?5:0);
  const fraudRoute=fraudEff>=inp.fraudThr?"SIU":(fraudEff>=60?"REVIEW":"CLEAR");
  const blockAuto=(fraudRoute==="SIU");
  const autoLiab=Math.round(acceptedLoss*(faultDisputed?faultLow:faultHigh)/100);
  const autoPay=blockAuto?0:Math.min(autoLiab,inp.autoLimit);
  const review=Math.max(0,ourLiabHigh-autoPay);
  const routes=[]; if(autoPay>0)routes.push("AUTO"); if(review>0)routes.push("HITL"); if(fraudRoute==="SIU")routes.push("SIU");
  const agents={
    담보:{verdict:"PASS",route:"자동"},
    견적:{verdict:repairExcess>0?"REVIEW":"PASS",route:repairExcess>0?"검토":"자동"},
    대인:{verdict:inp.medical<=0?"SKIP":(medicalExcess>0?"PARTIAL":"PASS"),route:medicalExcess>0?"검토":"자동"},
    과실:{verdict:faultDisputed?"REVIEW":"PASS",route:faultDisputed?"검토":"자동"},
    사기:{verdict:fraudRoute==="SIU"?"SIU":(fraudRoute==="REVIEW"?"REVIEW":"CLEAR"),route:fraudRoute==="SIU"?"SIU":(fraudRoute==="REVIEW"?"검토":"자동")}
  };
  const actions=[];
  if(autoPay>0)actions.push({code:"AUTO_PAY",label:"지급 승인 요청 생성",amt:autoPay,target:"지급 시스템",end:"ack"});
  if(review>0)actions.push({code:"REVIEW_QUEUE",label:"검토 큐 등록",amt:review,target:"손해사정 워크스페이스",end:"ack"});
  if(medicalExcess>0||inp.medical>0)actions.push({code:"DOC_REQUEST",label:"대인 합의 추가서류 요청",amt:0,target:"고객 안내",end:"retry"});
  if(fraudRoute==="SIU")actions.push({code:"SIU_REFERRAL",label:"보험사기 조사 검토 의뢰",amt:0,note:fraudEff+"점",target:"SIU 조사팀",end:"pending"});

  const claim=INPUTS.repair+INPUTS.medical;
  h+='<div class="sec" style="margin-top:0">금액 흐름</div>';
  h+='<div class="moneyflow"><div class="mf"><small>청구</small><b>'+won(claim)+'</b></div><span class="ar">▶</span><div class="mf"><small>인정 손해액</small><b>'+won(R.acceptedLoss)+'</b></div><span class="ar">▶</span><div class="mf"><small>우리 부담 추정</small><b>'+won(R.ourLiabHigh)+'</b></div><span class="ar">▶</span><div class="mf a"><small>자동</small><b>'+won(R.autoPay)+'</b></div><div class="mf r"><small>검토</small><b>'+won(R.review)+'</b></div></div>';
  if(R.blockAuto) h+='<div class="note">사기 의심(가중 '+R.fraudEff+' ≥ 임계 '+INPUTS.fraudThr+') → 자동 지급 전면 보류. 입력에서 사기 점수를 낮추면 자동 처리분이 산출됩니다.</div>';
  h+='<div class="sec">Action Plan <span class="tag">'+R.actions.length+'건</span><button class="btn sm" style="margin-left:auto" id="wbBtn" onclick="runWriteback()">실행하기</button> <span class="ws" id="wbState" style="font-size:10px;color:var(--muted);font-weight:700">미실행</span></div>';
  h+='<div id="apList">';
  R.actions.forEach((a,k)=>{ h+='<div class="aprow" id="ap'+k+'"><div><div class="ac">'+a.code+'</div><div class="al">'+a.label+(a.amt?" · "+won(a.amt):(a.note?" · "+a.note:""))+'</div><div class="at">→ '+a.target+'</div></div><div id="apb'+k+'"><span class="badge b-mut"><span class="dt"></span>대기</span></div></div>'; });
  if(!R.actions.length) h+='<div class="note">현재 입력에서 생성된 실행 액션이 없습니다.</div>';
  h+='</div>';
  h+='<div class="sec">Writeback 로그</div><div class="wblog" id="wbLog"><div class="wbr" style="border:0"><span style="color:var(--muted);font-weight:600">실행하기를 누르면 시스템 반영 결과가 기록됩니다.</span></div></div>';
  return h;
}
function decisionsText(){
  const ks=Object.keys(STATE.decisions); const names={s1:"지급심사",s2:"견적",s3:"대인",s4:"과실"};
  if(!ks.length && STATE.scn==null) return "검토 대기 (업무 단계에서 처리)";
  let parts=ks.map(k=>names[k]+": "+STATE.decisions[k]);
  if(STATE.scn!=null) parts.push("처리: "+SCENARIOS[STATE.scn].h);
  return parts.join(" · ");
}
function rLog(){
  let h=head("처리 로그","Decision Log · 재현성","판단 근거·결과 기록 + 같은 입력 같은 결론");
  h+='<div class="sec" style="margin-top:0">Decision Log <span class="tag">'+LOG.logId+'</span></div><div class="log">';
  [["Run ID",LOG.runId],["Input Hash",CASE.id+"-"+R.inputHash],["Agents","Coverage · Damage · Medical · Liability · Fraud · Decision"],
   ["Tools","Policy API · History DB · Estimate Validator · KNIA Matcher · FDS"],["Decision Route",routeStr()],
   ["사람 판단",decisionsText()],["Result Hash",LOG.logId+" · "+R.resultHash],["Timestamp",LOG.runAt]].forEach(r=>{ h+='<div class="lr"><div class="lk">'+r[0]+'</div><div class="lv mono">'+r[1]+'</div></div>'; });
  h+='</div>';
  h+='<div class="sec">재현성</div><div><button class="btn ghost" onclick="runReplay()">재현 실행 (같은 입력 재계산)</button></div>';
  h+='<div class="replay" id="replay"><div class="rh">재현 결과 <span class="matched">MATCHED</span></div><div class="log" style="border:0"><div class="lr"><div class="lk">Input Hash</div><div class="lv mono">'+CASE.id+"-"+R.inputHash+'</div></div><div class="lr"><div class="lk">Decision Route</div><div class="lv mono">'+routeStr()+'</div></div><div class="lr"><div class="lk">Result Hash</div><div class="lv mono">'+R.resultHash+'</div></div></div><div style="font-size:10.5px;color:var(--accent);font-weight:700;margin-top:6px">동일 입력 → 동일 판정 — 감사·민원 시 같은 근거 제시</div></div>';
  h+='<div class="note">운영 학습 자산 · Skill 후보: 교차로 좌회전 사고 과실 검토 Skill v0.1 (검증 대기) / 정책 후보: 과실 차이 임계 '+INPUTS.faultThr+'%p 검토 정책 (검증 대기)</div>';
  return h;
}

const RENDER={s1:rS1,s2:rS2,s3:rS3,s4:rS4,s5:rS5,inputs:rInputs,outputs:rOutputs,log:rLog};

/* ===================== 인터랙션 ===================== */
let toastTok=0;
function toast(msg,go){ const t=el("toast"); t.innerHTML=msg+(go?' <a onclick="nav(\''+go+'\')">로그 보기</a>':""); t.classList.add("show"); const k=++toastTok; setTimeout(()=>{ if(k===toastTok)t.classList.remove("show"); },2600); }
function nav(k){ STATE.area=k; buildNav(); setArea(k); el("work").innerHTML=RENDER[k](); window.scrollTo(0,0); }
function decide(k,act){ STATE.decisions[k]=act; el("work").innerHTML=RENDER[k](); buildNav(); toast("Decision Log에 기록됨 — "+act,"log"); }
function selectScn(i){ STATE.scn=i; el("work").innerHTML=rS5(); buildNav(); toast("처리 방안 선택 — 결재 상신","log"); }
function setInput(key,val){
  if(key==="stmtMatch") INPUTS[key]=(val==="true"); else INPUTS[key]=Number(val)||0;
  R=compute(INPUTS); buildPill(); buildNav(); const rs=el("resSum"); if(rs)rs.innerHTML=resSumHTML();
}
function loadExample(key){
  INPUTS=Object.assign({},DEFAULTS,EXAMPLES[key].patch); R=compute(INPUTS);
  STATE.decisions={}; STATE.scn=null; STATE.written=false; STATE.replayed=false;
  buildPill(); el("work").innerHTML=rInputs(); buildNav(); toast("예시 입력: "+EXAMPLES[key].name+" — 엔진이 다시 계산합니다");
}
let wTok=0;
function runWriteback(){
  const acts=R.actions, btn=el("wbBtn"), st=el("wbState"), wb=el("wbLog"); if(!acts.length)return;
  if(btn)btn.disabled=true; if(st)st.textContent="반영 중…"; if(wb)wb.innerHTML="";
  const stt={ack:["b-ok","반영됨"],retry:["b-review","재시도 → 발송"],pending:["b-review","승인 대기"]};
  const tok=++wTok; let k=0;
  (function nx(){ if(tok!==wTok)return;
    if(k>=acts.length){ if(btn){btn.disabled=false;btn.textContent="다시 실행";} if(st)st.textContent="완료 · "+acts.length+"건"; STATE.written=true; return; }
    const a=acts[k], s=stt[a.end]||stt.ack, b=el("apb"+k);
    if(b)b.innerHTML='<span class="badge '+s[0]+'"><span class="dt"></span>'+s[1]+'</span>';
    if(wb){ const r=document.createElement("div"); r.className="wbr"; r.innerHTML='<span class="wt">14:32:'+(10+k)+'</span>'+a.code+' → '+a.target+'<span class="ws"><span class="badge '+s[0]+'"><span class="dt"></span>'+s[1]+'</span></span>'; wb.appendChild(r); }
    k++; setTimeout(nx,520);
  })();
}
function runReplay(){ const r=el("replay"); if(r)r.classList.add("show"); STATE.replayed=true; }

/* init */
buildNav(); buildPill(); nav("s1");
</script>
</body>
</html>
