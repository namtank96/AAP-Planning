<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 손해사정 심사 플랫폼</title>
<!--
  AAP 손해사정 심사 플랫폼 — 기진회 호르무즈 프로토타입의 제품 UI/UX 골격을 손해사정 AAP 내용으로.
  좌 고정 사이드바 + 상단 브레드크럼 + 카드형 화면 + 좌우 분할 상세 패널 + 분석 실행 애니메이션 + 설명가능성.
  · 우측 패널이 단계/카드/노드/실행 클릭마다 'AAP가 지금 무엇을 하는지' 갱신.
  · 결과 수치는 compute() 결정론 엔진 산출(같은 입력 같은 결과·Replay). 단일 HTML·외부 의존성 0.
-->
<style>
:root{
  --bg-base:#F4F6FB; --bg-card:#FFFFFF; --text-primary:#111111; --text-secondary:#666666; --text-tertiary:#999999;
  --border:#E8ECF1; --accent:#E60012; --accent-light:rgba(230,0,18,.06);
  --shadow:0 1px 3px rgba(0,0,0,.08); --shadow-lg:0 4px 12px rgba(0,0,0,.08);
  --radius:12px; --radius-sm:8px; --sidebar-width:240px; --header-height:48px;
  --mono:'JetBrains Mono','Fira Code',ui-monospace,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Pretendard',-apple-system,system-ui,'Malgun Gothic',sans-serif;background:var(--bg-base);color:var(--text-primary);line-height:1.6;font-size:14px;display:flex}

/* sidebar */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-width);background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;overflow-y:auto}
.sidebar-logo{padding:20px 20px 8px;display:flex;align-items:center;gap:10px}
.sidebar-logo-fallback{width:32px;height:32px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
.sidebar-logo .lt{font-size:15px;font-weight:800}
.sidebar-subtitle{padding:0 20px 16px;font-size:12px;color:var(--text-tertiary);font-weight:500;border-bottom:1px solid var(--border)}
.sidebar-section-label{padding:16px 20px 6px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 20px;margin:1px 8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:inherit}
.menu-item .mi{width:18px;height:18px;flex-shrink:0;color:var(--text-tertiary);display:flex}
.menu-item:hover{background:#F8F9FA;color:var(--text-primary)}
.menu-item.active{background:#F0F2F5;font-weight:600;color:var(--text-primary);border-left:3px solid var(--accent);padding-left:17px}
.menu-item.active .mi{color:var(--accent)}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-tertiary);line-height:1.6}
.sidebar-footer .ver{font-weight:600;color:var(--text-secondary)}

/* main */
.main-area{margin-left:var(--sidebar-width);flex:1;min-height:100vh;display:flex;flex-direction:column}
.header-bar{height:var(--header-height);background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.header-breadcrumb{font-size:13px;color:var(--text-secondary)}
.header-breadcrumb .bc-root{color:var(--text-tertiary)}
.header-breadcrumb .bc-sep{margin:0 6px;color:var(--text-tertiary)}
.header-breadcrumb .bc-current{color:var(--text-primary);font-weight:600}
.header-right{display:flex;align-items:center;gap:12px}
.scenario-badge{padding:4px 10px;border-radius:4px;background:var(--accent-light);color:var(--accent);font-weight:600;font-size:11px}
.hr-user{font-size:12px;color:var(--text-secondary);font-weight:600}

.page{display:none;padding:28px 32px 48px;max-width:1400px;width:100%}
.page.active{display:block}
.section-header{margin-bottom:22px}
.section-header h2{font-size:20px;font-weight:700;margin-bottom:4px}
.section-header p{font-size:13px;color:var(--text-secondary)}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--bg-card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--border)}
.kpi-card .kpi-label{font-size:12px;color:var(--text-secondary);font-weight:500;margin-bottom:6px}
.kpi-card .kpi-value{font-size:26px;font-weight:700}
.kpi-card .kpi-sub{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.kpi-card.accent .kpi-value{color:var(--accent)}

.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
.card.pad{padding:18px 20px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--text-secondary);border-bottom:2px solid var(--border);background:#FAFBFD;white-space:nowrap}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tbody tr:hover{background:#F8F9FC}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr.clk{cursor:pointer}
.data-table tbody tr.on{background:var(--accent-light)}
.mono{font-family:var(--mono)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:#E8F5E9;color:#2E7D32}.badge-amber{background:#FFF3E0;color:#E65100}.badge-gray{background:#F5F5F5;color:#757575}.badge-red{background:#FFEBEE;color:#D32F2F}.badge-purple{background:#F3E5F5;color:#7B1FA2}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot-green{background:#4CAF50}.dot-amber{background:#FF9800}.dot-red{background:#E53935}.dot-gray{background:#BDBDBD}

/* cq-layout (page 2) */
.split-layout{display:grid;grid-template-columns:38% 62%;gap:0;min-height:calc(100vh - 200px);background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.list-panel{border-right:1px solid var(--border);display:flex;flex-direction:column}
.list-header{padding:15px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700}
.list-items{overflow-y:auto;flex:1;padding:8px}
.list-card{padding:13px 15px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .15s}
.list-card:hover{background:#F8F9FA}
.list-card.active{border-color:var(--accent);background:var(--accent-light)}
.list-card .lc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.list-card .lc-id{font-size:12px;font-weight:700}
.list-card .lc-q{font-size:12px;color:var(--text-secondary);line-height:1.5}
.detail-scroll{overflow-y:auto;padding:24px}
.d-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.d-section:last-child{border-bottom:none}
.d-section h4{font-size:13px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.d-field{margin-bottom:9px}
.d-label{font-size:11px;font-weight:600;color:var(--text-tertiary);margin-bottom:3px}
.d-value{font-size:13px;line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500;background:var(--bg-base);color:var(--text-secondary);border:1px solid var(--border)}

/* graph (page 3) */
.graph-container{display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 200px);background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
#caseGraph{border-right:1px solid var(--border);background:#FCFDFF;position:relative}
#caseGraph svg{width:100%;height:100%;display:block}
.gnode{cursor:pointer}
.gnode rect{transition:filter .15s}
.gnode:hover rect,.gnode.sel rect{filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}
.gnode.sel rect{stroke:#111;stroke-width:2.5}
.detail-panel{padding:22px;overflow-y:auto;background:#FAFBFD}
.dp-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:13px;text-align:center;gap:10px}
.dp-header{padding:11px 15px;border-radius:var(--radius-sm);margin-bottom:14px;color:#fff;font-weight:700;font-size:15px}
.dp-section-title{font-size:12px;font-weight:700;color:var(--accent);margin-top:15px;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.dp-label{font-size:11px;color:var(--text-tertiary);font-weight:500;margin-bottom:2px;margin-top:11px}
.dp-value{font-size:13px;font-weight:500;line-height:1.55}
.dp-list{font-size:12.5px;line-height:1.7;padding-left:16px}
.graph-legend{display:flex;flex-wrap:wrap;gap:14px;padding:12px 18px;background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* run (page 4) */
.run-selector{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:13px 16px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border);flex-wrap:wrap}
.run-selector label{font-size:12px;font-weight:600;color:var(--text-secondary);white-space:nowrap}
.run-selector select{padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-family:inherit;background:var(--bg-base)}
.btn-accent{padding:11px 22px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer;font-family:inherit;transition:background .2s;white-space:nowrap}
.btn-accent:hover{background:#C7000F}
.btn-accent:disabled{opacity:.6;cursor:default}
.btn-outline{padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:var(--bg-card);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-secondary)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.run-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
@media(max-width:1100px){.run-layout,.graph-container,.split-layout{grid-template-columns:1fr}}
.analysis-progress{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.analysis-progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0;transition:width .5s ease}
.analysis-step{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;cursor:pointer}
.analysis-step.visible{opacity:1;transform:translateY(0)}
.analysis-step.completed{border-color:#C8E6C9;background:#FAFFF9}
.analysis-step.cur{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.step-icon.spinner{border:2px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite}
.step-icon.done{background:#C8E6C9;color:#2E7D32;font-weight:700}
.step-icon.idle{background:var(--bg-base);color:var(--text-tertiary);font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
.step-title{font-weight:700;font-size:13px;margin-bottom:2px}
.step-detail{font-size:11.5px;color:var(--text-secondary);line-height:1.5}
.run-explain{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:sticky;top:62px}
.re-head{padding:13px 16px;background:#1E1E2E;color:#fff;font-weight:700;font-size:14px}
.re-head small{display:block;font-size:10px;color:#A6ADC8;font-weight:600;margin-top:2px}
.re-body{padding:16px}
.re-sub{font-size:11px;font-weight:700;color:var(--accent);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px}
.re-sub:first-child{margin-top:0}
.re-body .re-text{font-size:12.5px;line-height:1.6;color:var(--text-primary)}
.re-body ol{padding-left:18px;font-size:12.5px;line-height:1.7;color:var(--text-secondary)}
.re-body .re-result{font-size:12.5px;line-height:1.6;background:var(--bg-base);border-radius:6px;padding:10px 12px;border-left:3px solid var(--accent)}

/* results (page 5) */
.results-section{margin-bottom:26px}
.results-section-header{font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.results-section-header .section-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent)}
.flowmap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flowmap .fn{border:1px solid var(--border);border-radius:9px;background:var(--bg-card);padding:10px 13px;box-shadow:var(--shadow);min-width:0}
.flowmap .fn small{font-size:10px;color:var(--text-tertiary)}
.flowmap .fn b{display:block;font-family:var(--mono);font-size:14px;margin-top:2px}
.flowmap .fn.a b{color:#2E7D32}.flowmap .fn.r b{color:#E65100}.flowmap .fn.s b{color:#7B1FA2}
.flowmap .fa{color:var(--accent);font-weight:800}
.explain-panel{background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.explain-header{padding:15px 20px;background:#1E1E2E;color:#fff;font-weight:700;font-size:14px}
.explain-body{padding:20px}
.explain-sub-header{font-size:13px;font-weight:700;margin-top:20px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.explain-sub-header:first-child{margin-top:0}
.mini-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:900px){.mini-cards{grid-template-columns:repeat(2,1fr)}}
.mini-card{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-base)}
.mini-card .mc-label{font-size:11px;color:var(--text-tertiary);margin-bottom:4px}
.mini-card .mc-value{font-size:16px;font-weight:700;margin-bottom:2px}
.mini-card .mc-risk{font-size:11px;font-weight:600}
.mini-card .mc-source{font-size:10px;color:var(--text-tertiary);margin-top:4px}
.risk-danger{color:#D32F2F}.risk-warn{color:#E65100}.risk-ok{color:#2E7D32}
.reproduce-box{background:var(--bg-base);border-radius:var(--radius-sm);padding:15px;border:1px solid var(--border);font-size:12px;color:var(--text-secondary);line-height:1.9}
.reproduce-box .mono{color:var(--text-primary);font-weight:600}
.options-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:8px}
@media(max-width:900px){.options-grid{grid-template-columns:1fr}}
.option-card{background:var(--bg-card);border-radius:var(--radius-sm);box-shadow:var(--shadow);border:1px solid var(--border);padding:18px;position:relative;cursor:pointer;transition:border-color .15s}
.option-card:hover{border-color:var(--accent)}
.option-card.recommended{border-color:var(--accent);border-width:2px}
.option-card.recommended::after{content:'권장';position:absolute;top:-10px;right:14px;padding:2px 9px;border-radius:3px;background:var(--accent);color:#fff;font-size:10px;font-weight:700}
.option-card.sel{box-shadow:0 0 0 3px var(--accent-light)}
.option-title{font-size:15px;font-weight:700;margin-bottom:10px}
.option-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.option-row .ol{color:var(--text-secondary)}.option-row .ov{font-weight:600}
.option-desc{margin-top:9px;font-size:12px;color:var(--text-secondary);line-height:1.5}

/* compare (page 6) */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.compare-card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.compare-card .cc-head{padding:14px 18px;font-weight:700;font-size:14px;color:#fff}
.compare-card.old .cc-head{background:#757575}.compare-card.aap .cc-head{background:var(--accent)}
.compare-card .cc-body{padding:8px 18px 16px}
.cc-row{padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.55}
.cc-row:last-child{border-bottom:none}
.cc-row .crl{font-size:11px;color:var(--text-tertiary);font-weight:600;margin-bottom:2px}

.notice{font-size:12px;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:11px 14px;line-height:1.6;margin-top:16px}
.sim{font-size:10px;font-weight:700;color:#E65100;background:#FFF3E0;border-radius:4px;padding:2px 7px;margin-left:6px}
.inputs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:900px){.inputs-grid{grid-template-columns:repeat(2,1fr)}}
.fld{display:flex;flex-direction:column;gap:3px}
.fld span{font-size:11px;font-weight:600;color:var(--text-tertiary)}
.fld input,.fld select{font-family:var(--mono);font-size:12.5px;border:1px solid var(--border);border-radius:6px;padding:7px 9px;background:var(--bg-card);width:100%}
.fld input:focus,.fld select:focus{border-color:var(--accent);outline:none}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(12px);background:#111;color:#fff;font-size:12px;font-weight:600;padding:10px 16px;border-radius:9px;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:300}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo"><span class="sidebar-logo-fallback">AAP</span><span class="lt">손해사정</span></div>
  <div class="sidebar-subtitle">AI 자동 심사 플랫폼 · Simulation</div>
  <div id="menu"></div>
  <div class="sidebar-footer"><span class="ver">v4 · Simulation PoC</span><br>수치는 가정값 · SME 검증 대상<br>단일 HTML · 외부 의존성 0</div>
</nav>
<div class="main-area">
  <div class="header-bar">
    <div class="header-breadcrumb"><span class="bc-root">AAP 손해사정</span><span class="bc-sep">›</span><span class="bc-current" id="crumb">청구 데이터</span></div>
    <div class="header-right"><span class="scenario-badge" id="hbadge">CLM-2026-0417</span><span class="hr-user">김민준 손해사정사</span></div>
  </div>
  <div id="pages"></div>
</div>
<div id="toast"></div>

<script>
"use strict";

/* ===================== 엔진 (결정론 compute) ===================== */
const CASE={ id:"CLM-2026-0417", title:"교차로 직진/좌회전 충돌", type:"자동차보험 대물·대인 복합 청구",
  policy:{id:"POL-AUTO-8842"}, mileage:"1.2만 km", year:"2023년식", injury:"경추염좌 · 상해 14급 · 14일" };
const DEFAULTS={ repair:4800000, marketCap:4100000, medical:3000000, medicalNorm:2600000,
  faultBB:15, faultPre:30, faultThr:10, fraud:78, fraudThr:75, similar:3, stmtMatch:false, autoLimit:1000000 };
let INPUTS=Object.assign({},DEFAULTS);
const EXAMPLES={ low:{name:"저위험",patch:{fraud:32,faultBB:25,faultPre:30,repair:3800000,medical:0,similar:1,stmtMatch:true}},
  base:{name:"기본",patch:{}}, high:{name:"고위험",patch:{fraud:92,faultBB:10,faultPre:32,repair:9000000,marketCap:6500000,similar:4,stmtMatch:false}} };
function hash(o){ const s=JSON.stringify(o); let h=0x811c9dc5; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);} return (h>>>0).toString(16).toUpperCase().padStart(8,"0").slice(0,4); }
function compute(inp){
  const repairAccepted=Math.min(inp.repair,inp.marketCap), repairExcess=Math.max(0,inp.repair-inp.marketCap);
  const medicalAccepted=Math.min(inp.medical,inp.medicalNorm), medicalExcess=Math.max(0,inp.medical-inp.medicalNorm);
  const acceptedLoss=repairAccepted+medicalAccepted;
  const faultGap=Math.abs(inp.faultBB-inp.faultPre), faultDisputed=faultGap>inp.faultThr;
  const faultLow=Math.min(inp.faultBB,inp.faultPre), faultHigh=Math.max(inp.faultBB,inp.faultPre);
  const ourLiabHigh=Math.round(acceptedLoss*faultHigh/100);
  let fraudEff=inp.fraud+(inp.similar>=3?5:0)+(!inp.stmtMatch?5:0);
  const fraudRoute=fraudEff>=inp.fraudThr?"SIU":(fraudEff>=60?"REVIEW":"CLEAR");
  const blockAuto=(fraudRoute==="SIU");
  const autoLiab=Math.round(acceptedLoss*(faultDisputed?faultLow:faultHigh)/100);
  const autoPay=blockAuto?0:Math.min(autoLiab,inp.autoLimit);
  const review=Math.max(0,ourLiabHigh-autoPay);
  const routes=[]; if(autoPay>0)routes.push("자동 지급"); if(review>0)routes.push("사람 검토"); if(fraudRoute==="SIU")routes.push("SIU 조사");
  return {repairAccepted,repairExcess,medicalAccepted,medicalExcess,acceptedLoss,faultGap,faultDisputed,faultLow,faultHigh,
    ourLiabHigh,fraudEff,fraudRoute,blockAuto,autoPay,review,routes,inputHash:hash(inp),resultHash:hash({autoPay,review,routes})};
}

let runTok=0;
function runAudit(){
  const btn=el("runBtn"); btn.disabled=true; btn.textContent="심사 중…";
  STATE.ran=false; STATE.runStep=-1;
  for(let i=0;i<RUN_STEPS.length;i++){ const s=el("as"+i),ic=el("ai"+i); if(s){s.className="analysis-step";} if(ic){ic.className="step-icon idle";ic.textContent=(i+1);} }
  el("progFill").style.width="0%";
  const tok=++runTok; let k=0;
  (function nx(){
    if(tok!==runTok)return;
    if(k>=RUN_STEPS.length){ el("progFill").style.width="100%"; STATE.ran=true; STATE.runStep=RUN_STEPS.length-1;
      btn.disabled=false; btn.textContent="다시 실행";
      el("pages").querySelectorAll(".analysis-step").forEach(s=>s.classList.remove("cur"));
      const note=document.createElement("div"); note.className="notice"; note.innerHTML='심사 완료 · 경로 <b>'+routeStr()+'</b> · 자동 '+won(R.autoPay)+' / 검토 '+won(R.review)+'. <button class="btn-outline" style="margin-left:8px" onclick="go(\'result\')">지급·검토 결과 보기 →</button>';
      const lay=el("auditSteps").parentElement; if(lay&&!lay.nextElementSibling){ lay.parentElement.appendChild(note); }
      return; }
    const s=el("as"+k),ic=el("ai"+k);
    s.classList.add("visible","cur"); ic.className="step-icon spinner"; ic.textContent="";
    STATE.runStep=k; el("runExplain").innerHTML=explainHTML(k);
    setTimeout(()=>{ if(tok!==runTok)return; ic.className="step-icon done"; ic.textContent="✓"; s.classList.add("completed"); s.classList.remove("cur"); el("progFill").style.width=Math.round((k+1)/RUN_STEPS.length*100)+"%"; k++; nx(); }, RUN_STEPS[k].dur);

}

  h+='<div class="results-section"><div class="results-section-header"><span class="section-badge">B</span> 단계별 분기 결과</div><div class="card pad"><table class="data-table"><thead><tr><th>심사 항목</th><th>판정</th><th>경로</th><th>발동 규칙</th></tr></thead><tbody>';
  const gr=[["R-001·002","자동 처리"],["R-005",R.repairExcess>0?"사람 검토":"자동 처리"],["R-005",R.medicalExcess>0?"사람 검토":(INPUTS.medical>0?"추가 확인":"—")],["R-006",R.faultDisputed?"사람 검토":"자동 처리"],["R-007",R.fraudRoute==="SIU"?"SIU 조사":(R.fraudRoute==="REVIEW"?"현장 확인":"자동 처리")]];
  gate.forEach((g,i)=>{ h+='<tr><td style="font-weight:600">'+g[0]+'</td><td><span class="badge '+g[2]+'">'+g[1]+'</span></td><td>'+gr[i][1]+'</td><td class="mono">'+gr[i][0]+'</td></tr>'; });
  h+='</tbody></table></div></div>';
  /* C 설명가능성 */
  h+='<div class="results-section"><div class="results-section-header"><span class="section-badge">C</span> 판단 근거 · 설명가능성</div><div class="explain-panel"><div class="explain-header">'+CASE.id+' — 자동/검토 분리 근거</div><div class="explain-body">';
  h+='<div class="explain-sub-header">C1. 판정 근거 체인</div><table class="data-table"><thead><tr><th>심사</th><th>규칙</th><th>조건 비교</th><th>판정</th><th>출처</th><th>신뢰도</th></tr></thead><tbody>';
  const chain=[];
  chain.push(["담보 유효성","R-001·002","계약 active · 담보 포함","COVERED","계약 시스템","높음"]);
  chain.push(["블랙박스 신뢰도","증거","trust 0.92 ≥ 0.90","증거 채택","블랙박스","높음"]);
  if(R.faultDisputed) chain.push(["과실 편차","R-006","차이 "+R.faultGap+"%p > 임계 "+INPUTS.faultThr,"사람 검토","KNIA·판례","중간"]);
  if(R.repairExcess>0) chain.push(["견적 이상치","R-005",won(INPUTS.repair)+" > 상한 "+won(INPUTS.marketCap),"초과분 검토","시장 시세","중간"]);
  if(R.fraudRoute==="SIU") chain.push(["사기 신호","R-007","점수 "+R.fraudEff+" ≥ 임계 "+INPUTS.fraudThr,"SIU 조사","FDS·이력","높음"]);
  chain.push(["자동 분리","정책","위험·확신·권한 기준","자동 "+won(R.autoPay),"정책","높음"]);
  chain.push(["검토 라우팅","정책","다툼·초과·의심분","검토 "+won(R.review),"정책","높음"]);
  chain.forEach(c=>{ h+='<tr><td>'+c[0]+'</td><td class="mono">'+c[1]+'</td><td>'+c[2]+'</td><td style="font-weight:600">'+c[3]+'</td><td>'+c[4]+'</td><td><span class="badge badge-green">'+c[5]+'</span></td></tr>'; });
  h+='</tbody></table>';
  h+='<div class="explain-sub-header">C2. 위험·금액 지표</div><div class="mini-cards">';
  const rk=(b)=>b?"risk-danger":"risk-ok";
  h+='<div class="mini-card"><div class="mc-label">사기 점수(가중)</div><div class="mc-value '+rk(R.fraudRoute==="SIU")+'">'+R.fraudEff+'</div><div class="mc-risk '+rk(R.fraudRoute==="SIU")+'">'+(R.fraudRoute==="SIU"?"임계 초과":"임계 내")+'</div><div class="mc-source">출처: FDS</div></div>';
  h+='<div class="mini-card"><div class="mc-label">과실 차이</div><div class="mc-value '+rk(R.faultDisputed)+'">'+R.faultGap+'%p</div><div class="mc-risk '+rk(R.faultDisputed)+'">'+(R.faultDisputed?"자동 확정 불가":"확정 가능")+'</div><div class="mc-source">출처: 블랙박스·판례</div></div>';
  h+='<div class="mini-card"><div class="mc-label">견적 초과분</div><div class="mc-value '+rk(R.repairExcess>0)+'">'+won(R.repairExcess)+'</div><div class="mc-risk '+rk(R.repairExcess>0)+'">'+(R.repairExcess>0?"검토 대상":"범위 내")+'</div><div class="mc-source">출처: 시장 시세</div></div>';
  h+='<div class="mini-card"><div class="mc-label">인정 손해액</div><div class="mc-value">'+won(R.acceptedLoss)+'</div><div class="mc-risk" style="color:var(--text-secondary)">시장·통상 인정</div><div class="mc-source">출처: 부품·약관</div></div>';
  h+='</div>';
  h+='<div class="explain-sub-header">C3. 발동 규칙 · 경로</div><div class="card pad" style="font-size:12.5px;line-height:1.9">발동 규칙: <span class="mono">R-001·R-002·R-005·R-006'+(R.fraudRoute==="SIU"?"·R-007":"")+'</span><br>최종 경로: <b>'+routeStr()+'</b>'+(R.blockAuto?' <span class="badge badge-red">사기 의심 → 자동 지급 전면 보류</span>':'')+'</div>';
  h+='<div class="explain-sub-header">C4. 재현성 보장</div><div class="reproduce-box">동일 입력으로 다시 실행하면 동일한 경로·금액·해시가 보장됩니다.<br>분석 ID: <span class="mono">DLG-2026-0417-01</span> · 입력 해시: <span class="mono">'+CASE.id+"-"+R.inputHash+'</span> · 결과 해시: <span class="mono">'+R.resultHash+'</span> · 데이터 기준일: <span class="mono">2026-06-15</span></div>';
  h+='</div></div></div>';
  /* D 처리 옵션 */
  h+='<div class="results-section"><div class="results-section-header"><span class="section-badge">D</span> 담당자 처리 옵션</div><div class="options-grid">';
  OPTIONS.forEach((o,i)=>{ const reco=o.reco(); const amt=(typeof o.amt==="function")?o.amt():o.amt;
    h+='<div class="option-card'+(reco?" recommended":"")+(STATE.option===i?" sel":"")+'" onclick="selOption('+i+')"><div class="option-title">'+o.t+'</div><div class="option-row"><span class="ol">예상 처리기간</span><span class="ov">'+o.period+'</span></div><div class="option-row"><span class="ol">금액</span><span class="ov">'+amt+'</span></div><div class="option-row"><span class="ol">리스크</span><span class="ov">'+o.risk+'</span></div><div class="option-desc">'+o.desc+'</div></div>'; });
  h+='</div>'+(STATE.option!=null?'<div class="notice">‘'+OPTIONS[STATE.option].t+'’ 선택 → Decision Log에 담당자 처리로 기록되었습니다. <button class="btn-outline" style="margin-left:8px" onclick="go(\'log\')">Decision Log 보기 →</button></div>':'')+'</div>';
  return h;
}
function selOption(i){ STATE.option=i; el("pages").querySelectorAll(".option-card").forEach((c,k)=>c.classList.toggle("sel",k===i)); go("result"); toast("처리 옵션 선택: "+OPTIONS[i].t); }

/* ===================== 페이지 6 · 기존 방식 비교 ===================== */
function pCompare(){
  let h='<div class="section-header"><h2>기존 방식 비교</h2><p>같은 손해사정 업무를 기존 수작업 방식과 AAP 기반 방식으로 대비합니다.</p></div>';
  h+='<div class="compare-grid"><div class="compare-card old"><div class="cc-head">기존 손해사정 방식</div><div class="cc-body">';
  COMPARE.old.forEach(r=>{ h+='<div class="cc-row"><div class="crl">'+r[0]+'</div>'+r[1]+'</div>'; });
  h+='</div></div><div class="compare-card aap"><div class="cc-head">AAP 기반 방식</div><div class="cc-body">';
  COMPARE.aap.forEach(r=>{ h+='<div class="cc-row"><div class="crl">'+r[0]+'</div>'+r[1]+'</div>'; });
  h+='</div></div></div>';
  h+='<div class="notice">핵심 차이 — 단일 AI는 답을 생성하고 끝나지만, AAP는 판단을 <b>자동/검토/SIU로 분기</b>하고 실제 시스템에 반영하며 <b>Decision Log·재현성</b>으로 근거를 남깁니다.</div>';
  return h;
}

/* ===================== 페이지 7 · Decision Log ===================== */
function pLog(){
  let h='<div class="section-header"><h2>Decision Log</h2><p>모든 판단의 입력·규칙·결과·담당자 처리를 추적 가능한 로그로 기록하고, 같은 입력에 같은 결과를 재현합니다.</p></div>';
  h+='<div class="card pad" style="margin-bottom:16px"><table class="data-table"><tbody>';
  const opt=STATE.option!=null?OPTIONS[STATE.option].t:"미선택";
  [["Decision ID","DLG-2026-0417-01"],["Input Hash",CASE.id+"-"+R.inputHash],["Result Hash",R.resultHash],
   ["사용 Rule","R-001 · R-002 · R-005 · R-006"+(R.fraudRoute==="SIU"?" · R-007":"")],
   ["사용 Agent","Intake · Coverage · Damage · Liability · Fraud · Decision"],
   ["Decision Route",routeStr()],["담당자 Override","처리 옵션: "+opt],
   ["Writeback Action","자동 지급 "+won(R.autoPay)+" · 검토 큐 "+won(R.review)+(R.fraudRoute==="SIU"?" · SIU 의뢰":"")],
   ["Learning Candidate","교차로 좌회전 과실 검토 Skill v0.1 (검증 대기)"]].forEach(r=>{ h+='<tr><td style="font-weight:600;width:160px;color:var(--text-secondary)">'+r[0]+'</td><td class="mono">'+r[1]+'</td></tr>'; });
  h+='</tbody></table></div>';
  h+='<button class="btn-accent" onclick="runReplay()">재현 실행 (같은 입력 재계산)</button>';
  h+='<div id="replayBox" style="margin-top:14px">'+(STATE.replayed?replayHTML():"")+'</div>';
  return h;
}
function replayHTML(){ return '<div class="card pad" style="border-color:#C8E6C9;background:#FAFFF9"><span class="badge badge-green">REPLAY MATCHED</span> &nbsp; 입력 해시 <span class="mono">'+CASE.id+"-"+R.inputHash+'</span> · 결과 해시 <span class="mono">'+R.resultHash+'</span> · 경로 <b>'+routeStr()+'</b><br><span style="font-size:12px;color:var(--text-secondary)">동일 입력 → 동일 판정. 감사·민원 시 같은 근거를 그대로 제시합니다.</span></div>'; }
function runReplay(){ STATE.replayed=true; el("replayBox").innerHTML=replayHTML(); toast("재현 실행 — 결과 해시 일치(MATCHED)"); }

/* ===================== 입력 변경 ===================== */
function setIn(k,v){ if(k==="stmtMatch")INPUTS[k]=(v==="true"); else INPUTS[k]=Number(v)||0; R=compute(INPUTS); el("hbadge").textContent=CASE.id; toast("입력 반영 — 자동 "+won(R.autoPay)+" / 검토 "+won(R.review)); }
function loadEx(k){ INPUTS=Object.assign({},DEFAULTS,EXAMPLES[k].patch); R=compute(INPUTS); STATE.ran=false; STATE.runStep=-1; STATE.option=null; STATE.replayed=false; go("run"); toast("예시 입력: "+EXAMPLES[k].name+" — 다시 실행하세요"); }

const RENDER={data:pData,rules:pRules,graph:pGraph,run:pRun,result:pResult,compare:pCompare,log:pLog};

/* init */
buildMenu(); go("data");
</script>
