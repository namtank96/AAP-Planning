<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 손해사정 Use Case 콘솔</title>
<!--
  AAP 손해사정 Use Case 콘솔 — 사건 한 건이 Operating Loop(의미화→판단→분기→실행→학습)를
  통과하는 작동 시연 + 기획서(AAP Proactive Offering v0.4) 근거 설명 레이어.
  · 목적: 기술 구현 증명이 아니라 AAP 정의·사업화의 설득. 손해사정은 그 예시.
  · 단일 HTML · vanilla JS/CSS · 외부 의존성 0 · 더미 데이터(실연산 ✕) · 상호작용은 실제 작동.
-->
<style>
:root{
  --canvas:#ECEFF4; --surface:#FFFFFF; --ink:#1A2332; --muted:#5B6B82; --line:#DCE2EC;
  --sidebar:#141B2D; --accent:#2F54EB; --accent-sf:#EAF0FF;
  --ok:#1F9D5B; --review:#C77700; --hold:#C0392B; --siu:#7A3FBF;
  --ok-sf:#E7F6EE; --review-sf:#FBF1E0; --hold-sf:#FBEAE7; --siu-sf:#F1EAFB;
  --shadow:0 1px 2px rgba(20,27,45,.06);
  --mono:ui-monospace,'SF Mono',Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI','Malgun Gothic',sans-serif;background:var(--canvas);color:var(--ink);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:210px minmax(0,1fr) 280px;min-height:100vh}
@media(max-width:1180px){.app{grid-template-columns:188px minmax(0,1fr)} .rail{display:none}}

/* ===== Sidebar ===== */
.side{background:var(--sidebar);color:#C5CEDE;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:auto}
.brand{padding:16px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .bm{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:#fff;letter-spacing:.01em}
.brand .bm .sq{width:18px;height:18px;border-radius:5px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.brand .bs{font-size:10px;font-weight:600;color:#7E8CA6;margin-top:5px}
.nav{padding:8px 8px;display:flex;flex-direction:column;gap:1px}
.nav a{display:grid;grid-template-columns:24px 1fr;gap:9px;align-items:center;padding:8px 10px;border-radius:7px;cursor:pointer;color:#AEB9CE;text-decoration:none;border-left:2px solid transparent;transition:background .12s,color .12s}
.nav a .ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:#7E8CA6}
.nav a .ic svg{width:16px;height:16px}
.nav a .nl{font-size:12.5px;font-weight:600;line-height:1.15}
.nav a .nl span{display:block;font-size:9px;font-weight:600;color:#6B7894;margin-top:1px}
.nav a:hover{background:rgba(255,255,255,.05);color:#E4EAF3}
.nav a.on{background:rgba(47,84,235,.16);color:#fff;border-left-color:var(--accent)}
.nav a.on .ic{color:#9DB2FF}
.nav a.on .nl span{color:#9DB2FF}
.side-case{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.08)}
.side-case .scl{font-size:9px;font-weight:700;color:#6B7894;text-transform:uppercase;letter-spacing:.05em}
.side-case .sci{font-family:var(--mono);font-size:11px;font-weight:600;color:#E4EAF3;margin-top:4px}
.side-case .scx{font-size:10px;color:#8693AC;margin-top:3px;line-height:1.4}

/* ===== Main ===== */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:8;background:var(--surface);border-bottom:1px solid var(--line);padding:9px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.crumb{font-size:12px;font-weight:600;color:var(--muted)}
.crumb b{color:var(--ink);font-weight:700}
.crumb i{color:var(--line);font-style:normal;margin:0 5px}
.presets{margin-left:auto;display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.presets button{font:inherit;font-size:11px;font-weight:700;border:0;background:var(--surface);color:var(--muted);padding:5px 12px;cursor:pointer;border-right:1px solid var(--line)}
.presets button:last-child{border-right:0}
.presets button.on{background:var(--accent);color:#fff}
.pill{display:flex;gap:7px;align-items:center}
.pill .pl{font-family:var(--mono);font-size:11px;font-weight:700;border-radius:6px;padding:4px 9px;border:1px solid}
.pill .pl.a{background:var(--ok-sf);color:var(--ok);border-color:#BBE6CD}
.pill .pl.r{background:var(--review-sf);color:var(--review);border-color:#F0DBB0}

/* Operating Loop rail */
.loop{background:var(--surface);border-bottom:1px solid var(--line);padding:9px 22px;display:flex;align-items:center;gap:0}
.loop .lh{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:12px;white-space:nowrap}
.loop .lc{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--muted);background:var(--canvas);border:1px solid var(--line);border-radius:7px;padding:5px 11px;white-space:nowrap}
.loop .lc .d{width:7px;height:7px;border-radius:50%;background:#C4CDDD}
.loop .lc small{font-size:8.5px;font-weight:600;color:#93A0B8}
.loop .lc.done{color:var(--ink);border-color:#BBE6CD;background:var(--ok-sf)}
.loop .lc.done .d{background:var(--ok)}
.loop .lc.on{color:#fff;background:var(--accent);border-color:var(--accent)}
.loop .lc.on .d{background:#fff}
.loop .lc.on small{color:#C9D6FF}
.loop .ar{color:#C4CDDD;font-weight:800;margin:0 5px;font-size:11px}

.wrap{padding:20px 22px 40px;max-width:1080px}
.h1{font-size:18px;font-weight:800;margin:0 0 3px;letter-spacing:-.01em}
.sub{font-size:12px;color:var(--muted);margin:0 0 16px}
.sec{font-size:12px;font-weight:800;color:var(--ink);margin:20px 0 9px;display:flex;align-items:center;gap:7px}
.sec:first-of-type{margin-top:0}
.sec .tag{font-size:9px;font-weight:800;color:var(--accent);background:var(--accent-sf);border-radius:5px;padding:2px 7px;letter-spacing:.02em}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:820px){.g2,.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
.card h4{margin:0 0 9px;font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px}
.card h4 .cx{font-size:10px;font-weight:600;color:var(--muted)}

.kpi{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow)}
.kpi .kl{font-size:10.5px;font-weight:700;color:var(--muted)}
.kpi .kv{font-family:var(--mono);font-size:19px;font-weight:700;margin-top:5px}
.kpi.a .kv{color:var(--ok)}.kpi.r .kv{color:var(--review)}.kpi.h .kv{color:var(--hold)}
.kpi .kx{font-size:9.5px;color:var(--muted);margin-top:2px}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 8px;border:1px solid;white-space:nowrap}
.badge .dt{width:6px;height:6px;border-radius:50%}
.b-ok{background:var(--ok-sf);color:var(--ok);border-color:#BBE6CD}.b-ok .dt{background:var(--ok)}
.b-review{background:var(--review-sf);color:var(--review);border-color:#F0DBB0}.b-review .dt{background:var(--review)}
.b-hold{background:var(--hold-sf);color:var(--hold);border-color:#F1C9C2}.b-hold .dt{background:var(--hold)}
.b-siu{background:var(--siu-sf);color:var(--siu);border-color:#DDC9F2}.b-siu .dt{background:var(--siu)}
.b-mut{background:var(--canvas);color:var(--muted);border-color:var(--line)}.b-mut .dt{background:#A9B4C8}

table.tbl{width:100%;border-collapse:collapse;font-size:12px}
table.tbl th{text-align:left;font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;padding:7px 10px;border-bottom:1px solid var(--line)}
table.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:0}
table.tbl tbody tr:nth-child(even){background:#FAFBFD}
.mono{font-family:var(--mono)}
.amt{font-family:var(--mono);font-weight:700}

.kv-row{display:flex;padding:8px 0;border-bottom:1px dashed var(--line);gap:10px}
.kv-row:last-child{border-bottom:0}
.kv-row .k{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;min-width:76px;flex:0 0 auto;padding-top:1px}
.kv-row .v{font-size:12px;color:var(--ink);line-height:1.45}

.asset{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);margin-bottom:6px}
.asset .ad{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:0 0 auto}
.asset .an{font-size:12px;font-weight:700}
.asset .ax{font-size:9.5px;color:var(--muted)}
.asset .av{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--muted)}

.cmp{border:1px solid var(--line);border-radius:9px;overflow:hidden}
.cmp .row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}
.cmp .row:last-child{border-bottom:0}
.cmp .c{padding:9px 13px;font-size:11.5px;line-height:1.4}
.cmp .c.l{color:var(--muted);background:#FAFBFD;border-right:1px solid var(--line)}
.cmp .c.r{color:var(--ink);font-weight:600}
.cmp .hd .c{font-weight:800;font-size:11px}
.cmp .hd .c.l{color:var(--muted)}.cmp .hd .c.r{color:var(--accent);background:var(--accent-sf)}

.btn{font:inherit;font-size:12px;font-weight:700;border-radius:8px;padding:9px 18px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;transition:filter .12s}
.btn:hover{filter:brightness(1.06)}
.btn:disabled{opacity:.5;cursor:default}
.btn.ghost{background:var(--surface);color:var(--accent);border-color:#BBC8F5}
.btn.sm{padding:5px 11px;font-size:11px}
.runbar{display:flex;align-items:center;gap:12px;margin:6px 0 14px;flex-wrap:wrap}
.prog{flex:1;min-width:120px;height:6px;border-radius:4px;background:var(--canvas);border:1px solid var(--line);overflow:hidden}
.prog>i{display:block;height:100%;width:0;background:var(--accent);transition:width .35s ease}
.rstate{font-size:11px;font-weight:700;color:var(--muted)}

.steps{display:flex;flex-direction:column;gap:5px;min-height:300px}
.step{display:grid;grid-template-columns:22px 1fr;gap:10px;align-items:center;border:1px solid var(--line);border-radius:8px;background:var(--surface);padding:8px 11px;transition:opacity .2s,border-color .2s}
.step .si{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);box-sizing:border-box;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:var(--muted);flex:0 0 auto}
.step .st{font-size:12px;font-weight:700}
.step .sd{font-size:10px;color:var(--muted);margin-top:1px}
.step.pending{opacity:.5}
.step.run{border-color:var(--accent)}
.step.run .si{border-color:var(--accent);border-top-color:transparent;color:var(--accent);animation:spin .9s linear infinite}
.step.done .si{background:var(--accent);border-color:var(--accent);color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}

.agrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px;opacity:0;transition:opacity .3s}
.agrid.show{opacity:1}
@media(max-width:640px){.agrid{grid-template-columns:1fr}}
.acard{border:1px solid var(--line);border-radius:9px;background:var(--surface);padding:10px 12px;min-height:118px}
.acard .ah{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800}
.acard .ah .rt{margin-left:auto;font-size:9.5px;font-weight:700;color:var(--muted)}
.acard .aw{margin-top:7px;font-size:10.5px;color:var(--ink);line-height:1.45}
.acard .aw div{padding-left:11px;position:relative;margin-top:2px}
.acard .aw div:before{content:'';position:absolute;left:2px;top:7px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.acard .at{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
.acard .at .tg{font-size:9px;font-weight:700;color:var(--accent);background:var(--accent-sf);border-radius:4px;padding:1px 6px}

.queue{display:flex;flex-direction:column;gap:6px}
.qi{border:1px solid var(--line);border-radius:8px;background:var(--surface);padding:9px 11px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.qi:hover{border-color:var(--accent)}
.qi.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(47,84,235,.14)}
.qi .qn{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}
.qi .qx{font-size:10px;color:var(--muted);margin-top:2px}
.qdetail{border:1px solid var(--line);border-radius:9px;background:#FAFBFD;padding:11px 13px;min-height:150px}
.qdetail .qe{font-size:11px;color:var(--muted)}
.acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.acts .ab{font:inherit;font-size:11px;font-weight:700;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:7px;padding:6px 11px;cursor:pointer;transition:all .12s}
.acts .ab:hover{border-color:var(--accent);color:var(--accent)}
.acts .ab.done{background:var(--accent);color:#fff;border-color:var(--accent)}

.wbrow{display:grid;grid-template-columns:34px 1fr auto;gap:11px;align-items:center;border:1px solid var(--line);border-radius:8px;background:var(--surface);padding:9px 12px;margin-bottom:7px}
.wbrow .wi{width:34px;height:34px;border-radius:8px;background:var(--canvas);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--accent)}
.wbrow .wi svg{width:17px;height:17px}
.wbrow .wc{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--accent)}
.wbrow .wl{font-size:12px;font-weight:700;margin-top:1px}
.wbrow .wt{font-size:9.5px;color:var(--muted);margin-top:1px}

.log{border:1px solid var(--line);border-radius:9px;background:var(--surface);overflow:hidden}
.log .lr{display:grid;grid-template-columns:130px 1fr;gap:10px;padding:7px 13px;border-bottom:1px dashed var(--line);font-size:11.5px}
.log .lr:last-child{border-bottom:0}
.log .lr .lk{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;padding-top:1px}
.log .lr .lv{color:var(--ink);word-break:break-word}
.replay{border:1px dashed var(--accent);border-radius:9px;background:var(--accent-sf);padding:12px 14px;margin-top:11px;display:none}
.replay.show{display:block}
.replay .rh{font-size:12px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:8px}
.matched{font-family:var(--mono);font-size:10px;font-weight:800;color:#fff;background:var(--ok);border-radius:5px;padding:3px 9px}

.tl{display:flex;gap:10px}
.tl .tc{flex:1;border:1px solid var(--line);border-radius:9px;background:var(--surface);padding:11px 13px}
.tl .tc .tn{font-size:9px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
.tl .tc .tt{font-size:12px;font-weight:800;margin-top:3px}
.tl .tc .tx{font-size:10.5px;color:var(--muted);margin-top:4px;line-height:1.45}

.gl{border-bottom:1px dotted var(--muted);cursor:help}
.sim{font-size:8.5px;font-weight:800;color:var(--review);background:var(--review-sf);border:1px solid #F0DBB0;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}
.note{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:9px 12px;line-height:1.5;margin-top:14px}
.cta{margin-top:16px}

/* Right rail */
.rail{border-left:1px solid var(--line);background:var(--surface);padding:18px 16px;position:sticky;top:0;height:100vh;overflow:auto}
.rail .rt{font-size:9px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.06em}
.rail .rh{font-size:13px;font-weight:800;margin:6px 0 8px;line-height:1.3}
.rail .rb{font-size:11.5px;color:var(--ink);line-height:1.6}
.rail .rm{margin-top:13px;border-top:1px solid var(--line);padding-top:11px}
.rail .rm .rml{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.rail .rm .ri{font-size:10.5px;color:var(--muted);line-height:1.45;padding-left:12px;position:relative;margin-top:5px}
.rail .rm .ri:before{content:'';position:absolute;left:1px;top:6px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.rail .pillars{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.rail .pillars .p{font-size:9.5px;font-weight:700;color:var(--muted);background:var(--canvas);border:1px solid var(--line);border-radius:5px;padding:3px 7px}
.rail .pillars .p.on{color:var(--accent);background:var(--accent-sf);border-color:#BBC8F5}

.procrail{background:var(--surface);border-bottom:1px solid var(--line);padding:9px 22px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.procrail .pl-h{font-size:9px;font-weight:800;color:var(--ink);text-transform:uppercase;letter-spacing:.06em;margin-right:10px;white-space:nowrap}
.procrail .pl-h small{display:block;font-size:8px;color:var(--muted);font-weight:700;letter-spacing:0;text-transform:none;margin-top:1px}
.procrail .ps{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:8px;padding:5px 11px;background:var(--canvas);min-width:0}
.procrail .ps b{font-size:11.5px;font-weight:800;color:var(--ink);line-height:1.15}
.procrail .ps small{font-size:9px;font-weight:700;color:var(--muted);margin-top:1px}
.procrail .ps.auto{border-color:#BBE6CD;background:var(--ok-sf)} .procrail .ps.auto small{color:var(--ok)}
.procrail .ps.review{border-color:#F0DBB0;background:var(--review-sf)} .procrail .ps.review small{color:var(--review)}
.procrail .ps.siu{border-color:#DDC9F2;background:var(--siu-sf)} .procrail .ps.siu small{color:var(--siu)}
.procrail .ps.split{border-color:#BBC8F5;background:var(--accent-sf)} .procrail .ps.split small{color:var(--accent)}
.procrail .psa{color:#C4CDDD;font-weight:800}
.pcard{border:1px solid var(--line);border-radius:9px;background:var(--surface);padding:10px 12px;margin-bottom:8px}
.pcard .ph{display:flex;align-items:center;gap:8px}
.pcard .pno{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.pcard .pnm{font-size:12.5px;font-weight:800}
.pcard .pnm small{font-size:9px;font-weight:700;color:var(--muted)}
.pcard .pin{font-size:10.5px;font-family:var(--mono);color:var(--muted);margin-top:6px}
.pcard .pwhy{margin-top:5px}
.pcard .pwa{font-size:10.5px;color:var(--ink);line-height:1.45;margin-top:3px}
.pcard .pwa b{color:var(--accent)}
.iadj{font:inherit;font-size:11.5px;font-weight:700;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;padding:6px 12px;cursor:pointer;margin-left:auto}
.iadj:hover{border-color:var(--accent);color:var(--accent)}
.exlbl{font-size:10px;font-weight:700;color:var(--muted)}
.drawer{background:var(--surface);border-bottom:1px solid var(--line);padding:13px 22px}
.drawer .dh{display:flex;align-items:center;gap:10px;font-size:12.5px;margin-bottom:11px;flex-wrap:wrap}
.drawer .dh .dex{font-size:10px;color:var(--muted)}
.drawer .dh .dex button{font:inherit;font-size:10px;font-weight:700;border:1px solid var(--line);background:var(--canvas);color:var(--ink);border-radius:6px;padding:3px 9px;cursor:pointer;margin-left:3px}
.drawer .dh .dex button:hover{border-color:var(--accent);color:var(--accent)}

<script>

/* ===================== 더미 데이터 ===================== */
const CASE = {

  policy:{ id:"POL-AUTO-8842", coverage:["대물배상","대인배상Ⅰ","대인배상Ⅱ","자기차량손해"] },

  ],
  assets:[
    {n:"청구 접수 시스템", x:"청구 1건 · 사고일시·접수경로", v:"연결"},
    {n:"보험계약 시스템", x:"POL-AUTO-8842 · 담보 4종", v:"연결"},

  ],

    {k:"사건 요약", v:"교차로 직진/좌회전 충돌, 대물 + 대인 청구"},
    {k:"담보 맥락", v:"POL-AUTO-8842 · 대물배상·대인배상Ⅰ·대인배상Ⅱ·자차"},
    {k:"증거 맥락", v:"블랙박스 0.92 · 사진 0.81 · 견적 0.76 · 진단서 0.74 · 진술 0.48(불일치)"},

/* ===== 편집 가능한 입력(손잡이) — 사용자가 돌리면 compute()가 전 화면을 다시 계산 ===== */
const DEFAULTS={ repair:4800000, marketCap:4100000, medical:3000000, medicalNorm:2600000,
  faultBB:15, faultPre:30, faultThr:10, fraud:78, fraudThr:75, similar:3, stmtMatch:false, autoLimit:1000000 };
let INPUTS=Object.assign({},DEFAULTS);
const EXAMPLES={
  low:{name:"저위험", patch:{fraud:32, faultBB:25, faultPre:30, repair:3800000, marketCap:4100000, medical:0, similar:1, stmtMatch:true}},
  base:{name:"기본", patch:{}},
  high:{name:"고위험", patch:{fraud:92, faultBB:10, faultPre:32, repair:9000000, marketCap:6500000, medical:3000000, similar:4, stmtMatch:false}}
};
/* 결정론 해시 (FNV-1a → 4자리) */
function hash(o){ const s=JSON.stringify(o); let h=0x811c9dc5; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,0x01000193); } return (h>>>0).toString(16).toUpperCase().padStart(8,"0").slice(0,4); }

/* ===== 계산 엔진 — 모든 출력은 입력에서 결정론적으로 유도(상수 ✕) ===== */
function compute(inp){
  const repairAccepted=Math.min(inp.repair,inp.marketCap);
  const repairExcess=Math.max(0,inp.repair-inp.marketCap);
  const medicalAccepted=Math.min(inp.medical,inp.medicalNorm);
  const medicalExcess=Math.max(0,inp.medical-inp.medicalNorm);
  const acceptedLoss=repairAccepted+medicalAccepted;
  const faultGap=Math.abs(inp.faultBB-inp.faultPre);
  const faultDisputed=faultGap>inp.faultThr;
  const faultLow=Math.min(inp.faultBB,inp.faultPre);
  const faultHigh=Math.max(inp.faultBB,inp.faultPre);
  const ourLiabHigh=Math.round(acceptedLoss*faultHigh/100);
  let fraudEff=inp.fraud+(inp.similar>=3?5:0)+(!inp.stmtMatch?5:0);
  const fraudRoute=fraudEff>=inp.fraudThr?"SIU":(fraudEff>=60?"REVIEW":"CLEAR");
  const agents=[
    {k:"담보",name:"Coverage Agent",verdict:"PASS",route:"자동"},
    {k:"견적",name:"Damage Agent",verdict:repairExcess>0?"REVIEW":"PASS",route:repairExcess>0?"검토":"자동"},
    {k:"대인",name:"Medical Agent",verdict:inp.medical<=0?"SKIP":(medicalExcess>0?"PARTIAL":"PASS"),route:medicalExcess>0?"검토":"자동"},
    {k:"과실",name:"Liability Agent",verdict:faultDisputed?"REVIEW":"PASS",route:faultDisputed?"검토":"자동"},
    {k:"사기",name:"Fraud Agent",verdict:fraudRoute==="SIU"?"SIU":(fraudRoute==="REVIEW"?"REVIEW":"CLEAR"),route:fraudRoute==="SIU"?"SIU":(fraudRoute==="REVIEW"?"검토":"자동")}
  ];
  const blockAuto=(fraudRoute==="SIU");
  const autoLiab=Math.round(acceptedLoss*(faultDisputed?faultLow:faultHigh)/100);
  const autoPay=blockAuto?0:Math.min(autoLiab,inp.autoLimit);
  const review=Math.max(0,ourLiabHigh-autoPay);
  const ourShare=autoPay+review;
  const routes=[]; if(autoPay>0)routes.push("AUTO"); if(review>0)routes.push("HITL"); if(fraudRoute==="SIU")routes.push("SIU");
  const decision=routes.length>1?"SPLIT":(routes[0]||"AUTO");
  const actions=[];
  if(autoPay>0)actions.push({code:"AUTO_PAY",amt:autoPay,target:"지급 시스템"});
  if(review>0)actions.push({code:"REVIEW_QUEUE",amt:review,target:"손해사정 워크스페이스"});
  if(medicalExcess>0||inp.medical>0)actions.push({code:"DOC_REQUEST",amt:0,target:"고객 안내"});
  if(fraudRoute==="SIU")actions.push({code:"SIU_REFERRAL",amt:0,note:fraudEff+"점",target:"SIU 조사팀"});
  const inputHash=hash(inp);
  const resultHash=hash({autoPay,review,routes,v:agents.map(a=>a.verdict)});
  return {repairAccepted,repairExcess,medicalAccepted,medicalExcess,acceptedLoss,faultGap,faultDisputed,faultLow,faultHigh,
          ourLiabHigh,fraudEff,fraudRoute,blockAuto,agents,autoPay,review,ourShare,routes,decision,actions,inputHash,resultHash};
}
let R=compute(INPUTS);

/* ===== 계산 결과(R)를 화면용으로 가공 ===== */
const VCLS={PASS:"b-ok",PARTIAL:"b-review",REVIEW:"b-review",SKIP:"b-mut",SIU:"b-siu",CLEAR:"b-ok",SPLIT:"b-mut"};
const ATOOLS={담보:["Policy API"],견적:["Estimate Validator"],대인:["Estimate Validator"],과실:["KNIA Matcher"],사기:["Claim History DB","FDS"]};
function agentWhy(a){
  const i=INPUTS;
  if(a.k==="담보") return ["계약 POL-AUTO-8842 유효","담보(대물·대인Ⅰ·Ⅱ·자차) 포함 → 보장 대상"];
  if(a.k==="견적") return R.repairExcess>0?["수리견적 "+won(i.repair)+" · 시장 인정 상한 "+won(i.marketCap),"초과분 "+won(R.repairExcess)+" → 검토 대상"]:["견적이 시장 인정 상한 이내 → 자동 확정"];
  if(a.k==="대인") return i.medical<=0?["대인 피해 없음 → 단계 생략"]:(R.medicalExcess>0?["대인 합의 "+won(i.medical)+" · 통상 인정 "+won(i.medicalNorm),"초과분 "+won(R.medicalExcess)+" → 적정성 검토"]:["대인 합의 통상 인정 한도 이내 → 자동"]);
  if(a.k==="과실") return R.faultDisputed?["블랙박스 우리 과실 "+i.faultBB+"% ↔ 판례 "+i.faultPre+"%","차이 "+R.faultGap+"%p > 임계 "+i.faultThr+"%p → 자동 확정 불가, 사람 검토"]:["과실 차이 "+R.faultGap+"%p ≤ 임계 "+i.faultThr+"%p → 자동 확정"];
  if(a.k==="사기"){ if(R.fraudRoute==="SIU") return ["유사청구 "+i.similar+"건 · 진술 "+(i.stmtMatch?"일치":"불일치")+" 가중","사기점수 "+R.fraudEff+" ≥ 임계 "+i.fraudThr+" → 전담 조사(SIU)"]; if(R.fraudRoute==="REVIEW") return ["사기점수 "+R.fraudEff+" (60~"+i.fraudThr+") → 현장 확인 권고"]; return ["사기점수 "+R.fraudEff+" < 60 → 위험 신호 없음"]; }
  return [];
}
function buildAgents(){
  const list=R.agents.map(a=>({name:a.name,k:a.k,verdict:a.verdict,route:a.route,vcls:VCLS[a.verdict]||"b-mut",why:agentWhy(a),tools:ATOOLS[a.k]||[]}));
  const dwhy=R.routes.length>1?[(R.autoPay>0?"확정분 → 자동 "+won(R.autoPay):"사기 의심 → 자동 지급 전면 보류"),"다툼·초과·의심분 → 검토 "+won(R.review)+(R.fraudRoute==="SIU"?" · SIU 조사":"")]:["단일 경로: "+routeStr()];
  list.push({name:"Decision Agent",k:"분기",verdict:R.decision,route:"분기",vcls:"b-mut",why:dwhy,tools:[]});
  return list;
}
function buildGate(){ return R.agents.map(a=>({item:gateLabel(a.k),result:a.verdict,route:routeText(a.route),cls:VCLS[a.verdict]||"b-mut"})); }
function gateLabel(k){ return {담보:"담보 유효성",견적:"수리견적 이상치",대인:"대인 합의",과실:"과실 비율 충돌",사기:"보험사기 위험"}[k]||k; }
function routeText(r){ return r==="자동"?"자동 처리":(r==="SIU"?"SIU 검토":(r==="검토"?"사람 검토":"분기")); }
function buildActions(){
  const meta={AUTO_PAY:{label:"지급 승인 요청 생성",icon:"card",end:"ack"},REVIEW_QUEUE:{label:"검토 큐 등록",icon:"list",end:"ack"},DOC_REQUEST:{label:"대인 합의 추가서류 요청",icon:"mail",end:"retry"},SIU_REFERRAL:{label:"보험사기 조사 검토 의뢰",icon:"search",end:"pending"}};
  return R.actions.map(a=>{ const m=meta[a.code]||{}; return {code:a.code,label:m.label||a.code,icon:m.icon||"list",end:m.end||"ack",amt:(a.amt?won(a.amt):(a.note||"")),target:a.target}; });
}
function routeStr(){ return R.routes.join(" + ")||"AUTO"; }

const LOG = { runId:"RUN-CLM-2026-0417-01", logId:"DLG-2026-0417-01",
  runAt:"2026-06-15 14:32:10", skill:"교차로 좌회전 사고 과실 검토 Skill v0.1 (검증 대기)",

const STAGES=[

 {key:"semantic",  no:"1", label:"의미화", en:"Semantic",        loop:1,  icon:"layers"},

/* ===== 척추(spine) = 손해사정 5단계 업무 프로세스. AAP는 각 단계를 '어떻게' 처리하는가의 종속 설명. ===== */
const PROCESS=[
 {no:"1",name:"지급 심사",en:"Eligibility",agents:["담보","사기"],in:i=>"담보 4종 · 사기점수 "+R.fraudEff+" (임계 "+i.fraudThr+")"},

 {no:"3",name:"대인 피해",en:"Injury",agents:["대인"],in:i=>i.medical>0?"대인 합의 "+won(i.medical)+" · 통상 "+won(i.medicalNorm):"대인 피해 없음"},
 {no:"4",name:"과실 산정",en:"Fault",agents:["과실"],in:i=>"블랙박스 "+i.faultBB+"% ↔ 판례 "+i.faultPre+"% (차이 "+R.faultGap+"%p)"},
 {no:"5",name:"처리 방법",en:"Method",agents:["분기"],in:i=>"자동 "+won(R.autoPay)+" / 검토 "+won(R.review)}
];
function stepWorst(p){
  const avs=buildAgents().filter(a=>p.agents.indexOf(a.k)>=0);
  const r=avs.some(a=>a.route==="SIU")?"SIU":(avs.some(a=>a.route==="검토")?"검토":(avs.some(a=>a.route==="분기")?"분기":"자동"));
  const tk=r==="SIU"?"siu":(r==="검토"?"review":(r==="분기"?"split":"auto"));
  const txt=r==="SIU"?"SIU 검토":(r==="검토"?"사람 검토":(r==="분기"?"자동/검토 분리":"자동 처리"));
  const bcls=r==="SIU"?"b-siu":(r==="검토"?"b-review":(r==="분기"?"b-mut":"b-ok"));
  return {avs:avs, route:r, tk:tk, txt:txt, bcls:bcls};
}
function buildProc(){
  let h='<span class="pl-h">손해사정 5단계<small>업무 척추</small></span>';
  PROCESS.forEach((p,idx)=>{ const w=stepWorst(p); h+='<span class="ps '+w.tk+'"><b>'+p.no+'. '+p.name+'</b><small>'+w.txt+'</small></span>'; if(idx<PROCESS.length-1) h+='<span class="psa">›</span>'; });
  const pr=el("procRail"); if(pr) pr.innerHTML=h;
}
function processCards(){
  return PROCESS.map(p=>{ const w=stepWorst(p);
    let c='<div class="pcard"><div class="ph"><span class="pno">'+p.no+'</span><div class="pnm">'+p.name+' <small>'+p.en+'</small></div><span class="badge '+w.bcls+'" style="margin-left:auto"><span class="dt"></span>'+w.txt+'</span></div>';
    c+='<div class="pin">이 사건 입력 · '+p.in(INPUTS)+'</div><div class="pwhy">';
    w.avs.forEach(a=>{ c+='<div class="pwa"><b>'+a.name.replace(" Agent","")+'</b> '+a.why.join(" · ")+'</div>'; });
    c+='</div></div>';
    return c;
  }).join("");
}

 {t:"업무 맥락 로드",d:"담보·증거·권한·예외 맥락 패키지"},

function rReasoning(){
  let h='<div class="h1">판단 — 손해사정 5단계를 AAP가 처리</div><div class="sub">지급심사→견적→대인→과실→처리 5단계를 AAP Agent들이 나눠 판단합니다. 좌측은 AAP 실행 흐름, 우측은 각 손해사정 단계의 판정 — 입력을 바꾸면 함께 다시 계산됩니다.</div>';
  h+='<div class="runbar"><button class="btn" id="runBtn" onclick="runReasoning()">분석 실행</button><div class="prog"><i id="rProg"></i></div><span class="rstate" id="rState">대기</span></div>';

  RUN_STEPS.forEach((s,i)=>{ h+='<div class="step pending" id="rs'+i+'"><span class="si">'+(i+1)+'</span><div><div class="st">'+s.t+'</div><div class="sd">'+s.d+'</div></div></div>'; });
  h+='</div></div>';
  h+='<div><div class="sec" style="margin-top:0">손해사정 5단계 판정 <span class="cx" style="font-weight:600;color:var(--muted)">입력 변경 시 자동 갱신</span></div>'+processCards()+'</div>';
  h+='</div>';

  return h;
}
function agentCards(){
  return buildAgents().map(a=>{
    let c='<div class="acard"><div class="ah">'+a.name+'<span class="rt">'+routeText(a.route)+'</span></div>';
    c+='<div style="margin-top:5px"><span class="badge '+a.vcls+'"><span class="dt"></span>'+a.verdict+'</span></div>';
    c+='<div class="aw">'; a.why.forEach(w=>{ c+='<div>'+w+'</div>'; }); c+='</div>';
    if(a.tools.length){ c+='<div class="at">'; a.tools.forEach(t=>{ c+='<span class="tg">'+t+'</span>'; }); c+='</div>'; }
    return c+'</div>';
  }).join("");
}

/* ---- 3. 분기 ---- */
function rDecision(){
  const gate=buildGate(); const q=buildAgents().filter(a=>a.route==="검토"||a.route==="SIU");
  let h='<div class="h1">분기 — Decision Gate · HITL</div><div class="sub">위험·확신·권한 기준으로 처리 경로를 나눕니다. 최종 경로 <b class="mono">'+routeStr()+'</b>. 검토 대상만 사람에게 넘깁니다.</div>';
  h+='<div class="grid g2" style="align-items:start">';
  h+='<div><div class="sec" style="margin-top:0">Decision Gate</div><div class="card"><table class="tbl"><thead><tr><th>판단 항목</th><th>결과</th><th>경로</th></tr></thead><tbody>';
  gate.forEach(g=>{ h+='<tr><td><b>'+g.item+'</b></td><td><span class="badge '+g.cls+'"><span class="dt"></span>'+g.result+'</span></td><td>'+g.route+'</td></tr>'; });
  h+='</tbody></table></div></div>';
  h+='<div><div class="sec" style="margin-top:0">HITL 검토 큐 ('+q.length+')</div>';
  if(q.length){ h+='<div class="queue" style="margin-bottom:10px">';
    q.forEach((a,i)=>{ const st=STATE.hitl[i]; h+='<div class="qi'+(STATE.curQ===i?" sel":"")+'" id="q'+i+'" onclick="selectQueue('+i+')"><div class="qn">'+a.name.replace(" Agent","")+' <span class="badge '+a.vcls+'"><span class="dt"></span>'+a.verdict+'</span></div><div class="qx">'+(st?"처리: "+st:"검토 대기")+'</div></div>'; });
    h+='</div><div class="qdetail" id="qdetail">'+queueDetail(STATE.curQ,q)+'</div>';
  } else { h+='<div class="qdetail"><div class="qe">이 시나리오는 사람 검토 대상이 없습니다. 전 항목 자동 처리됩니다.</div></div>'; }
  h+='</div>';
  h+='</div>';
  return h;
}
function queueDetail(i,q){
  q=q||buildAgents().filter(a=>a.route==="검토"||a.route==="SIU"); const a=q[i]; if(!a) return "";
  let h='<div style="font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:7px">'+a.name.replace(" Agent","")+' 검토 <span class="badge '+a.vcls+'"><span class="dt"></span>'+a.verdict+'</span></div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--muted);margin:8px 0 3px">추천 근거</div>';
  h+='<div style="font-size:11.5px;line-height:1.5">'+a.why.join(" · ")+'</div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--muted);margin:9px 0 3px">관련 문서</div><div style="font-size:11px;color:var(--muted)">사건 '+CASE.id+' · 증거 '+CASE.evidence.length+'종 · '+a.tools.join(" / ")+'</div>';
  const acts=["승인","반려","추가서류 요청","SIU 의뢰","지급 보류"]; const cur=STATE.hitl[i];
  h+='<div class="acts">'; acts.forEach(x=>{ h+='<button class="ab'+(cur===x?" done":"")+'" onclick="decide('+i+',\''+x+'\')">'+x+'</button>'; }); h+='</div>';
  return h;
}

/* ---- 4. 실행 ---- */
function rAction(){
  const acts=buildActions();
  let h='<div class="h1">실행 — 시스템 반영(Writeback)</div><div class="sub">판단 결과를 지급·결재·안내·조사 시스템에 실제로 반영합니다. 단일 AI에는 없는 단계입니다.</div>';
  h+='<div class="runbar"><button class="btn" id="wbBtn" onclick="runWriteback()">실행하기</button><span class="rstate" id="wbState">미실행</span></div>';
  h+='<div id="wbList">';
  acts.forEach((a,i)=>{ h+='<div class="wbrow" id="wb'+i+'"><div class="wi">'+svg(a.icon)+'</div><div><div class="wc">'+a.code+'</div><div class="wl">'+a.label+(a.amt?' · '+a.amt:'')+'</div><div class="wt">→ '+a.target+'</div></div><div id="wbb'+i+'"><span class="badge b-mut"><span class="dt"></span>대기</span></div></div>'; });
  h+='</div>';
  h+='<div class="note">실행 결과는 <b>반영(ack) · 발송(sent) · 승인 대기 · 재시도</b>로 구분됩니다. 실패 시 자동 재시도 후 보류·수동 전환으로 강등됩니다.</div>';
  return h;
}

/* ---- 5. 학습 ---- */
function rLearning(){
  let h='<div class="h1">학습 — Decision Log · 재현성</div><div class="sub">판단 근거·결과를 로그와 Skill로 축적하고, 같은 입력에 같은 결론을 보장합니다.</div>';
  h+='<div class="grid g2" style="align-items:start">';
  h+='<div><div class="sec" style="margin-top:0">Decision Log <span class="tag">'+LOG.logId+'</span></div><div class="log">';
  [["Run ID",LOG.runId],["Input Hash",CASE.id+"-"+R.inputHash],["Agents","Coverage · Damage · Medical · Liability · Fraud · Decision"],
   ["Tools","Policy API · History DB · Estimate Validator · KNIA Matcher · FDS"],["Decision Route",routeStr()],
   ["Human Feedback",feedbackText()],["Result Hash",LOG.logId+" · "+R.resultHash],["Timestamp",LOG.runAt]].forEach(r=>{ h+='<div class="lr"><div class="lk">'+r[0]+'</div><div class="lv mono">'+r[1]+'</div></div>'; });
  h+='</div></div>';
  h+='<div><div class="sec" style="margin-top:0">운영 학습 자산</div><div class="card">';
  h+='<div class="kv-row"><div class="k">Skill 후보</div><div class="v">'+LOG.skill+'</div></div>';
  h+='<div class="kv-row"><div class="k">정책 후보</div><div class="v">'+LOG.policy+'</div></div>';
  h+='<div class="kv-row"><div class="k">재현성</div><div class="v">같은 입력 → 같은 발동 규칙 → 같은 결론</div></div>';
  h+='</div>';
  h+='<div style="margin-top:11px"><button class="btn ghost" onclick="runReplay()">재현 실행</button></div>';
  h+='<div class="replay" id="replay"><div class="rh">재현 결과 <span class="matched">MATCHED</span></div>';
  h+='<div class="log" style="border:0"><div class="lr"><div class="lk">Input Hash</div><div class="lv mono">'+CASE.id+"-"+R.inputHash+'</div></div>';
  h+='<div class="lr"><div class="lk">Decision Route</div><div class="lv mono">'+routeStr()+'</div></div>';
  h+='<div class="lr"><div class="lk">Result Hash</div><div class="lv mono">'+R.resultHash+'</div></div></div>';
  h+='<div style="font-size:10.5px;color:var(--accent);font-weight:700;margin-top:6px">동일 입력 동일 판정 — 감사·민원 시 같은 근거 제시</div></div>';
  h+='</div>';
  h+='</div>';
  return h;
}
function feedbackText(){
  const ks=Object.keys(STATE.hitl); if(!ks.length) return "검토 대기 (3. 분기에서 처리)";
  return ks.map(i=>{ const q=buildAgents().filter(a=>a.route==="검토"||a.route==="SIU"); return (q[i]?q[i].name.replace(" Agent",""):"")+": "+STATE.hitl[i]; }).join(" · ");
}

/* ---- 6. 확장 ---- */
function rScale(){
  let h='<div class="h1">확장 — 같은 플랫폼, 다른 도메인</div><div class="sub">손해사정에서 검증된 Operating Loop·8계층을 도메인만 바꿔 복제합니다.</div>';
  h+='<div class="sec">도메인 복제</div><div class="card"><table class="tbl"><thead><tr><th>도메인</th><th>같은 구조 (Operating Loop · 8계층)</th><th>교체되는 부분</th></tr></thead><tbody>';
  [["금융 내부통제","데이터 → 의미화 → 판단 → 분기 → 실행 → 학습","계좌·거래·규정 / 이상거래·승인 룰"],
   ["공공 정책분석","동일","정책·공급망·통계 / 영향 분석 기준"],
   ["제조 품질","동일","공정·불량·설비 / 품질 판정 기준"],
   ["국방·방산","동일","상황·자산·임무 / 위협 판단 기준"]].forEach(r=>{ h+='<tr><td><b>'+r[0]+'</b></td><td>'+r[1]+'</td><td>'+r[2]+'</td></tr>'; });
  h+='</tbody></table></div>';
  h+='<div class="sec">사업화 로드맵</div><div class="tl">';
  [["Now","검증된 손해사정 use case","온톨로지·판단 자산 확장, 레퍼런스화"],
   ["Near","인접 금융·보험 도메인","내부통제·심사로 Operating Loop 복제"],
   ["Next","공공·제조·국방","파트너십 기반 산업 확장"]].forEach(t=>{ h+='<div class="tc"><div class="tn">'+t[0]+'</div><div class="tt">'+t[1]+'</div><div class="tx">'+t[2]+'</div></div>'; });
  h+='</div>';
  h+='<div class="note"><b>Build · Integrate · Partner</b> — 핵심 역량은 직접 구축, 검증된 자산은 통합, 산업 특화는 파트너십. 이 use case는 AAP가 1회성 솔루션이 아니라 복제 가능한 플랫폼임을 보여줍니다.</div>';
  return h;
}

const RENDER={overview:rOverview,semantic:rSemantic,reasoning:rReasoning,decision:rDecision,action:rAction,learning:rLearning,scale:rScale};

/* ===================== 인터랙션 ===================== */
let rTok=0;
function runReasoning(){
  const btn=el("runBtn"); if(btn)btn.disabled=true; const rs=el("rState"); if(rs)rs.textContent="실행 중…";
  const grid=el("agrid"); if(grid)grid.classList.remove("show");
  for(let i=0;i<RUN_STEPS.length;i++){ const e=el("rs"+i); if(e){e.className="step pending"; e.querySelector(".si").textContent=(i+1);} }
  const tok=++rTok; let k=-1;
  (function nx(){
    if(tok!==rTok) return;
    if(k>=0){ const e=el("rs"+k); if(e){e.className="step done"; e.querySelector(".si").textContent="✓";} const pr=el("rProg"); if(pr)pr.style.width=Math.round((k+1)/RUN_STEPS.length*100)+"%"; }
    k++;
    if(k>=RUN_STEPS.length){ STATE.ran=true; if(btn){btn.disabled=false;btn.textContent="다시 실행";} if(rs)rs.textContent="완료 · 5단계 판정 산출"; return; }
    const e=el("rs"+k); if(e)e.className="step run";
    setTimeout(nx,700);
  })();
}
function selectQueue(i){
  STATE.curQ=i; const q=buildAgents().filter(a=>a.route==="검토"||a.route==="SIU");
  document.querySelectorAll(".qi").forEach(x=>x.classList.remove("sel")); const c=el("q"+i); if(c)c.classList.add("sel");
  const d=el("qdetail"); if(d)d.innerHTML=queueDetail(i,q);
}
function decide(i,act){
  STATE.hitl[i]=act;
  const q=buildAgents().filter(a=>a.route==="검토"||a.route==="SIU");
  const qi=el("q"+i); if(qi){ const x=qi.querySelector(".qx"); if(x)x.textContent="처리: "+act; }
  const d=el("qdetail"); if(d)d.innerHTML=queueDetail(i,q);
  toast("Decision Log에 기록됨 — "+(q[i]?q[i].name.replace(" Agent",""):"")+" "+act, "learning");
}
let wTok=0;
function runWriteback(){
  const acts=buildActions(); const btn=el("wbBtn"); if(btn)btn.disabled=true; const st=el("wbState"); if(st)st.textContent="반영 중…";
  for(let i=0;i<acts.length;i++){ const b=el("wbb"+i); if(b)b.innerHTML='<span class="badge b-mut"><span class="dt"></span>대기</span>'; }
  const tok=++wTok; let k=0;
  (function nx(){
    if(tok!==wTok) return;
    if(k>=acts.length){ if(btn){btn.disabled=false;btn.textContent="다시 실행";} if(st)st.textContent="완료 · "+acts.length+"건 반영"; STATE.written=true; return; }
    const a=acts[k], b=el("wbb"+k);
    if(a.end==="retry"){ if(b)b.innerHTML='<span class="badge b-review"><span class="dt"></span>재시도 → 발송</span>'; }
    else if(a.end==="pending"){ if(b)b.innerHTML='<span class="badge b-review"><span class="dt"></span>승인 대기</span>'; }
    else { if(b)b.innerHTML='<span class="badge b-ok"><span class="dt"></span>반영됨</span>'; }
    k++; setTimeout(nx,550);
  })();
}
function runReplay(){ const r=el("replay"); if(r)r.classList.add("show"); STATE.replayed=true; }
/* ===== 입력 조정(손잡이) ===== */
function buildDrawer(){
  const i=INPUTS;
  const F=(label,key,unit,step,min,max)=>'<label class="fld"><span>'+label+(unit?' <i>'+unit+'</i>':'')+'</span><input type="number" value="'+i[key]+'"'+(step?' step="'+step+'"':'')+(min!=null?' min="'+min+'"':'')+(max!=null?' max="'+max+'"':'')+' oninput="setInput(\''+key+'\',this.value)"></label>';
  let h='<div class="dh"><b>사건 입력 조정</b> <span class="sim">시뮬레이션 가정값</span><span class="dex">예시 불러오기:';
  Object.keys(EXAMPLES).forEach(k=>{ h+=' <button onclick="loadExample(\''+k+'\')">'+EXAMPLES[k].name+'</button>'; });
  h+='</span><button class="dclose" onclick="toggleDrawer()">닫기</button></div><div class="dgrid">';
  h+=F("대물 수리견적","repair","₩",100000,0);
  h+=F("대물 시장 인정 상한","marketCap","₩",100000,0);
  h+=F("대인 합의 청구","medical","₩",100000,0);
  h+=F("대인 통상 인정 한도","medicalNorm","₩",100000,0);
  h+=F("우리 과실 · 블랙박스","faultBB","%",1,0,100);
  h+=F("우리 과실 · 판례","faultPre","%",1,0,100);
  h+=F("과실차 자동확정 임계","faultThr","%p",1,0,100);
  h+=F("사기 점수","fraud","",1,0,100);
  h+=F("사기 SIU 임계","fraudThr","",1,0,100);
  h+=F("유사청구(6개월)","similar","건",1,0);
  h+='<label class="fld"><span>운전자 진술</span><select onchange="setInput(\'stmtMatch\',this.value)"><option value="false"'+(!i.stmtMatch?" selected":"")+'>불일치</option><option value="true"'+(i.stmtMatch?" selected":"")+'>일치</option></select></label>';
  h+=F("자동 처리 한도","autoLimit","₩",100000,0);
  h+='</div>';
  el("drawer").innerHTML=h;
}
function toggleDrawer(){ const d=el("drawer"); d.style.display=(d.style.display==="none"||!d.style.display)?"block":"none"; }
function setInput(key,val){
  if(key==="stmtMatch") INPUTS[key]=(val==="true"); else INPUTS[key]=Number(val)||0;
  R=compute(INPUTS); buildPill(); buildProc(); buildLoop(STAGES.find(s=>s.key===STATE.stage)); el("wrap").innerHTML=RENDER[STATE.stage]();
}
function loadExample(key){
  INPUTS=Object.assign({},DEFAULTS,EXAMPLES[key].patch); R=compute(INPUTS);
  STATE.ran=false; STATE.hitl={}; STATE.written=false; STATE.replayed=false; STATE.curQ=0;
  buildDrawer(); el("drawer").style.display="block"; buildPill(); nav(STATE.stage);
  toast("예시 입력: "+EXAMPLES[key].name+" — 엔진이 다시 계산합니다");
}
let toastTok=0;
function toast(msg,goStage){
  const t=el("toast"); t.innerHTML=msg+(goStage?' <a onclick="nav(\''+goStage+'\')">로그 보기</a>':"");
  t.classList.add("show"); const tok=++toastTok; setTimeout(()=>{ if(tok===toastTok)t.classList.remove("show"); },2600);
}
function nav(key){
  STATE.stage=key; const s=STAGES.find(x=>x.key===key);
  document.querySelectorAll(".nav a").forEach(a=>a.classList.remove("on")); const n=el("n_"+key); if(n)n.classList.add("on");
  el("cbStage").textContent=s.no+" "+s.label;
  buildProc(); buildLoop(s); buildRail(key);
  el("wrap").innerHTML=RENDER[key]();
  window.scrollTo(0,0);
}

/* init */
buildNav(); buildPresets(); buildDrawer(); buildPill(); nav("overview");
</script>
</body>
