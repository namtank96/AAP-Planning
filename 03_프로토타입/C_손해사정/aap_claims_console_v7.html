<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 손해사정 업무 콘솔</title>
<!--
  AAP 손해사정 업무 콘솔 v7 — "AAP 설명형 플랫폼"이 아니라 "손해사정 담당자가 청구를 처리하는 업무 콘솔".
  · 7개 업무 메뉴: 내 업무함 / 청구 심사 / 지급·합의 / 조사·이상징후 / 승인 대기 / 기준·정책 / 운영 설정.
  · 청구 심사 = 중심 화면(좌 사건 큐 · 중앙 사건 심사 · 우 추천 액션·근거).
  · AAP Runtime은 독립 메뉴가 아니라 [AAP 처리 경로 보기] → Trace Drawer로 제공.
  · Agent/Tool/Capability/Log/Learning/권한은 '운영 설정' 내부 탭으로 흡수.
  · 결과 수치는 compute() 결정론 엔진 산출(같은 입력 같은 결과·Replay). 단일 HTML · 외부 의존성 0. 수치는 가정값·SME 검증 대상.
-->
<style>
:root{
  --bg-base:#F4F6FB; --bg-card:#FFFFFF; --text-primary:#111111; --text-secondary:#666666; --text-tertiary:#999999;
  --border:#E8ECF1; --accent:#E60012; --accent-light:rgba(230,0,18,.06);
  --shadow:0 1px 3px rgba(0,0,0,.08); --shadow-lg:0 4px 12px rgba(0,0,0,.08);
  --radius:12px; --radius-sm:8px; --sidebar-width:240px; --header-height:48px;
  --mono:'JetBrains Mono','Fira Code',ui-monospace,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Pretendard',-apple-system,system-ui,'Malgun Gothic',sans-serif;background:var(--bg-base);color:var(--text-primary);line-height:1.6;font-size:14px;display:flex}

/* sidebar */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-width);background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;overflow-y:auto}
.sidebar-logo{padding:20px 20px 8px;display:flex;align-items:center;gap:10px}
.sidebar-logo-fallback{width:32px;height:32px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
.sidebar-logo .lt{font-size:15px;font-weight:800}
.sidebar-subtitle{padding:0 20px 16px;font-size:12px;color:var(--text-tertiary);font-weight:500;border-bottom:1px solid var(--border)}
.sidebar-section-label{padding:16px 20px 6px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 20px;margin:1px 8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:inherit}
.menu-item .mi{width:18px;height:18px;flex-shrink:0;color:var(--text-tertiary);display:flex}
.menu-item .mc{margin-left:auto;font-size:10px;font-weight:700;background:var(--accent);color:#fff;border-radius:9px;padding:1px 6px}
.menu-item:hover{background:#F8F9FA;color:var(--text-primary)}
.menu-item.active{background:#F0F2F5;font-weight:600;color:var(--text-primary);border-left:3px solid var(--accent);padding-left:17px}
.menu-item.active .mi{color:var(--accent)}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-tertiary);line-height:1.6}
.sidebar-footer .ver{font-weight:600;color:var(--text-secondary)}

/* main */
.main-area{margin-left:var(--sidebar-width);flex:1;min-height:100vh;display:flex;flex-direction:column}
.header-bar{height:var(--header-height);background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.header-breadcrumb{font-size:13px;color:var(--text-secondary)}
.header-breadcrumb .bc-root{color:var(--text-tertiary)}
.header-breadcrumb .bc-sep{margin:0 6px;color:var(--text-tertiary)}
.header-breadcrumb .bc-current{color:var(--text-primary);font-weight:600}
.header-right{display:flex;align-items:center;gap:12px}
.scenario-badge{padding:4px 10px;border-radius:4px;background:var(--accent-light);color:var(--accent);font-weight:600;font-size:11px}
.hr-user{font-size:12px;color:var(--text-secondary);font-weight:600}

.page{display:block;padding:24px 30px 56px;max-width:1480px;width:100%}
.section-header{margin-bottom:20px}
.section-header h2{font-size:20px;font-weight:700;margin-bottom:4px}
.section-header p{font-size:13px;color:var(--text-secondary)}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi-card{background:var(--bg-card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--border)}
.kpi-card .kpi-label{font-size:12px;color:var(--text-secondary);font-weight:500;margin-bottom:6px}
.kpi-card .kpi-value{font-size:25px;font-weight:700}
.kpi-card .kpi-sub{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.kpi-card.accent{border-color:#F3C0C5;background:var(--accent-light)}
.kpi-card.accent .kpi-value{color:var(--accent)}

.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
.card.pad{padding:18px 20px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--text-secondary);border-bottom:2px solid var(--border);background:#FAFBFD;white-space:nowrap}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tbody tr:hover{background:#F8F9FC}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr.clk{cursor:pointer}
.data-table tbody tr.on{background:var(--accent-light)}
.mono{font-family:var(--mono)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:#E8F5E9;color:#2E7D32}.badge-amber{background:#FFF3E0;color:#E65100}.badge-gray{background:#F5F5F5;color:#757575}.badge-red{background:#FFEBEE;color:#D32F2F}.badge-purple{background:#F3E5F5;color:#7B1FA2}.badge-blue{background:#E3F2FD;color:#1565C0}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot-green{background:#4CAF50}.dot-amber{background:#FF9800}.dot-red{background:#E53935}.dot-gray{background:#BDBDBD}

.section-title{font-size:15px;font-weight:700;margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.section-title:first-child{margin-top:0}
.section-title .st-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent)}

.notice{font-size:12px;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:11px 14px;line-height:1.6;margin-top:16px}
.sim{font-size:10px;font-weight:700;color:#E65100;background:#FFF3E0;border-radius:4px;padding:2px 7px;margin-left:6px}

/* buttons */
.btn-accent{padding:10px 18px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-weight:600;font-size:13px;border:none;cursor:pointer;font-family:inherit;transition:background .2s;white-space:nowrap}
.btn-accent:hover{background:#C7000F}
.btn-outline{padding:8px 14px;border-radius:7px;border:1px solid var(--border);background:var(--bg-card);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-secondary)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

/* 내 업무함 — 업무 큐 */
.inbox-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;align-items:start;margin-top:4px}
@media(max-width:1100px){.inbox-grid{grid-template-columns:1fr}}
.pri-tag{display:inline-block;width:42px;text-align:center;font-size:11px;font-weight:700;border-radius:5px;padding:2px 0}
.aap-help{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
.aap-help h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.aap-help h3 .hd{width:7px;height:7px;border-radius:50%}
.help-item{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--border);line-height:1.5}
.help-item:last-child{border-bottom:none}
.help-item .hi-ck{color:#2E7D32;font-weight:800;flex-shrink:0}
.help-item .hi-todo{color:var(--accent);font-weight:800;flex-shrink:0}

/* 청구 심사 — 3열 */
.review3{display:grid;grid-template-columns:248px minmax(0,1fr) 336px;gap:14px;align-items:start}
@media(max-width:1200px){.review3{grid-template-columns:1fr}}
.rv-queue{display:flex;flex-direction:column;max-height:calc(100vh - 150px);position:sticky;top:62px}
.rv-queue .list-header{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700}
.rv-qlist{overflow-y:auto;padding:8px}
.rv-qcard{padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .15s}
.rv-qcard:hover{background:#F8F9FA}
.rv-qcard.active{border-color:var(--accent);background:var(--accent-light)}
.rv-qcard .lc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rv-qcard .lc-id{font-size:12px;font-weight:700}
.rv-qcard .rv-qmeta{font-size:11px;color:var(--text-secondary)}
.rv-center{min-width:0}
.rv-block{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
.rv-block h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:760px){.sum-grid{grid-template-columns:repeat(2,1fr)}}
.sum-f .sf-l{font-size:11px;color:var(--text-tertiary);font-weight:600;margin-bottom:2px}
.sum-f .sf-v{font-size:13px;font-weight:600;line-height:1.4}
.pre-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:760px){.pre-cols{grid-template-columns:1fr}}
.pre-col{border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px}
.pre-col.done{background:#FAFFF9;border-color:#C8E6C9}
.pre-col.calc{background:#F6FAFF;border-color:#BBDEFB}
.pre-col.need{background:#FFF8F8;border-color:#F3C0C5}
.pre-col .pc-h{font-size:11.5px;font-weight:700;margin-bottom:8px}
.pre-col.done .pc-h{color:#2E7D32}.pre-col.calc .pc-h{color:#1565C0}.pre-col.need .pc-h{color:var(--accent)}
.pre-col ul{list-style:none;font-size:12px;line-height:1.7}
.pre-col li{padding-left:14px;position:relative}
.pre-col.done li::before{content:'✓';position:absolute;left:0;color:#2E7D32;font-weight:700}
.pre-col.calc li::before{content:'•';position:absolute;left:2px;color:#1565C0;font-weight:700}
.pre-col.need li::before{content:'!';position:absolute;left:3px;color:var(--accent);font-weight:800}
.handoff{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;margin-top:6px}
.handoff .ho{flex:1;min-width:120px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.handoff .ho b{display:block;font-size:22px;font-weight:700;margin-top:3px}
.handoff .ho.a b{color:var(--text-tertiary)}.handoff .ho.b b{color:#2E7D32}.handoff .ho.c b{color:var(--accent)}
.issue-card{border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;background:var(--bg-base)}
.issue-card .ic-t{font-size:13px;font-weight:700;margin-bottom:5px}
.issue-card .ic-row{font-size:12px;color:var(--text-secondary);line-height:1.6}
.issue-card .ic-reco{font-size:12px;font-weight:600;color:var(--accent);margin-top:5px}
.route-tbl{width:100%;font-size:13px;border-collapse:collapse}
.route-tbl td{padding:8px 4px;border-bottom:1px solid var(--border)}
.route-tbl td:last-child{text-align:right;font-weight:700;font-family:var(--mono)}
.route-tbl tr:last-child td{border-bottom:none;font-weight:700}
.route-tbl tr.reco td:last-child{color:var(--accent)}

/* 우측 액션 패널 */
.rv-right{position:sticky;top:62px}
.act-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.ap-head{padding:12px 16px;background:#1E1E2E;color:#fff;font-weight:700;font-size:13px}
.ap-head small{display:block;font-size:10px;color:#A6ADC8;font-weight:600;margin-top:2px}
.ap-body{padding:14px 16px}
.ap-sub{font-size:11px;font-weight:700;color:var(--accent);margin:14px 0 7px;text-transform:uppercase;letter-spacing:.4px}
.ap-sub:first-child{margin-top:0}
.act-btn{display:block;width:100%;text-align:left;padding:10px 13px;border:1px solid var(--border);border-radius:8px;margin-bottom:7px;background:var(--bg-card);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-primary);transition:all .15s;position:relative}
.act-btn:hover{border-color:var(--accent)}
.act-btn.reco{border-color:var(--accent);border-width:2px;background:var(--accent-light)}
.act-btn.reco::after{content:'권장';position:absolute;top:50%;right:12px;transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--accent)}
.act-btn.sel{box-shadow:0 0 0 3px var(--accent-light)}
.reason-list{font-size:12.5px;line-height:1.75;padding-left:15px;color:var(--text-secondary);margin:0}
.reason-list li{margin-bottom:2px}
.ev-btns{display:flex;flex-direction:column;gap:6px}
.ev-box{margin-top:10px;font-size:12px;line-height:1.7;color:var(--text-secondary);background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.ev-box .ev-h{font-size:11px;font-weight:700;color:var(--text-primary);margin-bottom:5px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500;background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border)}

/* 지급·합의 / 조사 draft box */
.mini-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:760px){.mini-cards{grid-template-columns:repeat(2,1fr)}}
.mini-card{padding:13px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-base)}
.mini-card .mc-label{font-size:11px;color:var(--text-tertiary);margin-bottom:4px}
.mini-card .mc-value{font-size:19px;font-weight:700}
.mini-card.hl{border-color:#F3C0C5;background:var(--accent-light)}.mini-card.hl .mc-value{color:var(--accent)}
.reason-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.reason-cols{grid-template-columns:1fr}}
.reason-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.reason-box .rb-h{font-size:12px;font-weight:700;margin-bottom:8px}
.reason-box ul{padding-left:16px;font-size:12.5px;line-height:1.7;color:var(--text-secondary)}
.draft-box{background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;font-size:13px;line-height:1.8;color:var(--text-primary);white-space:pre-line}
.draft-meta{font-size:11px;color:var(--text-tertiary);margin-bottom:8px;font-weight:600}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* graph (trace drawer) */
#traceGraph{width:100%;height:240px;background:#FCFDFF;border:1px solid var(--border);border-radius:var(--radius-sm)}
#traceGraph svg{width:100%;height:100%;display:block}
.gnode{cursor:default}
.gnode rect{transition:filter .15s}

/* 기준·정책 */
.split-layout{display:grid;grid-template-columns:36% 64%;min-height:calc(100vh - 180px);background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
@media(max-width:1100px){.split-layout{grid-template-columns:1fr}}
.list-panel{border-right:1px solid var(--border);display:flex;flex-direction:column}
.list-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700}
.list-items{overflow-y:auto;flex:1;padding:8px}
.list-card{padding:12px 15px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .15s}
.list-card:hover{background:#F8F9FA}
.list-card.active{border-color:var(--accent);background:var(--accent-light)}
.list-card .lc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.list-card .lc-id{font-size:13px;font-weight:700}
.list-card .lc-q{font-size:11.5px;color:var(--text-secondary);line-height:1.5}
.detail-scroll{overflow-y:auto;padding:22px}
.dp-header{padding:11px 15px;border-radius:var(--radius-sm);margin-bottom:14px;color:#fff;font-weight:700;font-size:15px;background:#34495E}
.dp-section-title{font-size:12px;font-weight:700;color:var(--accent);margin-top:15px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.dp-value{font-size:13px;font-weight:500;line-height:1.55}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.stat-grid .sg{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--text-tertiary)}
.stat-grid .sg b{display:block;font-size:15px;color:var(--text-primary);margin-top:2px}
.sim-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
.sim-tbl th,.sim-tbl td{padding:7px 9px;border-bottom:1px solid var(--border);text-align:left}
.sim-tbl th{font-size:11px;color:var(--text-secondary);background:#FAFBFD}
.sim-tbl td:last-child,.sim-tbl th:last-child{text-align:right;font-family:var(--mono);font-weight:600}

/* 운영 설정 (admin) */
.admin-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.admin-tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px}
.admin-tab:hover{color:var(--text-primary)}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ws{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:0;min-height:480px;background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
@media(max-width:1100px){.ws{grid-template-columns:1fr}}
.ws-main{padding:16px;overflow-x:auto;border-right:1px solid var(--border)}
.detail-panel{padding:18px;overflow-y:auto;background:#FAFBFD}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:760px){.cap-grid{grid-template-columns:1fr}}
.cap-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;cursor:pointer;transition:all .15s;border-left:3px solid var(--border)}
.cap-card:hover{background:#F8F9FA}
.cap-card.active{background:var(--accent-light)}
.cap-card .cc-t{font-size:13px;font-weight:700;margin-bottom:6px}
.cap-card .cc-items{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cap-card .cc-i{font-size:10px;color:var(--text-secondary);background:var(--bg-base);border:1px solid var(--border);border-radius:4px;padding:2px 6px}
.cap-card .cc-m{font-size:11px;font-weight:600;color:var(--text-tertiary)}
.dp-tag-acc{color:var(--accent);border-color:#F3C0C5}
.replay-ok{border-color:#C8E6C9;background:#FAFFF9}

/* Trace Drawer */

/* ===================== Trace Drawer (AAP 처리 경로) ===================== */
function openTrace(mode){
  el("drawerTitle").textContent=(mode==="log"?"Decision Log · 처리 경로":"AAP 처리 경로");
  let h='<div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;padding:10px 12px;background:var(--bg-base);border-radius:8px">사건 <b class="mono">'+CASE.id+'</b> · '+CASE.title+'<br>이 사건에 대해 AAP가 실제로 수행한 처리 경로입니다.</div>';
  TRACE_FULL.forEach((s,i)=>{ h+='<div class="trace-step"><div class="trace-num'+(s.blk?" blk":"")+'">'+(i+1)+'</div><div><div class="trace-t">'+s.t+'</div><div class="trace-r">'+s.r+'</div></div></div>'; });
  h+='<div style="font-size:12px;font-weight:700;margin:6px 0 8px">구성된 사건 관계도</div><div id="traceGraph"></div>';
  if(mode==="log") h+='<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">처리 로그</div><table class="data-table" style="font-size:12px"><thead><tr><th>시간</th><th>단계</th><th>Output</th><th>Route</th></tr></thead><tbody>'+buildLogs().map(r=>{ const rc=r.route==="HUMAN_REVIEW"?"badge-amber":(r.route==="SIU"?"badge-purple":(r.route==="WRITEBACK"?"badge-red":"badge-gray")); return '<tr><td class="mono">'+r.tm+'</td><td>'+r.step+'</td><td class="mono" style="font-size:10.5px">'+r.out+'</td><td><span class="badge '+rc+'">'+r.route+'</span></td></tr>'; }).join("")+'</tbody></table></div>';
  el("drawerBody").innerHTML=h;
  el("drawerOv").classList.add("open"); el("drawer").classList.add("open");
  drawGraph("traceGraph");
}
function closeTrace(){ el("drawerOv").classList.remove("open"); el("drawer").classList.remove("open"); }
function drawGraph(targetId){
  const box=el(targetId||"traceGraph"); if(!box)return;
  const W=760,H=240; const pos={}; GNODES.forEach(n=>pos[n.id]={x:n.x+72,y:n.y+18});
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  GEDGES.forEach(e=>{ const a=pos[e[0]],b=pos[e[1]]; s+='<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="#CBD5E1" stroke-width="1.5"/>'; });
  GNODES.forEach(n=>{ const lines=n.label.split("\n"); const w=144,h=36;
    s+='<g class="gnode"><rect x="'+n.x+'" y="'+n.y+'" rx="8" width="'+w+'" height="'+h+'" fill="'+n.c+'" opacity="0.92"/>';
    lines.forEach((ln,k)=>{ s+='<text x="'+(n.x+w/2)+'" y="'+(n.y+(lines.length>1?14:23)+k*13)+'" fill="#fff" font-size="'+(k===0?11:9.5)+'" font-weight="'+(k===0?700:500)+'" text-anchor="middle">'+ln+'</text>'; });
    s+='</g>';
  });
  s+='</svg>'; box.innerHTML=s;
}

function replayHTML(){
  const r='AUTO '+won(R.autoPay)+' / REVIEW '+man(MONEY.reviewAmt)+' / SIU '+(R.fraudRoute==="SIU"?"ON":"OFF");
  let h='<div class="card pad replay-ok"><div style="margin-bottom:8px"><span class="badge badge-green">REPLAY MATCHED</span></div><table class="data-table"><tbody>';
  [["Input Hash",CASE.id+"-"+R.inputHash],["Previous Result",r],["Replay Result",r],["Status","<b style=\"color:#2E7D32\">MATCHED</b>"]].forEach(x=>{ h+='<tr><td style="width:150px;font-weight:600;color:var(--text-secondary)">'+x[0]+'</td><td class="mono">'+x[1]+'</td></tr>'; });
  h+='</tbody></table></div>';
  return h;
}
function runReplay(){ STATE.replayed=true; el("replayBox").innerHTML=replayHTML(); toast("재현 실행 — 결과 해시 일치(MATCHED)"); }
function adminLearning(){
  let h='<div class="ws"><div class="ws-main"><table class="data-table"><thead><tr><th>Candidate</th><th>Type</th><th>Source</th><th>Expected Impact</th><th>Status</th><th>Owner</th></tr></thead><tbody>';
  LEARNING_CANDIDATES.forEach((c,i)=>{ h+='<tr class="clk'+(STATE.cand===i?" on":"")+'" onclick="selCand('+i+')"><td style="font-weight:600">'+c.title+'</td><td><span class="badge '+c.tb+'">'+c.type+'</span></td><td style="font-size:11px">'+c.source+'</td><td>'+c.impact+'</td><td><span class="badge '+c.sb+'">'+c.status+'</span></td><td>'+c.owner+'</td></tr>'; });
  h+='</tbody></table></div><div class="detail-panel" id="candDetail">'+candDetail(STATE.cand)+'</div></div>';
  h+='<div class="notice">학습 후보는 Detected → Draft → SME Review → Approved → Deployed → Monitored 흐름으로 운영됩니다. 결과 설명이 아니라 운영 프로세스입니다.</div>';
  return h;
}
function candDetail(i){ const c=LEARNING_CANDIDATES[i];
  let h='<div class="dp-header" style="background:#9B59B6">'+c.type+'</div>';
  h+='<div class="dp-section-title">후보명</div><div class="dp-value">'+c.title+'</div>';
  h+='<div class="dp-section-title">근거 로그</div><div class="dp-value">'+c.source+'</div>';
  h+='<div class="dp-section-title">관련 Rule / Agent</div><div class="tags"><span class="tag">'+c.rule+'</span><span class="tag dp-tag-acc">'+c.agent+'</span></div>';
  h+='<div class="dp-section-title">예상 효과 · 위험</div><div class="dp-value">'+c.impact+' · '+c.risk+'</div>';
  h+='<div class="dp-section-title">상태 · 승인 필요자</div><div class="dp-value"><span class="badge '+c.sb+'">'+c.status+'</span> · '+c.owner+'</div>';
  h+='<div class="dp-section-title">Rollback</div><div class="dp-value">'+c.rollback+'</div>';
  h+='<div class="btn-row" style="margin-top:14px"><button class="btn-outline" onclick="toast(\'승인 요청 전송(SME)\')">Approve</button><button class="btn-outline" onclick="toast(\'시뮬레이션 실행\')">Simulate</button><button class="btn-outline" onclick="toast(\'반려 처리\')">Reject</button></div>';
  return h;
}
function selCand(i){ STATE.cand=i; el("pages").querySelectorAll(".ws-main tbody tr").forEach((c,k)=>c.classList.toggle("on",k===i)); el("candDetail").innerHTML=candDetail(i); }
function adminPerm(){
  let h='<div class="card pad" style="overflow-x:auto"><table class="data-table"><thead><tr><th>Agent</th><th>Allowed Data</th><th>Allowed Tools</th><th>Allowed Actions</th><th>Approval Required</th><th>Owner</th></tr></thead><tbody>';
  AGENTS.forEach(a=>{ h+='<tr><td style="font-weight:700">'+a.name+'</td><td>'+a.data.join(", ")+'</td><td>'+a.tools.join(", ")+'</td><td class="mono" style="font-size:11px">'+a.actions.join(", ")+'</td><td>'+(a.approval.length?'<span class="badge badge-amber">'+a.approval.length+'개</span> '+a.approval.join(" · "):'<span style="color:var(--text-tertiary)">없음</span>')+'</td><td>'+a.owner+'</td></tr>'; });
  h+='</tbody></table></div><div class="notice">각 Agent는 허용된 데이터·Tool·액션 범위 안에서만 동작하며, 고위험 액션은 승인 정책을 통과해야 시스템에 반영됩니다.</div>';
  return h;
}
