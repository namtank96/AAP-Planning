<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 내부통제 운영 콘솔 v0.4</title>
<style>
  :root{
    --ink:#0F172A; --sub:#64748B; --mut:#94A3B8; --line:#E2E8F0; --bg:#F4F6F9; --card:#fff;
    --blue:#2563EB; --blue-soft:#EFF4FF; --amber:#D97706; --amber-soft:#FFF7ED;
    --green:#059669; --green-soft:#ECFDF5; --red:#DC2626; --red-soft:#FEF2F2; --violet:#7C3AED;
    --shadow:0 1px 2px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;font-size:14px}
  button{font-family:inherit}
  /* header */
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  .tb-brand{display:flex;flex-direction:column}
  .tb-brand .t{font-size:10px;font-weight:800;letter-spacing:.13em;color:var(--blue);text-transform:uppercase}
  .tb-brand .n{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pill{font-size:12px;border:1px solid var(--line);background:var(--bg);border-radius:8px;padding:5px 11px;font-weight:700}
  .pill .k{color:var(--mut);font-size:10px;margin-right:5px}
  .pill.r높음{background:var(--red-soft);border-color:#FECACA;color:var(--red)}
  .pill.r보통{background:var(--amber-soft);border-color:#FDE68A;color:var(--amber)}
  .pill.r낮음{background:var(--green-soft);border-color:#A7F3D0;color:#047857}
  .sim{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--amber);background:var(--amber-soft);border:1px solid #FDE68A;border-radius:6px;padding:4px 9px}
  /* flow strip = 플로우 구조도 (top backbone) */
  .flowbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 24px}
  .flow{display:flex;align-items:center;max-width:1100px;margin:0 auto;gap:0;overflow-x:auto}
  .fstep{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:108px;flex:1;cursor:pointer;text-align:center}
  .fstep .ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;background:#F1F5F9;border:1.5px solid transparent;transition:.22s}
  .fstep .lb{font-size:12.5px;font-weight:800;color:var(--mut);transition:.22s}
  .fstep .sub{font-size:10px;color:var(--mut)}
  .fstep.done .ic{background:var(--green-soft);border-color:#A7F3D0}
  .fstep.active .ic{background:var(--blue-soft);border-color:#BFDBFE;transform:scale(1.06);box-shadow:0 0 0 4px var(--blue-soft)}
  .fstep.active .lb{color:var(--ink)}
  .fstep.human.active .ic{background:var(--amber-soft);border-color:#FCD34D;box-shadow:0 0 0 4px var(--amber-soft)}
  .farrow{color:#CBD5E1;font-size:17px;flex:none;margin:0 4px;margin-bottom:20px}
  /* layout */
  .wrap{max-width:1100px;margin:0 auto;padding:20px 24px 50px}
  .grid{display:grid;grid-template-columns:248px 1fr;gap:16px;align-items:start}
  @media(max-width:840px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .pad{padding:18px}
  .col-h{font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px}
  /* queue */
  .qsum{font-size:12.5px;color:var(--sub);background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:12px}
  .qsum b{color:var(--ink)}
  .qitem{padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;cursor:pointer;transition:.14s}
  .qitem:hover{border-color:var(--blue)}
  .qitem.active{border-color:var(--blue);background:var(--blue-soft);box-shadow:0 0 0 3px var(--blue-soft)}
  .qitem .qt{font-size:13px;font-weight:700}
  .qitem .qm{font-size:11.5px;color:var(--sub);margin-top:2px}
  .qitem .qr{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;margin-top:7px}
  .qr.높음{background:var(--red-soft);color:var(--red)}.qr.보통{background:var(--amber-soft);color:var(--amber)}.qr.낮음{background:#F1F5F9;color:var(--sub)}
  /* console body */
  .stage-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--blue);background:var(--blue-soft);border-radius:7px;padding:4px 11px;margin-bottom:10px}
  .stage-badge.human{color:var(--amber);background:var(--amber-soft)}
  .con-title{font-size:20px;font-weight:800;letter-spacing:-.01em;margin:0 0 4px}
  .con-meta{font-size:13px;color:var(--sub);margin-bottom:18px}
  .con-meta .r{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:6px;margin-left:6px}
  .con-meta .r.높음{background:var(--red-soft);color:var(--red)}.con-meta .r.보통{background:var(--amber-soft);color:var(--amber)}.con-meta .r.낮음{background:var(--green-soft);color:#047857}
  /* simple info blocks */
  .blocks{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.blocks{grid-template-columns:1fr}}
  .block{border:1px solid var(--line);border-radius:12px;padding:14px 15px}
  .block h4{margin:0 0 9px;font-size:13px;display:flex;align-items:center;gap:7px}
  .block .it{font-size:13px;padding:4px 0;color:var(--ink);display:flex;gap:7px}
  .block .it .b{color:var(--blue);flex:none}
  .block .it span{color:var(--sub)}
  /* big number */
  .verdict{display:flex;align-items:center;gap:18px;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;background:linear-gradient(180deg,#fff,#FBFCFE)}
  .verdict .big{font-size:42px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .verdict .vlabel{font-size:12px;color:var(--sub);font-weight:700}
  .verdict .vrisk{font-size:15px;font-weight:800;margin-top:3px}
  .v높음 .big,.v높음 .vrisk{color:var(--red)}.v보통 .big,.v보통 .vrisk{color:var(--amber)}.v낮음 .big,.v낮음 .vrisk{color:var(--green)}
  .verdict .bar{flex:1;height:10px;background:#F1F5F9;border-radius:6px;overflow:hidden;align-self:flex-end;margin-bottom:6px}
  .verdict .bar i{display:block;height:100%;border-radius:6px;transition:width .7s cubic-bezier(.4,0,.2,1)}
  .why{margin-bottom:16px}
  .why h4{font-size:13px;margin:0 0 9px}
  .why .reason{display:flex;gap:10px;align-items:flex-start;font-size:13px;padding:8px 0;border-bottom:1px solid #F4F6F9}
  .why .reason:last-child{border:0}
  .why .reason .mk{flex:none;width:20px;height:20px;border-radius:6px;background:var(--amber-soft);color:var(--amber);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .reco{background:var(--blue-soft);border:1px solid #BFDBFE;border-radius:12px;padding:14px 16px;font-size:14px}
  .reco .rl{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  .reco b{font-weight:800}
  /* HITL */
  .hitl{border:1.5px solid #FCD34D;background:var(--amber-soft);border-radius:14px;padding:16px}
  .hitl .hh{font-size:14px;font-weight:800;color:#92400E;margin-bottom:6px}
  .hitl .hs{font-size:12.5px;color:#78350F;margin-bottom:13px}
  .decide{display:flex;gap:8px;flex-wrap:wrap}
  .decide button{flex:1;min-width:100px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;transition:.14s}
  .decide button:hover{border-color:var(--amber)}
  .decide button.ok{background:var(--green);color:#fff;border-color:var(--green)}
  .decide button.no{color:var(--red)}
  /* action */
  .act{display:flex;align-items:center;gap:11px;font-size:13.5px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;color:var(--mut);transition:.35s}
  .act .c{width:22px;height:22px;border-radius:7px;background:#F1F5F9;color:var(--mut);font-size:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .act.on{color:var(--ink);border-color:#A7F3D0;background:var(--green-soft)}
  .act.on .c{background:var(--green);color:#fff}
  .recordid{margin-top:14px;background:var(--ink);color:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .recordid .rl{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .recordid .rv{font-size:18px;font-weight:800}
  /* learn */
  .learn{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .learn .lc{flex:1;min-width:160px;border:1px solid var(--line);border-radius:12px;padding:15px;text-align:center}
  .learn .lc .ll{font-size:12px;color:var(--sub)}
  .learn .lc .lv{font-size:18px;font-weight:800;margin-top:5px}
  .learn .lc .lv .ar{color:var(--green)}
  /* cta */
  .cta{display:flex;gap:9px;align-items:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);flex-wrap:wrap}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--blue)}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn.ghost{color:var(--sub)}
  .cta .sp{margin-left:auto}
  .foot{text-align:center;margin-top:24px;font-size:11.5px;color:var(--mut);line-height:1.7}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand"><span class="t">AAP · 내부통제 운영 콘솔</span><span class="n">금융 내부통제 의사결정</span></div>
  <div class="tb-right">
    <span class="sim">시뮬레이션</span>
    <span class="pill" id="hdRisk"><span class="k">위험도</span>—</span>
    <span class="pill" id="hdRec"><span class="k">기록</span>—</span>
  </div>
</div>

<!-- 플로우 구조도 (상단 backbone) -->
<div class="flowbar"><div class="flow" id="flow"></div></div>

<div class="wrap">
  <div class="grid">
    <!-- 사건 목록 -->
    <div class="card pad">
      <h3 class="col-h">📥 사건 목록</h3>
      <div class="qsum">오늘 접수 <b>12건</b> · 검토 필요 <b>2건</b></div>
      <div id="queue"></div>
    </div>
    <!-- 콘솔 본체 -->
    <div class="card pad" id="console"></div>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const RANK={staff:1,team_lead:2,department_head:3,executive:4};
const LV={staff:'담당자',team_lead:'팀장',department_head:'부서장',executive:'임원'};
const won=n=>(n/10000).toLocaleString('ko-KR')+'만원';

/* ── 결정론 엔진 (뒤에 숨김 — 점수는 입력으로 계산, 하드코딩 아님) ── */
function engine(i){
  const reasons=[]; let rule=0, cs=0;
  const ratio=i.approvalAmount/i.approvalLimit;
  if(ratio>1){rule+=Math.min(35,18+Math.round((ratio-1)*60));
    reasons.push(`승인금액이 전결한도를 넘었습니다 (${won(i.approvalAmount)} > ${won(i.approvalLimit)})`);}
  if(RANK[i.actualApproverLevel]<RANK[i.requiredApproverLevel]){rule+=Math.min(30,(RANK[i.requiredApproverLevel]-RANK[i.actualApproverLevel])*13);
    reasons.push(`필요한 승인권자(${LV[i.requiredApproverLevel]})보다 낮은 직급(${LV[i.actualApproverLevel]})이 승인했습니다`);}
  if(!i.hasDelegation){rule+=12; reasons.push('권한 위임 근거가 확인되지 않습니다');}
  if(i.evidenceCompleteness<0.7){rule+=Math.round((0.7-i.evidenceCompleteness)*40);
    reasons.push(`증빙이 일부 부족합니다 (완전성 ${Math.round(i.evidenceCompleteness*100)}%)`);}
  if(i.unresolvedImprovementTasks>0){rule+=Math.min(15,i.unresolvedImprovementTasks*12);
    reasons.push(`아직 마무리되지 않은 개선과제가 ${i.unresolvedImprovementTasks}건 있습니다`);}
  if(i.similarCaseMatched>0){cs+=Math.min(40,i.similarCaseMatched*9);
    reasons.push(`비슷한 과거 사례가 ${i.similarCaseMatched}건 있습니다`);}
  if(i.repeatedCount>1){cs+=Math.min(24,i.repeatedCount*6);
    reasons.push(`같은 유형이 ${i.repeatedCount}번 반복됐습니다`);}
  rule=Math.min(100,rule); cs=Math.min(100,cs);
  const prob=Math.round(rule*0.6+cs*0.4);
  const risk=prob>=70?'높음':prob>=40?'보통':'낮음';
  let reco, actions;
  if(prob>=70){ reco='개선과제 등록 + 담당 부서 소명 요청';
    actions=['내부통제 케이스 등록','담당 부서 소명 요청','개선과제 등록','담당자 알림','감사 기록 남기기']; }
  else if(prob>=40){ reco='추가 확인 요청 (증빙 보완)';
    actions=['추가 증빙 요청','담당자 확인 요청','검토 기한 설정','감사 기록 남기기']; }
  else { reco='통제 위반 아님으로 종결';
    actions=['종결 사유 기록','감사 기록 남기기']; }
  return {prob,risk,reasons,reco,actions};
}

/* ── 사건 (입력값 → 엔진 계산) ── */
const CASES=[
  {id:'IC-2026-001',type:'승인권한 초과 가능성',dept:'여신심사본부',from:'정기 점검',demo:true,
   policies:['직무권한 및 승인 기준','내부통제 기준 규정'], owner:'여신담당 부행장',
   inputs:{approvalAmount:58000000,approvalLimit:50000000,requiredApproverLevel:'executive',actualApproverLevel:'team_lead',hasDelegation:false,evidenceCompleteness:0.45,repeatedCount:4,unresolvedImprovementTasks:1,similarCaseMatched:4}},
  {id:'IC-2026-002',type:'증빙 누락',dept:'자금부',from:'상시 점검',
   policies:['증빙 관리 기준'], owner:'자금부장',
   inputs:{approvalAmount:55000000,approvalLimit:50000000,requiredApproverLevel:'team_lead',actualApproverLevel:'team_lead',hasDelegation:true,evidenceCompleteness:0.30,repeatedCount:3,unresolvedImprovementTasks:0,similarCaseMatched:3}},
  {id:'IC-2026-003',type:'직무분리 위반 의심',dept:'영업1팀',from:'정기 점검',
   policies:['직무분리 기준','직무권한 및 승인 기준'], owner:'영업담당 임원',
   inputs:{approvalAmount:70000000,approvalLimit:50000000,requiredApproverLevel:'executive',actualApproverLevel:'team_lead',hasDelegation:false,evidenceCompleteness:0.50,repeatedCount:2,unresolvedImprovementTasks:1,similarCaseMatched:3}},
  {id:'IC-2026-004',type:'한도 초과 거래',dept:'외환딜링룸',from:'상시 점검',
   policies:['거래 한도 기준'], owner:'트레이딩 부서장',
   inputs:{approvalAmount:60000000,approvalLimit:50000000,requiredApproverLevel:'department_head',actualApproverLevel:'team_lead',hasDelegation:true,evidenceCompleteness:0.50,repeatedCount:2,unresolvedImprovementTasks:0,similarCaseMatched:2}},
  {id:'IC-2026-005',type:'보고기한 경과',dept:'리스크관리부',from:'상시 점검',
   policies:['보고 관리 기준'], owner:'리스크관리부장',
   inputs:{approvalAmount:40000000,approvalLimit:50000000,requiredApproverLevel:'team_lead',actualApproverLevel:'team_lead',hasDelegation:true,evidenceCompleteness:0.90,repeatedCount:1,unresolvedImprovementTasks:0,similarCaseMatched:0}},
];

/* ── 플로우 단계 (업무 언어) ── */
const STEPS=[
  {k:'접수', ic:'📥', sub:'사건 들어옴'},
  {k:'연결', ic:'🔗', sub:'관련 정보'},
  {k:'제안', ic:'💡', sub:'AI 판단'},
  {k:'결정', ic:'👤', sub:'사람 검토', human:true},
  {k:'실행', ic:'⚙️', sub:'반영·기록'},
  {k:'학습', ic:'↻', sub:'다음에 활용'},
];

/* ── 상태 ── */
let sel='IC-2026-001', step=0, decision=null, recId=null, seq=0;
const cur=()=>CASES.find(c=>c.id===sel);
const result=()=>engine(cur().inputs);

function loadCase(id){ sel=id; step=0; decision=null; recId=null; render(); }
function setStep(s){ if((s>=4)&&!decision){ s=3; } step=s; render(); }
function next(){ if(step<3){step++;} else if(step===3&&!decision){return;} else if(step<5){step++;} render(); }
const DEC={ok:'승인',mod:'수정 후 승인',no:'반려'};
function decide(d){ decision=d; seq++; recId='IC-20260529-'+String(seq).padStart(3,'0'); step=4; render(); }

/* ── 렌더 ── */
function render(){
  const c=cur(), r=result();
  // header
  $('hdRisk').className='pill r'+r.risk; $('hdRisk').innerHTML=`<span class="k">위험도</span>${r.risk} · ${r.prob}%`;
  $('hdRec').innerHTML=`<span class="k">기록</span>${recId||'—'}`;
  // flow
  $('flow').innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='fstep'+(s.human?' human':'')+(i<step?' done':'')+(i===step?' active':'');
    el.onclick=()=>setStep(i);
    el.innerHTML=`<div class="ic">${i<step?'✓':s.ic}</div><div class="lb">${s.k}</div><div class="sub">${s.sub}</div>`;
    $('flow').appendChild(el);
    if(i<STEPS.length-1){const a=document.createElement('span');a.className='farrow';a.textContent='→';$('flow').appendChild(a);}
  });
  // queue
  $('queue').innerHTML=CASES.map(x=>{const rr=engine(x.inputs);
    return `<div class="qitem ${x.id===sel?'active':''}" onclick="loadCase('${x.id}')">
      <div class="qt">${x.type}</div><div class="qm">${x.dept} · ${x.from}</div>
      <div class="qr ${rr.risk}">위험도 ${rr.risk}</div></div>`;}).join('');
  // console
  $('console').innerHTML=consoleHtml(c,r);
  if(step===2){requestAnimationFrame(()=>{const b=document.querySelector('.verdict .bar i'); if(b)b.style.width=r.prob+'%';});}
  if(step===4){document.querySelectorAll('.act').forEach((el,i)=>setTimeout(()=>el.classList.add('on'),150+i*220));}
  // foot
  $('foot').innerHTML='AAP 내부통제 운영 콘솔 · v0.4 (2026-05-29) · KT DS AX컨설팅팀<br><b>시뮬레이션</b> — 실제 시스템 연동 없이 동작합니다. 위쪽 6단계가 업무가 흐르는 구조입니다.';
}

function consoleHtml(c,r){
  const badge=(t,human)=>`<span class="stage-badge ${human?'human':''}">${t}</span>`;
  const head=`<div class="con-title">${c.type}</div><div class="con-meta">${c.dept} · ${c.from} · ${c.id}
    <span class="r ${r.risk}">위험도 ${r.risk}</span></div>`;

  // STEP 1 접수
  if(step===0){
    return badge('STEP 1 · 접수')+head+
      `<div class="block" style="margin-bottom:0"><h4>📋 사건 개요</h4>
        <div class="it"><span class="b">유형</span>${c.type}</div>
        <div class="it"><span class="b">부서</span>${c.dept}</div>
        <div class="it"><span class="b">탐지</span>${c.from}</div>
        <div class="it"><span class="b">상태</span>검토 진행 전</div></div>`
      + cta('관련 정보 연결 →');
  }
  // STEP 2 연결
  if(step===1){
    const i=c.inputs;
    return badge('STEP 2 · 연결')+head+
      `<p style="font-size:13px;color:var(--sub);margin:0 0 14px">이 사건과 관련된 규정·책임자·과거 사례를 자동으로 묶었습니다.</p>
       <div class="blocks">
        <div class="block"><h4>📑 관련 규정</h4>${c.policies.map(p=>`<div class="it"><span class="b">·</span>${p}</div>`).join('')}</div>
        <div class="block"><h4>👤 책임자</h4>
          <div class="it"><span class="b">·</span>${c.dept}</div>
          <div class="it"><span class="b">·</span>${c.owner} <span>(담당 임원)</span></div></div>
        <div class="block"><h4>🗃 비슷한 과거 사례</h4>
          <div class="it"><span class="b">·</span>${i.similarCaseMatched>0?`${i.similarCaseMatched}건 — 대부분 소명·개선과제로 종결`:'유사 사례 없음'}</div></div>
        <div class="block"><h4>🛠 개선과제</h4>
          <div class="it"><span class="b">·</span>${i.unresolvedImprovementTasks>0?`미완료 ${i.unresolvedImprovementTasks}건`:'미완료 없음'}</div></div>
       </div>`
      + cta('AI 판단 보기 →');
  }
  // STEP 3 제안
  if(step===2){
    return badge('STEP 3 · 제안')+head+
      `<div class="verdict v${r.risk}">
         <div><div class="vlabel">위반 가능성</div><div class="big">${r.prob}%</div><div class="vrisk">${r.risk}</div></div>
         <div class="bar"><i style="width:0;background:${r.risk==='높음'?'var(--red)':r.risk==='보통'?'var(--amber)':'var(--green)'}"></i></div>
       </div>
       <div class="why"><h4>왜 그렇게 봤나요?</h4>
         ${r.reasons.map((x,k)=>`<div class="reason"><span class="mk">${k+1}</span>${x}</div>`).join('')}</div>
       <div class="reco"><div class="rl">권고 조치</div><b>${r.reco}</b></div>`
      + cta('사람 검토로 →');
  }
  // STEP 4 결정
  if(step===3){
    if(!decision){
      return badge('STEP 4 · 결정 (사람이 판단)',true)+head+
        `<div class="hitl"><div class="hh">👤 담당자 검토가 필요합니다</div>
           <div class="hs">AI는 제안할 뿐, 최종 결정은 사람이 합니다. 권고 조치: <b>${r.reco}</b></div>
           <div class="decide">
             <button class="ok" onclick="decide('ok')">승인</button>
             <button onclick="decide('mod')">수정 후 승인</button>
             <button class="no" onclick="decide('no')">반려</button>
           </div></div>`;
    }
    return badge('STEP 4 · 결정',true)+head+
      `<div class="reco" style="background:var(--green-soft);border-color:#A7F3D0"><div class="rl" style="color:#047857">검토 결과</div><b>${DEC[decision]}</b> 처리되었습니다.</div>`
      + cta('실행 결과 보기 →');
  }
  // STEP 5 실행·기록
  if(step===4){
    return badge('STEP 5 · 실행 · 기록')+head+
      r.actions.map(a=>`<div class="act"><span class="c">✓</span>${a}</div>`).join('')+
      `<div class="recordid"><div><div class="rl">기록 번호</div><div class="rv">${recId}</div></div>
         <div style="font-size:11.5px;color:#94A3B8;text-align:right">판단 근거와 결정·실행 내역이<br>감사 가능한 형태로 남습니다.</div></div>`
      + cta('학습 결과 →');
  }
  // STEP 6 학습
  return badge('STEP 6 · 학습')+head+
    `<div class="learn">
       <div class="lc"><div class="ll">비슷한 사례</div><div class="lv">${cur().inputs.similarCaseMatched}건 <span class="ar">→</span> ${cur().inputs.similarCaseMatched+1}건</div></div>
       <div class="lc"><div class="ll">개선과제 패턴</div><div class="lv">+1 추가</div></div>
       <div class="lc"><div class="ll">다음 비슷한 사건</div><div class="lv" style="font-size:14px">더 빠르게 처리</div></div>
     </div>
     <p style="font-size:13px;color:var(--sub);margin:0">이번 결정이 쌓여, 다음에 비슷한 사건이 들어오면 같은 기준으로 더 빠르고 일관되게 처리됩니다.</p>`
    + cta(null);
}

function cta(label){
  const reset=`<button class="btn ghost" onclick="loadCase('${sel}')">↺ 처음부터</button>`;
  if(!label) return `<div class="cta"><button class="btn" onclick="loadCase('${sel}')">↺ 새로 시작</button><span class="sp"></span><span style="font-size:12px;color:var(--mut)">✓ 한 사건의 처리 흐름을 모두 마쳤습니다.</span></div>`;
  // STEP 4 미결정 시 다음 버튼 숨김
  if(step===3 && !decision) return '';
  return `<div class="cta"><button class="btn primary" onclick="next()">${label}</button><span class="sp"></span>${step>0?reset:''}</div>`;
}

render();
</script>
</body>
</html>
