<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP Meeting Runtime Demo · v0.2 (Core Run)</title>
<style>
  :root{
    --bg:#f1f5f9; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --card:#ffffff;
    --cust:#475569; --data:#2563eb; --sem:#7c3aed; --agt:#0d9488;
    --act:#16a34a; --lrn:#d97706; --amber:#d97706; --red:#dc2626; --trust:#1e293b;
    --custbg:#f8fafc; --databg:#eff6ff; --sembg:#f5f3ff; --agtbg:#f0fdfa;
    --actbg:#f0fdf4; --lrnbg:#fffbeb;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'Malgun Gothic','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;}
  .app{display:grid;grid-template-rows:auto auto 1fr auto;height:100vh;overflow:hidden;}

  /* Header */
  .hdr{background:var(--trust);color:#e2e8f0;padding:8px 16px;display:flex;align-items:center;gap:14px;}
  .hdr .title{font-weight:700;font-size:15px;color:#fff;}
  .hdr .sub{font-size:11px;color:#94a3b8;max-width:430px;}
  .hdr .runid{font-size:11px;color:#cbd5e1;background:#334155;padding:2px 8px;border-radius:4px;}
  .hdr .mode{font-size:11px;color:#5eead4;border:1px solid #0d9488;padding:2px 8px;border-radius:4px;}
  .hdr .spacer{flex:1;}
  .hdr .toggle{font-size:11px;color:#cbd5e1;display:flex;align-items:center;gap:5px;cursor:pointer;}

  /* Step rail */
  .rail{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:4px;padding:6px 12px;overflow-x:auto;align-items:center;}
  .step{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:6px;cursor:pointer;white-space:nowrap;border:1px solid transparent;color:var(--muted);font-size:11.5px;}
  .step .num{width:18px;height:18px;border-radius:50%;background:var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:0 0 auto;}
  .step.done{color:#0f172a;}
  .step.done .num{background:#16a34a;color:#fff;}
  .step.active{background:#ecfeff;border-color:#0d9488;color:#0f172a;font-weight:700;}
  .step.active .num{background:#0d9488;color:#fff;}
  .step.hitl.active .num{background:var(--amber);}
  .step.locked{opacity:.4;cursor:not-allowed;}
  .step .ph{font-size:9px;color:#94a3b8;}
  .railnav{margin-left:auto;display:flex;gap:6px;flex:0 0 auto;}

  /* Main grid */
  .main{display:grid;grid-template-columns:32% 44% 24%;gap:10px;padding:10px;overflow:hidden;}
  body.exp-off .main{grid-template-columns:38% 62%;}
  body.exp-off .right{display:none;}
  .col{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:auto;padding:12px;}
  .col h3{margin:0 0 8px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .col.center{display:flex;flex-direction:column;padding:10px 10px 12px;}

  /* Left business screen */
  .screen-title{font-weight:700;font-size:13.5px;margin-bottom:8px;}
  .portal .agent-item{padding:7px 10px;border:1px solid var(--line);border-radius:7px;margin-bottom:5px;background:#fff;}
  .portal .agent-item.active{border-color:#0d9488;background:var(--agtbg);font-weight:700;}
  .muted{color:var(--muted);font-size:11.5px;margin-top:6px;}
  .ask{color:var(--muted);margin-bottom:6px;}
  .reqbox{border:1px solid var(--line);background:#f8fafc;border-radius:8px;padding:10px;font-size:13px;}
  .btnrow{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .btn{font-size:11.5px;padding:5px 11px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;}
  .btn.primary{background:#0d9488;color:#fff;border-color:#0d9488;}
  .lblrow{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;font-weight:700;margin:9px 0 3px;}
  .kvbox{border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:12px;background:#fff;}
  .chips{display:flex;flex-wrap:wrap;gap:4px;}
  .ch{font-size:10.5px;border:1px solid var(--line);border-radius:5px;padding:2px 7px;background:#f8fafc;}
  .warnbox{font-size:11.5px;background:var(--lrnbg);border:1px solid #fde68a;border-radius:7px;padding:7px 9px;margin-top:6px;color:#92400e;}
  ul.tight{margin:2px 0;padding-left:16px;font-size:12px;}
  ul.tight li{margin-bottom:1px;}
  table.tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:2px;}
  table.tbl td{border-bottom:1px solid var(--line);padding:3px 5px;vertical-align:top;}
  table.tbl td.run{color:#0d9488;font-weight:700;}
  table.tbl td.lock{color:#b45309;}
  .conf{float:right;font-size:10.5px;background:#ede9fe;color:#6d28d9;border-radius:8px;padding:1px 7px;font-weight:700;}
  .checklist{list-style:none;padding:0;margin:0;}
  .checklist li{padding:6px 8px;border-radius:6px;margin-bottom:5px;font-size:12px;}
  .checklist li.done{background:var(--actbg);border:1px solid #bbf7d0;}
  .checklist li.done::before{content:"✓ ";color:#16a34a;font-weight:700;}
  .checklist li.wait{background:var(--lrnbg);border:1px solid #fde68a;}
  .checklist li.wait::before{content:"⏳ ";}
  .card{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px;background:#fff;}
  .card.hl{border-color:#7c3aed;background:var(--sembg);font-weight:700;}
  .card.warn{border-color:#f59e0b;background:var(--lrnbg);}
  .card.ok{border-color:#16a34a;background:var(--actbg);}
  .card.danger{border-color:#dc2626;background:#fef2f2;}
  .chk{display:flex;gap:7px;align-items:flex-start;padding:7px 9px;border:1px solid var(--line);border-radius:7px;margin-bottom:6px;font-size:12px;}
  .chk small{color:var(--muted);}

  /* Center structure room */
  .engine{border:2px solid var(--trust);border-radius:10px;padding:8px;flex:1;display:flex;flex-direction:column;gap:5px;position:relative;background:#fbfcfe;min-height:0;}
  .engine .trust-label{position:absolute;top:-9px;left:12px;background:var(--trust);color:#fff;font-size:9.5px;padding:1px 8px;border-radius:4px;letter-spacing:.03em;}
  .engine.trust-on{box-shadow:0 0 0 3px rgba(30,41,59,.12);}
  .band{border:1px solid var(--line);border-left:4px solid var(--bandc,#cbd5e1);border-radius:8px;padding:6px 9px;background:#fff;transition:all .15s;flex:0 0 auto;}
  .band .bhead{display:flex;align-items:center;gap:8px;font-size:11.5px;}
  .band .bname{font-weight:700;color:var(--bandc,#334155);}
  .band .bstat{margin-left:auto;font-size:10.5px;color:var(--muted);}
  .band .bsum{font-size:11px;color:var(--muted);margin-left:auto;}
  .band.done{background:#fcfdfe;}
  .band.done .bstat{color:#16a34a;}
  .band.pending{opacity:.55;}
  .band.active{flex:1 1 auto;min-height:120px;display:flex;flex-direction:column;background:var(--bandbg,#fff);box-shadow:0 1px 8px rgba(15,23,42,.07);border-color:var(--bandc);}
  .band.active .bname{font-size:12.5px;}
  .band.active .bstat{color:var(--bandc);font-weight:700;}
  .bbody{margin-top:7px;flex:1;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;}

  .flownode{padding:6px 14px;border-radius:8px;font-weight:700;font-size:12px;text-align:center;border:1px solid;}
  .flownode.big{font-size:14px;padding:9px 18px;}
  .flownode.gray{background:#f1f5f9;border-color:#cbd5e1;color:#475569;}
  .flownode.blue{background:var(--databg);border-color:var(--data);color:var(--data);}
  .flownode.purple{background:var(--sembg);border-color:var(--sem);color:var(--sem);}
  .flownode.teal{background:var(--agtbg);border-color:var(--agt);color:var(--agt);}
  .flownode.green{background:var(--actbg);border-color:var(--act);color:var(--act);}
  .flownode.amber{background:var(--lrnbg);border-color:var(--amber);color:#b45309;}
  .arrow{font-size:13px;color:#94a3b8;line-height:1;}
  .band-note{font-size:11px;color:var(--muted);text-align:center;max-width:90%;}
  .kv{font-size:11px;color:#334155;text-align:center;background:#f8fafc;border-radius:6px;padding:4px 8px;}
  .diverge,.fan{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .src,.agent,.chip{font-size:10.5px;border:1px solid var(--line);border-radius:6px;padding:4px 7px;background:#fff;text-align:center;}
  .src small,.agent small{display:block;color:var(--muted);font-size:9.5px;margin-top:1px;}
  .src.ok{border-color:#16a34a;background:var(--actbg);color:#15803d;}
  .src.wait{border-color:#f59e0b;background:var(--lrnbg);color:#b45309;}
  .agent{border-color:#5eead4;background:var(--agtbg);min-width:74px;}
  .chip{background:var(--custbg);}
  .tasks{font-size:10.5px;color:#475569;text-align:center;line-height:1.6;}
  .branch{display:flex;gap:7px;width:100%;justify-content:center;}
  .br{flex:1;max-width:150px;border-radius:7px;padding:6px 8px;font-size:11px;font-weight:700;text-align:center;border:1px solid;}
  .br small{display:block;font-weight:400;font-size:9.5px;margin-top:2px;}
  .br.auto{background:var(--actbg);border-color:var(--act);color:#15803d;}
  .br.hitl{background:var(--lrnbg);border-color:var(--amber);color:#b45309;}
  .br.block{background:#fef2f2;border-color:var(--red);color:#b91c1c;}

  /* Right interpretation (해석 위주) */
  .rkicker{font-size:11px;color:var(--agt);font-weight:700;letter-spacing:.02em;margin-bottom:7px;border-bottom:1px solid var(--line);padding-bottom:6px;}
  .rfield{margin-bottom:11px;}
  .rfield .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;font-weight:700;margin-bottom:3px;}
  .rprin{font-size:12.5px;line-height:1.7;color:#1e293b;}
  .rnote{font-size:11.5px;color:#334155;background:#f8fafc;border-left:3px solid #0d9488;border-radius:4px;padding:7px 9px;}
  .rnote.hitl{border-left-color:var(--amber);background:var(--lrnbg);}
  .ground{font-size:10.5px;color:#0d9488;margin:4px 0 2px;}
  .rdetail{margin-top:6px;border-top:1px dashed var(--line);padding-top:8px;}
  .rdetail summary{font-size:11px;color:var(--muted);cursor:pointer;font-weight:700;list-style:none;}
  .rdetail summary::before{content:"▸ ";}
  .rdetail[open] summary::before{content:"▾ ";}
  .rdetail .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;font-weight:700;margin:8px 0 2px;}
  .rlist{margin:0;padding-left:15px;font-size:11.5px;color:#334155;}
  .rlist li{margin-bottom:1px;}
  .layers{display:flex;flex-wrap:wrap;gap:4px;}
  .ltag{font-size:10px;background:#f1f5f9;border:1px solid var(--line);border-radius:5px;padding:2px 6px;color:#475569;}

  /* Log dock */
  .logdock{background:#0b1220;color:#cbd5e1;border-top:1px solid #1e293b;height:150px;display:flex;flex-direction:column;}
  .logtabs{display:flex;gap:2px;padding:5px 10px 0;}
  .ltab{font-size:11px;padding:3px 10px;border-radius:6px 6px 0 0;cursor:pointer;color:#94a3b8;}
  .ltab.active{background:#162033;color:#fff;}
  .logbody{flex:1;overflow:auto;padding:6px 12px;font-family:'Consolas','D2Coding',monospace;font-size:11px;background:#162033;}
  .logline{padding:1px 0;white-space:nowrap;}
  .logline .tg{color:#5eead4;}
  .logline .tg.gov{color:#fbbf24;}
  .logline .tg.dec{color:#a78bfa;}
  .logline .tg.act{color:#4ade80;}
  .logline .sgrp{color:#475569;margin-right:6px;}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div>
      <div class="title">AAP Meeting Runtime Demo</div>
      <div class="sub">모호한 회의 요청이 AAP 내부에서 업무 사건·Agent 실행·Writeback으로 바뀌는 과정</div>
    </div>
    <span class="runid">RUN-MEETING-001</span>
    <span class="mode">Core Run · Step 0–9</span>
    <div class="spacer"></div>
    <label class="toggle"><input type="checkbox" id="expToggle" checked> 작동 원리 해석 패널</label>
  </header>

  <nav class="rail" id="rail"></nav>

  <div class="main">
    <section class="col left">
      <h3>좌측 · 사용자 업무 화면</h3>
      <div id="leftBody"></div>
    </section>
    <section class="col center">
      <h3>중앙 · AAP 작동 구조</h3>
      <div class="engine" id="engine">
        <span class="trust-label">Trust · Security · Governance</span>
      </div>
    </section>
    <section class="col right">
      <h3>우측 · 작동 원리 해석</h3>
      <div id="rightBody"></div>
    </section>
  </div>

  <footer class="logdock">
    <div class="logtabs" id="logtabs"></div>
    <div class="logbody" id="logBody"></div>
  </footer>
</div>

<script>
/* ===== Bands (6 AAP 계층) ===== */
const BANDS = [
  {key:'custenv', name:'Customer Environment', c:'var(--cust)', bg:'var(--custbg)'},
  {key:'data',    name:'Data & Inputs',        c:'var(--data)', bg:'var(--databg)'},
  {key:'semantic',name:'Business Semantic',     c:'var(--sem)',  bg:'var(--sembg)'},
  {key:'agentic', name:'Agentic Core',          c:'var(--agt)',  bg:'var(--agtbg)'},
  {key:'action',  name:'Action & Integration',  c:'var(--act)',  bg:'var(--actbg)'},
  {key:'learning',name:'Operational Learning',  c:'var(--lrn)',  bg:'var(--lrnbg)'},
];
const DONE_LABEL = {
  custenv:'Mail·Cal·Docs·Org·CRM 연결',
  data:'Context Package · 메일14 문서6 CRM1',
  semantic:'◆ Meeting Event (Kickoff)',
  agentic:'9 Task · 5 Agent · 조율 완료',
  action:'Writeback 완료',
  learning:'—',
};
const PEND_LABEL = {
  custenv:'고객 환경 시스템', data:'요청·맥락 입력', semantic:'업무 의미화',
  agentic:'Agent 실행·조율', action:'실행·반영', learning:'운영 학습 (P3)',
};

/* ===== STEPS (Core Run 0~9) ===== */
const STEPS = [
{ id:0, title:'준비', hitl:false,
  left:`<div class="screen-title">AI 업무 포털 · 회의 준비 Agent</div>
    <div class="portal">
      <div class="agent-item active">회의 준비 Agent</div>
      <div class="agent-item">회의록 Agent</div>
      <div class="agent-item">보고서 Agent</div>
      <div class="agent-item">사내자료 검색 Agent</div>
      <div class="agent-item">결재 검토 Agent</div></div>
    <div class="lblrow">접속 사용자</div>
    <div class="kvbox"><b>홍길동</b> · AX BD · AI Business Planning</div>
    <div class="lblrow">연결 시스템</div>
    <div class="chips"><span class="ch">Calendar</span><span class="ch">Mail</span><span class="ch">Docs</span><span class="ch">CRM</span><span class="ch">Groupware</span><span class="ch">Meeting Room</span></div>
    <div class="warnbox">외부 공유 권한 · 조건부(승인 필요) — 권한에 따라 접근 문서·외부 초대 범위가 달라짐</div>`,
  center:{active:'custenv', done:[], trust:true,
    inner:`<div class="diverge">
        <div class="chip">Mail</div><div class="chip">Calendar</div><div class="chip">Docs</div>
        <div class="chip">Org Chart</div><div class="chip">CRM</div><div class="chip">Groupware</div>
        <div class="chip">Meeting Room</div><div class="chip">IAM/SSO</div></div>
      <div class="band-note">사용자 권한·연결 가능 시스템 확인 (아직 업무 객체 없음)</div>`},
  right:{stage:'Service · Data · Trust',
    principle:'AAP는 회의를 받기 전에 "누가 요청하는가"부터 확인합니다. 사용자 신분·권한·연결 가능한 시스템 범위를 먼저 파악하는 구조라, 같은 요청도 사람에 따라 접근 문서·외부 초대·자동 발송 가능 범위가 달라집니다. 즉 권한이 모든 후속 판단의 경계를 먼저 정합니다.',
    note:'권한 확인이 없으면 회의 준비는 "누구나 같은 결과"가 되어 보안·책임이 무너집니다.',
    ground:'', input:['User Identity','IAM / SSO'], process:['권한 확인','접근 가능 시스템 범위 확인'],
    output:['User Context'], layers:['Service Experience','Enterprise Data & Inputs','Trust Foundation']},
  logs:[['Auth','User identity verified'],['Access','Calendar, Mail, Docs, CRM access granted'],['Policy','External sharing requires approval']]},

{ id:1, title:'요청 입력', hitl:false,
  left:`<div class="screen-title">회의 준비 Agent</div>
    <div class="ask">무엇을 도와드릴까요?</div>
    <div class="reqbox">"다음 주 AAP 고객사 킥오프 회의 잡아줘. 관련 부서 사람들 넣고, 지난번 제안 자료랑 회의록도 같이 정리해줘."</div>
    <div class="btnrow"><span class="btn primary">실행</span><span class="btn">예시 불러오기</span></div>
    <div class="lblrow">AAP가 읽어낸 신호</div>
    <div class="chips"><span class="ch">다음 주</span><span class="ch">AAP 고객사</span><span class="ch">킥오프</span><span class="ch">관련 부서</span><span class="ch">제안 자료</span><span class="ch">회의록</span></div>
    <div class="warnbox">빠진 정보 · 고객사명 · 참석자 명단 · 회의 일시 · 공유 자료 보안등급 · 외부 초대 여부</div>`,
  center:{active:'data', done:['custenv'],
    inner:`<div class="flownode gray">Raw Request Event · REQ-001</div>
      <div class="band-note">원시 요청 — 아직 실행 명령이 아님. 해석이 필요한 업무 신호</div>`},
  right:{stage:'Business Semantic Modeling',
    principle:'사용자 요청은 실행 명령이 아니라 "해석이 필요한 업무 신호"로 다룹니다. AAP는 한 줄 요청을 곧장 캘린더에 넣지 않고, 먼저 무엇이 빠졌는지(고객사·참석자·일정·공유정책)를 식별합니다. 이 "즉시 실행하지 않는" 구조가 일반 자동화와의 첫 분기점입니다.',
    note:'바로 실행하면 잘못된 사람에게 잘못된 자료가 나갈 수 있습니다. 그래서 먼저 업무 사건을 정의합니다.',
    ground:'↳ 좌측 요청 입력창·읽어낸 신호와 연결', input:['Raw Request'], process:['요청 분해','누락 필드 식별'],
    output:['Raw Request Event'], layers:['Service Experience','Business Semantic']},
  logs:[['Request','Raw request captured'],['Semantic','Missing fields: customer, participants, date candidates, sharing policy']]},

{ id:2, title:'맥락 수집', hitl:false,
  left:`<div class="screen-title">관련 맥락 수집 중</div>
    <div class="lblrow">메일 · 14건 (핵심)</div>
    <ul class="tight"><li>대한제조그룹 후속 미팅 요청</li><li>기술 검토 자료 송부</li><li>보안 검토 필요사항</li></ul>
    <div class="lblrow">문서 · 6건</div>
    <ul class="tight"><li>AAP_선제안_자료_v3.pdf</li><li>AAP_4-2_아키텍처.html</li><li>고객사_QA_정리.docx</li></ul>

      <li class="done">아젠다 문서 생성</li><li class="done">회의록 템플릿 생성</li>
      <li class="wait">고객 초대 메일 · 발송 대기</li></ul>
    <div class="muted">남은 일 · 초대 메일 발송 승인 · 다음 회의 후보 7/4(금) 10:00</div>`,
  center:{active:'action', done:['custenv','data','semantic','agentic'],
    inner:`<div class="flownode green">▣ Execution Package (승인됨)</div>
      <div class="arrow">↓</div>
      <div class="diverge">
        <div class="src ok">Calendar<small>CAL-3391</small></div><div class="src ok">Room<small>ROOM-552</small></div>
        <div class="src ok">Docs<small>폴더·아젠다</small></div><div class="src ok">Minutes<small>템플릿</small></div>
        <div class="src wait">Mail<small>초안·대기</small></div></div>
      <div class="band-note">승인된 결과를 실제 업무 시스템에 반영 (Writeback)</div>`},
  right:{stage:'Enterprise Integration & Action',
    principle:'AAP가 일반 AI와 갈리는 지점입니다. 승인된 결과를 "이렇게 하세요"로 답하는 데서 끝내지 않고, 캘린더·회의실·문서함·메일 시스템에 실제로 반영(Writeback)합니다. 모든 호출과 결과는 감사 로그로 남아, 무엇이 실제로 실행됐는지 추적 가능합니다.',
    note:'답변 생성이 아니라 시스템 반영 — 이것이 AAP를 "운영 플랫폼"이라 부르는 이유입니다.',
    ground:'↳ Writeback 타깃 ↔ 좌측 실행 완료 체크리스트', input:['Approved Execution Package'], process:['Calendar/Room/Mail/Docs API 호출'],
    output:['Action Result'], layers:['Enterprise Integration & Action','Tool Calling Runtime','Audit Log']},
  logs:[['Writeback:Calendar','Event created · CAL-3391'],['Writeback:Room','Room reserved · ROOM-552'],['Writeback:Docs','Material folder + agenda created'],['Writeback:Mail','Invite draft prepared'],['Audit','All action results logged']]},
];
const LOCKED = [{title:'회의 진행',ph:'P3'},{title:'사후 처리',ph:'P3'},{title:'Learning',ph:'P3'},{title:'Playback',ph:'P4'}];

/* ===== log category ===== */
function catOf(tag){
  const t=tag.toLowerCase();
  if(/writeback|ready|package|access|status/.test(t)) return 'act';
  if(/semantic|hitl|decision|evaluation/.test(t)) return 'dec';
  if(/connector|supervisor|routing|agent|dependency/.test(t)) return 'agent';
  if(/policy|guardrail|governance|audit|auth/.test(t)) return 'gov';
  if(/learning|skill|feedback/.test(t)) return 'lrn';
  return '';
}
const LOG_TABS=[['all','All'],['act','Action'],['dec','Decision'],['agent','Agent'],['gov','Governance'],['lrn','Learning']];

/* ===== state ===== */
let cur=0, logTab='all';
(function(){ const q=new URLSearchParams(location.search); const s=parseInt(q.get('step'),10);
  if(!isNaN(s)&&s>=0&&s<STEPS.length) cur=s; })();

function goNext(){ if(cur<STEPS.length-1){cur++;render();} }
function goPrev(){ if(cur>0){cur--;render();} }

/* ===== render ===== */
function renderRail(){
  const r=document.getElementById('rail'); r.innerHTML='';
  STEPS.forEach(s=>{
    const cls = s.id===cur?'active':(s.id<cur?'done':'');
    const el=document.createElement('div');
    el.className=`step ${cls} ${s.hitl?'hitl':''}`;
    el.innerHTML=`<span class="num">${s.id}</span><span>${s.title}</span>`;
    el.onclick=()=>{cur=s.id;render();};
    r.appendChild(el);
  });
  LOCKED.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step locked';
    el.innerHTML=`<span class="num">${10+i}</span><span>${s.title}</span><span class="ph">${s.ph}</span>`;
    r.appendChild(el);
  });
  const nav=document.createElement('div'); nav.className='railnav';
  nav.innerHTML=`<span class="btn" id="prevBtn">◀ 이전</span><span class="btn primary" id="nextBtn">다음 ▶</span>`;
  r.appendChild(nav);
  document.getElementById('prevBtn').onclick=goPrev;
  document.getElementById('nextBtn').onclick=goNext;
  document.getElementById('prevBtn').style.visibility = cur===0?'hidden':'visible';
  document.getElementById('nextBtn').style.visibility = cur===STEPS.length-1?'hidden':'visible';
}

function renderLeft(){ document.getElementById('leftBody').innerHTML = STEPS[cur].left; }

function renderCenter(){
  const cfg=STEPS[cur].center;
  const eng=document.getElementById('engine');
  eng.className = 'engine'+(cfg.trust?' trust-on':'');
  let html='<span class="trust-label">Trust · Security · Governance</span>';
  BANDS.forEach(b=>{
    const isActive=cfg.active===b.key;
    const isDone=cfg.done.includes(b.key);
    const state=isActive?'active':(isDone?'done':'pending');
    const stat=isDone?'<span class="bstat">✓</span>':(isActive?'<span class="bstat">● ACTIVE</span>':'<span class="bstat">·</span>');
    const sum = isActive?'' : `<span class="bsum">${isDone?DONE_LABEL[b.key]:PEND_LABEL[b.key]}</span>`;
    html+=`<div class="band ${state}" style="--bandc:${b.c};--bandbg:${b.bg}">
        <div class="bhead"><span class="bname">${b.name}</span>${sum}${stat}</div>
        ${isActive?`<div class="bbody">${cfg.inner}</div>`:''}
      </div>`;
  });
  eng.innerHTML=html;
}

function renderRight(){
  const r=STEPS[cur].right;
  const li=a=>a.map(x=>`<li>${x}</li>`).join('');
  document.getElementById('rightBody').innerHTML=`
    <div class="rkicker">${r.stage}</div>
    <div class="rfield"><div class="lbl">어떤 구조·원리로 작동하나</div><div class="rprin">${r.principle}</div></div>
    <div class="rfield"><div class="lbl">${r.hitl?'왜 HITL인가':'왜 이렇게 하나'}</div><div class="rnote ${r.hitl?'hitl':''}">${r.note}</div></div>
    ${r.ground?`<div class="ground">${r.ground}</div>`:''}
    <details class="rdetail">
      <summary>입력 · 처리 · 산출 · AAP 계층</summary>
      <div class="lbl">입력</div><ul class="rlist">${li(r.input)}</ul>
      <div class="lbl">처리</div><ul class="rlist">${li(r.process)}</ul>
      <div class="lbl">산출</div><ul class="rlist">${li(r.output)}</ul>
      <div class="lbl">AAP 계층</div><div class="layers">${r.layers.map(l=>`<span class="ltag">${l}</span>`).join('')}</div>
    </details>`;
}

function renderLogs(){
  const body=document.getElementById('logBody');
  let lines=[];
  for(let i=0;i<=cur;i++){ STEPS[i].logs.forEach(([tag,msg])=>lines.push({s:i,tag,msg,cat:catOf(tag)})); }
  if(logTab!=='all') lines=lines.filter(l=>l.cat===logTab);
  body.innerHTML=lines.map(l=>
    `<div class="logline"><span class="sgrp">S${l.s}</span><span class="tg ${l.cat}">[${l.tag}]</span> ${l.msg}</div>`
  ).join('') || '<div class="logline" style="color:#475569">— 표시할 로그 없음 —</div>';
  body.scrollTop=body.scrollHeight;
}

function renderTabs(){
  const t=document.getElementById('logtabs'); t.innerHTML='';
  LOG_TABS.forEach(([k,label])=>{
    const el=document.createElement('div');
    el.className='ltab'+(logTab===k?' active':'');
    el.textContent=label;
    el.onclick=()=>{logTab=k;renderLogs();renderTabs();};
    t.appendChild(el);
  });
}

function render(){ renderRail(); renderLeft(); renderCenter(); renderRight(); renderLogs(); renderTabs(); }

document.getElementById('expToggle').onchange=e=>{ document.body.classList.toggle('exp-off',!e.target.checked); };
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')goNext(); if(e.key==='ArrowLeft')goPrev(); });

render();
</script>
</body>
</html>
