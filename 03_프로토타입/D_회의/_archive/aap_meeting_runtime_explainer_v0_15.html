<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 회의 업무 작동 원리 (v0.15)</title>
<style>
  :root{
    --bg:#f4f7fb; --surf:#f8fafc; --surface:#ffffff; --ink:#0f172a; --slate:#334155; --muted:#64748b; --border:#e2e8f0; --line:#eef2f7;
    --aap:#0d9488; --aap-ink:#0f766e; --aap-soft:#f0fdfa; --aap-border:#99f6e4;
    --violet:#7c3aed; --violet-soft:#f5f3ff; --violet-border:#ddd6fe;
    --amber:#d97706; --amber-soft:#fffbeb; --amber-ink:#92400e; --amber-border:#fde68a;
    --green:#16a34a; --green-soft:#f0fdf4; --red:#dc2626;
    --shadow:0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Pretendard","Inter","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-rows:1fr auto;height:100vh;overflow:hidden;}
  .main{display:grid;grid-template-columns:60% 40%;gap:13px;padding:13px;overflow:hidden;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:15px;box-shadow:var(--shadow);overflow:auto;}
  .panel.left{padding:0;display:flex;flex-direction:column;}
  .panel.right{padding:12px 13px;display:flex;flex-direction:column;}
  .ph{font-weight:800;font-size:13px;display:flex;align-items:center;gap:7px;}
  .help{width:15px;height:15px;border-radius:50%;border:1px solid var(--border);color:var(--muted);font-size:9.5px;display:inline-flex;align-items:center;justify-content:center;cursor:help;}

  /* drilldown : horizontal ±1 + first */
  .dd{padding:11px 14px 9px;border-bottom:1px solid var(--line);}
  .dd-top{display:flex;align-items:center;gap:9px;}
  .firstbtn{font-size:10.5px;font-weight:700;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--slate);cursor:pointer;flex:0 0 auto;}
  .ddrow{display:flex;align-items:stretch;gap:7px;flex:1;min-width:0;}
  .ddside{flex:1;min-width:0;display:flex;align-items:center;gap:6px;font-size:11px;color:#94a3b8;border:1px solid var(--border);border-radius:9px;padding:6px 9px;background:var(--surf);cursor:pointer;}
  .ddside.next{justify-content:flex-end;text-align:right;}
  .ddside .n{font-size:9px;font-weight:800;color:#94a3b8;}
  .ddside.empty{visibility:hidden;}
  .ddcur{flex:1.5;min-width:0;display:flex;align-items:center;gap:8px;border:1.5px solid var(--aap);border-radius:10px;padding:7px 11px;background:var(--aap-soft);}
  .ddcur .n{width:24px;height:24px;border-radius:7px;background:var(--aap);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .ddcur .lb{font-size:14px;font-weight:800;}
  .ddcur .st{margin-left:auto;font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:20px;background:#fff;color:var(--aap);border:1px solid var(--aap-border);}
  .ddcur .st.warn{color:var(--amber);border-color:var(--amber-border);background:var(--amber-soft);}
  .dd-desc{font-size:11.5px;color:var(--muted);margin-top:7px;}

  /* customer console — agentic workspace */
  .cons-wrap{flex:1;padding:13px 15px;overflow:auto;display:flex;flex-direction:column;}
  .cons-h{font-size:9.5px;color:#9ca3af;font-weight:800;letter-spacing:.03em;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
  .cons-h .repl{margin-left:auto;font-size:10.5px;color:var(--aap);cursor:pointer;font-weight:700;}
  .console{position:relative;flex:1;border:1px solid var(--border);border-radius:13px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.04);overflow:hidden;display:flex;flex-direction:column;min-height:380px;}
  .con-bar{background:var(--ink);color:#e2e8f0;font-size:10.5px;padding:7px 12px;display:flex;align-items:center;gap:8px;flex:0 0 auto;}
  .con-bar .dot{width:7px;height:7px;border-radius:50%;background:#475569;} .con-bar b{color:#fff;}
  .con-body{flex:1;padding:14px 16px;display:flex;flex-direction:column;overflow:auto;}
  .task{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
  .task .tl{font-size:9px;color:#9ca3af;font-weight:800;}
  .task .tt{font-size:15px;font-weight:800;}
  .task .tst{margin-left:auto;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;}
  .tst.wait{background:#eef2f7;color:#64748b;} .tst.run{background:var(--aap-soft);color:var(--aap);} .tst.done{background:var(--green-soft);color:var(--green);}
  .tst.run .pdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--aap);margin-right:4px;animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.3;}}

  .deleg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;color:var(--muted);}
  .deleg .dtx{font-size:12px;}
  .deleg-btn{font-size:13px;font-weight:800;padding:11px 22px;border-radius:11px;background:var(--aap);color:#fff;border:none;cursor:pointer;box-shadow:0 6px 16px rgba(13,148,136,.28);transition:transform .12s;}
  .deleg-btn.press{transform:scale(.94);}

  .sec-h{font-size:9.5px;color:#9ca3af;font-weight:800;letter-spacing:.03em;margin:4px 0 6px;}
  .feed{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;}
  .fi{display:flex;align-items:center;gap:9px;font-size:12px;padding:5px 9px;border-radius:8px;color:#94a3b8;transition:.2s;}
  .fi .ic{width:17px;height:17px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:#eef2f7;color:#94a3b8;}
  .fi.done{color:var(--slate);} .fi.done .ic{background:var(--aap);color:#fff;}
  .fi.doing{color:var(--ink);background:var(--aap-soft);} .fi.doing .ic{background:#fff;border:2px solid var(--aap-soft);border-top-color:var(--aap);animation:spin .7s linear infinite;color:transparent;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .fi .sys{margin-left:auto;font-size:9.5px;color:#94a3b8;background:var(--surf);border:1px solid var(--border);border-radius:5px;padding:1px 6px;}
  .fi .meta{font-size:10.5px;color:var(--muted);}

  .result{border:1px solid var(--border);border-radius:11px;background:var(--surf);padding:10px 12px;}
  .crow{font-size:12px;padding:2px 0;} .crow.b{font-weight:700;}
  .crow .ck{display:inline-flex;width:15px;height:15px;border-radius:4px;background:var(--aap);color:#fff;font-size:9px;align-items:center;justify-content:center;margin-right:6px;vertical-align:-2px;}
  .flag{font-size:9px;font-weight:800;color:var(--amber);background:var(--amber-soft);border:1px solid var(--amber-border);border-radius:5px;padding:1px 6px;margin-left:6px;}

  .hitl{margin-top:11px;border:1px solid var(--amber-border);background:var(--amber-soft);border-radius:12px;padding:11px 13px;}
  .hitl-h{font-size:10px;font-weight:800;color:var(--amber-ink);display:flex;align-items:center;gap:6px;}
  .hitl-q{font-size:12.5px;font-weight:700;color:#7c2d12;margin:5px 0 9px;}
  .hitl-btns{display:flex;gap:8px;}
  .hb{font-size:12px;font-weight:800;padding:8px 15px;border-radius:9px;cursor:pointer;border:1px solid;}
  .hb.yes{background:var(--aap);color:#fff;border-color:var(--aap);}
  .hb.no{background:#fff;color:var(--slate);border-color:var(--border);}
  .hitl.resolved{border-color:var(--green-soft);background:var(--green-soft);} .hitl.resolved .hitl-h{color:var(--green);}

  .mcursor{position:absolute;z-index:8;width:20px;height:20px;pointer-events:none;transition:left .5s cubic-bezier(.4,0,.2,1),top .5s cubic-bezier(.4,0,.2,1);opacity:0;}
  .mcursor.show{opacity:1;} .mcursor.click::after{content:"";position:absolute;inset:-6px;border:2px solid var(--aap);border-radius:50%;animation:ripple .5s ease-out;}
  @keyframes ripple{from{transform:scale(.4);opacity:.8;}to{transform:scale(1.5);opacity:0;}}

  /* RIGHT : op sequence (synced) + explain */
  .flow{flex:0 0 auto;margin-top:9px;}
  .op{border:1px solid var(--border);border-radius:11px;background:#fff;padding:7px 11px;opacity:.34;transition:.3s;}
  .op.doing{opacity:1;border-color:var(--aap);box-shadow:0 0 0 3px var(--aap-soft);}
  .op.done{opacity:1;border-color:var(--aap);box-shadow:0 3px 12px rgba(13,148,136,.1);}
  .op.done.ds,.op.doing.ds{border-color:var(--violet);box-shadow:0 3px 12px rgba(124,58,237,.1);}
  .op-h{display:flex;align-items:center;gap:8px;}
  .op-seq{width:18px;height:18px;border-radius:50%;background:#e2e8f0;color:#94a3b8;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .op.done .op-seq,.op.doing .op-seq{background:var(--aap);color:#fff;} .op.done.ds .op-seq,.op.doing.ds .op-seq{background:var(--violet);}
  .op-lay{font-size:8px;font-weight:800;color:#94a3b8;background:var(--surf);border:1px solid var(--border);border-radius:5px;padding:1px 6px;}
  .op.done .op-lay,.op.doing .op-lay{color:var(--aap-ink);border-color:var(--aap-border);} .op.done.ds .op-lay,.op.doing.ds .op-lay{color:var(--violet);border-color:var(--violet-border);}
  .op-t{font-size:11.5px;font-weight:800;color:var(--slate);} .op.done .op-t,.op.doing .op-t{color:var(--ink);}
  .op-badge{font-size:7px;font-weight:900;color:#fff;background:var(--violet);border-radius:4px;padding:1px 5px;margin-left:auto;}
  .op-d{font-size:10.5px;color:var(--muted);margin:2px 0 0 26px;} .op.done .op-d,.op.doing .op-d{color:var(--slate);}
  .op-micro{margin:5px 0 0 26px;display:flex;flex-wrap:wrap;gap:4px;}
  .mc{font-size:8.5px;font-weight:700;color:#94a3b8;background:var(--surf);border:1px solid var(--border);border-radius:5px;padding:1px 6px;transition:.2s;}
  .op.done .mc,.op.doing .mc{color:var(--aap-ink);background:var(--aap-soft);border-color:var(--aap-border);}
  .op-arrow{text-align:center;color:#cbd5e1;font-size:10px;margin:1px 0;transition:.3s;}
  .op-arrow.on{color:var(--aap);}
  .explain{margin-top:11px;border:1px solid var(--border);border-left:3px solid var(--aap);border-radius:9px;background:var(--surf);padding:10px 12px;font-size:11.5px;line-height:1.6;color:var(--slate);}
  .explain b{color:var(--aap-ink);} .explain .v{color:var(--violet);font-weight:700;}
  .legend{display:flex;gap:13px;margin-top:9px;font-size:9.5px;font-weight:700;color:var(--muted);flex:0 0 auto;}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:-1px;}

  .bot{background:#fff;border-top:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:12px;}
  .bot .bstep{font-size:12px;color:var(--muted);} .bot .bstep b{color:var(--ink);} .bot .spacer{flex:1;}
  .btn{font-size:12px;padding:7px 13px;border:1px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;color:var(--ink);}
  .btn.primary{background:var(--aap);color:#fff;border-color:var(--aap);}
  .tg{font-size:11.5px;color:#475569;display:flex;align-items:center;gap:5px;cursor:pointer;}
  [data-tip]{cursor:help;}
  #tip{position:fixed;z-index:60;max-width:280px;background:var(--ink);color:#f1f5f9;font-size:11px;line-height:1.5;padding:8px 11px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;pointer-events:none;}
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <section class="panel left">
      <div class="dd"><div class="ph" style="margin-bottom:9px">회의 업무 드릴다운 <span class="help" data-tip="회의 업무가 AAP 안에서 나뉘는 세부 업무. 앞뒤 단계가 함께 보입니다.">?</span></div><div id="ddBox"></div></div>
      <div class="cons-wrap">
        <div class="cons-h">고객 화면 <span class="repl" id="replay">↻ 다시 보기</span></div>
        <div class="console"><div class="con-bar"><span class="dot"></span><b>회의 업무 지원</b> · 대한제조그룹 · 담당 홍길동</div><div class="con-body" id="conBody"></div><div class="mcursor" id="mcursor"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M4 2l6.5 17 2.3-6.7 6.7-2.3z" fill="#0f172a" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/></svg></div></div>
      </div>
    </section>
    <section class="panel right">
      <div class="ph">AAP 작동 구조 <span class="help" data-tip="고객 화면에서 에이전트가 수행하는 작업이 AAP 8계층 안에서 어떤 컴포넌트·하위 요소로 실행되는지 동시에 점등됩니다.">?</span></div>
      <div class="flow" id="flow"></div>
      <div class="explain" id="explain"></div>
      <div class="legend"><span><i style="background:var(--aap)"></i>경유 컴포넌트</span><span><i style="background:var(--violet)"></i>kt ds 차별화 · L4 지식·L7 거버넌스</span></div>
      <div style="flex:1"></div>
    </section>
  </div>
  <div class="bot"><div class="bstep" id="bstep"></div><div class="spacer"></div><label class="tg"><input type="checkbox" id="devToggle"> 개발자 보기</label><button class="btn primary" id="playBtn">처리 흐름 보기</button></div>
</div>
<div id="tip"></div>

<script>
const LK={L1:'경험·접근',L2:'설계·개발',L3:'에이전트 코어',L4:'지식·시맨틱',L5:'데이터·연동',L6:'AI 품질·평가',L7:'컨트롤·거버넌스',L8:'인프라'};
/* op: feed(좌측 작업) ↔ 우측(L,comp,d,micro,ds,badge) 동기 점등 */
const WORK=[
 {id:'request',label:'요청 확인',st:'확인',sc:'',desc:'한 줄 요청에서 회의 준비가 시작됩니다. 바로 예약하지 않고 부족한 정보부터 확인합니다.',
  loop:'Data',
  ops:[{feed:'회의 요청 수신',sys:'AI 포털',L:'L1',comp:'코파일럿·챗 UI',d:'요청을 업무 신호로 접수'}],
  result:`<div class="crow b">킥오프 회의 준비 요청 접수</div><div class="crow" style="color:#64748b">부족 · 참석자 · 일시 · 공유 자료 승인</div>`,
  explain:`회의 요청은 추론 루프의 시작점입니다. <b>L1 경험·접근</b>(챗 UI)이 요청을 받아 업무 신호로 접수하고, 아직 실행하지 않고 부족한 정보를 표시합니다.`},
 {id:'intent',label:'업무 이해',st:'확인',sc:'',desc:'요청을 킥오프 회의 준비 업무로 정리합니다. 목적·산출물·확인 항목이 함께 잡힙니다.',
  loop:'Semantic',
  ops:[{feed:'회의 유형 분류',L:'L4',ds:1,comp:'온톨로지·시맨틱 모델',d:'킥오프 회의로 의미화'},{feed:'목적·산출물 추론',L:'L4',ds:1,comp:'컨텍스트 조합·근거',d:'필요 산출물·근거 구성'},{feed:'외부 공유 정책 확인',L:'L7',ds:1,comp:'정책 관리·통제',d:'외부 공유 승인 플래그'}],
  result:`<div class="crow b">킥오프 회의 준비 · 목적 정렬</div><div class="crow" style="color:#92400e">확인 필요 · 외부 초대 · 자료 공유</div>`,
  explain:`업무 이해는 추론 루프 <b>Semantic</b> 단계입니다. <span class="v">L4 지식·시맨틱</span>(kt ds 차별화)이 "킥오프"를 업무 유형으로 해석하고, <span class="v">L7 컨트롤·거버넌스</span>가 외부 공유 정책 플래그를 답니다.`},
 {id:'materials',label:'자료 확인',st:'준비',sc:'',desc:'메일·문서함·조직도에서 회의 준비에 필요한 근거를 모읍니다.',
  loop:'Data → Semantic',
  ops:[{feed:'메일·문서함 조회',sys:'메일·문서함',meta:'14·6건',L:'L5',comp:'연결·수집',d:'커넥터로 자료 수집',micro:['DB·API 커넥터','파일 커넥터'],badge:'AI:ON-U'},{feed:'OCR 디지털화·정규화',L:'L5',comp:'데이터 처리',d:'정제·정규화·변환',micro:['OCR','정규화']},{feed:'관련 자료 연결',L:'L4',ds:1,comp:'도메인 지식그래프',d:'흩어진 자료를 회의 맥락으로 연결'},{feed:'근거 묶음 구성',L:'L4',ds:1,comp:'컨텍스트 조합·근거',d:'판단 근거 묶음'}],
  result:`<div class="crow b">관련 자료 묶음</div><div class="crow" style="color:#64748b">메일 14 · 이전 회의록 1 · 문서 6 · Q&A 1 · 부서 5</div>`,
  explain:`자료 확인은 추론 루프 <b>Data → Semantic</b> 구간입니다. <b>L5 데이터·연동</b>이 메일·문서·조직도를 커넥터로 수집하고 OCR·정규화하며, <span class="v">L4 지식·시맨틱</span>(지식그래프)이 흩어진 자료를 회의 맥락으로 연결합니다.`},
 {id:'parts',label:'참석자 구성',st:'준비',sc:'',desc:'조직도·이전 참여자·메일 참여자를 바탕으로 참석자 후보를 준비합니다.',

const idxOf=id=>WORK.findIndex(w=>w.id===id);
const W=id=>WORK.find(w=>w.id===id);

const STATE={sel:'request', playing:false, hitlDone:false};
const RUN={phase:'idle', reveal:0, timers:[], playTimer:null};
function clearRun(){RUN.timers.forEach(clearTimeout);RUN.timers=[];clearTimeout(RUN.playTimer);}

/* drilldown */
function renderDrill(){
  const ci=idxOf(STATE.sel),p=ci>0?WORK[ci-1]:null,n=ci<WORK.length-1?WORK[ci+1]:null,c=WORK[ci];
  document.getElementById('ddBox').innerHTML=
   `<div class="dd-top"><button class="firstbtn" id="firstBtn">⤒ 처음으로</button>
     <div class="ddrow">
      ${p?`<div class="ddside prev" data-go="${p.id}"><span class="n">${ci}</span>‹ ${p.label}</div>`:`<div class="ddside empty"></div>`}
      <div class="ddcur"><span class="n">${ci+1}</span><span class="lb">${c.label}</span><span class="st ${c.sc}">${c.st}</span></div>
      ${n?`<div class="ddside next" data-go="${n.id}">${n.label} ›<span class="n">${ci+2}</span></div>`:`<div class="ddside empty"></div>`}
     </div></div>
    <div class="dd-desc">${c.desc}</div>`;
  document.getElementById('firstBtn').onclick=()=>setSel('request');
  document.querySelectorAll('.ddside[data-go]').forEach(e=>e.onclick=()=>setSel(e.getAttribute('data-go')));
}

/* console — agentic workspace */
function renderConsole(){
  const w=W(STATE.sel),n=w.ops.length;let st='wait',sl='대기';
  if(RUN.phase==='working'){st='run';sl='<span class="pdot"></span>진행 중';}
  else if(RUN.phase==='done'){st='done';sl='완료';}
  let body=`<div class="task"><div><div class="tl">작업</div><div class="tt">${w.label}</div></div><span class="tst ${st}">${sl}</span></div>`;
  if(RUN.phase==='before'){
    body+=`<div class="deleg"><div class="dtx">담당자가 이 작업을 AAP에게 맡깁니다.</div><button class="deleg-btn" id="delegBtn">AAP에게 맡기기</button></div>`;
  } else {
    body+=`<div class="sec-h">AAP가 수행한 작업</div><div class="feed">`;
    w.ops.forEach((o,i)=>{
      const stt=i<RUN.reveal?'done':(i===RUN.reveal&&RUN.phase==='working'?'doing':'');
      body+=`<div class="fi ${stt}"><span class="ic">${stt==='done'?'✓':''}</span><span>${o.feed}</span>${o.meta?`<span class="meta">· ${o.meta}</span>`:''}${o.sys?`<span class="sys">${o.sys}</span>`:''}</div>`;
    });
    body+=`</div>`;
    if(RUN.phase==='done'){
      body+=`<div class="sec-h">결과</div><div class="result">${w.result}</div>`;
      if(w.hitl){const r=STATE.hitlDone;body+=`<div class="hitl ${r?'resolved':''}"><div class="hitl-h">${r?'✓ 담당자 확인 완료':'⚑ 담당자 확인'}</div>${r?'':`<div class="hitl-q">${w.hitl.q}</div><div class="hitl-btns"><button class="hb yes" id="hbYes">${w.hitl.yes}</button><button class="hb no" id="hbNo">${w.hitl.no}</button></div>`}</div>`;}
    }
  }
  document.getElementById('conBody').innerHTML=body;
  if(RUN.phase==='before'){const b=document.getElementById('delegBtn');b.onclick=runStart;positionCursor(b);}
  else document.getElementById('mcursor').classList.remove('show','click');
  if(RUN.phase==='done'&&w.hitl&&!STATE.hitlDone){const y=document.getElementById('hbYes'),no=document.getElementById('hbNo');if(y)y.onclick=()=>{STATE.hitlDone=true;renderConsole();};if(no)no.onclick=()=>{STATE.hitlDone=true;renderConsole();};}
}
function positionCursor(btn){const mc=document.getElementById('mcursor'),con=document.querySelector('.console');if(!btn||!con)return;const br=btn.getBoundingClientRect(),cr=con.getBoundingClientRect();mc.classList.add('show');mc.style.left=(br.left-cr.left+br.width*0.7)+'px';mc.style.top=(br.top-cr.top+br.height*0.5)+'px';}

/* right — synced op sequence + explain */
function renderRight(){
  const w=W(STATE.sel);let h='';
  w.ops.forEach((o,i)=>{
    const stt=i<RUN.reveal?'done':(i===RUN.reveal&&RUN.phase==='working'?'doing':'');
    if(i>0)h+=`<div class="op-arrow ${i<=RUN.reveal?'on':''}">▼</div>`;
    const micro=o.micro?`<div class="op-micro">${o.micro.map(m=>`<span class="mc">${m}</span>`).join('')}</div>`:'';
    const badge=o.badge?`<span class="op-badge">${o.badge}</span>`:'';
    h+=`<div class="op ${stt} ${o.ds?'ds':''}"><div class="op-h"><span class="op-seq">${i+1}</span><span class="op-lay">${o.L} ${LK[o.L]}</span><span class="op-t">${o.comp}</span>${badge}</div><div class="op-d">${o.d}</div>${micro}</div>`;
  });
  document.getElementById('flow').innerHTML=h;
  document.getElementById('explain').innerHTML=w.explain;
}
function renderBot(){const i=idxOf(STATE.sel);document.getElementById('bstep').innerHTML=`현재 단계 <b>${String(i+1).padStart(2,'0')} / 12</b> · ${W(STATE.sel).label}`;}

/* run */
function runStart(){
  const b=document.getElementById('delegBtn');if(b)b.classList.add('press');
  document.getElementById('mcursor').classList.add('click');
  RUN.timers.push(setTimeout(()=>{RUN.phase='working';RUN.reveal=0;renderConsole();renderRight();revealOps();},420));
}
function revealOps(){
  const n=W(STATE.sel).ops.length;
  for(let i=1;i<=n;i++)RUN.timers.push(setTimeout(()=>{RUN.reveal=i;renderConsole();renderRight();},i*620));
  RUN.timers.push(setTimeout(()=>{RUN.phase='done';RUN.reveal=n;renderConsole();renderRight();
    if(STATE.playing)RUN.playTimer=setTimeout(playNext,W(STATE.sel).hitl?2200:1500);},n*620+250));
}
function runStep(){clearRun();STATE.hitlDone=false;RUN.phase='before';RUN.reveal=0;renderConsole();renderRight();}
function setSel(id){STATE.sel=id;STATE.hitlDone=false;renderDrill();renderBot();runStep();}

function startPlay(){STATE.playing=true;document.getElementById('playBtn').textContent='중지';setSel(WORK[0].id);autoRun();}
function autoRun(){const b=document.getElementById('delegBtn');if(b){b.classList.add('press');document.getElementById('mcursor').classList.add('click');RUN.timers.push(setTimeout(()=>{RUN.phase='working';RUN.reveal=0;renderConsole();renderRight();revealOps();},420));}}
function stopPlay(){STATE.playing=false;clearTimeout(RUN.playTimer);document.getElementById('playBtn').textContent='처리 흐름 보기';}
function playNext(){const ci=idxOf(STATE.sel);if(ci<WORK.length-1){setSel(WORK[ci+1].id);autoRun();}else stopPlay();}

document.getElementById('replay').onclick=()=>runStep();
document.getElementById('playBtn').onclick=()=>STATE.playing?stopPlay():startPlay();
document.getElementById('devToggle').onchange=e=>document.body.classList.toggle('dev-on',e.target.checked);
const TIP=document.getElementById('tip');
document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]');if(t){TIP.textContent=t.getAttribute('data-tip');TIP.style.display='block';const r=t.getBoundingClientRect();TIP.style.left=Math.min(r.left,window.innerWidth-300)+'px';let tp=r.bottom+8;if(tp+TIP.offsetHeight>window.innerHeight)tp=r.top-TIP.offsetHeight-8;TIP.style.top=Math.max(8,tp)+'px';}else if(!e.target.closest('#tip'))TIP.style.display='none';});

(function(){const q=new URLSearchParams(location.search);if(q.get('dev')==='1'){document.body.classList.add('dev-on');document.getElementById('devToggle').checked=true;}
 const s=q.get('sel')||'request';STATE.sel=W(s)?s:'request';renderDrill();renderBot();
 if(q.get('still')==='1'){STATE.hitlDone=q.get('hitl')==='1';RUN.phase='done';RUN.reveal=W(STATE.sel).ops.length;renderConsole();renderRight();}
 else runStep();})();
</script>
</body>
