<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 작동 원리 데모 · 회의 업무 (v0.5)</title>
<style>
  :root{
    --bg:#f8fafc; --surface:#ffffff; --soft:#f9fafb; --text:#111827; --muted:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --accent-soft:#eff6ff; --accent-line:#bfdbfe;
    --success:#16a34a; --success-soft:#f0fdf4; --warning:#d97706; --warning-soft:#fffbeb;
    --danger:#dc2626; --danger-soft:#fef2f2; --navy:#0f172a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Pretendard","Inter","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--text);font-size:13.5px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-rows:auto auto 1fr auto;height:100vh;overflow:hidden;}
  .internal{display:none;} body.dev-on .internal{display:inline;}
  .internal.blk{display:none;} body.dev-on .internal.blk{display:block;}

  /* Header */
  .hdr{background:var(--navy);color:#e2e8f0;height:56px;padding:0 20px;display:flex;align-items:center;gap:14px;}
  .hdr .title{font-weight:700;font-size:16px;color:#fff;}
  .hdr .sub{font-size:12px;color:#94a3b8;}
  .hdr .spacer{flex:1;}
  .hdr .dpk{font-size:12px;color:#cbd5e1;}
  .hdr .dpk select{font-size:12px;background:#1e293b;color:#fff;border:1px solid #334155;border-radius:6px;padding:3px 7px;}
  .hdr .tg{font-size:12px;color:#cbd5e1;display:flex;align-items:center;gap:6px;cursor:pointer;}

  /* Phase bar (상위 그룹) */
  .phasebar{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:9px 18px;gap:0;}
  .ph{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--muted);font-size:12.5px;white-space:nowrap;}
  .ph .pn{width:22px;height:22px;border-radius:50%;background:var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;}
  .ph.done{color:#374151;} .ph.done .pn{background:var(--success);color:#fff;}
  .ph.active{color:var(--text);font-weight:700;} .ph.active .pn{background:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-soft);}
  .ph.dim{opacity:.4;cursor:default;}
  .ph-line{flex:1;height:2px;background:var(--line);margin:0 8px;min-width:16px;}
  .ph-line.done{background:var(--success);}
  .ph-nav{margin-left:auto;display:flex;gap:7px;}
  .btn{font-size:12px;padding:6px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;color:var(--text);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn.sm{padding:4px 10px;font-size:11.5px;}

  /* Main */
  .main{display:grid;grid-template-columns:63% 37%;gap:14px;padding:14px;overflow:hidden;}

  /* ===== LEFT: console ===== */
  .console{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.05);overflow:hidden;display:flex;flex-direction:column;}
  .cbar{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;background:var(--soft);}
  .cbar .cnm{font-weight:700;font-size:14px;}
  .cbar .csm{font-size:11px;color:#9ca3af;}
  .cbar .cmeta{font-size:12px;color:var(--muted);}
  .cbar .csp{flex:1;}
  .cbar .cstat{font-size:11.5px;font-weight:700;padding:3px 11px;border-radius:20px;background:#eef2f7;color:#475569;}
  .cbar .cstat.wait{background:var(--warning-soft);color:var(--warning);}
  .cbar .cstat.run{background:var(--accent-soft);color:var(--accent);}
  .cbar .cstat.done{background:var(--success-soft);color:var(--success);}

  .reqsum{padding:13px 16px;border-bottom:1px solid var(--line);}
  .reqsum .rl{font-size:11px;color:#9ca3af;font-weight:700;margin-bottom:2px;}
  .reqsum .rt{font-size:13.5px;}
  .reqsum .ai{margin-top:9px;border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:11px;padding:9px 12px;}
  .reqsum .ai-h{font-weight:700;color:#1d4ed8;font-size:13px;}
  .reqsum .ai-b{font-size:12.5px;color:#1e40af;margin-top:1px;}

  .prail{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .pr{font-size:11px;color:#9ca3af;white-space:nowrap;display:flex;align-items:center;gap:5px;cursor:pointer;}
  .pr .pd{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .pr.done{color:var(--muted);} .pr.done .pd{background:var(--success);}
  .pr.active{color:var(--accent);font-weight:700;} .pr.active .pd{background:var(--accent);}
  .pr-sep{width:16px;height:1px;background:var(--line);margin:0 6px;flex:0 0 auto;}

  .cbody{flex:1;display:grid;grid-template-columns:1fr 236px;overflow:hidden;}
  .workbench{padding:16px 18px;overflow:auto;}
  .side{border-left:1px solid var(--line);background:var(--soft);padding:14px;overflow:auto;display:flex;flex-direction:column;gap:13px;}

  .wb-title{font-weight:700;font-size:15px;margin-bottom:3px;}
  .wb-sum{font-size:12.5px;color:var(--muted);margin-bottom:13px;}
  .wb-sec{margin-bottom:13px;}
  .wb-l{font-size:11px;color:#9ca3af;font-weight:700;margin-bottom:5px;}
  .wb-row{border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:7px;background:#fff;font-size:13px;}
  .wb-row.miss{border-style:dashed;color:#9ca3af;}
  .wb-tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
  .wb-tbl td{border-bottom:1px solid var(--line);padding:6px 7px;vertical-align:top;}
  .wb-tbl td.r{color:var(--muted);}
  .pill{display:inline-block;font-size:11px;border-radius:20px;padding:2px 10px;margin:0 4px 4px 0;font-weight:600;}
  .pill.auto{background:var(--success-soft);color:var(--success);}
  .pill.rev{background:var(--warning-soft);color:var(--warning);}
  .pill.block{background:var(--danger-soft);color:var(--danger);}
  .chk{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;font-size:12.5px;}
  .chk small{color:var(--muted);}
  .done-list{list-style:none;padding:0;margin:0;}
  .done-list li{font-size:12.5px;padding:7px 10px;border-radius:9px;margin-bottom:5px;background:var(--success-soft);border:1px solid #bbf7d0;}
  .done-list li::before{content:"✓ ";color:var(--success);font-weight:700;}
  .done-list li.wait{background:var(--warning-soft);border-color:#fde68a;}
  .done-list li.wait::before{content:"⏳ ";}
  .devbox{margin-top:10px;border-top:1px dashed var(--line);padding-top:9px;}
  .devbox .dl{font-size:10.5px;color:#9ca3af;font-weight:700;}
  .devbox .dv{font-size:11.5px;color:#64748b;font-family:"Consolas",monospace;}

  .spanel{border:1px solid var(--line);border-radius:12px;background:#fff;padding:11px 12px;}
  .sp-h{font-size:11px;color:#9ca3af;font-weight:700;margin-bottom:7px;}
  .ev-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#9ca3af;padding:3px 0;}
  .ev-item .ed{width:6px;height:6px;border-radius:50%;background:var(--line);}
  .ev-item.hot{color:var(--text);} .ev-item.hot .ed{background:var(--accent);}
  .ri{font-size:12px;padding:6px 9px;border-radius:8px;margin-bottom:5px;border:1px solid var(--line);}
  .ri.rev{background:var(--warning-soft);border-color:#fde68a;color:#92400e;}
  .ri.act{background:var(--success-soft);border-color:#bbf7d0;color:#166534;}
  .ri.idle{color:#9ca3af;}
  .sp-dim{opacity:.5;}

  /* ===== RIGHT: AAP structure ===== */
  .archcol{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.05);overflow:hidden;padding:15px 16px;display:flex;flex-direction:column;}
  .arch-scroll{flex:1;overflow:auto;min-height:0;}
  .arch-h{font-weight:700;font-size:14px;}
  .arch-s{font-size:11.5px;color:var(--muted);margin-bottom:13px;}
  .arch{position:relative;padding-left:15px;}
  .nd{border:1px solid var(--line);border-radius:11px;background:#fff;padding:6px 11px;transition:all .2s ease;}
  .nd .nd-ko{font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:7px;}
  .nd .nd-ko .ndd{width:8px;height:8px;border-radius:50%;background:#cbd5e1;}
  .nd .nd-en{font-size:10px;color:#9ca3af;margin-left:15px;}
  .nd.idle{opacity:.5;}
  .nd.done{border-color:#dbeafe;} .nd.done .ndd{background:var(--success);}
  .nd.active{border-color:var(--accent-line);background:var(--accent-soft);box-shadow:0 4px 14px rgba(37,99,235,.12);}
  .nd.active .nd-ko{color:#1d4ed8;} .nd.active .ndd{background:var(--accent);}
  .vln{height:11px;width:2px;background:var(--line);margin:0 auto;}
  .vln.on{background:var(--accent);}
  .core{border:1px solid #dbeafe;border-radius:13px;background:#fbfcff;padding:10px;}
  .core-t{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.04em;margin-bottom:8px;}
  .core-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .cn{border:1px solid var(--line);border-radius:9px;background:#fff;padding:6px 9px;transition:.2s;}
  .cn.span{grid-column:1/-1;}
  .cn .cn-ko{font-weight:700;font-size:11.5px;}
  .cn .cn-en{font-size:9.5px;color:#9ca3af;}
  .cn.idle{opacity:.5;} .cn.done{border-color:#dbeafe;}
  .cn.active{border-color:var(--accent-line);background:var(--accent-soft);color:#1d4ed8;box-shadow:0 3px 10px rgba(37,99,235,.12);}
  .cn-sub{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
  .cn-sub .sc{font-size:10px;border:1px solid var(--accent-line);background:#fff;border-radius:6px;padding:2px 7px;color:#1d4ed8;}
  .cmini{font-size:10px;color:#94a3b8;text-align:center;margin:3px 0;}
  .foundation{margin-top:13px;border:1px solid var(--line);border-radius:9px;background:var(--soft);padding:7px 12px;font-size:11px;color:var(--muted);text-align:center;transition:.2s;}
  .foundation.active{background:#1e293b;color:#cbd5e1;border-color:#1e293b;}
  .foundation b{color:inherit;font-weight:700;}
  .looprail{position:absolute;left:0;top:118px;bottom:120px;width:12px;border:2px solid var(--line);border-right:none;border-radius:8px 0 0 8px;}
  .looprail.on{border-color:var(--accent);}
  .looprail .ll{position:absolute;left:-2px;top:40%;transform:rotate(-90deg);transform-origin:left;font-size:8px;color:#cbd5e1;white-space:nowrap;}
  .looprail.on .ll{color:var(--accent);font-weight:700;}

  /* "이번 단계에서 AAP가 한 일" panel */
  .didpanel{flex:0 0 auto;margin-top:11px;border:1px solid var(--line);border-radius:13px;background:var(--soft);padding:12px 14px;}
  .didpanel .dp-h{font-weight:700;font-size:13px;margin-bottom:9px;}
  .dp-f{margin-bottom:9px;}
  .dp-l{font-size:10.5px;color:#9ca3af;font-weight:700;margin-bottom:2px;}
  .dp-v{font-size:12.5px;color:#374151;}
  .dp-v.need{background:var(--warning-soft);border-left:3px solid var(--warning);border-radius:5px;padding:6px 9px;color:#92400e;}
  .focusbtn{margin-top:13px;}

  [data-tip]{border-bottom:1px dotted #9ca3af;cursor:help;}
  #tip{position:fixed;z-index:60;max-width:280px;background:var(--navy);color:#f9fafb;font-size:11.5px;line-height:1.55;padding:9px 11px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;pointer-events:none;}
  #modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:70;}
  #modal .box{background:#fff;border-radius:18px;width:480px;max-width:92vw;padding:22px 24px;box-shadow:0 24px 64px rgba(0,0,0,.3);}
  #modal h4{margin:0 0 4px;font-size:16px;}
  #modal .mlbl{font-size:10.5px;color:#9ca3af;font-weight:700;margin:12px 0 2px;}
  #modal .mval{font-size:13px;color:#374151;}
  #modal .mclose{float:right;cursor:pointer;color:#9ca3af;font-size:19px;}
  #modal .mmean{background:var(--accent-soft);border-radius:9px;padding:10px 12px;font-size:12.5px;color:#1d4ed8;margin-top:6px;}

  .logdock{background:#0b1220;color:#cbd5e1;border-top:1px solid #1e293b;height:150px;display:flex;flex-direction:column;}
  .logtop{display:flex;align-items:center;gap:3px;padding:7px 14px 0;}
  .ltab{font-size:11.5px;padding:4px 12px;border-radius:7px 7px 0 0;cursor:pointer;color:#94a3b8;}
  .ltab.active{background:#162033;color:#fff;}
  .ltab .en{font-size:9px;color:#475569;margin-left:4px;}
  body.dev-on .ltab .en{color:#64748b;}
  .logbody{flex:1;overflow:auto;padding:8px 14px;font-size:12px;background:#162033;}
  .logline{padding:1.5px 0;}
  .logline .sg{color:#475569;margin-right:8px;}
  .logline.tech{font-family:"Consolas",monospace;font-size:11px;color:#64748b;}
  .logline .tg{color:#7dd3fc;}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div>
      <div class="title">AAP 작동 원리 데모</div>
      <div class="sub">회의 업무를 통해 보는 업무 이해 · 실행 · 검토 · 재사용 흐름</div>
    </div>
    <div class="spacer"></div>
    <div class="dpk">업무 ·
      <select id="dpkSel">
        <option value="meeting">회의 업무</option>
        <option value="claim" disabled>손해사정 (준비 중)</option>
        <option value="control" disabled>내부통제 (준비 중)</option>
        <option value="voc" disabled>VOC 대응 (준비 중)</option>
        <option value="quality" disabled>제조 품질 (준비 중)</option>
      </select>
    </div>
    <label class="tg"><input type="checkbox" id="devToggle"> 개발자 보기</label>
  </header>

  <nav class="phasebar" id="phasebar"></nav>

  <div class="main">
    <section class="console">
      <div class="cbar" id="cbar"></div>
      <div class="reqsum" id="reqsum"></div>
      <div class="prail" id="prail"></div>
      <div class="cbody">
        <div class="workbench" id="workbench"></div>
        <div class="side" id="side"></div>
      </div>
    </section>
    <section class="archcol">
      <div class="arch-scroll">
        <div class="arch-h">AAP는 지금 어디에서 일하고 있나</div>
        <div class="arch-s">현재 단계에서 쓰이는 자료·판단·실행·검토 구조를 보여줍니다.</div>
        <div class="arch" id="arch"></div>
      </div>
      <div id="didpanel"></div>
    </section>
  </div>

  <footer class="logdock">
    <div class="logtop" id="logtop"></div>
    <div class="logbody" id="logBody"></div>
  </footer>
</div>

<div id="tip"></div>
<div id="modal"><div class="box" id="modalBox"></div></div>

<script>
/* =========================================================================
   STANDARD RUNTIME (코드 내부 표준 객체 — 화면엔 친숙한 표시명만 노출)
   ========================================================================= */
const STANDARD_RUNTIME=['request','workEvent','contextPackage','candidateSets','coordinationResult',
  'executionPackage','hitlDecision','writebackResult','postProcessResult','runTrace','skillUpdate'];

/* 상위 그룹(Phase) */
const PHASES=[
  {label:'준비', steps:[0,1,2,3]},
  {label:'검토', steps:[4,5]},
  {label:'실행', steps:[6]},
  {label:'회의 중', steps:[], dim:true},
  {label:'회의 후', steps:[7]},
  {label:'재사용', steps:[8]},
];
/* 좌측 콘솔 세부 단계(친숙한 짧은 이름) */
const STEP_SHORT=['요청','이해','자료 확인','준비안','검토','확인','반영','정리','재사용'];

/* 우측 아키텍처 노드 — 한국어 큰 라벨 + 영어 작은 라벨 */
const NODE={
  custenv:{ko:'고객 업무 환경', en:'Customer Environment'},
  service:{ko:'사용자 화면',   en:'Service Experience'},
  data:{ko:'자료·시스템 연결', en:'Data & Inputs', tip:'메일·문서·일정·조직도 등 회사 시스템에서 필요한 정보를 모으는 부분입니다.'},
  semantic:{ko:'업무 이해',    en:'Business Semantic', tip:'업무 용어·역할·절차·정책을 AAP가 처리할 수 있는 구조로 바꾸는 부분입니다.'},
  agent:{ko:'작업 조율',       en:'Agent Core', tip:'회의 준비를 여러 작업으로 나누고 순서를 맞춰 처리하는 부분입니다.'},
  coord:{ko:'검토 기준',       en:'Coordination · Policy', tip:'바로 처리할 일과 사람이 확인할 일을 정책에 따라 나누는 부분입니다.'},
  hitl:{ko:'담당자 확인',      en:'Review · Governance', tip:'책임이 따르는 항목에서 담당자의 확인과 승인을 받는 부분입니다.'},
  action:{ko:'시스템 반영',    en:'Action · Writeback', tip:'AAP의 결과를 캘린더·문서함·메일 같은 실제 시스템에 반영하는 부분입니다.'},
  learning:{ko:'다음 업무에 재사용', en:'Operational Learning', tip:'이번 처리 경험을 저장해 다음 회의 준비에 재사용하는 부분입니다.'},
};

const DOMAIN_PACKS={ meeting:buildMeeting(),
  claim:{_ph:true,name:'손해사정'}, control:{_ph:true,name:'내부통제'}, voc:{_ph:true,name:'VOC 대응'}, quality:{_ph:true,name:'제조 품질'} };
let activeDomain='meeting';

function dev(o){ return `<span class="internal"> · ${o}</span>`; }

function buildMeeting(){
  const meta={console:'회의 업무 지원 콘솔', sub:'AAP Meeting Assistant', customer:'대한제조그룹', type:'킥오프 회의', owner:'홍길동'};
  const request='다음 주 AAP 고객사 킥오프 회의 잡아줘. 관련 부서 사람들 넣고, 지난번 제안 자료랑 회의록도 같이 정리해줘.';
  const understood={h:'AAP 고객사 킥오프 회의 준비', b:'목적 · 착수 범위·역할·일정·보안 조건 정리'};
  const evidence=[{k:'minutes',l:'이전 미팅 회의록'},{k:'proposal',l:'AAP 제안 자료'},{k:'qa',l:'고객 Q&A'},{k:'mail',l:'관련 메일'},{k:'org',l:'조직도'},{k:'cal',l:'캘린더'}];

  const WB={
   s0:`<div class="wb-title">요청을 접수했습니다</div><div class="wb-sum">AAP가 회의 요청을 받았습니다.</div>
     <div class="wb-sec"><div class="wb-l">요청</div><div class="wb-row">${request}</div></div>
     <div class="wb-sec"><div class="wb-l">아직 정해지지 않은 것</div>
       <div class="wb-row miss">고객사명 · 참석자 · 회의 일시 · 공유 자료 승인 여부</div></div>
     <div class="devbox internal blk"><div class="dl">내부 처리</div><div class="dv">object: Raw Request · layer: Service Experience</div></div>`,
   s1:`<div class="wb-title">회의 업무로 이해했습니다</div><div class="wb-sum">요청을 "AAP 고객사 킥오프 회의 준비"로 이해했습니다.</div>

  const el=document.getElementById('phasebar');el.innerHTML='';
  const curPh=phaseOf(cur);
  PHASES.forEach((p,i)=>{
    if(i>0){const ln=document.createElement('div');ln.className='ph-line'+((!p.dim&&p.steps[0]<=cur)||(i<curPh)?' done':'');el.appendChild(ln);}
    const it=document.createElement('div');
    const done=!p.dim && p.steps.length && p.steps[p.steps.length-1]<cur;
    it.className='ph '+(p.dim?'dim':(i===curPh?'active':(done?'done':'')));
    it.innerHTML=`<span class="pn">${i+1}</span><span>${p.label}</span>`;
    if(!p.dim&&p.steps.length) it.onclick=()=>{cur=p.steps[0];render();};
    el.appendChild(it);
  });
  const nav=document.createElement('div');nav.className='ph-nav';
  nav.innerHTML=`<button class="btn" id="pv">◀ 이전</button><button class="btn primary" id="nx">다음 ▶</button>`;
  el.appendChild(nav);
  document.getElementById('pv').onclick=goPrev;document.getElementById('nx').onclick=goNext;
  document.getElementById('pv').disabled=cur===0;document.getElementById('nx').disabled=cur===P().steps.length-1;
}

function renderConsole(){
  const p=P(),st=p.steps[cur],m=p.meta;
  document.getElementById('cbar').innerHTML=
    `<span class="cnm">${m.console}</span><span class="csm">${m.sub}</span>
     <span class="cmeta">· 고객사 ${m.customer} · ${m.type}</span>
     <span class="csp"></span><span class="cstat ${st.statusCls}">${st.status}</span>
     <span class="cmeta">담당 ${m.owner}</span>`;
  let rs=`<div class="rl">요청</div><div class="rt">${p.request}</div>`;
  if(st.ai||cur>=1) rs+=`<div class="ai"><div class="ai-h">AAP가 이해한 업무 · ${p.understood.h}${dev('Meeting Event')}</div><div class="ai-b">${p.understood.b}</div></div>`;
  document.getElementById('reqsum').innerHTML=rs;
  const pr=document.getElementById('prail');pr.innerHTML='';
  STEP_SHORT.forEach((lb,i)=>{
    if(i>0){const sep=document.createElement('div');sep.className='pr-sep';pr.appendChild(sep);}
    const s=document.createElement('div');s.className='pr '+(i===cur?'active':(i<cur?'done':''));
    s.innerHTML=`<span class="pd"></span>${lb}`;s.onclick=()=>{cur=i;render();};pr.appendChild(s);
  });
  document.getElementById('workbench').innerHTML=st.wb;
  const ev=p.evidence.map(e=>`<div class="ev-item ${st.evHot.includes(e.k)?'hot':''}"><span class="ed"></span>${e.l}</div>`).join('');
  const rev=st.review==='idle'?`<div class="ri idle">아직 확인 항목 없음</div>`
    :`<div class="ri rev">참석자 확정</div><div class="ri rev">외부 고객 초대</div><div class="ri rev">자료 공유 승인</div><div class="ri rev">초대 메일 문구</div>`;
  const aMap={idle:`<div class="ri idle">실행 준비 전</div>`,
    pending:`<div class="ri act" style="opacity:.6">캘린더 등록 (대기)</div><div class="ri act" style="opacity:.6">회의실 예약 (대기)</div>`,
    done:`<div class="ri act">캘린더 등록 ✓</div><div class="ri act">회의실 예약 ✓</div><div class="ri act">자료 폴더·메일 초안 ✓</div>`};
  document.getElementById('side').innerHTML=
    `<div class="spanel ${st.evHot.length?'':'sp-dim'}"><div class="sp-h">참고 근거</div>${ev}</div>
     <div class="spanel ${st.review==='pending'?'':'sp-dim'}"><div class="sp-h">확인 필요</div>${rev}</div>
     <div class="spanel ${st.action!=='idle'?'':'sp-dim'}"><div class="sp-h">실행 준비</div>${aMap[st.action]||aMap.idle}</div>`;
}

function renderArch(){
  const st=P().steps[cur];
  const act=new Set(st.active);const done=new Set();for(let i=0;i<cur;i++)P().steps[i].active.forEach(k=>done.add(k));
  const cls=k=>act.has(k)?'active':(done.has(k)?'done':'idle');
  const vln=on=>`<div class="vln${on?' on':''}"></div>`;
  const node=k=>{const N=NODE[k];return `<div class="nd ${cls(k)}"><div class="nd-ko"><span class="ndd"></span><span${N.tip?` data-tip="${k}"`:''}>${N.ko}</span></div><div class="nd-en">${N.en}</div></div>`;};
  const cn=k=>{const N=NODE[k];let sub='';if(act.has(k)&&st.sub[k])sub=`<div class="cn-sub">${st.sub[k].map(s=>`<span class="sc">${s}</span>`).join('')}</div>`;
    return `<div class="cn ${cls(k)}${k==='agent'||k==='hitl'?' span':''}"><div class="cn-ko"${N.tip?` data-tip="${k}"`:''}>${N.ko}</div><div class="cn-en">${N.en}</div>${sub}</div>`;};
  let h=`<div class="looprail ${st.loop?'on':''}"><span class="ll">학습 → 업무 이해</span></div>`;
  h+=node('custenv')+vln(act.has('data')||done.has('data'))+node('service')+vln(true);
  h+=`<div class="core"><div class="core-t">AAP CORE</div>
      <div class="core-g">${cn('data')}${cn('semantic')}</div>
      <div class="cmini">▼</div>${cn('agent')}<div class="cmini">▼</div>${cn('coord')}${cn('hitl')}</div>`;
  h+=vln(act.has('action')||done.has('action'))+node('action')+vln(act.has('learning')||done.has('learning'))+node('learning');
  h+=`<div class="foundation ${st.trust?'active':''}"><b>보안 · 권한 · 기록</b> · 모든 단계에 적용 <span class="internal">(Trust · Security · Governance)</span></div>`;
  document.getElementById('arch').innerHTML=h;
  // did panel
  const d=st.did;
  document.getElementById('didpanel').innerHTML=
    `<div class="didpanel"><div class="dp-h">이번 단계에서 AAP가 한 일</div>
      <div class="dp-f"><div class="dp-l">참고한 것</div><div class="dp-v">${d.input}</div></div>
      <div class="dp-f"><div class="dp-l">AAP가 한 일</div><div class="dp-v">${d.did}</div></div>
      <div class="dp-f"><div class="dp-l">결과</div><div class="dp-v">${d.result}</div></div>
      ${d.need?`<div class="dp-f"><div class="dp-l">확인 필요</div><div class="dp-v need">${d.need}</div></div>`:''}
      ${st.focus?`<div class="focusbtn"><button class="btn sm" id="focusBtn">⊕ 이 순간 자세히 보기</button></div>`:''}</div>`;
  if(st.focus) document.getElementById('focusBtn').onclick=()=>openFocus(st.focus);
}

function openFocus(f){
  document.getElementById('modalBox').innerHTML=`
    <span class="mclose" onclick="document.getElementById('modal').style.display='none'">×</span>
    <h4>${f.title}</h4>
    <div class="mlbl">무엇이 만들어졌나</div><div class="mval">${f.created}${dev(f.obj)}</div>
    <div class="mlbl">어떤 정보를 참고했나</div><div class="mval">${f.input}</div>
    <div class="mlbl">AAP는 무엇을 했나</div><div class="mval">${f.aap}</div>
    <div class="mlbl">왜 이 단계가 필요한가</div><div class="mmean">${f.meaning}</div>`;
  document.getElementById('modal').style.display='flex';
}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')e.currentTarget.style.display='none';};

function renderLogs(){
  const tabs=[['event','처리 이력','Event'],['decision','판단 근거','Decision'],['action','시스템 반영','Action'],['learning','재사용 기록','Learning']];
  const top=document.getElementById('logtop');top.innerHTML='';
  tabs.forEach(([k,ko,en])=>{const t=document.createElement('div');t.className='ltab'+(logTab===k?' active':'');
    t.innerHTML=`${ko}<span class="en">${en}</span>`;t.onclick=()=>{logTab=k;renderLogs();};top.appendChild(t);});
  const d=isDev();let lines=[];
  for(let i=0;i<=cur;i++){const L=(d?P().steps[i].logEn:P().steps[i].logKo)[logTab]||[];L.forEach(msg=>lines.push({s:i,msg}));}
  const body=document.getElementById('logBody');
  body.innerHTML=lines.length?lines.map(l=>`<div class="logline ${d?'tech':''}">${d?`<span class="sg">S${l.s+1}</span><span class="tg">[${logTab}]</span> `:`<span class="sg">${l.s+1}.</span>`}${l.msg}</div>`).join(''):'<div class="logline" style="color:#475569">— 기록 없음 —</div>';
  body.scrollTop=body.scrollHeight;
}

function render(){renderPhaseBar();renderConsole();renderArch();renderLogs();}

/* tooltip */
const tip=document.getElementById('tip');
function tipText(k){return NODE[k]&&NODE[k].tip?NODE[k].tip:null;}
function showTip(t){const k=t.getAttribute('data-tip');const txt=tipText(k);if(!txt)return;
  tip.textContent=txt;tip.style.display='block';const r=t.getBoundingClientRect();
  tip.style.left=Math.min(r.left,window.innerWidth-300)+'px';let top=r.bottom+8;tip.style.top=top+'px';
  if(top+tip.offsetHeight>window.innerHeight)tip.style.top=(r.top-tip.offsetHeight-8)+'px';}
document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]');if(t)showTip(t);});
document.addEventListener('mouseout',e=>{if(e.target.closest('[data-tip]'))tip.style.display='none';});

document.getElementById('devToggle').onchange=e=>{document.body.classList.toggle('dev-on',e.target.checked);renderLogs();};
document.getElementById('dpkSel').onchange=e=>{activeDomain=e.target.value;cur=0;render();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev();if(e.key==='Escape')document.getElementById('modal').style.display='none';});

render();
(function(){const q=new URLSearchParams(location.search);if(q.get('focus')==='1'){const f=P().steps[cur].focus;if(f)openFocus(f);}})();
</script>
</body>
