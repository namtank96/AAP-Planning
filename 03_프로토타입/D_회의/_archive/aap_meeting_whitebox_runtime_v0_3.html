<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP Meeting Whitebox Runtime Demo · v0.3</title>
<style>
  :root{
    --bg:#f8fafc; --card:#ffffff; --ink:#111827; --muted:#6b7280; --line:#e5e7eb;
    --primary:#0d9488; --primary-bg:#f0fdfa; --primary-line:#99f6e4;
    --amber:#d97706; --amber-bg:#fffbeb; --red:#dc2626; --red-bg:#fef2f2;
    --green:#16a34a; --green-bg:#f0fdf4; --trust:#1e293b; --gold:#b45309;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'Malgun Gothic','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:12.5px;line-height:1.5;}
  .app{display:grid;grid-template-rows:auto auto 1fr auto;height:100vh;overflow:hidden;}

  /* Header */
  .hdr{background:var(--trust);color:#e2e8f0;padding:7px 16px;display:flex;align-items:center;gap:14px;}
  .hdr .title{font-weight:700;font-size:14.5px;color:#fff;}
  .hdr .sub{font-size:11px;color:#94a3b8;}
  .hdr .spacer{flex:1;}
  .hdr .dpk{font-size:11px;color:#cbd5e1;}
  .hdr .dpk select{font-size:11px;background:#334155;color:#fff;border:1px solid #475569;border-radius:5px;padding:2px 6px;}
  .hdr .tg{font-size:11px;color:#cbd5e1;display:flex;align-items:center;gap:5px;cursor:pointer;}

  /* Step bar */
  .stepbar{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:6px 14px;overflow-x:auto;}
  .sb-item{display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;color:var(--muted);font-size:11px;}
  .sb-item .dot{width:19px;height:19px;border-radius:50%;background:var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
  .sb-item.done{color:#374151;} .sb-item.done .dot{background:var(--green);color:#fff;}
  .sb-item.active{color:var(--ink);font-weight:700;} .sb-item.active .dot{background:var(--primary);color:#fff;box-shadow:0 0 0 3px var(--primary-bg);}
  .sb-line{flex:1;height:2px;background:var(--line);margin:0 5px;min-width:10px;}
  .sb-line.done{background:var(--green);}
  .sb-nav{margin-left:auto;display:flex;gap:6px;padding-left:10px;}
  .btn{font-size:11px;padding:5px 11px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;color:var(--ink);}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn.sm{padding:3px 9px;font-size:10.5px;}

  /* Main */
  .main{display:grid;grid-template-columns:63% 37%;gap:10px;padding:10px;overflow:hidden;}

  /* ============ LEFT : CUSTOMER CONSOLE ============ */
  .console{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
  .cbar{background:var(--trust);color:#e5e7eb;padding:8px 13px;display:flex;align-items:center;gap:12px;}
  .cbar .cnm{font-weight:700;font-size:13px;color:#fff;}
  .cbar .cmeta{font-size:11px;color:#94a3b8;}
  .cbar .csp{flex:1;}
  .cbar .cstat{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:#334155;color:#cbd5e1;}
  .cbar .cstat.wait{background:#78350f;color:#fde68a;}
  .cbar .cstat.run{background:#064e3b;color:#6ee7b7;}
  .cbar .cstat.done{background:#065f46;color:#a7f3d0;}
  .cbar .cowner{font-size:11px;color:#cbd5e1;}

  /* event header */
  .evh{padding:10px 13px;border-bottom:1px solid var(--line);background:#fcfcfd;}
  .evh .req-l{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;font-weight:700;}
  .evh .req-t{font-size:12.5px;margin:2px 0 0;}
  .evh .me{margin-top:8px;border:1px solid var(--primary-line);background:var(--primary-bg);border-radius:9px;padding:7px 10px;}
  .evh .me-h{font-weight:700;color:#0f766e;font-size:12px;}
  .evh .me-b{font-size:11.5px;color:#115e59;margin-top:1px;}

  /* process rail */
  .prail{display:flex;align-items:center;gap:0;padding:7px 13px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .pr-step{font-size:10px;color:#9ca3af;white-space:nowrap;display:flex;align-items:center;gap:4px;}
  .pr-step .pd{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .pr-step.done{color:#6b7280;} .pr-step.done .pd{background:var(--green);}
  .pr-step.active{color:var(--primary);font-weight:700;} .pr-step.active .pd{background:var(--primary);}
  .pr-sep{width:14px;height:1px;background:var(--line);margin:0 5px;flex:0 0 auto;}

  /* console body */
  .cbody{flex:1;display:grid;grid-template-columns:1fr 232px;gap:0;overflow:hidden;}
  .workbench{padding:13px;overflow:auto;}
  .side{border-left:1px solid var(--line);background:#fcfcfd;padding:12px;overflow:auto;display:flex;flex-direction:column;gap:12px;}

  .wb-title{font-weight:700;font-size:13px;margin-bottom:9px;display:flex;align-items:center;gap:7px;}
  .wb-title .tag{font-size:9.5px;font-weight:700;color:#0f766e;background:var(--primary-bg);border:1px solid var(--primary-line);border-radius:5px;padding:1px 6px;}
  .wb-sec{margin-bottom:11px;}
  .wb-l{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;font-weight:700;margin-bottom:4px;}
  .wb-row{border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin-bottom:6px;background:#fff;font-size:12px;}
  .wb-row.miss{border-style:dashed;color:#9ca3af;}
  .wb-row b{color:var(--ink);}
  .wb-tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
  .wb-tbl td{border-bottom:1px solid var(--line);padding:4px 6px;vertical-align:top;}
  .wb-tbl td.r{color:var(--muted);}
  .pill{display:inline-block;font-size:10px;border-radius:20px;padding:1px 8px;margin:0 3px 3px 0;}
  .pill.auto{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0;}
  .pill.rev{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a;}
  .pill.block{background:var(--red-bg);color:var(--red);border:1px solid #fecaca;}
  .chk{display:flex;gap:8px;align-items:flex-start;padding:6px 8px;border:1px solid var(--line);border-radius:7px;margin-bottom:5px;font-size:11.5px;}
  .chk small{color:var(--muted);}
  .done-list{list-style:none;padding:0;margin:0;}
  .done-list li{font-size:11.5px;padding:4px 7px;border-radius:6px;margin-bottom:4px;background:var(--green-bg);border:1px solid #bbf7d0;}
  .done-list li::before{content:"✓ ";color:var(--green);font-weight:700;}
  .done-list li.wait{background:var(--amber-bg);border-color:#fde68a;}
  .done-list li.wait::before{content:"⏳ ";}

  /* side panels */
  .spanel{border:1px solid var(--line);border-radius:10px;background:#fff;padding:9px 10px;}
  .sp-h{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;font-weight:700;margin-bottom:6px;}
  .ev-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#9ca3af;padding:3px 0;}
  .ev-item .ed{width:6px;height:6px;border-radius:50%;background:var(--line);flex:0 0 auto;}
  .ev-item.hot{color:var(--ink);} .ev-item.hot .ed{background:var(--primary);}
  .ri-item{font-size:11px;padding:4px 7px;border-radius:6px;margin-bottom:4px;border:1px solid var(--line);}
  .ri-item.rev{background:var(--amber-bg);border-color:#fde68a;color:#92400e;}
  .ri-item.act{background:var(--green-bg);border-color:#bbf7d0;color:#166534;}
  .ri-item.idle{color:#9ca3af;}
  .sp-dim{opacity:.45;}

  /* ============ RIGHT : AAP ARCHITECTURE MAP ============ */
  .archcol{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:auto;padding:12px;position:relative;}
  .archcol h3{margin:0 0 9px;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .arch{position:relative;padding-left:16px;}
  .aband{border:1px solid var(--line);border-radius:10px;background:#fff;padding:7px 11px;transition:.15s;}
  .aband .ab-h{font-weight:700;font-size:11.5px;display:flex;align-items:center;gap:6px;}
  .aband .ab-h .ad{width:8px;height:8px;border-radius:50%;background:#cbd5e1;flex:0 0 auto;}
  .aband .ab-sub{font-size:10px;color:var(--muted);margin-top:1px;margin-left:14px;}
  .aband.idle{opacity:.5;}
  .aband.done{border-color:#cbd5e1;} .aband.done .ad{background:var(--green);}
  .aband.active{border-color:var(--primary);background:var(--primary-bg);box-shadow:0 1px 8px rgba(13,148,136,.12);}
  .aband.active .ab-h{color:#0f766e;} .aband.active .ad{background:var(--primary);animation:pl 1.2s infinite;}
  @keyframes pl{0%{box-shadow:0 0 0 0 rgba(13,148,136,.5)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .vedge{height:14px;width:2px;background:var(--line);margin:0 auto;position:relative;}
  .vedge.on{background:var(--primary);}
  .vedge::after{content:"▼";position:absolute;bottom:-4px;left:-4px;font-size:8px;color:var(--line);}
  .vedge.on::after{color:var(--primary);}

  /* core runtime cluster */
  .core{border:1.5px solid #cbd5e1;border-radius:12px;background:#fbfcfe;padding:9px;}
  .core .core-t{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;}
  .core-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 10px;align-items:stretch;}
  .cnode{border:1px solid var(--line);border-radius:8px;background:#fff;padding:5px 8px;font-size:10.5px;text-align:center;transition:.15s;}
  .cnode .cn-n{font-weight:700;font-size:10.5px;}
  .cnode .cn-d{font-size:9px;color:var(--muted);}
  .cnode.span{grid-column:1 / -1;}
  .cnode.idle{opacity:.5;}
  .cnode.done{border-color:#cbd5e1;}
  .cnode.active{border-color:var(--primary);background:var(--primary-bg);color:#0f766e;box-shadow:0 1px 6px rgba(13,148,136,.14);}
  .cn-sub{margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;}
  .cn-sub .sc{font-size:9px;border:1px solid var(--primary-line);background:#fff;border-radius:5px;padding:1px 6px;color:#0f766e;}
  .cmini{font-size:9px;color:#94a3b8;text-align:center;margin:1px 0;}

  /* trust foundation */
  .trustband{margin-top:12px;border:1px dashed #cbd5e1;border-radius:10px;background:#f8fafc;padding:7px 11px;}
  .trustband.active{border-color:var(--trust);background:#eef2f7;}
  .trustband .tb-h{font-weight:700;font-size:11px;color:#334155;}
  .trustband .tb-s{font-size:10px;color:var(--muted);}

  /* loop rail */
  .looprail{position:absolute;left:0;top:120px;bottom:96px;width:13px;border:2px solid var(--line);border-right:none;border-radius:9px 0 0 9px;}
  .looprail.on{border-color:var(--primary);}
  .looprail .lr-lbl{position:absolute;left:-3px;top:42%;transform:rotate(-90deg);transform-origin:left;font-size:8.5px;color:#9ca3af;white-space:nowrap;}
  .looprail.on .lr-lbl{color:var(--primary);font-weight:700;}

  [data-tip]{border-bottom:1px dotted #9ca3af;cursor:help;}

  /* tooltip + modal */
  #tip{position:fixed;z-index:60;max-width:260px;background:#111827;color:#f9fafb;font-size:11px;line-height:1.5;padding:8px 10px;border-radius:7px;box-shadow:0 6px 20px rgba(0,0,0,.25);display:none;pointer-events:none;}
  #modal{position:fixed;inset:0;background:rgba(17,24,39,.45);display:none;align-items:center;justify-content:center;z-index:70;}
  #modal .box{background:#fff;border-radius:16px;width:460px;max-width:92vw;padding:20px 22px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  #modal h4{margin:0 0 4px;font-size:15px;}
  #modal .mlbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;font-weight:700;margin:11px 0 2px;}
  #modal .mval{font-size:12.5px;color:#374151;}
  #modal .mclose{float:right;cursor:pointer;color:#9ca3af;font-size:18px;line-height:1;}
  #modal .mmean{background:var(--primary-bg);border-radius:8px;padding:9px 11px;font-size:12px;color:#0f766e;margin-top:6px;}

  /* logs */
  .logdock{background:#0b1220;color:#cbd5e1;border-top:1px solid #1e293b;height:142px;display:flex;flex-direction:column;}
  .logtop{display:flex;align-items:center;gap:2px;padding:5px 12px 0;}
  .ltab{font-size:11px;padding:3px 11px;border-radius:6px 6px 0 0;cursor:pointer;color:#94a3b8;}
  .ltab.active{background:#162033;color:#fff;}
  .logbody{flex:1;overflow:auto;padding:6px 12px;font-family:'Consolas','D2Coding',monospace;font-size:11px;background:#162033;}
  .logline{padding:1px 0;white-space:nowrap;}
  .logline .sg{color:#475569;margin-right:7px;}
  .logline .tg{color:#5eead4;}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div>
      <div class="title">AAP Meeting Whitebox Runtime Demo</div>
      <div class="sub">고객 콘솔에서 회의 업무를 처리하는 동안 AAP 아키텍처가 점등되는 화면</div>
    </div>
    <div class="spacer"></div>
    <div class="dpk">Domain Pack ·
      <select id="dpkSel">
        <option value="meeting">회의 (완성)</option>
        <option value="claim" disabled>손해사정 (placeholder)</option>
        <option value="control" disabled>내부통제 (placeholder)</option>
        <option value="voc" disabled>VOC 대응 (placeholder)</option>
        <option value="quality" disabled>제조 품질 (placeholder)</option>
      </select>
    </div>
    <label class="tg"><input type="checkbox" id="stdToggle"> 표준 객체명</label>
  </header>

  <nav class="stepbar" id="stepbar"></nav>

  <div class="main">
    <!-- LEFT: customer console -->
    <section class="console">
      <div class="cbar" id="cbar"></div>
      <div class="evh" id="evh"></div>
      <div class="prail" id="prail"></div>
      <div class="cbody">
        <div class="workbench" id="workbench"></div>
        <div class="side" id="side"></div>
      </div>
    </section>
    <!-- RIGHT: AAP architecture map -->
    <section class="archcol">
      <h3>AAP 아키텍처 · 현재 단계에서 작동하는 계층이 점등</h3>
      <div class="arch" id="arch"></div>
    </section>
  </div>

  <footer class="logdock">
    <div class="logtop" id="logtop"></div>
    <div class="logbody" id="logBody"></div>
  </footer>
</div>

<div id="tip"></div>
<div id="modal"><div class="box" id="modalBox"></div></div>

<script>
/* =========================================================================
   STANDARD RUNTIME GRAMMAR  (도메인 무관 — Domain Pack 교체로 산업 전환)
   request→workEvent→contextPackage→candidateSets→coordinationResult→
   executionPackage→hitlDecision→writebackResult→postProcessResult→runTrace→skillUpdate
   ========================================================================= */
const STANDARD_RUNTIME = ['request','workEvent','contextPackage','candidateSets','coordinationResult',
  'executionPackage','hitlDecision','writebackResult','postProcessResult','runTrace','skillUpdate'];

const RUNTIME_STAGES = ['요청','의미화','맥락 수집','후보 생성','조율','승인','실행','사후 처리','학습·Playback'];

/* 좌측 콘솔 섹션 (도메인 교체 가능) */
const CONSOLE_SECTIONS = ['eventHeader','processRail','mainWorkbench','evidencePanel','reviewPanel','actionPanel','postProcessPanel','learningPanel'];

/* AAP 아키텍처 레이어 (도메인 무관) */
const ARCH = {
  bands:[
    {key:'custenv', name:'Customer Environment', sub:'Mail · Calendar · Docs · CRM · Org', tip:''},
    {key:'service', name:'Service Experience',   sub:'Meeting Console · Review Workspace', tip:''},
  ],
  core:[ /* AAP Core Runtime 내부 노드 (2D 클러스터) */
    {key:'data',     n:'Data & Inputs',        d:'맥락 수집·연동', tip:'Context Package'},
    {key:'semantic', n:'Business Semantic',     d:'업무 사건 구조화', tip:'Meeting Event'},
    {key:'agent',    n:'Agent Core',            d:'작업 분해·조율', tip:'Supervisor'},
    {key:'coord',    n:'Coordination / Policy', d:'자동/검토/제한 분류', tip:''},
    {key:'hitl',     n:'HITL / Governance',     d:'책임 지점 승인·기록', tip:'HITL'},
  ],
  lower:[
    {key:'action',   name:'Enterprise Integration & Action', sub:'Calendar · Mail · Docs · Workflow', tip:'Writeback'},
    {key:'learning', name:'Operational Learning',            sub:'Decision Log · Action Log · Skill', tip:'Skill Update'},
  ]
};

const TOOLTIPS = {
  'Meeting Event':'사용자의 모호한 요청을 회의 목적·필요 산출물·정책 조건이 포함된 업무 사건으로 구조화한 객체',
  'Context Package':'메일·문서·캘린더·조직도 등에서 수집한 업무 맥락 묶음',
  'Candidate Set':'참석자·일정·자료·안건처럼 실행 전 생성된 후보 집합',
  'Execution Package':'실행 직전의 회의 준비 패키지. 참석자·일정·자료·안건·승인 항목을 포함',
  'HITL':'책임이 따르는 수렴점에서 사람이 확정·승인하는 구조',
  'Writeback':'AI 결과를 캘린더·메일·문서함·업무 시스템에 실제 반영하는 것',
  'Run Trace':'입력·조회·Agent 작업·정책 판단·승인·실행·학습까지 재생 가능한 이력',
  'Skill Update':'반복 가능한 업무 처리 패턴을 다음 실행에 재사용할 수 있도록 저장하는 것',
  'Supervisor':'업무 사건을 여러 Agent Task로 나누고 결과를 조율하는 제어자',
  'Business Semantic':'업무 용어·절차·역할·정책을 Agent가 이해 가능한 구조로 바꾸는 계층',
  'Agent Core':'업무 사건을 하위 작업으로 분해하고 Agent와 Tool을 조율하는 실행환경',
};

/* =========================================================================
   DOMAIN PACK  — meeting만 완성, 나머지는 placeholder
   ========================================================================= */
const DOMAIN_PACKS = {
  meeting: buildMeetingPack(),
  claim:   {_placeholder:true, name:'손해사정', mapNote:'Meeting Event→Claim Event · 참석자→청구자/의료기관 · 자료→약관/진단서 · 안건→심사 쟁점 · 회의록→심사 의견 · 액션→서류요청/지급/보류'},
  control: {_placeholder:true, name:'내부통제'},
  voc:     {_placeholder:true, name:'VOC 대응'},
  quality: {_placeholder:true, name:'제조 품질'},
};
let activeDomain='meeting';

function buildMeetingPack(){
  const meta={console:'Meeting Operations Console', customer:'대한제조그룹', type:'Kickoff Meeting', owner:'홍길동'};
  const request='"다음 주 AAP 고객사 킥오프 회의 잡아줘. 관련 부서 사람들 넣고, 지난번 제안 자료랑 회의록도 같이 정리해줘."';
  const meetingEvent={h:'Meeting Event · AAP 고객사 킥오프 회의', b:'목적 · 착수 범위·역할(R&R)·일정·보안 조건 정렬'};
  const railLabels=['요청 접수','의도 분석','맥락 수집','후보 생성','조율','승인','시스템 실행','사후 처리','학습'];
  const evidence=[{k:'minutes',l:'이전 미팅 회의록'},{k:'proposal',l:'AAP 제안 자료'},{k:'qa',l:'고객 Q&A'},{k:'mail',l:'관련 메일'},{k:'org',l:'조직도'},{k:'cal',l:'캘린더'}];

  const WB={
    s0:`<div class="wb-title">요청 접수</div>
      <div class="wb-sec"><div class="wb-l">사용자 요청</div><div class="wb-row">${request}</div></div>

/* ===== state ===== */
let cur=0, logTab='event';
(function(){const q=new URLSearchParams(location.search);const s=parseInt(q.get('step'),10);
  const n=DOMAIN_PACKS[activeDomain].steps.length; if(!isNaN(s)&&s>=0&&s<n)cur=s;})();
function P(){return DOMAIN_PACKS[activeDomain];}
function goNext(){if(cur<P().steps.length-1){cur++;render();}}
function goPrev(){if(cur>0){cur--;render();}}

/* ===== render ===== */
function renderStepBar(){
  const el=document.getElementById('stepbar');el.innerHTML='';
  P().steps.forEach((s,i)=>{
    if(i>0){const ln=document.createElement('div');ln.className='sb-line'+(i<=cur?' done':'');el.appendChild(ln);}
    const it=document.createElement('div');it.className='sb-item '+(i===cur?'active':(i<cur?'done':''));
    it.innerHTML=`<span class="dot">${i+1}</span><span>${RUNTIME_STAGES[i]}</span>`;
    it.onclick=()=>{cur=i;render();};el.appendChild(it);
  });
  const nav=document.createElement('div');nav.className='sb-nav';
  nav.innerHTML=`<button class="btn" id="pv">◀ 이전</button><button class="btn primary" id="nx">다음 ▶</button>`;
  el.appendChild(nav);
  document.getElementById('pv').onclick=goPrev;document.getElementById('nx').onclick=goNext;
  document.getElementById('pv').disabled=cur===0;document.getElementById('nx').disabled=cur===P().steps.length-1;
}

function renderConsole(){
  const p=P(), st=p.steps[cur], m=p.meta;
  document.getElementById('cbar').innerHTML=
    `<span class="cnm">${m.console}</span>
     <span class="cmeta">고객사 ${m.customer} · ${m.type}</span>
     <span class="csp"></span>
     <span class="cstat ${st.statusCls}">${st.status}</span>
     <span class="cowner">담당 ${m.owner}</span>`;
  // event header
  let eh=`<div class="req-l">사용자 요청</div><div class="req-t">${p.request}</div>`;
  if(st.me || cur>=1){ eh+=`<div class="me"><div class="me-h" data-tip="Meeting Event">${p.meetingEvent.h}</div><div class="me-b">${p.meetingEvent.b}</div></div>`; }
  document.getElementById('evh').innerHTML=eh;
  // process rail
  const pr=document.getElementById('prail');pr.innerHTML='';
  p.railLabels.forEach((lb,i)=>{
    if(i>0){const sep=document.createElement('div');sep.className='pr-sep';pr.appendChild(sep);}
    const s=document.createElement('div');s.className='pr-step '+(i===cur?'active':(i<cur?'done':''));
    s.innerHTML=`<span class="pd"></span>${lb}`;pr.appendChild(s);
  });
  // workbench
  document.getElementById('workbench').innerHTML=st.wb;
  // side: evidence + review + action
  const ev=p.evidence.map(e=>`<div class="ev-item ${st.evHot.includes(e.k)?'hot':''}"><span class="ed"></span>${e.l}</div>`).join('');
  const rev = st.review==='idle'
    ? `<div class="ri-item idle">아직 검토 항목 없음</div>`
    : `<div class="ri-item rev">참석자 확정</div><div class="ri-item rev">외부 고객 초대</div><div class="ri-item rev">자료 공유 승인</div><div class="ri-item rev">초대 메일 문구</div>`;
  const actMap={idle:`<div class="ri-item idle">실행 준비 전</div>`,
    pending:`<div class="ri-item act" style="opacity:.6">캘린더 등록 (대기)</div><div class="ri-item act" style="opacity:.6">회의실 예약 (대기)</div><div class="ri-item act" style="opacity:.6">자료 폴더·메일 초안 (대기)</div>`,
    done:`<div class="ri-item act">캘린더 등록 ✓</div><div class="ri-item act">회의실 예약 ✓</div><div class="ri-item act">자료 폴더·메일 초안 ✓</div>`};
  document.getElementById('side').innerHTML=
    `<div class="spanel ${st.evHot.length?'':'sp-dim'}"><div class="sp-h">Evidence / Source</div>${ev}</div>
     <div class="spanel ${st.review==='pending'?'':'sp-dim'}"><div class="sp-h">Review Required</div>${rev}</div>
     <div class="spanel ${st.action==='done'||st.action==='pending'?'':'sp-dim'}"><div class="sp-h">Action</div>${actMap[st.action]||actMap.idle}</div>`;
}

function renderArch(){
  const st=P().steps[cur];
  const act=new Set(st.active), edges=new Set(st.edges||[]);
  const done=new Set(); for(let i=0;i<cur;i++) P().steps[i].active.forEach(k=>done.add(k));
  const cls=k=>act.has(k)?'active':(done.has(k)?'done':'idle');
  const vedge=on=>`<div class="vedge${on?' on':''}"></div>`;
  // upper bands
  let html='';
  html+=band(ARCH.bands[0],cls('custenv'));
  html+=vedge(act.has('service')||done.has('service')||act.has('data')||done.has('data'));
  html+=band(ARCH.bands[1],cls('service'));
  html+=vedge(true);
  // core
  const cn=(k)=>{
    const c=ARCH.core.find(x=>x.key===k);
    let sub=''; if(act.has(k)&&st.sub[k]) sub=`<div class="cn-sub">${st.sub[k].map(s=>`<span class="sc"${TOOLTIPS[s]?` data-tip="${s}"`:''}>${s}</span>`).join('')}</div>`;
    return `<div class="cnode ${cls(k)}${k==='agent'||k==='hitl'?' span':''}"><div class="cn-n"${c.tip?` data-tip="${c.tip}"`:''}>${c.n}</div><div class="cn-d">${c.d}</div>${sub}</div>`;
  };
  html+=`<div class="core"><div class="core-t">AAP Core Runtime</div>
      <div class="core-grid">${cn('data')}${cn('semantic')}</div>
      <div class="cmini">▼ 입력·의미 → 분해</div>
      <div class="core-grid">${cn('agent')}</div>
      <div class="cmini">▼ 조율 → 통제</div>
      <div class="core-grid">${cn('coord')}</div>
      ${cn('hitl')}</div>`;
  html+=vedge(act.has('action')||done.has('action'));
  html+=band(ARCH.lower[0],cls('action'));
  html+=vedge(act.has('learning')||done.has('learning'));
  html+=band(ARCH.lower[1],cls('learning'));
  // trust band
  const tcls = act.has('trust')?'active':'';
  html+=`<div class="trustband ${tcls}"><div class="tb-h">Trust / Security / Governance Foundation</div><div class="tb-s">권한 · PII · 감사 · 설명가능성 · Private Runtime</div></div>`;
  // loop rail
  html=`<div class="looprail ${st.loop?'on':''}"><span class="lr-lbl">Operating Loop · 학습→의미화</span></div>`+html;
  document.getElementById('arch').innerHTML=html;
  // focus button
  if(st.focus){ const b=document.createElement('div'); b.style.marginTop='12px';
    b.innerHTML=`<button class="btn sm" id="focusBtn">⊕ 이 단계 자세히 보기</button>`;
    document.getElementById('arch').appendChild(b);
    document.getElementById('focusBtn').onclick=()=>openFocus(st.focus);
  }
}
function band(b,cls){return `<div class="aband ${cls}"><div class="ab-h"><span class="ad"></span><span${b.tip?` data-tip="${b.tip}"`:''}>${b.name}</span></div><div class="ab-sub">${b.sub}</div></div>`;}

function openFocus(f){
  document.getElementById('modalBox').innerHTML=`
    <span class="mclose" onclick="document.getElementById('modal').style.display='none'">×</span>
    <h4>${f.title}</h4>
    <div class="mlbl">무엇이 생성되었나</div><div class="mval">${f.created}</div>
    <div class="mlbl">어떤 입력을 사용했나</div><div class="mval">${f.input}</div>
    <div class="mlbl">어떤 AAP 요소가 작동했나</div><div class="mval">${f.aap}</div>
    <div class="mlbl">왜 이 판단이 필요한가</div><div class="mmean">${f.meaning}</div>`;
  document.getElementById('modal').style.display='flex';
}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')e.currentTarget.style.display='none';};

function renderLogs(){

    const t=document.createElement('div');t.className='ltab'+(logTab===k?' active':'');t.textContent=label;
    t.onclick=()=>{logTab=k;renderLogs();};top.appendChild(t);
  });
  let lines=[];
  for(let i=0;i<=cur;i++) (P().steps[i].logs[logTab]||[]).forEach(([msg])=>lines.push({s:i,msg}));
  const body=document.getElementById('logBody');
  body.innerHTML=lines.length?lines.map(l=>`<div class="logline"><span class="sg">S${l.s+1}</span><span class="tg">[${logTab}]</span> ${l.msg}</div>`).join(''):'<div class="logline" style="color:#475569">— 표시할 로그 없음 —</div>';
  body.scrollTop=body.scrollHeight;
}

function render(){ renderStepBar(); renderConsole(); renderArch(); renderLogs(); }

/* tooltip */
const tip=document.getElementById('tip');
function showTip(t){const k=t.getAttribute('data-tip');const txt=TOOLTIPS[k];if(!txt)return;
  tip.textContent=txt;tip.style.display='block';const r=t.getBoundingClientRect();
  tip.style.left=Math.min(r.left,window.innerWidth-280)+'px';let top=r.bottom+8;tip.style.top=top+'px';
  if(top+tip.offsetHeight>window.innerHeight)tip.style.top=(r.top-tip.offsetHeight-8)+'px';}
document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]');if(t)showTip(t);});
document.addEventListener('mouseout',e=>{if(e.target.closest('[data-tip]'))tip.style.display='none';});
document.addEventListener('click',e=>{const t=e.target.closest('[data-tip]');if(t)showTip(t);});

document.getElementById('stdToggle').onchange=e=>document.body.classList.toggle('show-std',e.target.checked);
document.getElementById('dpkSel').onchange=e=>{activeDomain=e.target.value;cur=0;render();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev();if(e.key==='Escape')document.getElementById('modal').style.display='none';});

render();
(function(){const q=new URLSearchParams(location.search);if(q.get('focus')==='1'){const f=P().steps[cur].focus;if(f)openFocus(f);}})();
</script>
</body>
