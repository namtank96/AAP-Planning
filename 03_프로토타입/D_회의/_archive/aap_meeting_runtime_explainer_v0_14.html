<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 회의 업무 작동 원리 (v0.14)</title>
<style>
  :root{
    --bg:#f4f7fb; --surf:#f8fafc; --surface:#ffffff; --ink:#0f172a; --slate:#334155; --muted:#64748b; --border:#e2e8f0; --line:#eef2f7;
    --aap:#0d9488; --aap-ink:#0f766e; --aap-soft:#f0fdfa; --aap-border:#99f6e4;
    --violet:#7c3aed; --violet-soft:#f5f3ff; --violet-border:#ddd6fe;
    --amber:#d97706; --amber-soft:#fffbeb; --amber-ink:#92400e; --amber-border:#fde68a;
    --green:#16a34a; --green-soft:#f0fdf4; --red:#dc2626;
    --shadow:0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Pretendard","Inter","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-rows:1fr auto;height:100vh;overflow:hidden;}
  .internal{display:none;} body.dev-on .internal{display:block;}
  .main{display:grid;grid-template-columns:52% 48%;gap:13px;padding:13px;overflow:hidden;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:15px;box-shadow:var(--shadow);overflow:auto;}
  .panel.left{padding:0;display:flex;flex-direction:column;}
  .panel.right{padding:12px 13px;}
  .ph{font-weight:800;font-size:13px;display:flex;align-items:center;gap:7px;}
  .help{width:15px;height:15px;border-radius:50%;border:1px solid var(--border);color:var(--muted);font-size:9.5px;display:inline-flex;align-items:center;justify-content:center;cursor:help;}

  /* ===== LEFT : drilldown (prev/cur/next) ===== */
  .dd{padding:12px 14px 8px;border-bottom:1px solid var(--line);}
  .dd-h{font-size:9.5px;color:#9ca3af;font-weight:800;letter-spacing:.03em;margin:7px 0 4px;}
  .ddr{display:flex;align-items:center;gap:8px;padding:5px 9px;border-radius:9px;font-size:12px;color:#94a3b8;cursor:pointer;}
  .ddr .n{width:18px;height:18px;border-radius:5px;background:#eef2f7;color:#94a3b8;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .ddr.done{color:#64748b;} .ddr.done .n{background:var(--aap-soft);color:var(--aap);}
  .ddr.cur{background:var(--aap-soft);border:1px solid var(--aap-border);padding:9px 11px;cursor:default;}
  .ddr.cur .n{width:26px;height:26px;border-radius:7px;background:var(--aap);color:#fff;font-size:12px;}
  .ddr.cur .lb{font-size:15px;font-weight:800;color:var(--ink);}
  .ddr .lb{font-size:12px;}
  .ddr.cur .st{margin-left:auto;font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;background:#fff;color:var(--aap);border:1px solid var(--aap-border);}
  .ddr.cur .st.warn{color:var(--amber);border-color:var(--amber-border);background:var(--amber-soft);}
  .ddr.cur .st.done{color:var(--green);}
  .dd-desc{font-size:11.5px;color:var(--muted);margin:5px 2px 2px;}

  /* ===== LEFT : customer console (interactive) ===== */
  .cons-wrap{flex:1;padding:13px 14px;overflow:auto;display:flex;flex-direction:column;}
  .cons-h{font-size:9.5px;color:#9ca3af;font-weight:800;letter-spacing:.03em;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .cons-h .repl{margin-left:auto;font-size:10.5px;color:var(--aap);cursor:pointer;font-weight:700;}
  .console{position:relative;flex:1;border:1px solid var(--border);border-radius:13px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.04);overflow:hidden;display:flex;flex-direction:column;min-height:300px;}
  .con-bar{background:var(--ink);color:#e2e8f0;font-size:10.5px;padding:7px 12px;display:flex;align-items:center;gap:8px;flex:0 0 auto;}
  .con-bar .dot{width:7px;height:7px;border-radius:50%;background:#475569;} .con-bar b{color:#fff;}
  .con-body{flex:1;padding:14px 15px;display:flex;flex-direction:column;}
  .scr-title{font-size:13px;font-weight:800;margin-bottom:3px;}
  .scr-hint{font-size:11.5px;color:var(--muted);margin-bottom:11px;}
  .scr-fill{flex:1;}
  .crow{border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:6px;font-size:12px;background:#fff;}
  .crow.warn{border-color:var(--amber-border);background:var(--amber-soft);color:var(--amber-ink);}
  .crow.ok{border-color:#bbf7d0;background:var(--green-soft);}
  .crow.red{border-color:#fecaca;background:#fef2f2;color:#b91c1c;}
  .crow b{font-weight:800;}
  .reqbox{border:1px solid var(--border);border-radius:10px;background:var(--surf);padding:10px 12px;font-size:12.5px;}
  .run-area{flex:0 0 auto;border-top:1px dashed var(--border);margin-top:8px;padding-top:11px;display:flex;align-items:center;gap:10px;min-height:64px;}
  .run-btn{font-size:12.5px;font-weight:800;padding:9px 16px;border-radius:10px;background:var(--aap);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(13,148,136,.28);transition:transform .12s;}
  .run-btn.press{transform:scale(.94);}
  .loading{display:flex;align-items:center;gap:11px;}
  .spinner{width:30px;height:30px;border-radius:50%;border:4px solid var(--aap-soft);border-top-color:var(--aap);animation:spin .8s linear infinite;flex:0 0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .load-tx b{font-size:12.5px;color:var(--aap-ink);} .load-tx span{display:block;font-size:10px;color:var(--muted);}
  .done-tag{font-size:11px;font-weight:800;color:var(--green);background:var(--green-soft);border:1px solid #bbf7d0;border-radius:20px;padding:3px 10px;}
  .mcursor{position:absolute;z-index:8;width:20px;height:20px;pointer-events:none;transition:left .5s cubic-bezier(.4,0,.2,1),top .5s cubic-bezier(.4,0,.2,1);opacity:0;}
  .mcursor.show{opacity:1;}
  .mcursor.click::after{content:"";position:absolute;inset:-6px;border:2px solid var(--aap);border-radius:50%;animation:ripple .5s ease-out;}
  @keyframes ripple{from{transform:scale(.4);opacity:.8;}to{transform:scale(1.5);opacity:0;}}
  .opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:9px;margin-bottom:5px;font-size:12px;}
  .opt .ck{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--aap);background:var(--aap);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt .ck.off{background:#fff;color:transparent;border-color:#cbd5e1;} .opt small{color:var(--muted);margin-left:auto;}

  /* detail tabs */
  .dtabs{flex:0 0 auto;border-top:1px solid var(--line);padding:9px 14px;}
  .dtab-row{display:flex;gap:5px;flex-wrap:wrap;}
  .dtab{font-size:10.5px;font-weight:700;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:#475569;cursor:pointer;}
  .dtab.on{border-color:var(--aap);background:var(--aap-soft);color:var(--aap-ink);}
  .dtab-body{margin-top:7px;font-size:11.5px;color:var(--slate);border:1px solid var(--border);border-radius:9px;background:var(--surf);padding:8px 10px;}
  .dtab-body.need{border-color:var(--amber-border);background:var(--amber-soft);color:var(--amber-ink);}
  .dtab-body .di{display:none;color:#64748b;font-family:Consolas,monospace;font-size:10.5px;margin-top:5px;border-top:1px dashed var(--border);padding-top:5px;}
  body.dev-on .dtab-body .di{display:block;}

  /* ===== RIGHT : operating sequence within 8-layer frame ===== */
  .lstrip{display:flex;align-items:center;gap:5px;flex-wrap:wrap;border:1px solid var(--border);border-radius:10px;background:var(--surf);padding:6px 9px;margin:9px 0 4px;}
  .lstrip .ll{font-size:8.5px;color:#9ca3af;font-weight:800;margin-right:3px;}
  .lchip{font-size:9.5px;font-weight:800;color:#94a3b8;background:#fff;border:1px solid var(--border);border-radius:6px;padding:3px 8px;line-height:1.1;text-align:center;}
  .lchip small{display:block;font-size:7px;font-weight:700;color:#cbd5e1;}
  .lchip.on{color:var(--aap-ink);border-color:var(--aap);background:var(--aap-soft);} .lchip.on small{color:var(--aap);}
  .lchip.ds.on{color:var(--violet);border-color:var(--violet);background:var(--violet-soft);} .lchip.ds.on small{color:var(--violet);}
  .loopstrip{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-bottom:9px;font-size:9px;color:#94a3b8;}
  .lps{font-weight:800;border:1px solid var(--border);border-radius:6px;padding:2px 7px;opacity:.5;}
  .lps.on{opacity:1;color:var(--aap-ink);border-color:var(--aap);background:var(--aap-soft);}
  .lpa{color:#cbd5e1;font-weight:900;}

  .flow{display:flex;flex-direction:column;align-items:stretch;}
  .op{border:1px solid var(--border);border-radius:11px;background:#fff;padding:8px 11px;position:relative;opacity:.32;transition:.3s;}
  .op.lit{opacity:1;border-color:var(--aap);box-shadow:0 4px 14px rgba(13,148,136,.12);}
  .op.lit.ds{border-color:var(--violet);box-shadow:0 4px 14px rgba(124,58,237,.12);}
  .op-h{display:flex;align-items:center;gap:8px;}
  .op-seq{width:19px;height:19px;border-radius:50%;background:#e2e8f0;color:#94a3b8;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .op.lit .op-seq{background:var(--aap);color:#fff;} .op.lit.ds .op-seq{background:var(--violet);}
  .op-lay{font-size:8px;font-weight:800;color:#94a3b8;background:var(--surf);border:1px solid var(--border);border-radius:5px;padding:1px 6px;}
  .op.lit .op-lay{color:var(--aap-ink);border-color:var(--aap-border);} .op.lit.ds .op-lay{color:var(--violet);border-color:var(--violet-border);}
  .op-t{font-size:11.5px;font-weight:800;color:var(--slate);}
  .op.lit .op-t{color:var(--ink);}
  .op-d{font-size:11px;color:var(--muted);margin:2px 0 0 27px;}
  .op.lit .op-d{color:var(--slate);}
  .op-micro{margin:5px 0 0 27px;display:flex;flex-wrap:wrap;gap:4px;}
  .mc{font-size:9px;font-weight:700;color:var(--aap-ink);background:var(--aap-soft);border:1px solid var(--aap-border);border-radius:5px;padding:2px 6px;}
  .op-badge{font-size:7px;font-weight:900;color:#fff;background:var(--violet);border-radius:4px;padding:1px 5px;margin-left:5px;}
  .op-arrow{text-align:center;color:#cbd5e1;font-size:11px;line-height:1;margin:2px 0;transition:.3s;}
  .op-arrow.on{color:var(--aap);}
  .trustline{margin-top:9px;border:1px dashed #cbd5e1;border-radius:9px;background:var(--surf);padding:6px 11px;font-size:10px;color:var(--muted);text-align:center;}
  .trustline.on{border-color:#1e293b;background:#1e293b;color:#cbd5e1;}

  .bot{background:#fff;border-top:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:12px;}
  .bot .bstep{font-size:12px;color:var(--muted);} .bot .bstep b{color:var(--ink);}
  .bot .spacer{flex:1;}
  .btn{font-size:12px;padding:7px 13px;border:1px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;color:var(--ink);}
  .btn.primary{background:var(--aap);color:#fff;border-color:var(--aap);} .btn.sm{padding:5px 10px;font-size:11px;}
  .tg{font-size:11.5px;color:#475569;display:flex;align-items:center;gap:5px;cursor:pointer;}
  [data-tip]{cursor:help;}
  #tip{position:fixed;z-index:60;max-width:280px;background:var(--ink);color:#f1f5f9;font-size:11px;line-height:1.5;padding:8px 11px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;pointer-events:none;}
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <section class="panel left">
      <div class="dd"><div class="ph">회의 업무 드릴다운 <span class="help" data-tip="회의 업무가 AAP 안에서 나뉘는 세부 업무. 선행·후행이 함께 보입니다.">?</span></div><div id="ddFlow"></div></div>
      <div class="cons-wrap">
        <div class="cons-h">고객 화면 <span class="repl" id="replay">↻ 다시 보기</span></div>
        <div class="console"><div class="con-bar"><span class="dot"></span><b>회의 업무 지원</b> · 대한제조그룹 · 홍길동</div><div class="con-body" id="conBody"></div><div class="mcursor" id="mcursor"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M4 2l6.5 17 2.3-6.7 6.7-2.3z" fill="#0f172a" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/></svg></div></div>
      </div>
      <div class="dtabs"><div class="dtab-row" id="dtabs"></div><div class="dtab-body" id="dtabBody"></div></div>
    </section>

    <section class="panel right">
      <div class="ph">AAP 작동 구조 <span class="help" data-tip="고객이 화면에서 행동하는 순간, AAP 8계층 안에서 어떤 세부 동작이 순서대로 일어나는지 보여줍니다.">?</span></div>
      <div class="lstrip" id="lstrip"></div>
      <div class="loopstrip" id="loopstrip"></div>
      <div class="flow" id="flow"></div>
      <div class="trustline" id="trustline"></div>
    </section>
  </div>
  <div class="bot"><div class="bstep" id="bstep"></div><div class="spacer"></div><label class="tg"><input type="checkbox" id="devToggle"> 개발자 보기</label><button class="btn primary" id="playBtn">처리 흐름 보기</button></div>
</div>
<div id="tip"></div>

<script>
const LAYERS=[['L1','경험·접근'],['L2','설계·개발'],['L3','에이전트 코어'],['L4','지식·시맨틱'],['L5','데이터·연동'],['L6','AI 품질·평가'],['L7','컨트롤·거버넌스'],['L8','인프라']];
const DS_LAYERS=['L4','L7'];
const LOOP=['Data','Semantic','Reasoning','Decision','Action','Learning'];

/* op: {L, t(컴포넌트), d(작동), micro?, ds?} — 실행 순서대로 */
const WORK=[
 {id:'request',label:'요청 확인',st:'확인',sc:'',desc:'한 줄 요청에서 회의 준비가 시작됩니다. 바로 예약하지 않고 부족한 정보부터 확인합니다.',
  scr:{title:'회의 요청',hint:'AI 업무 포털에 회의를 요청합니다.',
   fill:`<div class="reqbox">다음 주 AAP 고객사 킥오프 회의 잡아줘. 관련 부서 사람들 넣고, 지난번 제안 자료랑 회의록도 같이 정리해줘.</div>`,
   btn:'보내기',loading:'요청을 이해하는 중…',
   done:`<div class="crow"><b>킥오프 회의 준비</b> 요청으로 접수</div><div class="crow warn">부족 · 참석자 · 일시 · 공유 자료 승인</div>`},
  loop:['Data'],trust:'사용자 권한 확인',
  ops:[{L:'L1',t:'코파일럿 / 챗 UI',d:'AI 포털에서 회의 요청 수신'}],
  in:'사용자 요청 한 줄',out:'회의 준비 업무 시작',review:'요청 의도 보완 필요 여부',wb:'없음',dev:'Raw Request'},
 {id:'intent',label:'업무 이해',st:'확인',sc:'',desc:'요청을 킥오프 회의 준비 업무로 정리합니다. 목적·산출물·확인 항목이 함께 잡힙니다.',
  scr:{title:'회의 업무 이해',hint:'AAP가 요청을 어떤 업무로 이해했는지 확인합니다.',
   fill:`<div class="reqbox" style="color:#64748b">"다음 주 AAP 고객사 킥오프 회의…"</div>`,
   btn:'회의 이해 실행',loading:'회의 유형 분류 중…',
   done:`<div class="crow"><b>킥오프 회의 준비</b> · 목적 정렬</div><div class="crow warn">확인 필요 · 외부 초대 · 자료 공유</div>`},
  loop:['Semantic'],trust:'외부 공유 정책 적용',
  ops:[{L:'L4',ds:1,t:'온톨로지·시맨틱 모델',d:'킥오프 회의 의미화'},{L:'L4',ds:1,t:'컨텍스트 조합·근거',d:'목적·산출물 근거 구성'},{L:'L7',ds:1,t:'정책 관리·통제',d:'외부 공유 정책 플래그'}],
  in:'사용자 요청·이전 미팅',out:'킥오프 회의 준비 업무·목적·산출물',review:'외부 고객 포함·자료 공유 여부',wb:'회의 준비안',dev:'Meeting Event'},
 {id:'materials',label:'자료 확인',st:'준비',sc:'',desc:'메일·문서함·조직도에서 회의 준비에 필요한 근거를 모읍니다.',
  scr:{title:'관련 자료',hint:'회의 준비에 필요한 자료를 모읍니다.',fill:`<div class="crow" style="color:#94a3b8">아직 자료가 연결되지 않았습니다.</div>`,
   btn:'관련 자료 찾기',loading:'관련 자료 수집 중…',
   done:`<div class="crow">메일 14 · 이전 회의록 1 · 문서 6</div><div class="crow">고객 Q&A 1 · 관련 부서 후보 5</div>`},
  loop:['Data','Semantic'],trust:'접근 권한 확인',
  ops:[{L:'L5',t:'연결·수집',d:'메일·문서·조직도 수집',micro:['DB·API 커넥터','OCR 디지털화'],badge:'AI:ON-U'},{L:'L5',t:'데이터 처리',d:'정제·정규화'},{L:'L4',ds:1,t:'도메인 지식그래프',d:'관련 자료 연결'},{L:'L4',ds:1,t:'컨텍스트 조합',d:'근거 묶음 구성'}],
  in:'메일·문서함·조직도',out:'관련 자료 묶음·근거 목록·공유 제한 후보',review:'외부 공유 가능 자료·마스킹',wb:'자료 폴더·첨부 후보',dev:'Context Package'},
 {id:'parts',label:'참석자 구성',st:'준비',sc:'',desc:'조직도·이전 참여자·메일 참여자를 바탕으로 참석자 후보를 준비합니다.',
  scr:{title:'참석자',hint:'참석자가 비어 있습니다. AAP에게 추천을 요청합니다.',fill:`<div class="crow" style="color:#94a3b8">참석자 미정</div>`,
   btn:'AAP에게 참석자 추천',loading:'참석자를 분석 중…',

const idxOf=id=>WORK.findIndex(w=>w.id===id);
const W=id=>WORK.find(w=>w.id===id);
const LK=id=>{const l=LAYERS.find(x=>x[0]===id);return l?l[1]:id;};

const STATE={sel:'request', tab:'out', playing:false};
const RUN={phase:'idle', reveal:0, timers:[], playTimer:null};
function clearRun(){RUN.timers.forEach(clearTimeout);RUN.timers=[];}

/* ===== drilldown (prev/cur/next) ===== */
function renderDrill(){
  const ci=idxOf(STATE.sel);let h='';
  const row=(w,i,cls)=>`<div class="ddr ${cls}" data-go="${w.id}"><span class="n">${i+1}</span><span class="lb">${w.label}</span>${cls==='cur'?`<span class="st ${w.sc}">${w.st}</span>`:''}</div>`;
  if(ci>1)h+=`<div class="dd-h">선행</div>`+row(WORK[ci-2],ci-2,'done');
  if(ci>0)h+=(ci>1?'':`<div class="dd-h">선행</div>`)+row(WORK[ci-1],ci-1,'done');
  h+=`<div class="dd-h">현재</div>`+row(WORK[ci],ci,'cur')+`<div class="dd-desc">${WORK[ci].desc}</div>`;
  if(ci<WORK.length-1)h+=`<div class="dd-h">후행</div>`+row(WORK[ci+1],ci+1,'');
  if(ci<WORK.length-2)h+=row(WORK[ci+2],ci+2,'');
  document.getElementById('ddFlow').innerHTML=h;
  document.querySelectorAll('.ddr[data-go]').forEach(e=>{if(!e.classList.contains('cur'))e.onclick=()=>setSel(e.getAttribute('data-go'));});
}

/* ===== customer console (interactive run) ===== */
function renderConsole(){
  const w=W(STATE.sel),s=w.scr;let body='';
  body=`<div class="scr-title">${s.title}</div><div class="scr-hint">${s.hint}</div><div class="scr-fill" id="scrFill">`;
  if(RUN.phase==='done') body+=s.done; else body+=s.fill;
  body+=`</div><div class="run-area" id="runArea">`;
  if(RUN.phase==='before'||RUN.phase==='click'){ body+=`<button class="run-btn ${RUN.phase==='click'?'press':''}" id="runBtn">${s.btn}</button><span style="font-size:11px;color:#94a3b8">버튼을 누르면 AAP가 처리합니다</span>`; }
  else if(RUN.phase==='loading'){ body+=`<div class="loading"><div class="spinner"></div><div class="load-tx"><b>${s.loading}</b><span>검증된 Agent가 처리하고 있습니다</span></div></div>`; }
  else if(RUN.phase==='done'){ body+=`<span class="done-tag">✓ 완료</span><span style="font-size:11px;color:#94a3b8">우측에서 내부 작동 순서를 확인하세요</span>`; }
  body+=`</div>`;
  document.getElementById('conBody').innerHTML=body;
  const mc=document.getElementById('mcursor');
  if(RUN.phase==='before'||RUN.phase==='click'){
    const btn=document.getElementById('runBtn'),con=document.querySelector('.console');
    if(btn&&con){const br=btn.getBoundingClientRect(),cr=con.getBoundingClientRect();
      mc.classList.add('show');mc.classList.toggle('click',RUN.phase==='click');
      mc.style.left=(br.left-cr.left+br.width*0.7)+'px';mc.style.top=(br.top-cr.top+br.height*0.5)+'px';}
  } else mc.classList.remove('show','click');
}

/* ===== right : 8-layer strip + operating sequence ===== */
function renderRight(){
  const w=W(STATE.sel);const active=new Set(w.ops.map(o=>o.L));
  document.getElementById('lstrip').innerHTML=`<span class="ll">8계층</span>`+LAYERS.map(([id,ko])=>`<span class="lchip ${DS_LAYERS.includes(id)?'ds':''} ${active.has(id)?'on':''}">${id}<small>${ko}</small></span>`).join('');
  document.getElementById('loopstrip').innerHTML=`<span class="ll" style="margin-right:4px">추론 루프</span>`+LOOP.map((s,k)=>`<span class="lps ${w.loop.includes(s)?'on':''}">${s}</span>`+(k<LOOP.length-1?'<span class="lpa">▶</span>':'')).join('');
  let h='';
  w.ops.forEach((o,i)=>{
    const lit=i<RUN.reveal;
    if(i>0)h+=`<div class="op-arrow ${i<RUN.reveal?'on':''}">▼</div>`;
    const micro=o.micro?`<div class="op-micro">${o.micro.map(m=>`<span class="mc">${m}</span>`).join('')}</div>`:'';
    const badge=o.badge?`<span class="op-badge">${o.badge}</span>`:'';
    h+=`<div class="op ${lit?'lit':''} ${o.ds?'ds':''}"><div class="op-h"><span class="op-seq">${i+1}</span><span class="op-lay">${o.L} ${LK(o.L)}</span><span class="op-t">${o.t}</span>${badge}</div><div class="op-d">${o.d}</div>${lit?micro:''}</div>`;
  });
  document.getElementById('flow').innerHTML=h;
  const tl=document.getElementById('trustline');tl.className='trustline'+(RUN.reveal>0?' on':'');tl.textContent='Trust 횡단 · '+w.trust;
}

  document.getElementById('dtabs').innerHTML=t.map(([k,l])=>`<button class="dtab ${STATE.tab===k?'on':''}" data-tab="${k}">${l}</button>`).join('');
  document.querySelectorAll('.dtab').forEach(b=>b.onclick=()=>{STATE.tab=b.getAttribute('data-tab');renderTabs();});
  const v={in:w.in,out:w.out,review:w.review,wb:w.wb}[STATE.tab];const need=STATE.tab==='review'&&v&&v!=='없음';
  document.getElementById('dtabBody').className='dtab-body'+(need?' need':'');
  document.getElementById('dtabBody').innerHTML=`${v}<div class="di">내부 처리 · ${w.dev}</div>`;
}
function renderBot(){const i=idxOf(STATE.sel);document.getElementById('bstep').innerHTML=`현재 단계 <b>${String(i+1).padStart(2,'0')} / 12</b> · ${W(STATE.sel).label}`;}

/* ===== run scenario ===== */
function runStep(){
  clearRun();RUN.phase='before';RUN.reveal=0;renderConsole();renderRight();
  RUN.timers.push(setTimeout(()=>{RUN.phase='click';renderConsole();},750));
  RUN.timers.push(setTimeout(()=>{RUN.phase='loading';renderConsole();revealOps();},1150));
}
function revealOps(){
  const n=W(STATE.sel).ops.length;
  for(let i=0;i<n;i++)RUN.timers.push(setTimeout(()=>{RUN.reveal=i+1;renderRight();},i*420));
  RUN.timers.push(setTimeout(()=>{RUN.phase='done';RUN.reveal=n;renderConsole();renderRight();
    if(STATE.playing)RUN.playTimer=setTimeout(playNext,1400);},n*420+350));
}
function setSel(id,noRun){STATE.sel=id;renderDrill();renderTabs();renderBot();if(noRun){RUN.phase='done';RUN.reveal=W(id).ops.length;renderConsole();renderRight();}else runStep();}

/* play-through all */
function startPlay(){STATE.playing=true;document.getElementById('playBtn').textContent='중지';setSel(WORK[0].id);}
function stopPlay(){STATE.playing=false;clearTimeout(RUN.playTimer);document.getElementById('playBtn').textContent='처리 흐름 보기';}
function playNext(){const ci=idxOf(STATE.sel);if(ci<WORK.length-1)setSel(WORK[ci+1].id);else stopPlay();}

document.getElementById('replay').onclick=()=>runStep();
document.getElementById('playBtn').onclick=()=>STATE.playing?stopPlay():startPlay();
document.getElementById('devToggle').onchange=e=>document.body.classList.toggle('dev-on',e.target.checked);
const TIP=document.getElementById('tip');
document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]');if(t){TIP.textContent=t.getAttribute('data-tip');TIP.style.display='block';const r=t.getBoundingClientRect();TIP.style.left=Math.min(r.left,window.innerWidth-300)+'px';let tp=r.bottom+8;if(tp+TIP.offsetHeight>window.innerHeight)tp=r.top-TIP.offsetHeight-8;TIP.style.top=Math.max(8,tp)+'px';}else if(!e.target.closest('#tip'))TIP.style.display='none';});

(function(){const q=new URLSearchParams(location.search);if(q.get('dev')==='1'){document.body.classList.add('dev-on');document.getElementById('devToggle').checked=true;}
 const s=q.get('sel')||'request';const still=q.get('still')==='1';setSel(W(s)?s:'request',still);})();
</script>
</body>
