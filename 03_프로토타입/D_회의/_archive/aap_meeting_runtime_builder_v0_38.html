<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic AI Platform 데모 시연 (회의업무) — v0.38</title>
<style>
  :root{
    --bg:#f4f7fb; --surf:#f8fafc; --surface:#ffffff; --ink:#0f172a; --slate:#334155; --muted:#64748b; --faint:#94a3b8; --border:#e2e8f0; --line:#eef2f7;
    --aap:#0d9488; --aap-ink:#0f766e; --aap-soft:#f0fdfa; --aap-border:#99f6e4;
    --violet:#7c3aed; --violet-soft:#f5f3ff; --violet-border:#ddd6fe;
    --amber:#d97706; --amber-soft:#fffbeb; --amber-ink:#92400e; --amber-border:#fde68a;
    --blue:#2563eb; --blue-soft:#eff6ff; --blue-border:#bfdbfe;
    --cyan:#0891b2; --cyan-soft:#ecfeff; --cyan-border:#a5f3fc;
    --green:#16a34a; --green-soft:#f0fdf4; --red:#dc2626; --red-soft:#fef2f2;
    --shadow:0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Pretendard","Inter","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{height:42px;flex:0 0 42px;display:flex;align-items:center;gap:9px;padding:0 13px;background:#fff;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:baseline;gap:6px;}
  .brand .logo{width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,var(--aap),#14b8a6);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:10px;transform:translateY(3px);}
  .brand b{font-size:13px;letter-spacing:-.3px;} .brand span{font-size:10px;color:var(--muted);}
  .pack{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:3px 9px;} .pack b{color:var(--ink);font-weight:700;}
  .sp{flex:1;}
  .devtg{font-size:10px;color:#475569;display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;}
  .speed{display:flex;background:#f1f5f9;border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px;}
  .speed button{border:0;background:transparent;font-family:inherit;font-size:10px;font-weight:800;color:var(--muted);padding:4px 8px;border-radius:6px;cursor:pointer;} .speed button.on{background:#fff;color:var(--aap-ink);box-shadow:0 1px 2px rgba(15,23,42,.1);}
  .runbtn{border:0;background:var(--ink);color:#fff;font-family:inherit;font-weight:700;font-size:11px;padding:6px 13px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;} .runbtn:hover{background:#000;} .runbtn.stop{background:var(--red);}

  .main{flex:1;display:grid;grid-template-columns:40% 60%;gap:14px;padding:13px 14px;overflow:hidden;min-height:0;}

  /* ===== LEFT: 고객 화면 (기본 기업 포털 · 사이드바 없음 · 챗봇 톤 제거) ===== */
  .panel.left{display:flex;flex-direction:column;min-height:0;}
  .cs-cap{font-size:9.5px;color:var(--aap-ink);font-weight:800;letter-spacing:.04em;margin-bottom:6px;display:flex;align-items:center;gap:6px;} .cs-cap::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--aap);}
  .cscreen{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;background:#fff;border:2px solid var(--aap);border-radius:16px;box-shadow:0 10px 34px rgba(13,148,136,.14);overflow:hidden;}
  .pt-head{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line);}
  .pt-logo{font-size:14px;font-weight:900;letter-spacing:-.5px;background:var(--ink);color:#fff;border-radius:6px;padding:3px 8px;flex:0 0 auto;}
  .pt-nav{display:flex;gap:3px;margin-left:4px;} .pt-nav span{font-size:11px;font-weight:600;color:var(--muted);padding:4px 9px;border-radius:7px;} .pt-nav span.on{background:var(--surf);color:var(--ink);font-weight:700;}
  .pt-st{margin-left:auto;font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:20px;}
  .st-info{background:#eef2f7;color:#64748b;} .st-amber{background:var(--amber-soft);color:var(--amber);} .st-green{background:var(--green-soft);color:var(--green);} .st-blue{background:var(--blue-soft);color:var(--blue);}
  .pt-user{width:24px;height:24px;border-radius:50%;background:#cbd5e1;color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;}
  .cs-body{flex:1;min-height:0;overflow:hidden;padding:15px 16px;display:flex;flex-direction:column;gap:11px;}
  /* ===== 기업 포털 홈 대시보드 ===== */
  .cs-home{padding:2px 1px;display:flex;flex-direction:column;gap:11px;}
  .ph-greet{font-size:15px;font-weight:800;} .ph-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .ph-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .ph-stat{border:1px solid var(--border);border-radius:10px;padding:7px 5px;text-align:center;background:#fff;}
  .ps-n{font-size:17px;font-weight:800;color:var(--aap-ink);line-height:1.1;} .ps-l{font-size:9px;color:var(--muted);margin-top:2px;}
  .ph-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .ph-card{border:1px solid var(--border);border-radius:11px;padding:9px 11px;background:#fff;}
  .ph-ch{font-size:9.5px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .ph-li{font-size:11px;color:var(--slate);display:flex;align-items:center;gap:6px;padding:2px 0;line-height:1.3;}
  .ph-dot{width:4px;height:4px;border-radius:50%;background:var(--aap);flex:0 0 auto;} .ph-t{font-size:9.5px;font-weight:800;color:var(--aap-ink);flex:0 0 auto;min-width:30px;}
  .ph-links{display:flex;flex-wrap:wrap;gap:6px;} .ph-links span{font-size:10.5px;font-weight:700;color:var(--slate);background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
  .rc-card{display:flex;align-items:center;gap:9px;border:1px solid var(--border);border-radius:11px;padding:9px 11px;}
  .rc-ic{width:28px;height:28px;border-radius:8px;background:var(--surf);display:grid;place-items:center;color:var(--muted);} .rc-ic.blue{background:var(--blue-soft);color:var(--blue);}
  .rc-t{font-size:12px;font-weight:700;} .rc-m{font-size:10px;color:var(--muted);} .rc-tag{margin-left:auto;font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:20px;} .rc-tag.blue{background:var(--blue-soft);color:var(--blue);} .rc-tag.done{background:#f1f5f9;color:var(--faint);}
  .req-echo{font-size:12px;color:var(--slate);background:var(--surf);border:1px solid var(--border);border-radius:11px;padding:10px 13px;display:flex;gap:9px;align-items:center;line-height:1.4;}
  .req-echo .re-lab{font-size:8.5px;font-weight:800;color:var(--faint);background:#fff;border:1px solid var(--border);border-radius:5px;padding:2px 7px;letter-spacing:.04em;flex:0 0 auto;}
  .cs-status{font-size:12px;color:var(--slate);display:flex;align-items:center;gap:8px;}
  .artifact{border:1px solid var(--aap-border);border-radius:13px;background:linear-gradient(180deg,#fbfffe,#fff);box-shadow:0 4px 14px rgba(13,148,136,.08);overflow:hidden;}
  @keyframes slidein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .af-h{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--line);background:var(--aap-soft);}
  .af-ic{width:28px;height:28px;border-radius:8px;background:#fff;display:grid;place-items:center;color:var(--aap-ink);border:1px solid var(--aap-border);}
  .af-t{font-size:12.5px;font-weight:800;} .af-meta{font-size:10.5px;color:var(--muted);} .af-tag{margin-left:auto;font-size:9px;font-weight:800;color:var(--aap-ink);background:#fff;border:1px solid var(--aap-border);border-radius:6px;padding:2px 7px;}
  .af-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .af-cell{padding:9px 13px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);transition:.3s;} .af-cell:nth-child(2n){border-right:none;} .af-cell:nth-last-child(-n+2){border-bottom:none;} .af-cell.doing{background:var(--aap-soft);}
  .af-cl{font-size:9px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;} .af-cv{font-size:12px;font-weight:700;margin-top:3px;display:flex;align-items:center;gap:6px;}
  .af-go{font-size:10px;font-weight:700;color:var(--aap);background:var(--aap-soft);border:1px solid var(--aap-border);border-radius:6px;padding:2px 7px;cursor:pointer;font-family:inherit;} .af-na{font-size:11px;color:var(--faint);font-weight:500;}
  .spin{display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid var(--aap-soft);border-top-color:var(--aap);animation:spin .7s linear infinite;flex:0 0 auto;} .spin.sm{width:11px;height:11px;}
  @keyframes spin{to{transform:rotate(360deg);}} @keyframes blink{50%{opacity:.25;}}
  .cs-input{flex:0 0 auto;padding:11px 14px 13px;border-top:1px solid var(--line);background:#fcfdff;}
  .cs-inbox{display:flex;align-items:center;gap:9px;border:1.5px solid var(--border);border-radius:11px;padding:9px 12px;background:#fff;} .cs-inbox.focus{border-color:var(--aap);box-shadow:0 0 0 3px var(--aap-soft);}
  .cs-inbox .ico{color:var(--faint);display:flex;flex:0 0 auto;}
  .cs-inbox .ph{flex:1;font-size:12.5px;color:var(--slate);} .cs-inbox .ph.empty{color:var(--faint);} .cs-inbox .cur{display:inline-block;width:1px;height:14px;background:var(--aap);vertical-align:middle;margin-left:1px;animation:blink 1s step-end infinite;}
  .cs-send{width:30px;height:30px;border-radius:9px;background:var(--aap);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;} .cs-send:disabled{background:#cbd5e1;cursor:default;}

  /* ===== in-console modal ===== */
  .cmodal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(248,250,252,.66);z-index:6;} .cmodal.show{display:flex;}
  .cmodal-card{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 18px 44px rgba(15,23,42,.2);width:100%;max-width:540px;max-height:100%;overflow:auto;padding:18px 22px;position:relative;}
  .cmodal-x{position:absolute;right:14px;top:14px;border:none;background:none;font-size:20px;color:var(--faint);cursor:pointer;line-height:1;}
  .cmodal-back{font-size:11px;font-weight:700;color:var(--aap);cursor:pointer;margin-bottom:9px;background:none;border:none;font-family:inherit;padding:0;}
  .cmodal-h{font-size:15px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:8px;} .cmodal-h.done{color:var(--green);}
  .cmodal-sub{font-size:11.5px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
  .cmodal-actions{display:flex;gap:9px;margin-top:17px;justify-content:center;}
  .cp-btn{font-size:13px;font-weight:800;padding:11px 22px;border-radius:11px;cursor:pointer;border:1px solid;font-family:inherit;}
  .cp-btn.primary{background:var(--aap);color:#fff;border-color:var(--aap);box-shadow:0 4px 12px rgba(13,148,136,.22);} .cp-btn.primary:hover{background:var(--aap-ink);} .cp-btn.ghost{background:#fff;color:var(--slate);border-color:var(--border);} .cp-check{color:var(--green);}
  .wm-tasks{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
  .wm-i{display:flex;align-items:center;gap:11px;font-size:13px;}
  .wm-dot{width:17px;height:17px;border-radius:50%;flex:0 0 auto;border:2px solid #cbd5e1;display:grid;place-items:center;}
  .wm-i.wait{color:var(--faint);} .wm-i.doing{color:var(--ink);} .wm-i.doing .wm-dot{border-color:var(--aap-soft);border-top-color:var(--aap);animation:spin .7s linear infinite;} .wm-i.done{color:var(--slate);} .wm-i.done .wm-dot{background:var(--aap);border-color:var(--aap);} .wm-i.done .wm-dot::after{content:"✓";color:#fff;font-size:9px;font-weight:900;} .wm-t{flex:1;font-weight:600;}
  .ch-sec{margin-bottom:14px;} .ch-k{font-size:11.5px;font-weight:800;color:var(--slate);margin-bottom:8px;display:flex;align-items:center;gap:7px;} .ch-k .ch-hint{font-weight:600;color:var(--faint);font-size:10px;}
  .ch-opts{display:flex;flex-wrap:wrap;gap:7px;}
  .ch-op{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:9px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--slate);background:#fff;user-select:none;}
  .ch-op .box{width:16px;height:16px;border-radius:5px;border:1.5px solid #cbd5e1;display:grid;place-items:center;flex:0 0 auto;font-size:9px;color:#fff;} .ch-op.radio .box{border-radius:50%;}
  .ch-op.on{border-color:var(--aap);background:var(--aap-soft);color:var(--aap-ink);} .ch-op.on .box{background:var(--aap);border-color:var(--aap);} .ch-op.on .box::after{content:"✓";} .ch-op.radio.on .box::after{content:"";width:6px;height:6px;border-radius:50%;background:#fff;} .ch-op .sub{font-weight:500;color:var(--faint);font-size:10px;}
  .ch-must{border:1.5px solid var(--amber-border);background:var(--amber-soft);border-radius:12px;padding:13px 15px;margin-bottom:14px;}
  .cm-h{font-size:10.5px;font-weight:900;color:var(--amber-ink);letter-spacing:.03em;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
  .cm-row{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--amber-border);flex-wrap:wrap;} .cm-row:first-of-type{border-top:none;padding-top:2px;}
  .cm-q{font-size:12.5px;font-weight:800;color:#7c2d12;} .cm-why{font-size:10.5px;color:var(--amber-ink);margin-top:2px;line-height:1.45;}
  .seg{display:flex;border:1px solid var(--amber-border);border-radius:9px;overflow:hidden;flex:0 0 auto;}
  .seg-b{font-size:12px;font-weight:700;padding:8px 15px;background:#fff;border:none;cursor:pointer;color:var(--slate);font-family:inherit;display:flex;align-items:center;gap:5px;} .seg-b.on{background:var(--amber);color:#fff;} .seg-b+.seg-b{border-left:1px solid var(--amber-border);}
  .aap-rec{font-size:8px;font-weight:800;color:var(--aap-ink);background:var(--aap-soft);border:1px solid var(--aap-border);border-radius:5px;padding:1px 5px;} .seg-b.on .aap-rec{color:#fff;background:rgba(255,255,255,.22);border-color:transparent;}
  .ch-docs{display:flex;flex-wrap:wrap;gap:6px;}
  .co-h{font-size:10.5px;font-weight:800;color:var(--faint);letter-spacing:.03em;margin:2px 0 10px;display:flex;align-items:center;gap:5px;} .ch-opt-sec .ch-k{color:var(--muted);}
  .rs-card{border:1px solid var(--border);border-radius:12px;padding:13px 15px;}
  .rs-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--line);} .rs-row:last-child{border-bottom:none;} .rs-row .rk{color:var(--muted);} .rs-row .rv{font-weight:700;} .rs-row .rv.g{color:var(--green);}
  .rs-foot{margin-top:11px;font-size:11.5px;color:#15803d;background:var(--green-soft);border:1px solid #bbf7d0;border-radius:8px;padding:9px 12px;}
  .lm{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:2px;} .lm-h{font-size:11.5px;font-weight:800;color:var(--slate);padding:9px 13px;border-bottom:1px solid var(--line);background:var(--surf);}
  .lm-line{font-size:12px;color:var(--slate);padding:8px 13px;border-bottom:1px solid var(--line);} .lm-line b{color:var(--aap-ink);font-weight:700;margin-right:6px;} .lm-line:last-child{border-bottom:none;}
  .dlv{font-size:12.5px;line-height:1.7;} .dlv .dlv-sec{font-size:9.5px;font-weight:800;letter-spacing:.04em;color:var(--faint);text-transform:uppercase;margin:12px 0 5px;} .dlv .dlv-sec:first-child{margin-top:0;}
  .dlv .row{display:flex;align-items:flex-start;gap:9px;padding:7px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:5px;} .dlv .row .av{width:26px;height:26px;border-radius:50%;background:#e2e8f0;color:#475569;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .dlv .row .nm{font-weight:700;} .dlv .row .why{font-size:10.5px;color:var(--muted);} .dlv .row .tag{margin-left:auto;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;}
  .tag.ok{background:var(--green-soft);color:var(--green);} .tag.warn{background:var(--amber-soft);color:var(--amber);} .tag.no{background:#f1f5f9;color:var(--faint);} .tag.block{background:var(--red-soft);color:var(--red);}
  .doc{border:1px solid var(--border);border-radius:11px;padding:14px 16px;background:var(--surf);} .doc h5{margin:0 0 9px;font-size:14px;} .doc .dl{font-size:9px;color:var(--faint);font-weight:800;letter-spacing:.04em;margin:11px 0 3px;text-transform:uppercase;} .doc .drow{display:flex;gap:8px;padding:2px 0;} .doc .drow .dk{color:var(--faint);width:52px;flex:0 0 auto;font-size:11px;}

  /* ===== Lucide line icon ===== */
  .lic{width:14px;height:14px;flex:0 0 auto;stroke-width:1.6;} .lic.big{width:18px;height:18px;} .lic.sm{width:11px;height:11px;}

  /* ===== RIGHT: 작동 흐름 노드 그래프 ===== */
  .panel.right{background:var(--surface);border:1px solid var(--border);border-radius:15px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;}
  .rsec{flex:0 0 auto;padding:6px 13px;border-bottom:1px solid var(--border);background:var(--surf);}
  .rsec-h{font-size:9px;font-weight:800;letter-spacing:.04em;color:var(--faint);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .rsec-h .tostart{margin-left:auto;font-size:9.5px;font-weight:700;color:var(--aap);background:#fff;border:1px solid var(--aap-border);border-radius:7px;padding:2px 8px;cursor:pointer;font-family:inherit;}
  .rsec-h .prog{font-size:10px;font-weight:800;color:var(--aap);letter-spacing:0;}
  /* 업무 순서 — 8단계 전부 1줄·컴팩트 */
  .seq{display:flex;align-items:stretch;gap:3px;}
  .snode{flex:1 1 0;min-width:0;display:flex;align-items:center;gap:3px;padding:4px 6px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:#fff;white-space:nowrap;overflow:hidden;}
  .snode .sn{font-size:8px;font-weight:800;color:var(--faint);flex:0 0 auto;} .snode .lab{font-size:9.5px;font-weight:700;color:var(--slate);overflow:hidden;text-overflow:ellipsis;}
  .snode.past{opacity:.5;} .snode.active{flex:1.7 1 0;background:var(--aap-soft);border-color:var(--aap-border);}
  .snode.active .sn{color:var(--aap);} .snode.active .lab{color:var(--aap-ink);}
  .snode.gate.active{background:#fff7ed;border-color:var(--amber);} .snode.gate.active .sn,.snode.gate.active .lab{color:var(--amber-ink);} .snode .gate-d{width:4px;height:4px;border-radius:50%;background:var(--amber);flex:0 0 auto;} .snode .trig-d{width:4px;height:4px;border-radius:50%;background:var(--blue);flex:0 0 auto;}
  .sarrow{display:none;}

  .rflow{flex:1;padding:8px 13px;overflow:auto;}
  .ph{font-weight:800;font-size:12px;display:flex;align-items:center;gap:7px;margin-bottom:5px;}
  .ph .guideb{margin-left:auto;font-size:10px;font-weight:700;color:#fff;background:var(--aap);border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-family:inherit;}
  .help{width:15px;height:15px;border-radius:50%;border:1px solid var(--border);color:var(--muted);font-size:9.5px;display:inline-flex;align-items:center;justify-content:center;cursor:help;}
  .rg-expl{font-size:10.5px;color:var(--slate);background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--aap);border-radius:8px;padding:5px 9px;margin-bottom:5px;line-height:1.4;}
  /* edge + 데이터 입자 */
  .rg-edge{height:15px;position:relative;display:flex;justify-content:center;}
  .rg-edge::before{content:"";width:2px;height:100%;background:var(--border);}
  .rg-edge.on::before{background:var(--aap);}
  .rg-edge.on .tok{position:absolute;left:50%;margin-left:-4px;width:8px;height:8px;border-radius:50%;animation:tokdown 1.1s ease-in-out infinite;}

const idxOf=id=>WORK.findIndex(w=>w.id===id);
const W=id=>WORK.find(w=>w.id===id);
const groupsOf=w=>[...new Set(w.ops.map(o=>o.g))].sort((a,b)=>a-b);

const C={parts:{김:1,박:1,이:1,최:1,정:1,D:1},time:0,room:0,docs:{a:1,b:1,c:1},recip:{김:1,박:1,이:1,최:1,정:1,D:1}};
const STATE={sel:'request', playing:false, paused:false, speed:1, decisions:{}, previewK:null, baseOnly:false, guideStatic:false, nodeK:null, narrHidden:false, expanded:{}};
const RUN={phase:'idle', reveal:0, timers:[], playTimer:null};
const GUIDE={on:false,i:0,manual:false};
function clearRun(){RUN.timers.forEach(clearTimeout);RUN.timers=[];clearTimeout(RUN.playTimer);}
function partsCount(){return ['김','박','이','최','정'].filter(k=>C.parts[k]).length+(C.parts.D?1:0);}
function partsNames(){const m={김:'김영업',박:'박지훈',이:'이수민',최:'최도현',정:'정하은',D:'외부 DX팀장'};return Object.keys(m).filter(k=>C.parts[k]).map(k=>m[k]);}
function recipCount(){return Object.keys(C.recip).filter(k=>C.recip[k]).length;}
function resolveDlv(k){return typeof DLV[k]==='function'?DLV[k]():DLV[k];}
const SP=ms=>Math.round(ms/STATE.speed);

/* ===== 업무 순서 (미니멀) ===== */
function renderSeq(){
  const ci=idxOf(STATE.sel);let html='';
  WORK.forEach((w,i)=>{
    const cls='snode'+(i===ci?' active':(i<ci?' past':''))+(w.gate?' gate':'');
    html+=`<div class="${cls}" data-go="${w.id}"><span class="sn">${String(i+1).padStart(2,'0')}</span><span class="lab">${w.label}</span>${w.gate?'<span class="gate-d" title="사람 승인 게이트"></span>':''}${w.trigger?'<span class="trig-d" title="사람 운영 트리거"></span>':''}</div>`;
  });
  document.getElementById('seq').innerHTML=html;document.getElementById('seqProg').textContent=`${ci+1} / ${WORK.length}`;
  document.querySelectorAll('#seq .snode').forEach(e=>e.onclick=()=>setSel(e.dataset.go));
}

  const txt=first?`다음 주 AAP 고객사 킥오프 회의 잡아줘. 참석자랑 일정, 자료까지 준비해줘.<span class="cur"></span>`:'요청 입력…';

  const s=document.getElementById('csSend');if(s&&first)s.onclick=()=>{if(!STATE.playing)startPlay();};

function cellState(k){
  const i=idxOf(STATE.sel);
  if(k==='회의록')return(i>idxOf('meeting')||(i===idxOf('meeting')&&RUN.phase!=='working'&&RUN.phase!=='idle'))?'ready':'wait';
  if(i<idxOf('prepare'))return 'wait';if(i>idxOf('prepare'))return 'ready';
  const g0=['참석자','자료','장소'],g1=['안건','초대장'];
  if(RUN.phase==='working'){if(g0.includes(k))return RUN.reveal>=1?'ready':'doing';if(g1.includes(k))return RUN.reveal>=2?'ready':'doing';return 'doing';}
  return 'ready';
}
function cellVal(k){if(k==='참석자')return `${partsCount()}명`;if(k==='자료')return `${[C.docs.a,C.docs.b,C.docs.c].filter(Boolean).length}건`;if(k==='안건')return '6항';if(k==='초대장')return '준비됨';if(k==='장소')return ROOMS[C.room].split(' ')[0];if(k==='회의록')return '초안';return '';}
function meetingCard(){

  const yes=cm.querySelector('[data-yes]');if(yes)yes.onclick=()=>decide();
  const rd=cm.querySelector('[data-redo]');if(rd)rd.onclick=()=>toast('계획을 다시 검토합니다');
  cm.querySelectorAll('[data-close]').forEach(e=>e.onclick=()=>{STATE.baseOnly=true;renderConsole();});
  cm.querySelectorAll('[data-tp]').forEach(e=>e.onclick=()=>{C.parts[e.dataset.tp]=C.parts[e.dataset.tp]?0:1;renderConsole();});
  cm.querySelectorAll('[data-setd]').forEach(e=>e.onclick=()=>{C.parts.D=+e.dataset.setd;C.recip.D=+e.dataset.setd;renderConsole();});
  cm.querySelectorAll('[data-setrd]').forEach(e=>e.onclick=()=>{C.recip.D=+e.dataset.setrd;renderConsole();});
  cm.querySelectorAll('[data-tt]').forEach(e=>e.onclick=()=>{C.time=+e.dataset.tt;renderConsole();});
  cm.querySelectorAll('[data-tr]').forEach(e=>e.onclick=()=>{C.room=+e.dataset.tr;renderConsole();});
  cm.querySelectorAll('[data-td]').forEach(e=>e.onclick=()=>{C.docs[e.dataset.td]=C.docs[e.dataset.td]?0:1;renderConsole();});
  cm.querySelectorAll('[data-rp]').forEach(e=>e.onclick=()=>{C.recip[e.dataset.rp]=C.recip[e.dataset.rp]?0:1;renderConsole();});
}
function openPreview(k){STATE.previewK=k;renderConsole();}
function renderConsole(){renderBody();renderInput();renderCModal();}

/* ===== RIGHT 작동 흐름 노드 그래프 ===== */
function opState(op,started,allDone,phase,reveal){
  if(!started)return 'wait';
  if(allDone)return 'done';
  if(op.live)return (phase==='working'||phase==='await')?'live':'done';
  if(op.g<reveal)return 'done';
  if(op.g===reveal&&phase==='working')return 'doing';
  if(op.g===reveal+1&&phase==='working')return 'ready';
  return 'wait';
}
function compNode(op,opi){
  const st=op._st,[stl]=ST[st];const[tyl,tyi]=TY[op.ty]||TY.module;
  const caps=op.caps||[];
  const capRow=caps.length?`<div class="rn-caps">${caps.slice(0,3).map(c=>`<span class="ccap">${c}</span>`).join('')}${caps.length>3?`<span class="ccap more">+${caps.length-3}</span>`:''}</div>`:'';
  const open=STATE.expanded[opi];
  const subRow=(op.sub&&op.sub.length)?`<button class="rn-subbtn" data-sub="${opi}" type="button">세부 ${op.sub.length}</button><div class="rn-sub">${op.sub.map(x=>`<div>${x}</div>`).join('')}</div>`:'';
  return `<div class="rg-node ${st}${open?' subopen':''}" data-op="${opi}">
    <div class="rn-h">${IC(tyi)}<span class="rn-ty">${tyl}</span><span class="rn-lay">${LK[op.L]}</span><span class="rn-lcode">${op.L}</span><span class="rn-st ${st}">${stl}</span></div>
    <div class="rn-nm">${op.nm}</div>
    <div class="rn-desc">${op.desc||''}</div>
    ${capRow}
    ${subRow}
    <button class="rn-more" type="button">데이터·근거·산출물</button>
  </div>`;
}
function renderRight(){
  const w=W(STATE.sel),gs=groupsOf(w);
  const started=RUN.phase!=='idle', allDone=RUN.phase==='done'||RUN.phase==='await';
  const mAct=started&&!allDone, mDone=allDone;
  w.ops.forEach(op=>op._st=opState(op,started,allDone,RUN.phase,RUN.reveal));
  /* (1) 단계 설명을 레일 바로 아래 항상 표시 → 그 아래에 상태 범례 */
  let h=`<div class="rg-expl">${w.guide}</div>`;
  h+=`<div class="rg-leg top"><span class="lg-k">상태</span>${['wait','ready','doing','done'].map(k=>`<span><span class="d" style="background:${ST[k][1]}"></span>${ST[k][0]}</span>`).join('')}</div>`;
  h+=`<div class="rg-master ${mDone?'done':(mAct?'on':'')}">${IC('cpu','big')}<div class="rm-tx"><b>Master · 오케스트레이션</b><span>구성요소 배정·조율</span></div><span class="rm-st">${mDone?'완료':(mAct?'조율 중':'대기')}</span></div>`;
  /* 상시·배경 레이어 (단계 공통) */
  h+=`<div class="band"><div class="band-h">${IC('refresh','sm')} 상시·배경 레이어</div><div class="band-row">${BG.map(b=>{const[tyl,tyi]=TY[b.ty];return `<div class="bg-c"><div class="bg-h">${IC(tyi)}<span class="bg-ty">${tyl}</span><span class="bg-lc">${b.L}</span></div><div class="bg-nm">${b.nm}</div><div class="bg-d">${b.desc}</div></div>`;}).join('')}</div></div>`;
  /* 단계 컴포넌트: 이 단계에서만 작동(업무 순서 따라 바뀜) — 상시/트리거와 구분 */
  h+=`<div class="stage-h">${IC('net','sm')} 이 단계 작동 구성요소 <span class="sh-sub">· 업무 순서에 따라 바뀜</span></div>`;
  h+=`<div class="stages">`;
  gs.forEach((g,gi)=>{
    const ops=w.ops.filter(o=>o.g===g);
    if(gi>0)h+=`<div class="seqar">${IC('down')}</div>`;
    h+=`<div>${ops.length>1?`<div class="par-tag">${IC('net')} 병렬 ${ops.length}</div>`:''}<div class="cards-row ${ops.length<2?'solo':''}">${ops.map(op=>compNode(op,w.ops.indexOf(op))).join('')}</div></div>`;
  });
  h+=`</div>`;
  /* 맥락 변화 트리거 (조건부) */
  h+=`<div class="trig-lane"><div class="trig-h">${IC('split','sm')} 맥락 변화 트리거 <span class="sh-sub" style="font-weight:600;color:var(--amber-ink)">· 맥락이 바뀔 때만</span></div><div class="cards-row">${TRIG.map(t=>{const[tyl,tyi]=TY[t.ty];return `<div class="rg-node trig"><div class="rn-h">${IC(tyi)}<span class="rn-ty">${tyl}</span><span class="rn-lay">${LK[t.L]}</span><span class="rn-lcode">${t.L}</span><span class="rn-st trig">대기·트리거</span></div><div class="rn-nm">${t.nm}</div><div class="rn-desc">${t.desc}</div><span class="trig-tag">⚡ ${t.trig}</span></div>`;}).join('')}</div></div>`;
  const flow=document.getElementById('flow');flow.innerHTML=h;
  flow.querySelectorAll('[data-op]').forEach(e=>e.onclick=()=>openNode(+e.dataset.op));
  flow.querySelectorAll('[data-sub]').forEach(e=>e.onclick=ev=>{ev.stopPropagation();const i=+e.dataset.sub;STATE.expanded[i]=!STATE.expanded[i];renderRight();});
}

/* ===== node detail modal (근거 4유형 + 산출물 3유형) ===== */
const EV_T=[['data','참조 데이터'],['lookup','조회·대조'],['rule','규칙·정책'],['logic','판단 로직']];
const PROD_T=[['doc','문서·자료'],['msg','안내·메시지'],['sys','시스템 반영']];
function openNode(opi){STATE.nodeK=opi;renderNodeModal();}
function closeNode(){STATE.nodeK=null;document.getElementById('nodeModal').classList.remove('show');}
function renderNodeModal(){
  const nm=document.getElementById('nodeModal');
  if(STATE.nodeK==null){nm.classList.remove('show');nm.innerHTML='';return;}
  const w=W(STATE.sel),op=w.ops[STATE.nodeK];if(!op){closeNode();return;}
  const st=op._st||'wait',[stl]=ST[st];const[tyl,tyi]=TY[op.ty]||TY.module;
  const evRows=EV_T.filter(t=>op.ev&&op.ev[t[0]]&&op.ev[t[0]].length).map(t=>`<div class="ev-row"><span class="ev-k ${t[0]}">${t[1]}</span><div class="ev-v">${op.ev[t[0]].map(x=>`<div>${x}</div>`).join('')}</div></div>`).join('');
  const prodRows=PROD_T.filter(t=>op.prod&&op.prod[t[0]]&&op.prod[t[0]].length).map(t=>`<div class="ev-row"><span class="ev-k ${t[0]}">${t[1]}</span><div class="ev-v">${op.prod[t[0]].map(x=>`<div>${x}</div>`).join('')}</div></div>`).join('');
  const note=st==='wait'?`<div class="nm-note">아직 시작하지 않은 단계예요. 이 구성요소가 맡게 될 근거와 산출물이에요.</div>`:'';
  const dash='<div class="ev-v" style="color:var(--faint);font-size:11px">—</div>';
  nm.innerHTML=`<div class="nm-card"><button class="nm-x" id="nmX">×</button>
    <div class="nm-top"><div class="nm-tt">${IC(tyi)}<b>${op.nm||op.fn}</b></div>
      <div class="nm-ident">
        <div class="id-it"><span class="id-k">구성요소</span><span class="id-v">${tyl}</span></div>
        <div class="id-it"><span class="id-k">계층</span><span class="id-v">${op.L} · ${LK[op.L]}</span></div>
        <div class="id-it"><span class="id-k">상태</span><span class="id-v st-${st}">${stl}</span></div>
      </div>
      ${op.caps&&op.caps.length?`<div class="nm-caps"><span class="cap-k">상세 capability</span>${op.caps.map(c=>`<span class="cap-c">${c}</span>`).join('')}</div>`:''}
      <div class="nm-io">${op.reads&&op.reads.length?`<div class="io-r"><span class="io-k">읽는 데이터</span><div class="io-v">${op.reads.map(r=>`<span class="cap-c">${r}</span>`).join('')}</div></div>`:''}${op.out?`<div class="io-r"><span class="io-k">결과</span><div class="io-v"><span class="cap-c out">${op.out}</span></div></div>`:''}</div>
    </div>
    <div class="nm-body">${note}
      <div class="nm-sec basis"><span class="bar"></span>판단 근거</div>${evRows||dash}
      <div class="nm-sec prod"><span class="bar"></span>산출물</div>${prodRows||dash}
    </div></div>`;
  nm.classList.add('show');
  document.getElementById('nmX').onclick=closeNode;
  nm.onclick=e=>{if(e.target===nm)closeNode();};
}

/* ===== run ===== */
const stopped=()=>!STATE.playing||STATE.paused;
function startWorking(){RUN.phase='working';RUN.reveal=0;renderConsole();renderRight();
  if(STATE.sel==='meeting'){const r=document.getElementById('recBtn');if(r)moveCur(r,true);} /* 마우스가 녹음으로 이동 → 우측 STT 점등 */
  revealOps();}
function revealOps(){
  const w=W(STATE.sel),n=groupsOf(w).length;
  for(let i=1;i<=n;i++)RUN.timers.push(setTimeout(()=>{RUN.reveal=i;renderConsole();renderRight();},SP(i*1400)));
  RUN.timers.push(setTimeout(()=>{RUN.reveal=n;
    if(w.hitl){RUN.phase='await';renderConsole();renderRight();const cb=document.querySelector('.cmodal.show .cp-btn.primary');if(cb&&!stopped())moveCur(cb,true);}
    else{RUN.phase='done';renderConsole();renderRight();hideCur();if(!stopped())RUN.playTimer=setTimeout(playNext,SP(2400));}
  },SP(n*1400+700)));
}
/* (5) 단계 클릭 = 그 단계 1회 재생(좌측 변화 → 우측 순차 점등 후 정착·탐색 가능) */
function runStep(){clearRun();STATE.previewK=null;STATE.baseOnly=false;STATE.nodeK=null;document.getElementById('nodeModal').classList.remove('show');hideCur();const w=W(STATE.sel);
  if(STATE.playing){startWorking();return;}
  if(w.id==='request'){RUN.phase='idle';RUN.reveal=0;renderConsole();renderRight();return;}
  if(w.id==='meeting'){RUN.phase='mtrig';RUN.reveal=0;renderConsole();renderRight();return;} /* 회의 시작 누르면 재생 */
  startWorking();
}
function decide(){STATE.decisions[STATE.sel]=1;RUN.phase='done';renderConsole();renderRight();hideCur();toast('확정했어요. 다음 단계로 넘어갈게요');if(!stopped())RUN.playTimer=setTimeout(playNext,SP(2200));}
function setSel(id){STATE.sel=id;STATE.nodeK=null;document.getElementById('nodeModal').classList.remove('show');renderSeq();if(STATE.playing)playStep();else runStep();}
function playStep(){clearRun();STATE.previewK=null;STATE.baseOnly=false;const w=W(STATE.sel);RUN.phase='idle';RUN.reveal=0;renderConsole();renderRight();
  if(w.id==='request'){const sb=document.getElementById('csSend');if(sb)moveCur(sb,true);}
  if(w.id==='meeting'){ /* 준비→회의: Teams 켜진 뒤 '회의 시작'(운영 트리거) → 자동 진행 */
    RUN.timers.push(setTimeout(()=>{if(stopped())return;RUN.phase='mtrig';renderConsole();renderRight();const ms=document.getElementById('msStart');if(ms)moveCur(ms,true);},SP(1600)));
    RUN.timers.push(setTimeout(()=>{if(stopped())return;startWorking();},SP(3800)));
  }else{
    RUN.timers.push(setTimeout(()=>{if(stopped())return;startWorking();},SP(1800)));
  }
}
/* Run/일시정지/계속 — 현재 단계부터 재생, 중간 PAUSE 가능 */
function startPlay(){STATE.playing=true;STATE.paused=false;setRunBtn();setSel(STATE.sel);}
function pausePlay(){STATE.paused=true;clearRun();hideCur();setRunBtn();}
function resumePlay(){STATE.paused=false;setRunBtn();playStep();}
function stopPlay(){STATE.playing=false;STATE.paused=false;clearRun();hideCur();setRunBtn();renderRight();}
function setRunBtn(){const b=document.getElementById('runBtn');if(!STATE.playing){b.textContent='▶ Run';b.classList.remove('stop');}else if(STATE.paused){b.textContent='▶ 계속';b.classList.add('stop');}else{b.textContent='❚❚ 일시정지';b.classList.add('stop');}}
function playNext(){if(stopped())return;const ci=idxOf(STATE.sel);if(ci<WORK.length-1)setSel(WORK[ci+1].id);else stopPlay();}
function toStart(){stopPlay();setSel(WORK[0].id);}
/* 커서만 이동(Run 중 검정 툴팁은 생략) */
function moveCur(el,click){const c=document.getElementById('nCur');if(!el){c.classList.remove('on');return;}const b=el.getBoundingClientRect();c.classList.add('on');c.classList.toggle('click',!!click);c.style.left=(b.left+b.width/2-5)+'px';c.style.top=(b.top+b.height/2-3)+'px';}
function hideCur(){document.getElementById('nCur').classList.remove('on');}

/* ===== narration ===== */
function hideNarr(){if(GUIDE.manual)return;document.getElementById('nCur').classList.remove('on');document.getElementById('nTip').classList.remove('on');document.querySelectorAll('.narr-hl').forEach(e=>e.classList.remove('narr-hl'));}
function narrate(w,isHitl){
  if(STATE.narrHidden)return;
  const cur=document.getElementById('nCur'),tip=document.getElementById('nTip');
  document.querySelectorAll('.narr-hl').forEach(e=>e.classList.remove('narr-hl'));
  const cs=document.querySelector('.cscreen');
  /* 좌측 고객 화면을 강조(HITL이면 화면 속 모달 카드) */
  const spot=isHitl?(document.querySelector('.cmodal.show .cmodal-card')||cs):cs;
  if(spot)spot.classList.add('narr-hl');
  /* 실제로 누를 버튼 — 있으면 커서를 그 버튼으로 이동(HITL 확인 / 첫 단계 전송) */
  const btn=isHitl?document.querySelector('.cmodal.show .cp-btn.primary')
            :(w.id==='request'?document.getElementById('csSend'):null);
  cur.classList.add('on');cur.classList.toggle('click',!!btn);
  if(btn){const b=btn.getBoundingClientRect();cur.style.left=(b.left+b.width/2-5)+'px';cur.style.top=(b.top+b.height/2-3)+'px';}
  else{const r=(spot||cs).getBoundingClientRect();cur.style.left=(r.left+30)+'px';cur.style.top=(r.top+42)+'px';}
  const ci=idxOf(w.id);tip.classList.add('on');
  tip.innerHTML=`<button class="nt-x" id="nClose" title="설명 닫기">×</button><div class="nt-n">${ci+1} / ${WORK.length} · ${w.role}</div><div class="nt-t">${isHitl?'🙋 여기서 사람이 확인':w.label}</div><div class="nt-b">${isHitl?'AAP가 추천을 준비했어요. 책임 항목만 확인하고 확정하면 다음으로 넘어갑니다.':(w.guide||'')}</div>${GUIDE.manual?`<div class="nt-act"><button class="gx" id="nStop">닫기</button><span class="sp3"></span>${ci>0?'<button class="gbtn" id="nPrev">이전</button>':''}<button class="gbtn pri" id="nNext">${ci<WORK.length-1?'다음 단계':'완료'}</button></div>`:''}`;
  /* 말풍선: 버튼이 있으면(HITL·전송) 버튼 근처(좌측 화면 안)에, 없으면 좌측 화면 오른쪽 틈에 */
  let tl,tt;
  if(btn){const b=btn.getBoundingClientRect();tt=b.top-104;if(tt<46)tt=b.bottom+12;tl=b.left+b.width/2-140;}
  else{const cr=cs.getBoundingClientRect();tl=cr.right+16;tt=cr.top+54;}
  tl=Math.max(10,Math.min(tl,window.innerWidth-296));tip.style.left=tl+'px';tip.style.top=tt+'px';
  const cl=document.getElementById('nClose');if(cl)cl.onclick=()=>{if(GUIDE.manual){stopGuide();}else{STATE.narrHidden=true;cur.classList.remove('on');tip.classList.remove('on');document.querySelectorAll('.narr-hl').forEach(e=>e.classList.remove('narr-hl'));renderRight();}};
  if(GUIDE.manual){document.getElementById('nStop').onclick=stopGuide;document.getElementById('nNext').onclick=()=>gNav(1);const p=document.getElementById('nPrev');if(p)p.onclick=()=>gNav(-1);}
}
function startGuide(){GUIDE.manual=true;GUIDE.on=true;STATE.narrHidden=false;stopPlay();gGo(0);}
function stopGuide(){GUIDE.manual=false;GUIDE.on=false;STATE.guideStatic=false;hideNarr();runStep();}
function gGo(i){GUIDE.i=i;const w=WORK[i];clearRun();STATE.sel=w.id;STATE.guideStatic=true;STATE.previewK=null;RUN.phase='done';RUN.reveal=groupsOf(w).length;renderSeq();renderConsole();renderRight();narrate(w,false);}
function gNav(d){const n=GUIDE.i+d;if(n<0)return;if(n>=WORK.length){stopGuide();return;}gGo(n);}

/* (2) 확정 알림 = 고객 화면(좌측) 안 인-콘솔 토스트 */
function toast(m){const t=document.getElementById('ctoast')||document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2200);}
document.getElementById('runBtn').onclick=()=>{if(!STATE.playing)startPlay();else if(!STATE.paused)pausePlay();else resumePlay();};
document.getElementById('toStart').onclick=toStart;
document.querySelectorAll('#speed button').forEach(b=>b.onclick=()=>{STATE.speed=+b.dataset.spd;document.querySelectorAll('#speed button').forEach(x=>x.classList.toggle('on',x===b));});
document.getElementById('devToggle').onchange=e=>document.body.classList.toggle('dev-on',e.target.checked);
const TIP=document.getElementById('tip');
document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]');if(t){TIP.textContent=t.getAttribute('data-tip');TIP.style.display='block';const r=t.getBoundingClientRect();TIP.style.left=Math.min(r.left,window.innerWidth-320)+'px';let tp=r.bottom+8;if(tp+TIP.offsetHeight>window.innerHeight)tp=r.top-TIP.offsetHeight-8;TIP.style.top=Math.max(8,tp)+'px';}else if(!e.target.closest('#tip'))TIP.style.display='none';});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(STATE.nodeK!=null)closeNode();}});

(function(){const q=new URLSearchParams(location.search);
 if(q.get('dev')==='1'){document.body.classList.add('dev-on');document.getElementById('devToggle').checked=true;}
 if(q.get('ext')==='no'){C.parts.D=0;C.recip.D=0;}
 const s=q.get('sel')||'request';STATE.sel=W(s)?s:'request';
 renderSeq();
 if(q.get('still')==='1'){const w=W(STATE.sel);RUN.phase=w.hitl?'await':(w.id==='request'?'idle':'done');RUN.reveal=groupsOf(w).length;renderConsole();renderRight();if(q.get('node'))openNode(+q.get('node'));}
 else runStep();
})();
</script>
