<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAP 회의 업무 작동 원리 (v0.18)</title>
<style>
  :root{
    --bg:#f4f7fb; --surf:#f8fafc; --surface:#ffffff; --ink:#0f172a; --slate:#334155; --muted:#64748b; --border:#e2e8f0; --line:#eef2f7;
    --aap:#0d9488; --aap-ink:#0f766e; --aap-soft:#f0fdfa; --aap-border:#99f6e4;
    --violet:#7c3aed; --violet-soft:#f5f3ff; --violet-border:#ddd6fe;
    --amber:#d97706; --amber-soft:#fffbeb; --amber-ink:#92400e; --amber-border:#fde68a;
    --green:#16a34a; --green-soft:#f0fdf4; --red:#dc2626; --red-soft:#fef2f2;
    --shadow:0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Pretendard","Inter","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-rows:1fr auto;height:100vh;overflow:hidden;}
  .main{display:grid;grid-template-columns:60% 40%;gap:13px;padding:13px;overflow:hidden;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:15px;box-shadow:var(--shadow);overflow:auto;}
  .panel.left{padding:0;display:flex;flex-direction:column;}
  .panel.right{padding:12px 14px;display:flex;flex-direction:column;}
  .ph{font-weight:800;font-size:13px;display:flex;align-items:center;gap:7px;}
  .help{width:15px;height:15px;border-radius:50%;border:1px solid var(--border);color:var(--muted);font-size:9.5px;display:inline-flex;align-items:center;justify-content:center;cursor:help;}

  .dd{padding:11px 14px 9px;border-bottom:1px solid var(--line);}
  .dd-top{display:flex;align-items:center;gap:9px;}
  .firstbtn{font-size:10.5px;font-weight:700;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--slate);cursor:pointer;flex:0 0 auto;}
  .ddrow{display:flex;align-items:stretch;gap:7px;flex:1;min-width:0;}
  .ddside{flex:1;min-width:0;display:flex;align-items:center;gap:6px;font-size:11px;color:#94a3b8;border:1px solid var(--border);border-radius:9px;padding:6px 9px;background:var(--surf);cursor:pointer;}
  .ddside.next{justify-content:flex-end;text-align:right;} .ddside .n{font-size:9px;font-weight:800;} .ddside.empty{visibility:hidden;}
  .ddcur{flex:1.6;min-width:0;display:flex;align-items:center;gap:8px;border:1.5px solid var(--aap);border-radius:10px;padding:7px 11px;background:var(--aap-soft);}
  .ddcur .n{width:24px;height:24px;border-radius:7px;background:var(--aap);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .ddcur .lb{font-size:13.5px;font-weight:800;} .ddcur .st{margin-left:auto;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;background:#fff;color:var(--aap);border:1px solid var(--aap-border);}
  .ddcur .st.warn{color:var(--amber);border-color:var(--amber-border);background:var(--amber-soft);} .ddcur .st.evt{color:var(--violet);border-color:var(--violet-border);background:var(--violet-soft);}
  .dd-desc{font-size:11.5px;color:var(--muted);margin-top:7px;}

  .cons-wrap{flex:1;padding:13px 15px;overflow:auto;display:flex;flex-direction:column;}
  .cons-h{font-size:9.5px;color:#9ca3af;font-weight:800;letter-spacing:.03em;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
  .cons-h .repl{margin-left:auto;font-size:10.5px;color:var(--aap);cursor:pointer;font-weight:700;}
  .cons-h .orch{font-size:10.5px;color:var(--violet);cursor:pointer;font-weight:700;border:1px solid var(--violet-border);border-radius:7px;padding:2px 8px;}
  .console{position:relative;flex:1;border:1px solid var(--border);border-radius:13px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.04);overflow:hidden;display:flex;flex-direction:column;min-height:410px;}
  .con-bar{background:var(--ink);color:#e2e8f0;font-size:10.5px;padding:7px 12px;display:flex;align-items:center;gap:8px;flex:0 0 auto;}
  .con-bar .dot{width:7px;height:7px;border-radius:50%;background:#475569;} .con-bar b{color:#fff;}
  .con-body{flex:1;padding:13px 16px;display:flex;flex-direction:column;overflow:auto;}
  .task{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
  .task .tl{font-size:9px;color:#9ca3af;font-weight:800;} .task .tt{font-size:15px;font-weight:800;}
  .task .tst{margin-left:auto;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;}
  .tst.wait{background:#eef2f7;color:#64748b;} .tst.run{background:var(--aap-soft);color:var(--aap);} .tst.done{background:var(--green-soft);color:var(--green);}
  .tst.run .pdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--aap);margin-right:4px;animation:blink 1s infinite;} @keyframes blink{50%{opacity:.3;}}
  .agtag{font-size:10px;color:var(--violet);font-weight:700;margin-bottom:8px;} .agtag b{color:var(--violet);} .agtag .sup{color:#94a3b8;font-weight:600;}
  .evtbar{font-size:11px;font-weight:700;color:var(--violet);background:var(--violet-soft);border:1px solid var(--violet-border);border-radius:9px;padding:7px 11px;margin-bottom:10px;}
  .carry{font-size:10.5px;font-weight:700;color:#7c2d12;background:var(--amber-soft);border:1px solid var(--amber-border);border-radius:8px;padding:6px 10px;margin-bottom:10px;}
  .carry.keep{color:#15803d;background:var(--green-soft);border-color:#bbf7d0;}

  .deleg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;color:var(--muted);}
  .deleg .dtx{font-size:12px;text-align:center;} .deleg-btn{font-size:13px;font-weight:800;padding:11px 22px;border-radius:11px;background:var(--aap);color:#fff;border:none;cursor:pointer;box-shadow:0 6px 16px rgba(13,148,136,.28);transition:transform .12s;} .deleg-btn.press{transform:scale(.94);}

  .sec-h{font-size:9.5px;color:#9ca3af;font-weight:800;letter-spacing:.03em;margin:3px 0 6px;}
  .stage{border:1px solid var(--line);border-radius:10px;padding:5px 7px;margin-bottom:6px;background:#fff;}
  .stage.par{border-style:dashed;background:#fcfdff;} .par-h{font-size:8.5px;font-weight:800;color:var(--aap);margin:1px 2px 4px;}
  .fi{display:flex;align-items:flex-start;gap:8px;font-size:12px;padding:4px 6px;border-radius:7px;color:#94a3b8;transition:.2s;}
  .fi .ic{width:16px;height:16px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:#eef2f7;color:#94a3b8;margin-top:1px;}
  .fi.done{color:var(--slate);} .fi.done .ic{background:var(--aap);color:#fff;}
  .fi.doing .ic{background:#fff;border:2px solid var(--aap-soft);border-top-color:var(--aap);animation:spin .7s linear infinite;color:transparent;} @keyframes spin{to{transform:rotate(360deg);}}
  .fi .fbody{flex:1;min-width:0;} .fi .ft{font-weight:700;} .fi .arr{color:#cbd5e1;margin:0 4px;} .fi.done .arr{color:var(--aap);}
  .fi .fout{color:var(--muted);} .fi.done .fout{color:var(--slate);} .fi .fout.flash{color:var(--aap);font-weight:700;}
  .why{display:block;font-size:10px;color:#94a3b8;margin-top:1px;} .why b{color:var(--aap-ink);font-weight:700;}

  .result{border:1px solid var(--border);border-radius:11px;background:var(--surf);padding:9px 12px;margin-top:3px;}
  .crow{font-size:12px;padding:2px 0;} .crow.b{font-weight:700;} .crow .ck{display:inline-flex;width:15px;height:15px;border-radius:4px;background:var(--aap);color:#fff;font-size:9px;align-items:center;justify-content:center;margin-right:6px;vertical-align:-2px;}
  .crow .rwhy{font-size:10px;color:#94a3b8;} .crow .rwhy b{color:var(--aap-ink);}
  .flag{font-size:9px;font-weight:800;color:var(--amber);background:var(--amber-soft);border:1px solid var(--amber-border);border-radius:5px;padding:1px 6px;margin-left:6px;}
  .route{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .rt{font-size:10px;font-weight:800;border-radius:7px;padding:3px 9px;border:1px solid;}
  .rt.auto{background:var(--aap-soft);color:var(--aap-ink);border-color:var(--aap-border);}
  .rt.review{background:var(--amber-soft);color:var(--amber-ink);border-color:var(--amber-border);}
  .rt.block{background:var(--red-soft);color:#b91c1c;border-color:#fecaca;}
  .rt small{font-weight:600;opacity:.85;}
  .a2a{font-size:10.5px;font-weight:700;color:var(--violet);background:var(--violet-soft);border:1px dashed var(--violet-border);border-radius:8px;padding:6px 10px;margin-top:8px;}
  .detbtn{font-size:10.5px;font-weight:700;color:var(--aap);cursor:pointer;border:1px solid var(--aap-border);border-radius:7px;padding:3px 9px;margin-top:8px;display:inline-block;}

  .hitl{margin-top:10px;border:1px solid var(--amber-border);background:var(--amber-soft);border-radius:12px;padding:11px 13px;}
  .hitl-h{font-size:10px;font-weight:800;color:var(--amber-ink);} .hitl-q{font-size:12.5px;font-weight:700;color:#7c2d12;margin:5px 0 3px;} .hitl-why{font-size:10px;color:#92400e;margin-bottom:9px;}
  .hitl-btns{display:flex;gap:8px;} .hb{font-size:12px;font-weight:800;padding:8px 15px;border-radius:9px;cursor:pointer;border:1px solid;}
  .hb.yes{background:var(--aap);color:#fff;border-color:var(--aap);} .hb.no{background:#fff;color:var(--slate);border-color:var(--border);}
  .hitl.resolved{border-color:#bbf7d0;background:var(--green-soft);} .hitl.resolved .hitl-h{color:var(--green);}

  .mcursor{position:absolute;z-index:8;width:20px;height:20px;pointer-events:none;transition:left .5s cubic-bezier(.4,0,.2,1),top .5s cubic-bezier(.4,0,.2,1);opacity:0;}
  .mcursor.show{opacity:1;} .mcursor.click::after{content:"";position:absolute;inset:-6px;border:2px solid var(--aap);border-radius:50%;animation:ripple .5s ease-out;} @keyframes ripple{from{transform:scale(.4);opacity:.8;}to{transform:scale(1.5);opacity:0;}}

  .explain{margin:8px 0 11px;border:1px solid var(--border);border-left:3px solid var(--aap);border-radius:9px;background:var(--surf);padding:9px 12px;font-size:11.5px;line-height:1.6;color:var(--slate);}
  .explain b{color:var(--aap-ink);} .explain .v{color:var(--violet);font-weight:700;}
  .flow{flex:1 1 auto;overflow:auto;min-height:0;}
  .rstage.par{border:1px dashed var(--violet-border);border-radius:11px;padding:5px;background:#fdfcff;} .rstage.par .rph{font-size:8px;font-weight:800;color:var(--violet);margin:1px 4px 3px;}
  .op{border:1px solid var(--border);border-radius:10px;background:#fff;padding:7px 10px;opacity:.34;transition:.3s;margin-bottom:4px;} .op:last-child{margin-bottom:0;}
  .op.doing,.op.done{opacity:1;border-color:var(--aap);} .op.done{box-shadow:0 2px 10px rgba(13,148,136,.08);} .op.doing{box-shadow:0 0 0 3px var(--aap-soft);}
  .op.asset.doing,.op.asset.done{border-color:var(--violet);box-shadow:0 2px 10px rgba(124,58,237,.1);}
  .op-h{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .op-lay{font-size:8px;font-weight:800;color:#94a3b8;background:var(--surf);border:1px solid var(--border);border-radius:5px;padding:1px 6px;}
  .op.doing .op-lay,.op.done .op-lay{color:var(--aap-ink);border-color:var(--aap-border);} .op.asset.doing .op-lay,.op.asset.done .op-lay{color:var(--violet);border-color:var(--violet-border);}
  .op-type{font-size:7.5px;font-weight:900;letter-spacing:.02em;border-radius:4px;padding:1px 5px;border:1px solid var(--border);color:#94a3b8;}
  .op.done .op-type,.op.doing .op-type{color:#475569;}
  .op-t{font-size:11.5px;font-weight:800;color:var(--slate);} .op.doing .op-t,.op.done .op-t{color:var(--ink);}
  .op-badge{font-size:7px;font-weight:900;color:#fff;background:var(--violet);border-radius:4px;padding:1px 5px;margin-left:auto;}
  .op-out{font-size:10.5px;color:#94a3b8;margin-top:2px;} .op.doing .op-out,.op.done .op-out{color:var(--slate);} .op-out b{color:var(--aap-ink);font-weight:700;}
  .op-why{font-size:9px;color:#94a3b8;margin-top:1px;} .op-why b{color:var(--aap-ink);}
  .op-micro{margin-top:4px;display:flex;flex-wrap:wrap;gap:3px;} .mc{font-size:8px;font-weight:700;color:#94a3b8;background:var(--surf);border:1px solid var(--border);border-radius:4px;padding:1px 5px;} .op.doing .mc,.op.done .mc{color:var(--aap-ink);background:var(--aap-soft);border-color:var(--aap-border);}
  .op.changed{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-soft);} .op.changed .op-out{color:var(--amber-ink);}
  .rarrow{text-align:center;color:#cbd5e1;font-size:10px;margin:1px 0;} .rarrow.on{color:var(--aap);}
  /* platform strip */
  .platform{flex:0 0 auto;margin-top:9px;border:1px solid var(--border);border-radius:11px;background:#0f172a;color:#cbd5e1;padding:9px 12px;}
  .platform .pf-h{font-size:10px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px;}
  .platform .pf-h span{font-size:8.5px;color:#94a3b8;font-weight:600;}
  .platform .pf-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .platform .pfc{font-size:9px;font-weight:700;color:#cbd5e1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:6px;padding:2px 8px;}
  .platform .pf-pack{font-size:9.5px;color:#94a3b8;margin-top:7px;} .platform .pf-pack b{color:#5eead4;}

  .bot{background:#fff;border-top:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:12px;}
  .bot .bstep{font-size:12px;color:var(--muted);} .bot .bstep b{color:var(--ink);} .bot .spacer{flex:1;}
  .btn{font-size:12px;padding:7px 13px;border:1px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;color:var(--ink);}
  .btn.primary{background:var(--aap);color:#fff;border-color:var(--aap);}
  .tg{font-size:11.5px;color:#475569;display:flex;align-items:center;gap:5px;cursor:pointer;}
  [data-tip]{cursor:help;}
  #tip{position:fixed;z-index:60;max-width:300px;background:var(--ink);color:#f1f5f9;font-size:11px;line-height:1.55;padding:9px 11px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;pointer-events:none;}

  #modal{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:80;}
  #modal .mbox{background:#fff;border-radius:18px;width:540px;max-width:92vw;max-height:88vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.3);}
  .mtop{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;position:sticky;top:0;background:#fff;}
  .mtop .mt{font-size:15px;font-weight:800;} .mtop .msub{font-size:11px;color:var(--muted);} .mtop .mx{margin-left:auto;cursor:pointer;color:#9ca3af;font-size:20px;}
  .mbody{padding:16px 20px;}
  .mlist .mrow{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);}
  .mrow .av{width:30px;height:30px;border-radius:9px;background:var(--aap-soft);color:var(--aap-ink);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .mrow.no .av{background:#f1f5f9;color:#94a3b8;}
  .mrow .mn{font-weight:700;font-size:13px;} .mrow .mw{font-size:11px;color:var(--aap-ink);margin-top:1px;} .mrow.no .mw{color:#94a3b8;}
  .mrow .mtag{margin-left:auto;font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:20px;} .mtag.ok{background:var(--green-soft);color:var(--green);} .mtag.no{background:#f1f5f9;color:#94a3b8;}
  .mtbl{width:100%;border-collapse:collapse;font-size:12px;} .mtbl th{font-size:10px;color:#9ca3af;text-align:left;padding:5px 7px;border-bottom:1px solid var(--border);} .mtbl td{padding:7px;border-bottom:1px solid var(--line);} .mtbl tr.best{background:var(--aap-soft);} .mtbl .bt{font-size:9px;font-weight:800;color:var(--aap);}
  .calcard{border:1px solid var(--border);border-radius:12px;padding:14px;} .calcard .cc-h{font-size:14px;font-weight:800;} .calcard .cc-row{font-size:12px;color:var(--slate);padding:4px 0;display:flex;gap:8px;} .calcard .cc-row b{color:#9ca3af;font-weight:700;width:52px;font-size:10.5px;}
  .doc{border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;} .doc h5{margin:0 0 7px;font-size:13px;} .doc .dl{font-size:9.5px;color:#9ca3af;font-weight:800;margin:9px 0 3px;}
  .path .prow{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px;}
  .path .pn{width:18px;height:18px;border-radius:5px;background:var(--aap-soft);color:var(--aap-ink);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .path .pty{margin-left:auto;font-size:9px;font-weight:800;color:#64748b;border:1px solid var(--border);border-radius:5px;padding:1px 6px;}
  .path .pty.r{color:var(--amber);border-color:var(--amber-border);} .path .pty.b{color:#b91c1c;border-color:#fecaca;}
  .orchg{text-align:center;} .sup{display:inline-block;border:1.5px solid var(--violet);background:var(--violet-soft);border-radius:11px;padding:8px 18px;font-weight:800;font-size:13px;color:var(--violet);} .sup small{display:block;font-size:9px;font-weight:600;color:#94a3b8;}
  .orch-stem{height:14px;width:2px;background:var(--violet-border);margin:0 auto;}
  .subs{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
  .subag{flex:1;min-width:82px;border:1px solid var(--border);border-radius:10px;padding:7px 6px;background:#fff;}
  .subag.act{border-color:var(--aap);background:var(--aap-soft);} .subag.done{border-color:var(--aap-border);}
  .subag .san{font-size:10.5px;font-weight:800;} .subag.act .san{color:var(--aap-ink);} .subag .sas{font-size:8.5px;color:var(--muted);margin-top:1px;}
  .subag .sbd{font-size:7.5px;font-weight:800;margin-top:3px;color:#94a3b8;border:1px solid var(--border);border-radius:4px;padding:0 4px;display:inline-block;}
  .standing{margin-top:11px;border-top:1px solid var(--line);padding-top:9px;} .stand-h{font-size:9.5px;font-weight:800;color:#9ca3af;margin-bottom:5px;}
  .stand-chips{display:flex;flex-wrap:wrap;gap:5px;} .stch{font-size:10px;font-weight:700;color:#475569;background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:2px 8px;} .stch b{color:var(--violet);font-size:8px;}
  .coord{margin-top:11px;border:1px solid var(--aap-border);background:var(--aap-soft);border-radius:11px;padding:11px 13px;} .coord-h{font-size:10px;font-weight:800;color:var(--aap-ink);margin-bottom:6px;}
  .coord .cl{font-size:11px;color:var(--slate);padding:2px 0;} .coord .cl b{color:var(--violet);}
  .coord .cr{font-size:11.5px;font-weight:700;color:var(--aap-ink);margin-top:7px;border-top:1px dashed var(--aap-border);padding-top:7px;}
  .a2alist{margin-top:11px;} .a2alist .a2r{font-size:11px;color:var(--slate);padding:2px 0;} .a2alist .a2r b{color:var(--violet);}
  .dl{font-size:9.5px;color:#9ca3af;font-weight:800;}
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <section class="panel left">
      <div class="dd"><div class="ph" style="margin-bottom:9px">회의 업무 드릴다운 <span class="help" data-tip="회의 업무가 AAP 안에서 나뉘는 세부 업무. 앞뒤 단계가 함께 보입니다.">?</span></div><div id="ddBox"></div></div>

const idxOf=id=>WORK.findIndex(w=>w.id===id);
const W=id=>WORK.find(w=>w.id===id);
const groupsOf=w=>[...new Set(w.ops.map(o=>o.g))].sort((a,b)=>a-b);

const STATE={sel:'request', playing:false, hitlDone:false, decisions:{}};
const RUN={phase:'idle', reveal:0, timers:[], playTimer:null};
const FLASH={t:null};
function clearRun(){RUN.timers.forEach(clearTimeout);RUN.timers=[];clearTimeout(RUN.playTimer);stopFlash();}
function stopFlash(){if(FLASH.t)clearInterval(FLASH.t);FLASH.t=null;}
function extExcluded(){return STATE.decisions['parts']==='no';}

function renderDrill(){
  const ci=idxOf(STATE.sel),p=ci>0?WORK[ci-1]:null,n=ci<WORK.length-1?WORK[ci+1]:null,c=WORK[ci];
  document.getElementById('ddBox').innerHTML=
   `<div class="dd-top"><button class="firstbtn" id="firstBtn">⤒ 처음으로</button>
     <div class="ddrow">${p?`<div class="ddside prev" data-go="${p.id}"><span class="n">${ci}</span>‹ ${p.label}</div>`:`<div class="ddside empty"></div>`}
      <div class="ddcur"><span class="n">${ci+1}</span><span class="lb">${c.label}</span><span class="st ${c.sc}">${c.st}</span></div>
      ${n?`<div class="ddside next" data-go="${n.id}">${n.label} ›<span class="n">${ci+2}</span></div>`:`<div class="ddside empty"></div>`}</div></div>
    <div class="dd-desc">${c.desc}</div>`;
  document.getElementById('firstBtn').onclick=()=>setSel('request');
  document.querySelectorAll('.ddside[data-go]').forEach(e=>e.onclick=()=>setSel(e.getAttribute('data-go')));
}

function renderConsole(){
  const w=W(STATE.sel),gs=groupsOf(w);let st='wait',sl='대기';
  if(RUN.phase==='working'){st='run';sl='<span class="pdot"></span>진행 중';}else if(RUN.phase==='done'){st='done';sl='완료';}
  let body=`<div class="task"><div><div class="tl">작업</div><div class="tt">${w.label}</div></div><span class="tst ${st}">${sl}</span></div>`;
  body+=`<div class="agtag">담당 · <b>${w.agent}</b> <span class="sup">· Supervisor 배정·조율</span></div>`;
  if(w.event&&RUN.phase!=='before')body+=`<div class="evtbar">⚡ ${w.event}</div>`;
  if(RUN.phase!=='before'&&STATE.sel==='writeback'&&STATE.decisions['parts'])body+=extExcluded()?`<div class="carry">↩ 담당자 결정 반영 · <b>외부 고객 제외</b> → 초대 메일 없음</div>`:`<div class="carry keep">↩ 담당자 결정 반영 · <b>외부 고객 포함</b> → 초대 메일 발송 대기</div>`;
  if(RUN.phase==='before'){
    body+=`<div class="deleg"><div class="dtx">${w.event?'AAP가 변경을 감지했습니다.':`담당자가 이 작업을 ${w.agent}에게 맡깁니다.`}</div><button class="deleg-btn" id="delegBtn">${w.event?'변경 반영 보기':'AAP에게 맡기기'}</button></div>`;
  } else {
    body+=`<div class="sec-h">AAP가 수행한 작업 · 단계별 산출물·근거</div>`;
    gs.forEach((g,gi)=>{
      const ops=w.ops.filter(o=>o.g===g);const stt=gi<RUN.reveal?'done':(gi===RUN.reveal&&RUN.phase==='working'?'doing':'');
      body+=`<div class="stage ${ops.length>1?'par':''}">`;if(ops.length>1)body+=`<div class="par-h">∥ 동시 실행</div>`;
      ops.forEach(o=>{const gi2=w.ops.indexOf(o);let out=o.out;if(o.ext&&extExcluded())out='제외됨 (담당자 결정)';
        const showFlash=stt==='doing'&&o.live;
        body+=`<div class="fi ${stt}"><span class="ic">${stt==='done'?'✓':''}</span><div class="fbody"><span class="ft">${o.feed}</span><span class="arr">→</span><span class="fout ${showFlash?'flash':''}" id="fl-${gi2}">${stt?(showFlash?'검토 중…':out):'…'}</span>${(stt&&o.why)?`<span class="why">근거 · <b>${o.why}</b></span>`:''}</div></div>`;});
      body+=`</div>`;
    });
    if(RUN.phase==='done'){
      body+=`<div class="sec-h">결과</div><div class="result">${w.result}${(STATE.sel==='writeback')?(extExcluded()?'<div class="crow" style="color:#64748b">고객 초대 메일 · 제외됨</div>':'<div class="crow" style="color:#92400e">⏳ 고객 초대 메일 · 발송 대기</div>'):''}${w.modal?`<span class="detbtn" id="detBtn">＋ 자세히 보기</span>`:''}</div>`;
      if(w.route){let r='';if(w.route.auto)r+=`<span class="rt auto">자동 <small>· ${w.route.auto}</small></span>`;if(w.route.review)r+=`<span class="rt review">담당자 확인 <small>· ${w.route.review}</small></span>`;if(w.route.block)r+=`<span class="rt block">차단 <small>· ${w.route.block}</small></span>`;body+=`<div class="route">${r}</div>`;}
      if(w.a2a)body+=`<div class="a2a">↗ A2A · ${w.a2a}</div>`;
      if(w.hitl){const r=STATE.hitlDone;body+=`<div class="hitl ${r?'resolved':''}"><div class="hitl-h">${r?'✓ 담당자 확인 완료 · 결정이 다음 단계에 반영됩니다':'⚑ 담당자 확인'}</div>${r?'':`<div class="hitl-q">${w.hitl.q}</div>${w.hitl.why?`<div class="hitl-why">근거 · ${w.hitl.why}</div>`:''}<div class="hitl-btns"><button class="hb yes" id="hbYes">${w.hitl.yes}</button><button class="hb no" id="hbNo">${w.hitl.no}</button></div>`}</div>`;}
    }
  }
  document.getElementById('conBody').innerHTML=body;
  if(RUN.phase==='before'){const b=document.getElementById('delegBtn');b.onclick=runStart;positionCursor(b);}else document.getElementById('mcursor').classList.remove('show','click');
  const det=document.getElementById('detBtn');if(det)det.onclick=()=>openModal(w.modal);
  if(RUN.phase==='done'&&w.hitl&&!STATE.hitlDone){const y=document.getElementById('hbYes'),no=document.getElementById('hbNo');
    if(y)y.onclick=()=>{STATE.decisions[w.id]='yes';STATE.hitlDone=true;renderConsole();renderRight();};
    if(no)no.onclick=()=>{STATE.decisions[w.id]='no';STATE.hitlDone=true;renderConsole();renderRight();};}
  startFlash();
}
function startFlash(){stopFlash();if(RUN.phase!=='working')return;const w=W(STATE.sel),gs=groupsOf(w),dg=gs[RUN.reveal];if(dg===undefined)return;
  const liveOps=w.ops.map((o,idx)=>({o,idx})).filter(x=>x.o.g===dg&&x.o.live);if(!liveOps.length)return;
  let k=0;FLASH.t=setInterval(()=>{liveOps.forEach(x=>{const el=document.getElementById('fl-'+x.idx);if(el)el.textContent='▸ '+x.o.live[k%x.o.live.length];});k++;},150);}
function positionCursor(btn){const mc=document.getElementById('mcursor'),con=document.querySelector('.console');if(!btn||!con)return;const br=btn.getBoundingClientRect(),cr=con.getBoundingClientRect();mc.classList.add('show');mc.style.left=(br.left-cr.left+br.width*0.7)+'px';mc.style.top=(br.top-cr.top+br.height*0.5)+'px';}

function renderRight(){
  const w=W(STATE.sel),gs=groupsOf(w);let h='';
  gs.forEach((g,gi)=>{
    const ops=w.ops.filter(o=>o.g===g);const stt=gi<RUN.reveal?'done':(gi===RUN.reveal&&RUN.phase==='working'?'doing':'');
    if(gi>0)h+=`<div class="rarrow ${gi<=RUN.reveal?'on':''}">▼</div>`;
    const par=ops.length>1;h+=`<div class="rstage ${par?'par':''}">`;if(par)h+=`<div class="rph">∥ 병렬 동시 실행</div>`;
    ops.forEach(o=>{let out=o.out;let changed='';if(o.ext&&extExcluded()){out='제외됨 (담당자 결정)';changed=' changed';}
      const micro=o.micro?`<div class="op-micro">${o.micro.map(m=>`<span class="mc">${m}</span>`).join('')}</div>`:'';
      const badge=o.badge?`<span class="op-badge">${o.badge}</span>`:'';
      const type=o.type?`<span class="op-type">${o.type}</span>`:'';
      const why=(stt&&o.why)?`<div class="op-why">근거 · <b>${o.why}</b></div>`:'';
      h+=`<div class="op ${stt} ${o.asset?'asset':''}${changed}"><div class="op-h"><span class="op-lay">${o.L} ${LK[o.L]}</span>${type}<span class="op-t">${o.comp}</span>${badge}</div><div class="op-out">${o.feed} · <b>${stt?out:'대기'}</b></div>${why}${(stt?micro:'')}</div>`;});
    h+=`</div>`;
  });
  document.getElementById('flow').innerHTML=h;document.getElementById('explain').innerHTML=w.explain;
}
function renderBot(){const i=idxOf(STATE.sel);document.getElementById('bstep').innerHTML=`현재 단계 <b>${String(i+1).padStart(2,'0')} / ${WORK.length}</b> · ${W(STATE.sel).label}`;}

function openModal(m){document.getElementById('mbox').innerHTML=`<div class="mtop"><div><div class="mt">${m.t}</div><div class="msub">${m.sub}</div></div><span class="mx" onclick="document.getElementById('modal').style.display='none'">×</span></div><div class="mbody">${m.body}</div>`;document.getElementById('modal').style.display='flex';}
function openOrch(){
  const w=W(STATE.sel),ci=idxOf(STATE.sel);const order={know:2,part:3,cal:5,agd:7,exe:9};
  const subHTML=SUBS.map(([k,nm])=>{let cls='';if(w.sub===k)cls='act';else if(order[k]!==undefined&&order[k]<ci)cls='done';
    const stt=cls==='act'?'진행 중':(cls==='done'?'완료':'대기');
    return `<div class="subag ${cls}"><div class="san">${nm}</div><div class="sas">${{part:'참석자 후보',cal:'일정 계산',know:'자료 수집·묶음',agd:'안건 구성',exe:'시스템 반영'}[k]}</div><div class="sbd">호출 · ${stt}</div></div>`;}).join('');
  const standHTML=STANDING.map(([nm,b])=>`<span class="stch">${nm} <b>${b}</b></span>`).join('');
  const a2aHTML=A2A_LIST.map(([a,b,t])=>{const an=(SUBS.find(s=>s[0]===a)||[])[1]||(a==='pol'?'정책 Agent':a);const bn=(SUBS.find(s=>s[0]===b)||[])[1]||b;return `<div class="a2r"><b>${an} → ${bn}</b> · ${t}</div>`;}).join('');
  const coordHTML=COORD.map(([a,t])=>`<div class="cl"><b>${a}</b> · ${t}</div>`).join('');
  document.getElementById('mbox').innerHTML=`<div class="mtop"><div><div class="mt">에이전트 오케스트레이션</div><div class="msub">Supervisor가 sub-agent를 분해·배정·조율 · A2A 연계 · 충돌 통합</div></div><span class="mx" onclick="document.getElementById('modal').style.display='none'">×</span></div>
   <div class="mbody"><div class="orchg"><div class="sup">Supervisor (Master)<small>계획 · 분해 · 배정 · 통합 · 충돌 조정</small></div><div class="orch-stem"></div><div class="subs">${subHTML}</div></div>
   <div class="standing"><div class="stand-h">상시 감시 Agent (요청 없이도 항상 작동)</div><div class="stand-chips">${standHTML}</div></div>
   <div class="a2alist"><div class="dl" style="margin-bottom:4px">A2A · 에이전트 간 연계</div>${a2aHTML}</div>
   <div class="coord"><div class="coord-h">조율 결과 · Supervisor가 충돌을 통합</div>${coordHTML}<div class="cr">→ 외부 포함 · 일정 6/25로 변경 · 내부 상세 자료 제외 · 초대 메일은 담당자 확인 후 발송</div></div></div>`;
  document.getElementById('modal').style.display='flex';
}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')e.currentTarget.style.display='none';};
document.getElementById('orchBtn').onclick=openOrch;

function runStart(){const b=document.getElementById('delegBtn');if(b)b.classList.add('press');document.getElementById('mcursor').classList.add('click');
  RUN.timers.push(setTimeout(()=>{RUN.phase='working';RUN.reveal=0;renderConsole();renderRight();revealOps();},420));}
function revealOps(){const n=groupsOf(W(STATE.sel)).length;
  for(let i=1;i<=n;i++)RUN.timers.push(setTimeout(()=>{RUN.reveal=i;renderConsole();renderRight();},i*720));
  RUN.timers.push(setTimeout(()=>{RUN.phase='done';RUN.reveal=n;stopFlash();renderConsole();renderRight();
    if(STATE.playing)RUN.playTimer=setTimeout(playNext,W(STATE.sel).hitl?2400:1500);},n*720+300));}
function runStep(){clearRun();STATE.hitlDone=false;RUN.phase='before';RUN.reveal=0;renderConsole();renderRight();}
function setSel(id){STATE.sel=id;STATE.hitlDone=false;renderDrill();renderBot();runStep();}

function startPlay(){STATE.playing=true;STATE.decisions={};document.getElementById('playBtn').textContent='중지';setSel(WORK[0].id);autoRun();}
function autoRun(){const b=document.getElementById('delegBtn');if(b){b.classList.add('press');document.getElementById('mcursor').classList.add('click');RUN.timers.push(setTimeout(()=>{RUN.phase='working';RUN.reveal=0;renderConsole();renderRight();revealOps();},420));}}
function stopPlay(){STATE.playing=false;clearTimeout(RUN.playTimer);document.getElementById('playBtn').textContent='처리 흐름 보기';}
function playNext(){const ci=idxOf(STATE.sel);if(ci<WORK.length-1){setSel(WORK[ci+1].id);autoRun();}else stopPlay();}

document.getElementById('replay').onclick=()=>runStep();
document.getElementById('playBtn').onclick=()=>STATE.playing?stopPlay():startPlay();
document.getElementById('devToggle').onchange=e=>document.body.classList.toggle('dev-on',e.target.checked);
const TIP=document.getElementById('tip');
document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]');if(t){TIP.textContent=t.getAttribute('data-tip');TIP.style.display='block';const r=t.getBoundingClientRect();TIP.style.left=Math.min(r.left,window.innerWidth-320)+'px';let tp=r.bottom+8;if(tp+TIP.offsetHeight>window.innerHeight)tp=r.top-TIP.offsetHeight-8;TIP.style.top=Math.max(8,tp)+'px';}else if(!e.target.closest('#tip'))TIP.style.display='none';});

(function(){const q=new URLSearchParams(location.search);if(q.get('dev')==='1'){document.body.classList.add('dev-on');document.getElementById('devToggle').checked=true;}
 if(q.get('ext')==='no')STATE.decisions['parts']='no';
 const s=q.get('sel')||'request';STATE.sel=W(s)?s:'request';renderDrill();renderBot();
 if(q.get('still')==='1'){STATE.hitlDone=q.get('hitl')==='1';RUN.phase='done';RUN.reveal=groupsOf(W(STATE.sel)).length;renderConsole();renderRight();}else runStep();
 if(q.get('orch')==='1')openOrch();})();
</script>
</body>
</html>
